                    label={{value:r.label, position:r.pos==="left"?"insideTopLeft":"insideTopRight",
                      fill:r.color, fontSize:9, fontWeight:"bold", stroke:"#fff", strokeWidth:3, paintOrder:"stroke"}}/>
                ))}
                <Line type="monotone" dataKey="sc1" stroke="#2a6496" strokeWidth={2.5} dot={{r:2.5,fill:"#2a6496"}} name="Sc.1 (rising dimorphism)" connectNulls/>
                <Line type="monotone" dataKey="sc2" stroke="#a63a3a" strokeWidth={2.5} dot={{r:2.5,fill:"#a63a3a"}} name="Sc.2 (rising noise, E=0)" connectNulls/>
                <Line type="monotone" dataKey="sc3" stroke="#2a7a4a" strokeWidth={2.5} dot={{r:2.5,fill:"#2a7a4a"}} name="Sc.3 (rising noise, E=natural)" connectNulls/>
              </LineChart>
            </ResponsiveContainer>
            <div style={{marginTop:"10px",padding:"8px 12px",background:"#f8f4ec",borderLeft:"3px solid #1c2b3a",fontSize:"10px",color:"#5a4a2a",lineHeight:1.6}}>
              <strong>Reading this overlay:</strong> The vertical gap between Sc.2 (noise only, red) and Sc.3 (noise + real dimorphism, green) at any x-position shows the contribution of genuine dimorphism above the noise baseline. Sc.1 (blue) shows how the metric responds as true dimorphism grows with noise held fixed. Where Sc.1 and Sc.2 diverge most, the metric best discriminates signal from noise.
            </div>
          </div>
        );
      })()}

      {/* Second combined overlay for the secondary metric (y2): CV DeltaLL or GMM DeltaBIC */}
      {y2Label && (() => {
        const xs = [...new Set([...dimT, ...varT, ...snrT].map(d => +d.x.toFixed(3)))].sort((a,b)=>a-b);
        const findY2 = (rows, x) => { const r = rows.find(d => Math.abs(d.x - x) < 0.001); return r ? r.y2 : undefined; };
        const combined2 = xs.map(x => ({
          x, sc1: findY2(dimT, x), sc2: findY2(varT, x), sc3: findY2(snrT, x),
        }));
        const y2vals = combined2.flatMap(d=>[d.sc1,d.sc2,d.sc3]).filter(v=>v!=null&&isFinite(v));
        if (!y2vals.length) return null;
        // Threshold lines this overlay will draw — include them in the range so they're never clipped.
        const y2Thresholds = metric==="gmm" ? [0, -2] : [0];
        const y2RangeVals = [...y2vals, ...y2Thresholds];
        const y2Ticks = niceTicks(Math.min(...y2RangeVals), Math.max(...y2RangeVals), 5);
        const y2Dom = [y2Ticks[0]-Math.abs(y2Ticks[y2Ticks.length-1]-y2Ticks[0])*0.04,
                       y2Ticks[y2Ticks.length-1]+Math.abs(y2Ticks[y2Ticks.length-1]-y2Ticks[0])*0.04];
        return (
          <div style={{marginTop:"22px",background:"#fff",border:"2px solid #6a4a8a",padding:"18px 20px"}}>
            <div style={{fontSize:"13px",fontWeight:"bold",color:"#4a2a6a",marginBottom:"3px"}}>
              All Three Scenarios Overlaid — {y2Label}
            </div>
            <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"12px"}}>
              The secondary metric for this tab, overlaid across all three scenarios. X-axis = × natural reference. Dashed vertical line = natural reference (×1).
            </div>
            <ResponsiveContainer width="100%" height={300}>
              <LineChart data={combined2} margin={{top:18,right:20,left:12,bottom:34}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
                <XAxis dataKey="x" type="number" domain={[0, 2.5]} ticks={[0,0.5,1,1.5,2,2.5]}
                  tickFormatter={v=>v.toFixed(1)+"×"}
                  label={{value:"× natural reference value",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
                  tick={{fontSize:10}}/>
                <YAxis domain={y2Dom} ticks={y2Ticks} tickFormatter={niceFmt}
                  label={{value:y2Label,angle:-90,position:"insideLeft",style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}}
                  tick={{fontSize:10}} width={62}/>
                <Tooltip formatter={(v,n)=>[isFinite(v)?v.toFixed(4):String(v),n]}
                  contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"}}/>
                <Legend wrapperStyle={{fontSize:"11px",fontFamily:"Georgia,serif",paddingTop:"10px"}}/>
                <ReferenceLine x={1} stroke="#aaa" strokeDasharray="3 3"
                  label={{value:"Natural",position:"insideTop",fill:"#888",fontSize:9,stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
                <ReferenceLine y={0} stroke="#c8a96e" strokeDasharray="4 2"
                  label={{value:"y=0",position:"insideTopRight",fill:"#a08020",fontSize:9,fontWeight:"bold",stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
                {metric==="gmm" && <ReferenceLine y={-2} stroke="#a06030" strokeDasharray="2 4"
                  label={{value:"ΔBIC=−2 (positive evidence)",position:"insideTopRight",fill:"#a06030",fontSize:9,fontWeight:"bold",stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>}
                <Line type="monotone" dataKey="sc1" stroke="#2a6496" strokeWidth={2.5} dot={{r:2.5,fill:"#2a6496"}} name="Sc.1 (rising dimorphism)" connectNulls/>
                <Line type="monotone" dataKey="sc2" stroke="#a63a3a" strokeWidth={2.5} dot={{r:2.5,fill:"#a63a3a"}} name="Sc.2 (rising noise, E=0)" connectNulls/>
                <Line type="monotone" dataKey="sc3" stroke="#2a7a4a" strokeWidth={2.5} dot={{r:2.5,fill:"#2a7a4a"}} name="Sc.3 (rising noise, E=natural)" connectNulls/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        );
      })()}

      {/* GMM U-shape diagnostic: gap vs spread vs Cohen's d across effect size (Sc.1 only) */}
      {metric==="gmm" && (() => {
        const rows = (dimData||[]).filter(Boolean)
          .filter(d => isFinite(d.gmmGap_mean) && isFinite(d.gmmSpread_mean))
          .map(d => ({
            x: +(d.x/naturalE).toFixed(2),          // x in × natural dimorphism
            gap: +d.gmmGap_mean.toFixed(4),
            spread: +d.gmmSpread_mean.toFixed(4),
            d: isFinite(d.componentSep_mean) ? +d.componentSep_mean.toFixed(3) : null,
          }));
        if (rows.length < 3) return null;
        const gapMax = Math.max(...rows.map(r=>r.gap), ...rows.map(r=>r.spread));
        const dMax   = Math.max(...rows.map(r=>r.d||0));
        const gapTicks = niceTicks(0, gapMax, 5);
        const dTicks   = niceTicks(0, dMax, 5);
        // find the x where Cohen's d peaks (the crossover)
        const peak = rows.reduce((a,b)=>(b.d||0)>(a.d||0)?b:a, rows[0]);
        return (
          <div style={{marginTop:"22px",background:"#fff",border:"2px solid #0F6E56",padding:"18px 20px"}}>
            <div style={{fontSize:"13px",fontWeight:"bold",color:"#0F6E56",marginBottom:"3px"}}>
              Why Sc.1 GMM ΔBIC is U-shaped — the two competing quantities
            </div>
            <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"10px"}}>
              Component separation = Cohen's d = (between-component gap) ÷ (within-component spread), measured on the residuals of the Sc.1 (rising dimorphism) runs. The gap and spread are on the left axis (metres); Cohen's d is on the right axis. Peak d here is near {peak.x}× natural dimorphism.
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"14px",marginBottom:"8px",fontSize:"11px",color:"#5a4a2a"}}>
              <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#185FA5",display:"inline-block"}}/>Between-group gap (numerator)</span>
              <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#D85A30",display:"inline-block",borderTop:"1px dashed #D85A30"}}/>Within-group spread (denominator)</span>
              <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#0F6E56",display:"inline-block"}}/>Cohen's d = gap ÷ spread</span>
            </div>
            <ResponsiveContainer width="100%" height={280}>
              <ComposedChart data={rows} margin={{top:20,right:52,left:16,bottom:34}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
                <XAxis dataKey="x" type="number" domain={[0,2.5]} ticks={[0,0.5,1,1.5,2,2.5]}
                  tickFormatter={v=>v.toFixed(1)+"×"}
                  label={{value:"Effect size (× natural dimorphism)",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
                  tick={{fontSize:10}}/>
                <YAxis yAxisId="L" domain={[0, gapTicks[gapTicks.length-1]]} ticks={gapTicks} tickFormatter={niceFmt}
                  label={{value:"Gap / Spread (m)",angle:-90,position:"insideLeft",style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}}
                  tick={{fontSize:10}} width={58}/>
                <YAxis yAxisId="R" orientation="right" domain={[0, dTicks[dTicks.length-1]]} ticks={dTicks} tickFormatter={niceFmt}
                  label={{value:"Cohen's d",angle:90,position:"insideRight",style:{fontSize:"10px",fill:"#0F6E56",textAnchor:"middle"}}}
                  tick={{fontSize:10}} width={48}/>
                <Tooltip formatter={(v,n)=>[isFinite(v)?(+v).toFixed(3):String(v),n]}
                  labelFormatter={l=>`${l}× natural dimorphism`}
                  contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"}}/>
                <ReferenceLine x={peak.x} yAxisId="L" stroke="#0F6E56" strokeDasharray="4 3"
                  label={{value:"d peaks",position:"insideTopRight",fill:"#0F6E56",fontSize:9,fontWeight:"bold",stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
                <Line yAxisId="L" type="monotone" dataKey="gap" stroke="#185FA5" strokeWidth={2}
                  dot={{r:2.5,fill:"#185FA5"}} name="Between-group gap" connectNulls/>
                <Line yAxisId="L" type="monotone" dataKey="spread" stroke="#D85A30" strokeWidth={2}
                  strokeDasharray="5 3" dot={{r:2.5,fill:"#D85A30"}} name="Within-group spread" connectNulls/>
                <Line yAxisId="R" type="monotone" dataKey="d" stroke="#0F6E56" strokeWidth={3}
                  dot={{r:3,fill:"#0F6E56"}} name="Cohen's d" connectNulls/>
              </ComposedChart>
            </ResponsiveContainer>
            <div style={{marginTop:"10px",padding:"8px 12px",background:"#eafaf2",borderLeft:"3px solid #0F6E56",fontSize:"10px",color:"#0a3a2a",lineHeight:1.6}}>
              The gap (blue) rises then stalls or falls at high effect size, because a single combined growth curve no longer cleanly separates the two sexes' residual means once the male curve's shape distorts. The spread (orange) rises steadily the whole way, as that single curve fits each sex progressively worse. Cohen's d (green) is their ratio: it climbs while the gap outpaces the spread, then falls once the spread takes over — producing the U-shape in GMM ΔBIC, which is most negative (strongest 2-component evidence) right at the green peak.
            </div>
          </div>
        );
      })()}

      {/* The mis-sorting / sexing-accuracy diagnostic now lives in its own "Sexing Accuracy" tab,
          where it is shown for all three scenarios. A brief note about the intermittent CV dip is in
          the interpretation panel below. */}
    </div>
  );
}

function ChartPanel({title,subtitle,data,xLabel,yLabel,y2Label,yDesc,color,
  sharedDomain,tTicks,tickFmt,effectiveScale,untransform,
  referenceX,referenceXLabel,scaleBadge,scaleBadgeColor,refLines=[],onStepClick}){
  const hasData=data&&data.length>0&&data.some(d=>d.y!=null&&isFinite(d.y));
  const hasY2=y2Label&&data&&data.some(d=>d.y2!=null&&isFinite(d.y2));

  const slog=v=>v===0?0:Math.sign(v)*Math.log10(1+Math.abs(v));
  const toScaled=v=>{
    if(v==null||!isFinite(v)) return null;
    if(effectiveScale==="log")        return v>0?Math.log10(v):null;
    if(effectiveScale==="signedLog")  return slog(v);
    return v;
  };
  const [dMin,dMax]=sharedDomain||[-Infinity,Infinity];

  // Secondary metric (y2) gets its OWN right-hand axis when its scale differs from y.
  // This is essential for the GMM tab where Component Sep (~0-2) and ΔBIC (~-50..50)
  // would otherwise be crushed onto one axis.
  const y2vals = hasY2 ? data.map(d=>d.y2).filter(v=>v!=null&&isFinite(v)) : [];
  const useRightAxis = hasY2 && y2vals.length > 0;
  let y2Domain=null, y2Ticks=null;
  if (useRightAxis) {
    const lo=Math.min(...y2vals), hi=Math.max(...y2vals);
    y2Ticks=niceTicks(lo,hi,5);
    const pad=Math.abs(y2Ticks[y2Ticks.length-1]-y2Ticks[0])*0.04||0.1;
    y2Domain=[y2Ticks[0]-pad, y2Ticks[y2Ticks.length-1]+pad];
  }

  // Reference lines for the LEFT (primary) axis: those without axis:"right"
  const leftRefLines=refLines.filter(r=>r.axis!=="right")
    .map(r=>({...r,yScaled:toScaled(r.y)}))
    .filter(r=>r.yScaled!=null&&isFinite(r.yScaled)&&r.yScaled>=dMin&&r.yScaled<=dMax);
  // Reference lines for the RIGHT (secondary) axis: those with axis:"right"
  const rightRefLines=useRightAxis
    ? refLines.filter(r=>r.axis==="right")
        .filter(r=>r.y>=y2Domain[0]&&r.y<=y2Domain[1])
    : [];

  const handleClick = (chartData) => {
    if (!onStepClick || !chartData?.activePayload) return;
    const pt = chartData.activePayload[0]?.payload;
    if (!pt || pt.effectSize == null) return;
    onStepClick({ effectSize: pt.effectSize, sdMult: pt.sdMult, scenario: pt.scenario, xVal: pt.x });
  };

  return(
    <div style={{background:"#fff",border:"1px solid #d4c9b0",padding:"16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"2px"}}>
        <div style={{fontSize:"12px",fontWeight:"bold",color:"#1c2b3a"}}>{title}</div>
        {scaleBadge&&(
          <span style={{background:scaleBadgeColor||"#2a6496",color:"#fff",
            padding:"1px 6px",borderRadius:"3px",fontSize:"9px",fontWeight:"bold",
            letterSpacing:"0.3px",whiteSpace:"nowrap",marginLeft:"6px",marginTop:"1px"}}>
            {scaleBadge}
          </span>
        )}
      </div>
      <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"6px"}}>{subtitle}</div>
      {onStepClick&&<div style={{fontSize:"9px",color:"#2a6496",marginBottom:"4px",fontStyle:"italic"}}>
        ▸ Click any data point to see the growth curves at that step
      </div>}
      {hasData?(
        <ResponsiveContainer width="100%" height={230}>
          <LineChart key={effectiveScale} data={data} margin={{top:18,right:14,left:8,bottom:32}}
            onClick={handleClick} style={{cursor:onStepClick?"pointer":"default"}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
            <XAxis dataKey="x" type="number" domain={["auto","auto"]}
              label={{value:xLabel,position:"bottom",offset:-5,style:{fontSize:"10px",fill:"#5a4a2a"}}} tick={{fontSize:9}}/>
            <YAxis domain={sharedDomain} ticks={tTicks} tickFormatter={tickFmt}
              label={{value:hasY2?"two measures (see key below)":yLabel,angle:-90,position:"insideLeft",style:{fontSize:"8px",fill:"#5a4a2a",textAnchor:"middle"}}}
              tick={{fontSize:9}} width={62}/>
            <Tooltip
              formatter={(v,n)=>{
                const raw=untransform(v);
                const label=isFinite(raw)?raw.toFixed(4):String(v);
                const hint=effectiveScale!=="linear"?` (${effectiveScale==="log"?"log":"slog"}=${(+v).toFixed(3)})`:"";
                return[label+hint,n];
              }}
              contentStyle={{fontFamily:"Georgia,serif",fontSize:"10px",border:"1px solid #d4c9b0"}}/>
            {leftRefLines.map((r,i)=>(
              <ReferenceLine key={"L"+i} y={r.yScaled}
                stroke={r.color} strokeDasharray={r.dash} strokeWidth={1.2}
                label={{value:r.label, position:r.pos==="left"?"insideTopLeft":"insideTopRight",
                  fill:r.color, fontSize:9, fontWeight:"bold",
                  stroke:"#faf8f4", strokeWidth:3, paintOrder:"stroke"}}/>
            ))}
            {rightRefLines.map((r,i)=>{
              const ys=toScaled(r.y);
              if(ys==null||!isFinite(ys)) return null;
              return (
                <ReferenceLine key={"R"+i} y={ys}
                  stroke={r.color} strokeDasharray={r.dash} strokeWidth={1.2}
                  label={{value:r.label, position:r.pos==="left"?"insideTopLeft":"insideTopRight",
                    fill:r.color, fontSize:9, fontWeight:"bold",
                    stroke:"#faf8f4", strokeWidth:3, paintOrder:"stroke"}}/>
              );
            })}
            {referenceX&&<ReferenceLine x={referenceX} stroke="#aaa" strokeDasharray="3 3"
              label={{value:referenceXLabel,position:"insideTop",fill:"#888",fontSize:9,
                stroke:"#faf8f4",strokeWidth:3,paintOrder:"stroke"}}/>}
            <Line type="monotone" dataKey="y" stroke={color} strokeWidth={2}
              dot={{r:3,fill:color,cursor:"pointer"}} activeDot={{r:5,strokeWidth:2,stroke:"#fff"}} name={yLabel} connectNulls/>
            {hasY2&&<Line type="monotone" dataKey="y2" stroke={color} strokeWidth={1.5}
              strokeDasharray="5 3" dot={false} name={y2Label} connectNulls/>}
          </LineChart>
        </ResponsiveContainer>
      ):(
        <div style={{height:230,display:"flex",alignItems:"center",justifyContent:"center",
          color:"#aaa",fontStyle:"italic",fontSize:"11px"}}>No data</div>
      )}
      {hasY2&&<div style={{display:"flex",flexWrap:"wrap",gap:"16px",fontSize:"10px",color:"#5a4a2a",marginTop:"6px",alignItems:"center"}}>
        <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:18,height:0,borderTop:`2px solid ${color}`,display:"inline-block"}}/><b>solid:</b> {yLabel}</span>
        <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:18,height:0,borderTop:`2px dashed ${color}`,display:"inline-block"}}/><b>dashed:</b> {y2Label}</span>
      </div>}
      <div style={{marginTop:"8px",padding:"6px 8px",background:"#f8f4ec",
        borderLeft:`3px solid ${color}`,fontSize:"10px",color:"#5a4a2a",lineHeight:1.5}}>{yDesc}</div>
    </div>
  );
}

// --- Growth Curve Panel (shown on click) --------------------------------------
function GrowthCurvePanel({ step, nPerSex, onClose }) {
  const [curves, setCurves] = useState(null);
  const [computing, setComputing] = useState(true);

  useEffect(() => {
    setComputing(true);
    setCurves(null);
    // Run multiple reps and average the curve parameters
    const { effectSize, sdMult } = step;
    const N_REPS = 20;
    const validReps = [];
    for (let r = 0; r < N_REPS; r++) {
      const res = simOnce(nPerSex, effectSize, sdMult);
      if (res) validReps.push(res);
    }
    if (validReps.length === 0) { setComputing(false); return; }

    // Average fitted parameters across reps
    const mean = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
    const avgLFit = {
      Linf: mean(validReps.map(r=>r.lFit.Linf)),
      K:    mean(validReps.map(r=>r.lFit.K)),
      t0:   mean(validReps.map(r=>r.lFit.t0)),
    };
    const avgSFit = {
      Linf: mean(validReps.map(r=>r.sFit.Linf)),
      K:    mean(validReps.map(r=>r.sFit.K)),
      t0:   mean(validReps.map(r=>r.sFit.t0)),
    };

    const ages = Array.from({length:50},(_,i)=>1+i); // full age range 1-50
    const trueFLine = ages.map(a=>({age:a, length:femaleVB(a)}));
    const trueMLine = ages.map(a=>({age:a, length:maleVB(a,effectSize)}));
    const estLLine  = ages.map(a=>({age:a, length:vbPredict(avgLFit,a)}));
    const estSLine  = ages.map(a=>({age:a, length:vbPredict(avgSFit,a)}));

    // Average CI/PI bounds across all reps at each age.
    // Each rep returns lFit with its own ages/lengths; we compute intervals using
    // each rep's actual data, then average the bounds -- this gives honest mean intervals.
    const avgBounds = (repFits, repAgesArr, repLensArr) =>
      ages.map(targetAge => {
        const bounds = repFits.map((fit, ri) => {
          const iv = computeIntervals(fit, repAgesArr[ri], repLensArr[ri], targetAge);
          return iv;
        }).filter(Boolean);
        if (bounds.length === 0) return null;
        return {
          ci_lo: mean(bounds.map(b=>b.ci_low)),
          ci_hi: mean(bounds.map(b=>b.ci_high)),
          pi_lo: mean(bounds.map(b=>b.pi_low)),
          pi_hi: mean(bounds.map(b=>b.pi_high)),
        };
      });

    // Collect per-rep fits and their actual age/length data (stored by simOnce)
    const lFits    = validReps.map(r=>r.lFit);
    const sFits    = validReps.map(r=>r.sFit);
    const repDataL = validReps.map(r=>({
      ages: r.lAges || [], lens: r.lLens || [],
    }));
    const repDataS = validReps.map(r=>({
      ages: r.sAges || [], lens: r.sLens || [],
    }));

    // If reps stored lAges/lLens, use them; otherwise fall back to single-point estimate
    const hasData = repDataL[0].ages.length > 0;
    let ribbonL, ribbonS;

    if (hasData) {
      ribbonL = avgBounds(lFits, repDataL.map(r=>r.ages), repDataL.map(r=>r.lens));
      ribbonS = avgBounds(sFits, repDataS.map(r=>r.ages), repDataS.map(r=>r.lens));
    } else {
      // Fallback: use avgLFit with a synthetic age/length array covering the range
      const synthAges = Array.from({length:20},(_,i)=>1+i*2.5);
      ribbonL = ages.map(a=>{
        const iv = computeIntervals(avgLFit, synthAges, synthAges.map(sa=>vbPredict(avgLFit,sa)), a);
        return iv ? {ci_lo:iv.ci_low,ci_hi:iv.ci_high,pi_lo:iv.pi_low,pi_hi:iv.pi_high} : null;
      });
      ribbonS = ages.map(a=>{
        const iv = computeIntervals(avgSFit, synthAges, synthAges.map(sa=>vbPredict(avgSFit,sa)), a);
        return iv ? {ci_lo:iv.ci_low,ci_hi:iv.ci_high,pi_lo:iv.pi_low,pi_hi:iv.pi_high} : null;
      });
    }

    const chartData = ages.map((a,i)=>({
      age: a,
      trueF:   trueFLine[i].length,
      trueM:   effectSize > 0 ? trueMLine[i].length : undefined,
      estL:    estLLine[i].length,
      estS:    estSLine[i].length,
      lPi: ribbonL[i] ? [ribbonL[i].pi_lo, ribbonL[i].pi_hi] : undefined,
      sPi: ribbonS[i] ? [ribbonS[i].pi_lo, ribbonS[i].pi_hi] : undefined,
      lCi: ribbonL[i] ? [ribbonL[i].ci_lo, ribbonL[i].ci_hi] : undefined,
      sCi: ribbonS[i] ? [ribbonS[i].ci_lo, ribbonS[i].ci_hi] : undefined,
    }));

    // Summary stats
    const estEffect = mean(validReps.map(r=>r.estEffect));
    const piSep     = mean(validReps.map(r=>r.piSep));
    const ciSep     = mean(validReps.map(r=>r.ciSep));
    const maleAcc   = mean(validReps.map(r=>r.maleAccuracy));
    const femaleAcc = mean(validReps.map(r=>r.femaleAccuracy));

    setCurves({ chartData, estEffect, piSep, ciSep, maleAcc, femaleAcc, nReps: validReps.length,
      avgLFit, avgSFit, effectSize, sdMult });
    setComputing(false);
  }, [step, nPerSex]);

  const scenarioLabel = step.scenario === "dimorphism"
    ? `Sc.1: E=${step.effectSize.toFixed(3)}m (${(step.effectSize/NATURAL_E).toFixed(2)}× natural), SD=1× natural`
    : step.scenario === "variance"
    ? `Sc.2: E=0 (monomorphic), SD=${step.sdMult.toFixed(3)}× natural`
    : `Sc.3: E=${step.effectSize.toFixed(3)}m (natural), SD=${step.sdMult.toFixed(3)}× natural`;

  return (
    <div style={{
      margin:"20px 0", background:"#fff",
      border:"2px solid #2a6496", borderRadius:"4px",
      boxShadow:"0 4px 20px rgba(0,0,0,0.15)"
    }}>
      {/* Header */}
      <div style={{background:"#1c2b3a",color:"#e8dfc8",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:"11px",letterSpacing:"2px",textTransform:"uppercase",color:"#c8a96e",marginBottom:"4px"}}>
            Growth Curves at Selected Step
          </div>
          <div style={{fontSize:"13px"}}>{scenarioLabel}</div>
          <div style={{fontSize:"11px",color:"#aaa",marginTop:"2px"}}>
            Averaged over {curves?.nReps || 20} simulation runs. Click another point to update, or close to dismiss.
          </div>
        </div>
        <button onClick={onClose} style={{
          background:"#c8a96e",border:"none",color:"#1c2b3a",
          padding:"6px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:"12px",fontWeight:"bold",borderRadius:"2px"
        }}>x Close</button>
      </div>

      {computing && (
        <div style={{padding:"40px",textAlign:"center",color:"#8a7a5a",fontStyle:"italic"}}>
          Running 20 simulations at this step...
        </div>
      )}

      {curves && (
        <div style={{padding:"20px"}}>
          {/* Summary stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"12px",marginBottom:"12px"}}>
            {[
              {label:"True Effect (E)", val: step.effectSize > 0 ? step.effectSize.toFixed(3)+"m" : "0 (monomorphic)", color:"#555"},
              {label:"Estimated Effect", val: curves.estEffect.toFixed(3)+"m", color:"#1e50a0"},
              {label:"CI Separation", val: curves.ciSep.toFixed(3)+"m", color: curves.ciSep>0?"#2a8a2a":"#a63a3a"},
              {label:"PI Separation", val: curves.piSep.toFixed(3)+"m", color: curves.piSep>0?"#2a8a2a":"#a63a3a"},
            ].map((s,i)=>(
              <div key={i} style={{background:"#f8f4ec",padding:"10px 14px",borderLeft:`3px solid ${s.color}`}}>
                <div style={{fontSize:"10px",color:"#8a7a5a",marginBottom:"3px"}}>{s.label}</div>
                <div style={{fontSize:"16px",fontWeight:"bold",color:s.color}}>{s.val}</div>
              </div>
            ))}
          </div>
          {/* Sex assignment accuracy (residual method), scored against true generating sex */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"8px"}}>
            {[
              {label:"Male sexing accuracy", val: isFinite(curves.maleAcc)?curves.maleAcc.toFixed(1)+"%":"--",
               color: curves.maleAcc>=75?"#2a8a2a":curves.maleAcc>=60?"#8a6a2a":"#a63a3a"},
              {label:"Female sexing accuracy", val: isFinite(curves.femaleAcc)?curves.femaleAcc.toFixed(1)+"%":"--",
               color: curves.femaleAcc>=75?"#2a8a2a":curves.femaleAcc>=60?"#8a6a2a":"#a63a3a"},
            ].map((s,i)=>(
              <div key={i} style={{background:"#f0f4f8",padding:"10px 14px",borderLeft:`3px solid ${s.color}`}}>
                <div style={{fontSize:"10px",color:"#8a7a5a",marginBottom:"3px"}}>{s.label}</div>
                <div style={{fontSize:"16px",fontWeight:"bold",color:s.color}}>{s.val}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"20px",lineHeight:1.5}}>
            Sexing accuracy (following Saitta et al.): the percentage of truly-male specimens assigned to the larger group by positive residual, and of truly-female specimens assigned to the smaller group by negative residual. At E=0 these sit near 50% (the residual split cannot recover sex that has no size signal); they climb toward 100% as true dimorphism grows.
          </div>

          {/* Growth curve chart */}
          <div style={{marginBottom:"8px",fontSize:"12px",color:"#1c2b3a",fontWeight:"bold"}}>
            Body Length vs Age -- True and Estimated Growth Curves
          </div>
          <div style={{fontSize:"10px",color:"#5a4a2a",marginBottom:"12px",lineHeight:1.8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 16px"}}>
            <span><span style={{display:"inline-block",width:28,height:10,background:"rgba(42,130,180,0.20)",border:"1px solid rgba(42,130,180,0.5)",marginRight:5,verticalAlign:"middle"}}/>Larger-sex 95% PI (light blue) -- individual specimen range</span>
            <span><span style={{display:"inline-block",width:28,height:10,background:"rgba(200,80,30,0.20)",border:"1px solid rgba(200,80,30,0.5)",marginRight:5,verticalAlign:"middle"}}/>Smaller-sex 95% PI (light orange) -- individual specimen range</span>
            <span><span style={{display:"inline-block",width:28,height:10,background:"rgba(30,80,160,0.45)",border:"1px solid rgba(30,80,160,0.8)",marginRight:5,verticalAlign:"middle"}}/>Larger-sex 95% CI (dark blue) -- fitted curve uncertainty</span>
            <span><span style={{display:"inline-block",width:28,height:10,background:"rgba(160,30,30,0.45)",border:"1px solid rgba(160,30,30,0.8)",marginRight:5,verticalAlign:"middle"}}/>Smaller-sex 95% CI (dark red) -- fitted curve uncertainty</span>
            <span><span style={{display:"inline-block",width:24,height:3,background:"#777",verticalAlign:"middle",marginRight:5}}/><span style={{borderTop:"2px dashed #777",display:"inline-block",width:0}}/> True curves -- grey dashed</span>
            <span><span style={{display:"inline-block",width:24,height:3,background:"#1e50a0",verticalAlign:"middle",marginRight:5}}/> Estimated curves -- solid coloured</span>
          </div>
          <ResponsiveContainer width="100%" height={380}>
            <ComposedChart data={curves.chartData} margin={{top:8,right:20,left:20,bottom:30}}>
              <defs>
                {/* PI bands: lighter, more saturated teal/orange to distinguish from CI */}
                <linearGradient id="lPiFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#2a82b4" stopOpacity={0.18}/>
                  <stop offset="100%" stopColor="#2a82b4" stopOpacity={0.18}/>
                </linearGradient>
                <linearGradient id="sPiFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#c8501e" stopOpacity={0.18}/>
                  <stop offset="100%" stopColor="#c8501e" stopOpacity={0.18}/>
                </linearGradient>
                {/* CI bands: same hue but darker and more opaque */}
                <linearGradient id="lCiFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#1e50a0" stopOpacity={0.42}/>
                  <stop offset="100%" stopColor="#1e50a0" stopOpacity={0.42}/>
                </linearGradient>
                <linearGradient id="sCiFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#a01e1e" stopOpacity={0.42}/>
                  <stop offset="100%" stopColor="#a01e1e" stopOpacity={0.42}/>
                </linearGradient>
              </defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
              <XAxis dataKey="age" type="number" domain={[1,50]}
                label={{value:"Age (years)",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
                tick={{fontSize:10}}/>
              <YAxis domain={[0, 5]} ticks={[0,1,2,3,4,5]}
                tickFormatter={v=>v.toFixed(0)+"m"}
                label={{value:"Body length (m)",angle:-90,position:"insideLeft",style:{fontSize:"11px",fill:"#5a4a2a",textAnchor:"middle"}}}
                tick={{fontSize:10}} width={42}/>
              <Tooltip
                formatter={(v,n)=>{
                  if(Array.isArray(v)) return [`${v[0].toFixed(3)}-${v[1].toFixed(3)} m`, n];
                  return [typeof v==="number"?v.toFixed(3)+"m":v, n];
                }}
                contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px"}}/>

              {/* PI shaded bands -- wide light bands, outermost */}
              <Area type="monotone" dataKey="lPi" stroke="#2a82b4" strokeWidth={0.5}
                fill="url(#lPiFill)" legendType="none" connectNulls/>
              <Area type="monotone" dataKey="sPi" stroke="#c8501e" strokeWidth={0.5}
                fill="url(#sPiFill)" legendType="none" connectNulls/>

              {/* CI shaded bands -- narrower darker bands, inside PI */}
              <Area type="monotone" dataKey="lCi" stroke="#1e50a0" strokeWidth={0.8}
                fill="url(#lCiFill)" legendType="none" connectNulls/>
              <Area type="monotone" dataKey="sCi" stroke="#a01e1e" strokeWidth={0.8}
                fill="url(#sCiFill)" legendType="none" connectNulls/>

              {/* True curves -- grey dashed */}
              <Line type="monotone" dataKey="trueF" stroke="#999" strokeWidth={1.5}
                strokeDasharray="7 3" dot={false} name="True female" connectNulls/>
              {step.effectSize > 0 && <Line type="monotone" dataKey="trueM" stroke="#555"
                strokeWidth={1.5} strokeDasharray="7 3" dot={false} name="True male" connectNulls/>}

              {/* Estimated mean curves -- solid, on top of everything */}
              <Line type="monotone" dataKey="estL" stroke="#1e50a0" strokeWidth={2.5}
                dot={false} name="Est. larger-sex" connectNulls/>
              <Line type="monotone" dataKey="estS" stroke="#a01e1e" strokeWidth={2.5}
                dot={false} name="Est. smaller-sex" connectNulls/>
            </ComposedChart>
          </ResponsiveContainer>

          {/* Fitted parameter table */}
          <div style={{marginTop:"16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
            {[
              {label:"Estimated LARGER-sex curve", fit:curves.avgLFit, color:"#2a6496"},
              {label:"Estimated smaller-sex curve", fit:curves.avgSFit, color:"#a63a3a"},
            ].map((s,i)=>(
              <div key={i} style={{background:"#f8f4ec",padding:"10px 14px",borderLeft:`3px solid ${s.color}`,fontSize:"11px"}}>
                <div style={{fontWeight:"bold",color:s.color,marginBottom:"6px"}}>{s.label}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"4px"}}>
                  <div><div style={{fontSize:"9px",color:"#8a7a5a"}}>L∞ (m)</div><div style={{fontWeight:"bold"}}>{s.fit.Linf.toFixed(3)}</div></div>
                  <div><div style={{fontSize:"9px",color:"#8a7a5a"}}>K (yr⁻¹)</div><div style={{fontWeight:"bold"}}>{s.fit.K.toFixed(4)}</div></div>
                  <div><div style={{fontSize:"9px",color:"#8a7a5a"}}>t₀ (implicit)</div><div style={{fontWeight:"bold"}}>{s.fit.t0.toFixed(4)}</div></div>
                </div>
              </div>
            ))}
          </div>

          <div style={{marginTop:"12px",fontSize:"10px",color:"#8a7a5a",lineHeight:1.6,padding:"8px 12px",background:"#f0f4f8",borderLeft:"3px solid #1e50a0"}}>
            <strong>How to read:</strong> Grey dashed = true growth curves (what was simulated).
            Dark blue / dark red solid lines = estimated curves for larger-sex and smaller-sex groups respectively.
            Wide light-coloured bands = 95% prediction intervals -- where 95% of individual specimens are expected to fall.
            Narrower darker bands inside = 95% confidence intervals -- where the average fitted curve lies.
            PI is always wider than CI because it adds individual scatter on top of curve uncertainty.
            When PI bands of the two sex groups do not overlap, PI Separation is positive.
          </div>
        </div>
      )}
    </div>
  );
}

function ComparisonPanel({ dimResults, varResults, naturalE, effectMetric, yScale }) {
  const dimClean = dimResults.filter(Boolean);
  const varClean = varResults.filter(Boolean);
  const dimN = dimClean.length;
  const varN = varClean.length;
  const maxLen = Math.max(dimN, varN);

  const metricMap = {
    raw:  { estKey:"estEffect_mean", label:"Estimated Linf diff (m)",       trueLabel:"True Linf diff (m)" },
    sdi:  { estKey:"sdi_mean",       label:"SDI (Lovich & Gibbons)",       trueLabel:"True SDI" },
    logr: { estKey:"logr_mean",      label:"Log-ratio ln(Linf_m/Linf_f)",     trueLabel:"True log-ratio" },
  };
  const mc = metricMap[effectMetric];

  const trueDimMetric = (E) => {
    const mLinf = 2.78 + E, fLinf = 2.78;
    if (effectMetric === "raw")  return E;
    if (effectMetric === "sdi")  return (mLinf / fLinf) - 1;
    if (effectMetric === "logr") return Math.log(mLinf / fLinf);
    return E;
  };

  // x-axis: 0→2.5× natural reference, same for both scenarios
  const merged = Array.from({ length: maxLen }, (_, i) => {
    const di = Math.round((i / (maxLen - 1)) * (dimN - 1));
    const vi = Math.round((i / (maxLen - 1)) * (varN - 1));
    const d = dimClean[di];
    const v = varClean[vi];
    const xVal = +(i / (maxLen - 1) * 2.5).toFixed(3);
    return {
      idx:      xVal,
      dim_est:  d ? +d[mc.estKey].toFixed(4) : undefined,
      dim_true: d ? +trueDimMetric(d.x).toFixed(4) : undefined,
      var_est:  v ? +v[mc.estKey].toFixed(4) : undefined,
    };
  });

  const allY = merged.flatMap(r=>[r.dim_est,r.dim_true,r.var_est]).filter(v=>v!=null&&isFinite(v));
  const scaler = makeScaler(yScale, allY);
  const mergedT = merged.map(r=>({...r,
    dim_est:  scaler.transform(r.dim_est),
    dim_true: scaler.transform(r.dim_true),
    var_est:  scaler.transform(r.var_est),
  }));
  const tVals = mergedT.flatMap(r=>[r.dim_est,r.dim_true,r.var_est]).filter(v=>v!=null&&isFinite(v));
  const yMin = tVals.length ? Math.min(...tVals) : 0;
  const yMax = tVals.length ? Math.max(...tVals) : 1;

  const tickIdxs = [0, 0.5, 1.0, 1.5, 2.0, 2.5];
  const getDimLabel = (idx) => {
    const i = Math.round((idx/2.5)*(dimN-1));
    return (dimClean[i]?.x/naturalE).toFixed(1)+"x";
  };
  const getVarLabel = (idx) => {
    const i = Math.round((idx/2.5)*(varN-1));
    return (varClean[i]?.x/NATURAL_SD_MULT).toFixed(1)+"x";
  };

  const metricNotes = {
    raw:  "Raw L∞ difference (m): absolute body size difference. Not comparable across species of different sizes.",
    sdi:  "SDI: dimensionless fraction. SDI=0.364 means larger sex is 36.4% bigger.",
    logr: "Log-ratio: ln(larger L∞ / smaller L∞). Symmetric, dimensionless, best for cross-species comparison.",
  };

  return (
    <div>
      {/* Intro banner */}
      <div style={{background:"#fff8e8",border:"1px solid #c8a96e",borderLeft:"4px solid #c8a96e",
        padding:"18px 22px",marginBottom:"24px",fontSize:"13px",color:"#5a4a2a",lineHeight:1.85}}>
        <div style={{fontSize:"12px",letterSpacing:"2px",textTransform:"uppercase",color:"#8a6a2a",marginBottom:"10px"}}>
          Direct Comparison -- Signal vs. Noise on a Shared 0→2.5× Axis
        </div>
        <p style={{margin:"0 0 10px"}}>
          Both Scenario 1 and Scenario 2 are plotted on the same x-axis, running from 0 to 2.5× their natural
          reference. At x=1 (dashed vertical line), Sc.1 is at natural alligator dimorphism and Sc.2 is at
          natural alligator scatter -- both anchored at the same relative position.
        </p>
        <p style={{margin:"0 0 10px"}}>
          <strong>Scenario 1 (blue)</strong>: x = true effect size as a multiple of natural dimorphism (0→2.5×).
          Grey dashed = what a perfect method would recover. Gap between blue and grey = bias from residual-split assignment.
        </p>
        <p style={{margin:"0 0 10px"}}>
          <strong>Scenario 2 (red)</strong>: x = scatter multiplier as a multiple of natural scatter (0→2.5×).
          True effect = 0 throughout. Any upward slope is a false positive.
        </p>
        <p style={{margin:"0"}}>
          <strong>Key question:</strong> Does the red line approach or exceed the blue at the same x-position?
          If so, noise produces as large an apparent effect as real dimorphism -- indistinguishable from effect size alone.
          <br/><strong>Current metric:</strong> {metricNotes[effectMetric]}
        </p>
      </div>

      {/* Chart */}
      <div style={{background:"#fff",border:"1px solid #d4c9b0",padding:"28px 24px 16px"}}>
        <div style={{fontSize:"14px",fontWeight:"bold",color:"#1c2b3a",marginBottom:"4px"}}>
          Direct Comparison: {mc.label}
        </div>
        <div style={{fontSize:"11px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"20px"}}>
          x-axis = × natural reference (0→2.5×, same for both scenarios). Grey dashed = true effect (Sc.1).
          Blue = Sc.1 estimated. Red = Sc.2 estimated (true E=0). Vertical dashed = natural reference (x=1).
        </div>
        <ResponsiveContainer width="100%" height={360}>
          <LineChart data={mergedT} margin={{top:10,right:30,left:20,bottom:20}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
            <XAxis dataKey="idx" type="number" domain={[0,2.5]} ticks={tickIdxs}
              tickFormatter={v=>v.toFixed(2)+"×"}
              label={{value:"× natural reference (Sc.1: × natural dimorphism | Sc.2: × natural scatter)",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
              tick={{fontSize:10}}/>
            <YAxis domain={[yMin,yMax]}
              ticks={niceTicks(yMin, yMax)}
              tickFormatter={scaler.tickFmt}
              label={{value:mc.label,angle:-90,position:"insideLeft",style:{fontSize:"11px",fill:"#5a4a2a",textAnchor:"middle"}}}
              tick={{fontSize:10}} width={52}/>
            <ReferenceLine x={1} stroke="#aaa" strokeDasharray="3 3"
              label={{value:"Natural ref",position:"insideTop",fill:"#888",fontSize:9,stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
            {effectMetric==="logr"&&<ReferenceLine y={0} stroke="#c8a96e" strokeDasharray="4 4"/>}
            <Tooltip formatter={(v,name)=>[typeof v==="number"?v.toFixed(4):v,name]}
              contentStyle={{fontFamily:"Georgia,serif",fontSize:"12px",border:"1px solid #d4c9b0"}}/>
            <Legend wrapperStyle={{fontSize:"12px",fontFamily:"Georgia,serif",paddingTop:"12px"}}/>
            <Line type="monotone" dataKey="dim_true" stroke="#aaaaaa" strokeWidth={2}
              strokeDasharray="6 3" dot={false} name={`Sc.1 — ${mc.trueLabel}`} connectNulls/>
            <Line type="monotone" dataKey="dim_est" stroke="#2a6496" strokeWidth={2.5}
              dot={{r:3,fill:"#2a6496"}} name="Sc.1 — Estimated (rising dimorphism)" connectNulls/>
            <Line type="monotone" dataKey="var_est" stroke="#a63a3a" strokeWidth={2.5}
              dot={{r:3,fill:"#a63a3a"}} name="Sc.2 — Estimated (rising noise, E=0)" connectNulls/>
          </LineChart>
        </ResponsiveContainer>

        {/* Axis annotation table */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginTop:"16px",
          padding:"12px 16px",background:"#f8f4ec",border:"1px solid #d4c9b0",
          fontSize:"11px",color:"#5a4a2a"}}>
          <div>
            <div style={{fontWeight:"bold",marginBottom:"4px",color:"#2a6496"}}>Sc.1 x-axis (× natural dimorphism):</div>
            <div style={{display:"flex",gap:"12px",flexWrap:"wrap"}}>
              {tickIdxs.map(t=><span key={t}><span style={{color:"#999"}}>{t.toFixed(2)}-></span>{getDimLabel(t)}</span>)}
            </div>
          </div>
          <div>
            <div style={{fontWeight:"bold",marginBottom:"4px",color:"#a63a3a"}}>Sc.2 x-axis (× natural scatter):</div>
            <div style={{display:"flex",gap:"12px",flexWrap:"wrap"}}>
              {tickIdxs.map(t=><span key={t}><span style={{color:"#999"}}>{t.toFixed(2)}-></span>{getVarLabel(t)}</span>)}
            </div>
          </div>
        </div>
      </div>

      {/* Interpretation */}
      <div style={{marginTop:"24px",background:"#1c2b3a",color:"#e8dfc8",padding:"24px 28px"}}>
        <div style={{fontSize:"12px",letterSpacing:"2px",textTransform:"uppercase",color:"#c8a96e",marginBottom:"12px"}}>
          How to read this comparison
        </div>
        <ul style={{margin:0,padding:"0 0 0 18px",lineHeight:1.8,fontSize:"13px"}}>
          <li style={{marginBottom:"8px",color:"#ccc8bc"}}>
            <strong style={{color:"#e8dfc8"}}>Grey dashed (true effect, Sc.1):</strong> What a perfect method recovers. Blue should track it; any gap is bias from the forced residual split.
          </li>
          <li style={{marginBottom:"8px",color:"#ccc8bc"}}>
            <strong style={{color:"#e8dfc8"}}>Blue (Sc.1 estimated):</strong> Rises with true dimorphism. Gap above grey = overestimation at low effect sizes; tracks well at high effect sizes.
          </li>
          <li style={{marginBottom:"8px",color:"#ccc8bc"}}>
            <strong style={{color:"#e8dfc8"}}>Red (Sc.2 estimated, true E=0):</strong> Any upward slope is a false positive. If red exceeds blue at the same x-position, noise at that level produces a larger apparent effect than real dimorphism -- that is the confound.
          </li>
          <li style={{marginBottom:"0",color:"#ccc8bc"}}>
            <strong style={{color:"#e8dfc8"}}>Metric choice:</strong> SDI and log-ratio are dimensionless and enable cross-species comparison. Log-ratio is symmetric and most statistically well-behaved. SDI is most widely reported in the herpetology literature.
          </li>
        </ul>
      </div>
    </div>
  );
}

function ReadmePanel() {
  const Section = ({title, children}) => (
    <div style={{marginBottom:"28px"}}>
      <div style={{fontSize:"11px",letterSpacing:"2.5px",textTransform:"uppercase",color:"#c8a96e",marginBottom:"10px",borderBottom:"1px solid #d4c9b0",paddingBottom:"6px"}}>{title}</div>
      {children}
    </div>
  );
  const P = ({children, style}) => <p style={{margin:"0 0 12px",color:"#3a3a3a",lineHeight:1.8,fontSize:"13px",...style}}>{children}</p>;
  const B = ({children}) => <strong style={{color:"#1c2b3a"}}>{children}</strong>;
  const Term = ({children}) => <em style={{color:"#2a5a8a",fontStyle:"normal",fontWeight:"bold"}}>{children}</em>;
  const Tag = ({color="#2a6496",bg="#e8f0f8",children}) => (
    <span style={{background:bg,color,padding:"2px 7px",borderRadius:"3px",fontSize:"11px",fontWeight:"bold",fontFamily:"monospace"}}>{children}</span>
  );
  const Faithful = ({children}) => <Tag color="#1a5a1a" bg="#e8f4e8">v Faithful: {children}</Tag>;
  const Departure = ({children}) => <Tag color="#5a2a1a" bg="#f4ece8">? Departure: {children}</Tag>;
  const Added = ({children}) => <Tag color="#1a3a5a" bg="#e8eef4">+ Added: {children}</Tag>;

  return (
    <div style={{maxWidth:"880px",margin:"0 auto",padding:"4px 0 40px"}}>

      <div style={{background:"#1c2b3a",color:"#e8dfc8",padding:"28px 32px",marginBottom:"28px"}}>
        <div style={{fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:"#c8a96e",marginBottom:"10px"}}>Documentation</div>
        <h2 style={{margin:"0 0 12px",fontSize:"22px",fontWeight:"normal",lineHeight:1.3}}>
          Signal vs. Noise: Testing the Saitta et al. Growth Curve Divergence Framework
        </h2>
        <p style={{margin:0,fontSize:"13px",color:"#b0bec8",lineHeight:1.7}}>
          An interactive simulator for evaluating and extending the statistical framework proposed in:{" "}
          <em>Saitta ET, Stockdale MT, Longrich NR, Bonhomme V, Benton MJ, Cuthill IC, Makovicky PJ (2020).
          "An effect size statistical framework for investigating sexual dimorphism in non-avian dinosaurs and other extinct taxa."
          Biological Journal of the Linnean Society 131: 231-273.</em>
        </p>
      </div>

      <Section title="Background -- what problem does this address?">
        <P>
          <B>Sexual dimorphism</B> means that males and females of a species differ systematically in body size or shape.
          In living animals this can be confirmed by examining individuals of known sex. In fossils, sex is almost never
          directly observable -- so researchers must infer dimorphism statistically from patterns in the size data alone.
        </P>
        <P>
          The traditional approach is to ask "is this species dimorphic?" and answer with a statistical test (e.g., a
          t-test comparing two groups). Saitta et al. (2020) argue this is the wrong question, because fossil samples
          are small and noisy, making it easy to miss real dimorphism (false negative) or detect apparent dimorphism
          that is actually caused by random scatter in the data (false positive). Their alternative: instead of
          testing for dimorphism in a single species, <B>estimate how large the dimorphism appears to be</B> and
          <B>compare that estimate across multiple species or datasets</B>. Species with genuinely large dimorphism
          should show consistently larger estimates than monomorphic species, even if no single estimate clears a
          significance threshold.
        </P>
        <P>
          Their method uses <Term>growth curves</Term> -- mathematical descriptions of how body size increases with age.
          The specific model is the <Term>von Bertalanffy (VB) growth equation</Term>:
          L(age) = Linf·(1 − shape·exp(−K·age)), where <Term>Linf</Term> (spoken "L-infinity") is the
          <B> asymptotic body length</B> -- the maximum size the animal would reach given unlimited time.
          K controls how fast growth approaches that maximum. The key idea: if males and females have different
          adult body sizes, they have different Linf values, and the difference between those values is the effect size.
        </P>
      </Section>

      <Section title="What is this simulator?">
        <P>
          This simulator implements the Saitta et al. method in JavaScript, faithfully reproducing their published R code,
          and then tests it under three controlled scenarios. In each scenario, we <B>know the true answer</B> -- we
          constructed the data -- so we can measure exactly how well (or how poorly) the method recovers reality.
        </P>
        <P>
          We also add several diagnostic metrics that Saitta et al. did not implement but suggested as future work,
          including mixture modelling and cross-validated model comparison (both explained below). Each metric is
          evaluated across all three scenarios so you can see which ones reliably distinguish real dimorphism from noise.
        </P>
      </Section>

      <Section title="How the method works (step by step)">
        <P><B>Step 1 -- Simulate a population.</B> We generate age and body-length data for a mixed-sex group of
        individuals, using the known alligator growth parameters from Wilkinson &amp; Rhodes (1997). Males and females
        have different true growth curves when dimorphism is present. Random scatter (noise) is added to each
        individual's length to simulate real measurement and biological variation.</P>
        <P><B>Step 2 -- Fit a combined growth curve.</B> The method treats the data as if sex is unknown (as it would
        be in a fossil sample) and fits a single VB curve to all individuals together. This gives a
        "population-average" trajectory.</P>
        <P><B>Step 3 -- Assign sex by residuals.</B> A <Term>residual</Term> is the difference between an individual's
        actual measured length and the length predicted by the combined curve for its age. Individuals that are
        larger than expected (positive residuals) are labelled "larger sex"; those smaller than expected (negative
        residuals) are labelled "smaller sex." This is the critical assumption: the method treats above-average
        individuals as one sex and below-average as the other.</P>
        <P><B>Step 4 -- Fit sex-specific curves.</B> Two separate VB curves are fit to the two assigned groups.
        The difference between their Linf values (the asymptotic sizes) is the estimated effect size.</P>
        <P><B>Step 5 -- Compute interval metrics.</B> <Term>Confidence intervals (CIs)</Term> capture uncertainty
        about the fitted curve -- how precisely we know where the average growth trajectory lies.
        <Term>Prediction intervals (PIs)</Term> are always wider: they capture where we expect individual
        specimens to fall, accounting for both curve uncertainty and natural individual-to-individual variation.
        We compute whether the intervals of the two sex-specific curves overlap or are separated.</P>
        <P><B>Step 6 -- Compare across scenarios.</B> Rather than asking "did the method detect dimorphism?",
        we ask "how does the estimate change as the true dimorphism or noise level changes?" The slope and
        direction of that change across scenarios is what discriminates reliable metrics from unreliable ones.</P>
      </Section>

      <Section title="The three scenarios">
        <P style={{background:"#f8f4ec",borderLeft:"3px solid #c8a96e",padding:"10px 14px",margin:"0 0 14px"}}>
        <B>First, what is "sdMult" (the noise / scatter multiplier)?</B> Real animals of the same sex and age are
        not all exactly the same size — they scatter around their growth curve. In this model that scatter is a
        standard deviation that grows with body length: <Term>SD = sdMult × (0.0589 × log(length) + 0.0816)</Term>.
        The number <B>sdMult</B> is simply a dial on how much scatter there is, expressed as a multiple of the
        real alligator's natural scatter. <B>sdMult = 1</B> means exactly the natural amount of individual
        variation observed in real alligators (a coefficient of variation of about 5%). <B>sdMult = 0</B> means no
        scatter at all — every animal sits perfectly on its curve. <B>sdMult = 2.5</B> means two-and-a-half times
        the natural scatter — a very noisy population. Wherever you see "SD multiplier" or "× natural SD" on an
        axis, that is sdMult.</P>
        <P><B>Scenario 1 -- Increasing true dimorphism, fixed noise.</B> We start with true monomorphism (males
        and females identical) and gradually increase the male asymptotic size while holding female size and
        within-sex scatter constant (sdMult fixed at 1). The x-axis represents true effect size from 0 to 2.5× the natural alligator
        dimorphism. This is the "signal" scenario: a good metric should rise steadily as true dimorphism increases.</P>
        <P><B>Scenario 2 -- True monomorphism, increasing noise.</B> Males and females are kept identical throughout
        (there is genuinely no dimorphism). We gradually increase the amount of random scatter in the data.
        The x-axis represents the scatter multiplier (sdMult) from 0 (perfect noiseless data) to 2.5× the natural alligator
        scatter level. Any apparent dimorphism detected here is a <Term>false positive</Term> -- the method
        mistaking noise for signal.</P>
        <P><B>Scenario 3 -- Fixed true dimorphism, increasing noise.</B> True dimorphism is fixed at the natural
        alligator level (1.01m difference in Linf). Noise increases from 0 to 2.5× natural. Same x-axis units as
        Scenario 2, so you can directly compare: at any given noise level, the gap between Sc.2 and Sc.3
        tells you how much of what the method detects is genuinely due to the real dimorphism versus how much
        is just noise.</P>
        <P>All three scenarios share a 0→2.5× x-axis range. The dashed vertical line at x=1 marks the
        "natural reference" -- the natural alligator dimorphism in Sc.1, and the natural alligator scatter level
        in Sc.2 and Sc.3.</P>
      </Section>

      <Section title="The metrics -- what each one measures">
        <P><B>Estimated effect size</B> -- the raw output of the method: the absolute difference in fitted Linf
        between the two residual-assigned groups (or dimensionless versions of it -- see Definition panels for
        details). Always positive by construction. The key problem: this rises in ALL three scenarios, so you
        cannot use it alone to confirm real dimorphism.</P>
        <P><B>CI and PI Spread</B> -- how far apart the outer bounds of the two growth curves are. "Spread" is
        always positive and increases both when curves are genuinely separated (Sc.1) and when individual
        uncertainty is high (Sc.2). It cannot distinguish the two.</P>
        <P><B>CI and PI Separation</B> -- the signed gap between the inner bounds of the two curves.
        Positive = the curves do not overlap at all; negative = they overlap. Zero = they just touch.
        This is directional: real dimorphism (Sc.1) pushes it positive; pure noise (Sc.2) pushes it negative.
        PI separation uses the wider prediction intervals (individual-level) rather than confidence intervals
        (curve-level) and is therefore more conservative and more biologically meaningful.</P>
        <P><B>ΔAICc (delta = change)</B> -- a model comparison statistic. <Term>AIC</Term> (Akaike Information Criterion)
        measures how well a statistical model fits the data while penalising it for having more free parameters
        (to prevent overfitting). <Term>AICc</Term> is a version corrected for small sample sizes.
        <Term>ΔAICc</Term> = AICc(two-sex model) - AICc(one-sex model). Negative means the two-sex model is
        preferred after accounting for its extra complexity. Conventional thresholds: |ΔAICc| &gt; 2 = modest
        support for dimorphism; |ΔAICc| &gt; 7 = strong support. Critical caveat: because sex is assigned from
        the same data used to fit the model, the two-sex model has a built-in advantage and ΔAICc is
        artificially negative even with no real dimorphism.</P>
        <P><B>CV ΔLog-Likelihood</B> -- a corrected version of the model comparison that avoids the built-in bias.
        <Term>Cross-validation (CV)</Term> means we repeatedly hide part of the data from the model during fitting,
        then test whether the model correctly predicts the hidden part. We use <Term>5-fold cross-validation</Term>:
        split the data into 5 equal portions, use 4 to fit, predict the 5th, repeat so every portion is predicted
        once. <Term>Log-likelihood</Term> measures how well the model predicted the held-out data (higher = better).
        <Term>ΔLog-Likelihood</Term> = (two-sex model score) - (one-sex model score). Positive means the two-sex
        model genuinely predicts new, unseen data better -- which is a much stronger claim than just fitting
        the training data better.</P>
        <P><B>GMM Component Separation</B> -- a mixture model test for whether the residuals (deviations from the
        combined curve) look like they come from one population or two. A <Term>Gaussian Mixture Model (GMM)</Term>
        fits two overlapping bell curves to the residual data using an algorithm called
        <Term>Expectation-Maximisation (EM)</Term> -- an iterative procedure that alternates between guessing
        which observations belong to which group and re-fitting the group parameters until convergence.
        <Term>Component separation</Term> is measured in units of <Term>Cohen's d</Term>: the distance between
        the two bell-curve peaks divided by their average spread. Cohen's d = 0 means the two peaks are identical;
        d = 0.2 is conventionally "small"; d = 0.5 is "medium"; d = 0.8 is "large" (these thresholds come from
        Jacob Cohen's 1988 statistical power textbook and are widely used across sciences). Values above 0.8
        suggest the residuals are clearly bimodal -- consistent with two distinct growth groups.</P>
        <P><B>GMM ΔBIC</B> -- <Term>BIC</Term> (Bayesian Information Criterion) is similar to AICc but applies
        a heavier penalty for extra parameters, making it more conservative. <Term>ΔBIC</Term> = BIC(two-component GMM)
        - BIC(one-component normal). Negative means the two-component mixture is preferred over a simple
        bell curve after accounting for its extra parameters. Conventional thresholds: ΔBIC &lt; -2 = positive
        evidence; &lt; -6 = strong evidence for two components.</P>
        <P style={{background:"#f0f4f8",borderLeft:"3px solid #2a6496",padding:"10px 14px",margin:"4px 0 0"}}>
        <B>Reading the GMM Mixture chart:</B> these two measures are drawn on the same chart — Component
        Separation (Cohen's d) as the <B>solid</B> line, and ΔBIC as the <B>dashed</B> line. They sit on very
        different numeric scales (Cohen's d runs about 0–2; the plotted ΔBIC average runs roughly +10 down to
        about −2), so each line should be read against its own range described above, never compared directly to
        the other by height. The ΔAICc panel works the same way: solid ΔAICc and dashed CV ΔLog-Likelihood share
        one chart but live on different scales.</P>
        <P><B>Trend / Slope Analysis</B> -- rather than looking at any single value, we compute the
        <Term>linear regression slope</Term> of each metric across its scenario's gradient -- in plain terms,
        "how fast does this metric change as we move along the x-axis?" We then normalise all slopes so the
        largest is ±1, making them directly comparable across metrics with different units. A metric with a
        large positive slope in Sc.1 and a near-zero or negative slope in Sc.2 is a strong discriminator.</P>
      </Section>

      <Section title="Faithful implementations of Saitta et al.">
        <P>The following elements are direct translations of the published R code:</P>
        <ul style={{margin:"0 0 12px",padding:"0",listStyle:"none",display:"flex",flexDirection:"column",gap:"10px"}}>
          {[
            ["Female curve fixed; male curve scales with effect size E",
             "The female VB growth curve is held constant in all simulations -- its parameters never change. Female: L = 2.78·(1 − 0.91·exp(−0.0926·age)). Only the male curve shifts as effect size E increases: male Linf = 2.78 + E, with the shape and growth-rate parameters also scaling proportionally with E (matching the observed male-female difference in real alligators from Hone & Mallon 2017). This means larger-effect males not only have a bigger adult size but also grow somewhat faster -- biologically realistic. The female size is always the baseline; E measures how far above it the male asymptote sits."],
            ["Within-sex scatter (SD function)",
             "The amount of random scatter added to each simulated individual's length is not fixed -- it scales with body length: scatter = sdMult x (0.0589·log(L) + 0.0816). Larger individuals have more absolute scatter (but the same relative scatter), matching the pattern observed in real alligator data. Because males are larger than females, males have slightly more scatter in absolute terms: at natural dimorphism, female scatter ≈ 0.141m and male scatter ≈ 0.157m (about 11% more). Both sexes share the same sdMult multiplier throughout all scenarios."],
            ["Sex assignment by residual sign",
             "After fitting the combined growth curve, individuals above the curve (positive residual = larger than expected for their age) are assigned to the 'larger sex' group; individuals below (negative residual = smaller than expected) are assigned to the 'smaller sex' group. This mirrors Allig_functions_ETS.r exactly. It requires no prior knowledge of sex -- which is why it can be applied to fossils."],
            ["Effect size always taken as absolute value",
             "Following Phylo_dimorphism.r line 129, the estimated effect is always abs(L∞_larger - L∞_smaller) -- the positive difference, regardless of which residual-assigned group happens to be 'larger' in a given run. This means the method does not assume which sex is the bigger one, and estimated effects are always ≥ 0."],
            ["Natural alligator dimorphism as reference",
             "E = 1.01m is the empirical Linf difference between male and female American alligators from Wilkinson & Rhodes (1997), used as the biological reference throughout. The x=1 line on all plots marks this natural value."],
            ["CI and PI interval computation",
             "Confidence and prediction intervals are computed via the delta method -- a mathematical technique that propagates uncertainty from the fitted curve parameters to the predicted body length at any given age. This matches the predictNLS() function in R's propagate package used by Saitta et al."],
          ].map(([title, desc], i) => (
            <li key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <span style={{flex:"0 0 auto",marginTop:"2px"}}><Faithful>{title}</Faithful></span>
              <span style={{fontSize:"12px",color:"#4a4a4a",lineHeight:1.7}}>{desc}</span>
            </li>
          ))}
        </ul>
      </Section>

      <Section title="Deliberate departures from Saitta et al.">
        <P>The following elements differ from the published R code, with justification:</P>
        <ul style={{margin:"0 0 12px",padding:"0",listStyle:"none",display:"flex",flexDirection:"column",gap:"10px"}}>
          {[
            ["Shared reference age for interval metrics",
             "Saitta's code evaluates confidence and prediction intervals at the oldest individual in each residual-assigned sex group separately. At extreme noise levels, the random residual split can accidentally put the dataset's overall oldest individual into the 'smaller sex' group, then the 'larger sex' group has no old individuals, and the upper bound of the younger group's curve is lower than the lower bound of the older group's curve -- producing a geometrically impossible negative spread. This simulator instead evaluates both curves at the single oldest individual in the entire combined dataset, ensuring the comparison is always made at the same biological reference point. This makes no practical difference at realistic noise levels where both assigned groups contain old individuals."],
            ["Shared 0→2.5× gradient range across all three scenarios",
             "All three scenarios run from 0 to 2.5× their natural reference value. This makes the three panels on each metric tab directly comparable: at any x position, you are looking at the same multiple of the natural reference for all three scenarios. Saitta's original simulations used different ranges and starting points. The range is capped at 2.5× because beyond about 3× natural dimorphism the curve-fitting becomes numerically unstable, and even at 2.5× the male growth curve is already biologically unrealistic (its juvenile portion crosses below the female curve)."],
            ["Scenario 3 SNR range limited to biologically realistic noise",
             "The SNR Analysis tab only shows Scenario 3 data where the noise level (coefficient of variation, or CV -- scatter expressed as a percentage of body length) is below 20%. Below this, simulated individuals can have near-zero or negative body lengths, which is biologically impossible and produces erratic fitting. The natural alligator CV is about 5%; 20% is already extreme."],
          ].map(([title, desc], i) => (
            <li key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <span style={{flex:"0 0 auto",marginTop:"2px"}}><Departure>{title}</Departure></span>
              <span style={{fontSize:"12px",color:"#4a4a4a",lineHeight:1.7}}>{desc}</span>
            </li>
          ))}
        </ul>
      </Section>

      <Section title="Novel extensions beyond Saitta et al.">
        <ul style={{margin:"0 0 12px",padding:"0",listStyle:"none",display:"flex",flexDirection:"column",gap:"10px"}}>
          {[
            ["Scenario 3 (SNR gradient)",
             "Saitta et al. discuss the signal-to-noise ratio (SNR = true dimorphism ÷ within-sex scatter) conceptually but do not simulate it directly. Scenario 3 fixes the true dimorphism and varies the noise, so both Scenario 1 and Scenario 3 can be plotted against SNR -- a single number capturing how detectable the signal is -- on a shared axis. At the same SNR, you can compare: does it matter whether that SNR comes from a large signal (Sc.1) or low noise (Sc.3)?"],
            ["ΔAICc / ΔBIC model comparison",
             "Formal comparison of the one-sex (monomorphic) vs two-sex (dimorphic) growth curve models using information criteria. AICc and BIC both measure model fit while penalising for complexity, but BIC is more conservative (heavier penalty). Saitta et al. mention AIC but do not implement it as a diagnostic. Key finding: because sex is assigned from the same data being fit, the two-sex model always appears to fit better -- AICc is biased and unreliable in isolation. Trends across scenarios are meaningful; absolute values are not."],
            ["Cross-validated log-likelihood (CV ΔLL)",
             "A corrected model comparison that hides part of the data during fitting and tests predictions on the hidden part. This REDUCES the bias described above but does not remove it: because sex labels are assigned from the full dataset before the data is split, a residual positive bias leaks into the held-out folds. So CV ΔLL is strongly positive in Sc.1 (real dimorphism) and lower -- but still positive (~10), not zero -- in Sc.2. Read the GAP between scenarios, not the absolute value."],
            ["Gaussian Mixture Model (GMM) on residuals",
             "A statistical test for whether the residuals (deviations from the combined curve) look like one population or a mixture of two. If two sexes grow differently, their residuals should cluster into two bell curves. The EM algorithm finds the best-fitting two-component mixture. This is more principled than the Hartigans' dip test (which just tests for bimodality in the raw data) -- Saitta et al. explicitly criticise the dip test and call for mixture modelling as future work."],
            ["Trend / slope analysis tab",
             "Operationalises Saitta et al.'s core argument: compare estimates across datasets rather than test a single dataset. For each metric, the slope (rate of change) across the gradient is computed and normalised so you can compare all metrics on the same scale. This directly answers: which metric responds most strongly to real dimorphism (Sc.1) relative to noise (Sc.2)?"],
            ["Y-axis scale toggle",
             "Switches between linear, log₁₀, and signed-log scaling across all three scenario panels simultaneously. The signed log transform -- sign(y)·log₁₀(1+|y|) -- compresses very large values while preserving zero and the sign of negative values (important for separation metrics). Useful when Sc.3 at high noise produces extreme values that visually dominate a linear-scale plot, hiding the more subtle dynamics in Sc.1 and Sc.2."],
          ].map(([title, desc], i) => (
            <li key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <span style={{flex:"0 0 auto",marginTop:"2px"}}><Added>{title}</Added></span>
              <span style={{fontSize:"12px",color:"#4a4a4a",lineHeight:1.7}}>{desc}</span>
            </li>
          ))}
        </ul>
      </Section>

      <Section title="Key findings">
        <ul style={{margin:0,padding:"0 0 0 18px",lineHeight:1.9,fontSize:"13px",color:"#3a3a3a"}}>
          <li style={{marginBottom:"10px"}}><B>PI separation is the most reliable single metric.</B> It is the only metric that moves in opposite directions in Sc.1 (increases as true dimorphism grows) and Sc.2 (decreases as noise grows). Every other metric either rises in both scenarios or is ambiguous. This is why Saitta et al. emphasise it.</li>
          <li style={{marginBottom:"10px"}}><B>Estimated effect size alone cannot distinguish real signal from noise.</B> The residual-split method always produces a positive estimate, even when there is no true dimorphism. The estimate rises in Scenario 2 as well as Scenario 1. You cannot look at a single effect size estimate and conclude dimorphism is real -- you need to compare it across multiple datasets and alongside the interval separation metrics.</li>
          <li style={{marginBottom:"10px"}}><B>ΔAICc is always negative -- it cannot confirm dimorphism.</B> The two-sex model always fits the data it was fit to better than the one-sex model, because the sex assignments come from the same data. This built-in advantage makes ΔAICc universally negative. Only the trend (how much more negative it gets in Sc.1 vs Sc.2) is informative. The cross-validated log-likelihood is more trustworthy.</li>
          <li style={{marginBottom:"10px"}}><B>GMM component separation has a false-positive floor.</B> Even with no true dimorphism (Sc.2), the GMM finds two components -- because the residuals are always split into positive and negative halves by construction. Typical baseline values are 0.8-1.2 Cohen's d. Only values substantially above this, combined with a clear rising trend as dimorphism grows, are meaningful.</li>
          <li style={{marginBottom:"0"}}><B>SNR = 1 is the practical detection threshold.</B> When noise equals signal (SNR = 1), most metrics become unreliable. The natural alligator CV is about 5%, which corresponds to a high SNR -- fossil datasets with many individuals of unknown growth histories may have much higher CV and correspondingly lower SNR. Any fossil application of this method should consider how noisy the data are relative to the expected dimorphism.</li>
        </ul>
      </Section>

      <Section title="How to use this simulator">
        <ul style={{margin:0,padding:"0 0 0 18px",lineHeight:1.9,fontSize:"13px",color:"#3a3a3a"}}>
          <li style={{marginBottom:"8px"}}><B>N per sex</B>: how many individuals are simulated per true sex (total sample = 2x). Fossil datasets often have 10-50 specimens total; lower N makes curves noisier and more variable between runs.</li>
          <li style={{marginBottom:"8px"}}><B>Reps per step</B>: how many independent simulations are averaged at each x-axis position. More reps = smoother, more reliable curves, but longer computation time. 15-30 reps is a reasonable starting point; use 50-100 for publication-quality results.</li>
          <li style={{marginBottom:"8px"}}><B>Y-axis scale</B>: Linear shows raw values. Log compresses large values (only works for positive metrics). Signed Log compresses large values in both directions -- recommended when Scenario 3 dominates the chart at high noise.</li>
          <li style={{marginBottom:"8px"}}><B>Effect metric</B>: switches between raw Linf difference in metres (absolute, body-size-dependent), SDI (percentage difference, dimensionless), and log-ratio (dimensionless, mathematically symmetric). Use log-ratio for cross-species comparison.</li>
          <li style={{marginBottom:"8px"}}><B>Read the Definition panel</B> (amber box above each chart group) before interpreting results -- it gives plain-language definitions, units, sign conventions, and the key caveat for each metric.</li>
          <li style={{marginBottom:"8px"}}><B>* Trend Analysis tab</B>: the best single summary of the simulator's findings. Shows slope (rate of change) of each metric across each scenario, normalised so all metrics are comparable. Start here for an overview.</li>
          <li style={{marginBottom:"0"}}><B>> SNR Analysis tab</B>: shows how performance changes as signal-to-noise ratio changes. The PI separation chart (starred, bottom-left) is the clearest visual demonstration of why this metric is the key diagnostic.</li>
        </ul>
      </Section>

      <div style={{background:"#f0f4f8",border:"1px solid #8aabcc",borderLeft:"4px solid #2a6496",padding:"14px 18px",fontSize:"12px",color:"#1a3a5a",lineHeight:1.7}}>
        <strong>Note on updates:</strong> This README is maintained alongside the simulator code. The most recent changes: (1) all explanatory text -- this README, the Definition panels above each chart, and the Interpretation panels below -- has been rewritten in plain language, defining every technical term (Cohen's d, BIC, CV, log-likelihood, etc.) on first use, to be accessible to readers without a statistics background. (2) All three scenarios share a 0→2.5× x-axis range, reduced from 0→4× because Sc.1 NLS fitting becomes erratic above 3× natural dimorphism. (3) Reference lines mark thresholds where they are meaningful: y=0 (no-preference / curves-touching boundary) on all relevant charts, the natural dimorphism value on the effect-size chart, and Cohen's d = 0.2/0.5/0.8 on the GMM separation chart. The conventional ΔAICc thresholds (-2/-7) are deliberately NOT drawn, because the structural bias makes ΔAICc run from roughly -100 to -250 in every scenario, so those lines would sit invisibly on the y=0 line and falsely imply 'strong support' even when there is no dimorphism. For GMM ΔBIC only the -2 ("positive evidence") line is drawn, because averaged over repetitions ΔBIC only just grazes -2 at moderate dimorphism and never approaches the conventional -6 ("strong") line — drawing -6 would only mislead. Throughout, the trend across scenarios is the diagnostic signal, not whether an absolute threshold is crossed.
      </div>

    </div>
  );
}

function DefinitionPanel({metric, effectMetric}){
  const defs = {
    estEffect: {
      title: "Estimated Effect Size -- What Is Being Measured",
      summary: "After fitting separate growth curves to the two residual-assigned sex groups, this metric asks: how different are their estimated adult body sizes? Specifically, it computes the difference in the fitted Linf parameter (the asymptotic, or maximum, body length) between the group that ended up larger and the group that ended up smaller. Because sex is assigned by who is above or below average -- not by true biological sex -- this estimate is always a positive number, and it tends to be inflated when the true dimorphism is small or when noise is high. The gold dashed reference line on each chart shows the true natural alligator dimorphism (1.01m) -- what an ideal method would recover.",
      metrics: [
        { name: "Raw L∞ difference (metres)", def: "The absolute difference in fitted asymptotic length between the two assigned groups: |L∞_larger - L∞_smaller|. Expressed in metres. Depends on the animal's body size -- a 1m difference means something very different for a 3m animal vs a 30m animal -- so this metric cannot be fairly compared across species of different sizes." },
        { name: "SDI -- Sexual Dimorphism Index (Lovich & Gibbons 1992)", def: "(L∞_larger ÷ L∞_smaller) − 1. Dimensionless (no units). Expresses size difference as a fraction: SDI = 0.36 means the larger group is 36% bigger than the smaller group. Widely used in reptile biology. Always ≥ 0 here." },
        { name: "Log-ratio", def: "ln(L∞_larger ÷ L∞_smaller), where ln is the natural logarithm. Dimensionless. A log-ratio of 0.30 means the larger group is about 35% bigger (e^0.30 ≈ 1.35). Unlike SDI, the log-ratio is mathematically symmetric -- swapping which group is 'larger' just changes the sign -- and it has better statistical properties for regression and cross-species comparison. Always ≥ 0 here." },
      ],
      caveat: "All three versions are always ≥ 0 by construction: even when there is no true dimorphism (Scenario 2), the method always finds some difference between the two assigned groups. Do not interpret the absolute value as confirming that dimorphism is real. Instead, compare the trend (how it changes as dimorphism or noise increases) across datasets or scenarios.",
    },
    ciSpread: {
      title: "95% Confidence Interval Spread -- Curve-Level Uncertainty Envelope",
      summary: "A confidence interval (CI) is a range of values within which the true parameter (here, the growth curve) almost certainly falls, based on the data. A 95% CI means: if we repeated this study many times, 95% of the computed intervals would contain the true value. The CI captures uncertainty about where the average growth trajectory lies -- it does not say anything about individual specimens. CI Spread measures the total width of the envelope formed by the upper bound of the larger-sex curve and the lower bound of the smaller-sex curve at the oldest individual's age. A large spread can mean the curves are far apart (real dimorphism) OR that the curves are poorly estimated (high noise) -- it cannot distinguish the two.",
      metrics: [
