  return (
    <div style={{maxWidth:"880px",margin:"0 auto",padding:"4px 0 40px"}}>

      <div style={{background:"#1c2b3a",color:"#e8dfc8",padding:"28px 32px",marginBottom:"28px"}}>
        <div style={{fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:"#c8a96e",marginBottom:"10px"}}>Documentation</div>
        <h2 style={{margin:"0 0 12px",fontSize:"22px",fontWeight:"normal",lineHeight:1.3}}>
          Signal vs. Noise: Testing the Saitta et al. Growth Curve Divergence Framework
        </h2>
        <p style={{margin:0,fontSize:"13px",color:"#b0bec8",lineHeight:1.7}}>
          An interactive simulator for evaluating and extending the statistical framework proposed in:{" "}
          <em>Saitta ET, Stockdale MT, Longrich NR, Bonhomme V, Benton MJ, Cuthill IC, Makovicky PJ (2020).
          "An effect size statistical framework for investigating sexual dimorphism in non-avian dinosaurs and other extinct taxa."
          Biological Journal of the Linnean Society 131: 231-273.</em>
        </p>
      </div>

      <Section title="Background -- what problem does this address?">
        <P>
          <B>Sexual dimorphism</B> means that males and females of a species differ systematically in body size or shape.
          In living animals this can be confirmed by examining individuals of known sex. In fossils, sex is almost never
          directly observable -- so researchers must infer dimorphism statistically from patterns in the size data alone.
        </P>
        <P>
          The traditional approach is to ask "is this species dimorphic?" and answer with a statistical test (e.g., a
          t-test comparing two groups). Saitta et al. (2020) argue this is the wrong question, because fossil samples
          are small and noisy, making it easy to miss real dimorphism (false negative) or detect apparent dimorphism
          that is actually caused by random scatter in the data (false positive). Their alternative: instead of
          testing for dimorphism in a single species, <B>estimate how large the dimorphism appears to be</B> and
          <B>compare that estimate across multiple species or datasets</B>. Species with genuinely large dimorphism
          should show consistently larger estimates than monomorphic species, even if no single estimate clears a
          significance threshold.
        </P>
        <P>
          Their method uses <Term>growth curves</Term> -- mathematical descriptions of how body size increases with age.
          The specific model is the <Term>von Bertalanffy (VB) growth equation</Term>:
        </P>
        <Eq>{`L(age) = L∞ · (1 − shape · exp(−K · age))`}</Eq>
        <Where items={[
          {sym:"L∞", def:'asymptotic body length ("L-infinity") — the maximum size given unlimited time'},
          {sym:"K", def:"how fast growth approaches L∞"},
          {sym:"shape", def:"sets the size at age 0"},
        ]}/>
        <P>
          If males and females have different adult body sizes, they have different L∞ values, and the difference
          between those values is the effect size E.
        </P>
      </Section>

      <Section title="What is this simulator?">
        <P>
          This simulator implements the Saitta et al. method in JavaScript, faithfully reproducing their published R code,
          and then tests it under three controlled scenarios. In each scenario, we <B>know the true answer</B> -- we
          constructed the data -- so we can measure exactly how well (or how poorly) the method recovers reality.
        </P>
        <P>
          We also add several diagnostic metrics that Saitta et al. did not implement but suggested as future work,
          including mixture modelling and cross-validated model comparison (both explained below). Each metric is
          evaluated across all three scenarios so you can see which ones reliably distinguish real dimorphism from noise.
        </P>
        <P style={{background:"#eef4ee",borderLeft:"3px solid #2a7a4a",padding:"10px 14px",margin:"4px 0"}}>
        <B>TRUE vs ESTIMATED — the single most important distinction in this simulator.</B> Every quantity here is one of two kinds:
        </P>
        <Eq>{`TRUE (generating) values   — the parameters we CHOSE to build the data.
                             Known only because this is a simulation.
   E_true        = the dimorphism we put in (male L∞_true − 2.78)
   L∞_true       = 2.78 m (female), 2.78 + E_true (male)
   SD_true       = sdMult·(0.0589·ln(L∞_true) + 0.0816)
   true sex      = which loop (female/male) a specimen was drawn from

ESTIMATED values          — what a researcher computes FROM the data,
                             with no access to the truth.
   fitted L∞     = von Bertalanffy curves fit to the (sex-unknown) data
   estimated E   = fitted L∞_larger − fitted L∞_smaller
   assigned sex  = above the combined curve → "male", below → "female"
   all metrics   = CI/PI spread & separation, ΔAICc, CV ΔLL, Cohen's d, ΔBIC`}</Eq>
        <P>
          The whole experiment is: feed in known <B>true</B> values, run the method blind, and see how close its
          <B> estimated</B> values come. A reference line drawn at a true value (e.g. the gold line on the effect-size
          chart, or the SNR axis itself) is ground truth; everything plotted as a data curve is an estimate. Throughout
          the simulator the labels "true" and "estimated/assigned/fitted" are used in this exact sense.
        </P>
      </Section>

      <div style={{ background: "#faf7f0", border: "1px solid #e5ddc8", borderRadius: 6, padding: "12px 15px", margin: "12px 0" }}>
        <div style={{ fontSize: 13.5, fontWeight: "bold", color: "#1c2b3a", marginBottom: 6 }}>Two-way glossary — so a reader from statistics, paleontology, or biology can follow the whole tool</div>
        <div style={{ fontSize: 12, fontWeight: "bold", color: "#2a5a8a", margin: "4px 0 2px" }}>Statistics, one line each (for readers coming from biology / paleontology)</div>
        <div style={{ fontSize: 12.5, lineHeight: 1.6, color: "#3a3228" }}>
          <b>Likelihood / maximum-likelihood</b> — how probable the data are under a fitted model; the fit chosen is the one that makes the observed data most probable.<br />
          <b>AICc &amp; BIC</b> — model-comparison scores that reward fit but penalise extra parameters, so a two-curve model must <i>earn</i> its complexity; the smaller score wins.<br />
          <b>Cross-validation</b> — fit on part of the data, test on the held-out rest; credits only structure that generalises, not noise the model memorised.<br />
          <b>Delta method</b> — a Taylor-expansion shortcut that turns uncertainty in the fitted parameters into an uncertainty band on the curve, without simulation.<br />
          <b>Jacobian</b> — the list of the curve's sensitivities to each parameter (its partial derivatives); the delta method uses it to propagate that uncertainty.<br />
          <b>Mixture density / posterior</b> — a two-group model treats each point as coming from one of two bell curves; the <i>posterior</i> is the probability a point belongs to each. EM / GMM fit these.<br />
          <b>Wilson interval</b> — a confidence interval for a percentage (e.g. % correctly sexed) that stays sensible near 0% and 100%, unlike the plain normal formula.<br />
          <b>Bootstrap</b> — repeatedly simulate fake datasets under a stated null (&ldquo;no dimorphism&rdquo;) to see how often chance alone reproduces the observed signal; that fraction is the p-value.<br />
          <b>Confidence vs prediction interval</b> — the confidence band is where the <i>mean</i> curve lies; the prediction band (always wider) is where a <i>single new</i> specimen would fall.<br />
          <b>Sample vs population SD</b> — the sample SD divides by n−1 (unbiased; used for standard errors and CIs); the population SD divides by n.<br />
          <b>Residual</b> — the gap between a specimen's observed size and the size the fitted curve predicts for its age.
        </div>
        <div style={{ fontSize: 12, fontWeight: "bold", color: "#7a5a2a", margin: "9px 0 2px" }}>Biology &amp; paleontology, one line each (for readers coming from statistics)</div>
        <div style={{ fontSize: 12.5, lineHeight: 1.6, color: "#3a3228" }}>
          <b>von Bertalanffy / Gompertz / logistic</b> — standard equations for how body size rises with age then levels off; VB bends from the start, Gompertz and logistic are S-shaped (the sensible default for dinosaurs).<br />
          <b>Asymptote (L∞)</b> — the adult &ldquo;ceiling&rdquo; size the growth curve approaches; the male−female gap in L∞ is the effect size (E) this method tries to recover.<br />
          <b>LAG (Line of Arrested Growth)</b> — an annual growth ring in fossil bone, like a tree ring; counting them gives a specimen's age in years.<br />
          <b>Ontogeny</b> — an individual's growth trajectory from juvenile to adult.<br />
          <b>Sexual dimorphism / SDI</b> — a systematic size difference between the sexes; the Size Dimorphism Index = (larger ÷ smaller) − 1.<br />
          <b>Assemblage</b> — the collection of specimens available for a species — here, one simulated dataset.<br />
          <b>Heterochrony</b> — an evolutionary shift in the timing or rate of growth (e.g. one sex maturing later or growing more slowly).
        </div>
      </div>

      <Section title="How the method works (step by step)">
        <P><B>Step 1 -- Simulate a population.</B> We generate age and body-length data for a mixed-sex group of
        individuals, using the known alligator growth parameters from Wilkinson &amp; Rhodes (1997). Males and females
        have different true growth curves when dimorphism is present. Random scatter (noise) is added to each
        individual's length to simulate real measurement and biological variation.</P>
        <P><B>Step 2 -- Fit a combined growth curve.</B> The method treats the data as if sex is unknown (as it would
        be in a fossil sample) and fits a single VB curve to all individuals together. This gives a
        "population-average" trajectory.</P>
        <P><B>Step 3 -- Assign sex by residuals.</B> A <Term>residual</Term> is the difference between an individual's
        actual measured length and the length predicted by the combined curve for its age. Individuals that are
        larger than expected (positive residuals) are labelled "larger sex"; those smaller than expected (negative
        residuals) are labelled "smaller sex." This is the critical assumption: the method treats above-average
        individuals as one sex and below-average as the other.</P>
        <P><B>Step 4 -- Fit sex-specific curves.</B> Two separate VB curves are fit to the two assigned groups.
        The difference between their Linf values (the asymptotic sizes) is the estimated effect size.</P>
        <P><B>Step 5 -- Compute interval metrics.</B> <Term>Confidence intervals (CIs)</Term> capture uncertainty
        about the fitted curve -- how precisely we know where the average growth trajectory lies.
        <Term>Prediction intervals (PIs)</Term> are always wider: they capture where we expect individual
        specimens to fall, accounting for both curve uncertainty and natural individual-to-individual variation.
        We compute whether the intervals of the two sex-specific curves overlap or are separated.</P>
        <P><B>Step 6 -- Compare across scenarios.</B> Rather than asking "did the method detect dimorphism?",
        we ask "how does the estimate change as the true dimorphism or noise level changes?" The slope and
        direction of that change across scenarios is what discriminates reliable metrics from unreliable ones.</P>
      </Section>

      <Section title="How the curves are fit (the shared engine)">
        <P>
          Steps 2 and 4 above say "fit a VB curve"; here is exactly how, because the fitting is doing real work and
          is easy to mistake for a black box. Every von Bertalanffy curve in this simulator — and in the two companion
          simulators — is fit by the <B>same</B> routine: nonlinear least squares by <Term>Levenberg–Marquardt</Term>{" "}
          damped iteration, the same algorithm as R's <Term>nls</Term> / <Term>minpack.lm::nlsLM</Term>. To avoid
          settling in a poor local minimum, each fit is started from a coarse <B>grid of initial values</B> for the
          growth rate K and the age-zero/inflection parameter t₀, and the best converged solution is kept
          (a <Term>multistart</Term>).
        </P>
        <P>
          The fit is deliberately close to unconstrained. The <B>only</B> bounds enforced during the regression are{" "}
          <B>L∞ &gt; 0</B> and <B>K &gt; 0</B> — positivity, because an adult size or a growth rate cannot be negative —
          plus a loose sanity window on t₀ (roughly ±1.5 age-spans around the data) that only stops the optimiser
          diverging to nonsense; it binds on a couple of percent of fits, all of them degenerating ones, and is inert
          on the rest. There is <B>no upper bound on the asymptote</B> and no shape prior: for extinct taxa there is no
          defensible ceiling on adult size, so the curves are left free to follow the data. The consequence is honest —
          weak or ambiguous data yields a poorly-constrained curve rather than one quietly pulled toward a
          "reasonable" answer.
        </P>
        <P>
          One numerical safeguard touches only the scoring, never the fit: in cross-validation, a fold whose fit
          degenerates into a near-step curve that predicts an impossible <B>negative</B> size at a held-out age is
          dropped from the CV average (the fitted curve itself is left exactly as the data produced it). The whole
          routine is byte-identical across all three simulators, so any difference between them is the analysis, never
          the fitter.
        </P>
      </Section>

      <Section title="How the two sexes are generated, parameterization, and effect-size units">
        <P>
          The true female curve is L∞·(1 − b·e^(−K·age)) with L∞ = 2.78 m, b = 0.91, K = 0.0926 — the empirical
          American-alligator von Bertalanffy. The true male raises the asymptote to 2.78 + E and, following the
          parameterization of Saitta et al. (2020), also raises the shape coefficient b and lowers the growth rate K
          as E grows. The biological consequence is deliberate and consequential: a strongly dimorphic male is a
          <B>late bloomer</B> — larger as an adult but slower-growing, so he is briefly <B>smaller than the female as a
          juvenile</B>, and the two curves <B>cross</B> (near age ≈ 14 yr at E = 2.5×). This is exactly why sexing
          accuracy can fall <i>below</i> chance in the youngest specimens: the larger sex there is the female, so a
          "larger = male" rule inverts. The crossing is faithful to real alligators and is retained here because it
          drives the noise-and-dimorphism sweeps this tool performs.
        </P>
        <P>
          <B>This differs, on purpose, from the clade tool.</B> The companion cross-taxa simulator uses a
          <i>non-crossing</i> dimorphism model: its larger sex is larger at every age (monotone separation, the gap
          smallest in juveniles and widening with age), which is the more general default for an arbitrary clade. The
          alligator crossing is specific to this calibration; both patterns are biologically real, and the suite uses
          each where it fits.
        </P>
        <P>
          <B>Parameterization note.</B> The generator writes the curve in the "shape" form L∞·(1 − b·e^(−K·age)); the
          fitter and the closed-form models use the equivalent <Term>t₀ form</Term> L∞·(1 − e^(−K·(age−t₀))). The two are
          algebraically identical with b = e^(K·t₀), i.e. t₀ = ln b / K ≈ −1.02 yr for the female. Nothing downstream
          depends on the choice; the fit recovers whichever form the data imply.
        </P>
        <P>
          <B>Effect-size units.</B> This simulator reports dimorphism as the <i>absolute</i> asymptote difference E in
          metres (male L∞ = 2.78 + E; the alligator "natural" value is E = 1.01 m). The two companion tools report it
          <i>proportionally</i>, as the size-dimorphism index SDI = L∞,large / L∞,small − 1. For the alligator baseline
          the conversion is SDI = E / 2.78, so E = 1.01 m corresponds to SDI ≈ 0.36.
        </P>
      </Section>

      <Section title="The three scenarios">
        <P style={{background:"#f8f4ec",borderLeft:"3px solid #c8a96e",padding:"10px 14px",margin:"0 0 14px"}}>
        <B>First, what is "sdMult" (the noise / scatter multiplier)?</B> Real animals of the same sex and age are
        not all exactly the same size — they scatter around their growth curve. In this model that scatter is a
        standard deviation that grows with body length: <Term>SD = sdMult × (0.0589 × log(length) + 0.0816)</Term>.
        The number <B>sdMult</B> is simply a dial on how much scatter there is, expressed as a multiple of the
        real alligator's natural scatter. <B>sdMult = 1</B> means exactly the natural amount of individual
        variation observed in real alligators (a coefficient of variation of about 5%). <B>sdMult = 0</B> means no
        scatter at all — every animal sits perfectly on its curve. <B>sdMult = 2.5</B> means two-and-a-half times
        the natural scatter — a very noisy population. Wherever you see "SD multiplier" or "× natural SD" on an
        axis, that is sdMult.</P>
        <P><B>Scenario 1 -- Increasing true dimorphism, fixed noise.</B> We start with true monomorphism (males
        and females identical) and gradually increase the male asymptotic size while holding female size and
        within-sex scatter constant (sdMult fixed at 1). The x-axis represents true effect size from 0 to 2.5× the natural alligator
        dimorphism. This is the "signal" scenario: a good metric should rise steadily as true dimorphism increases.</P>
        <P><B>Scenario 2 -- True monomorphism, increasing noise.</B> Males and females are kept identical throughout
        (there is genuinely no dimorphism). We gradually increase the amount of random scatter in the data.
        The x-axis represents the scatter multiplier (sdMult) from 0 (perfect noiseless data) to 2.5× the natural alligator
        scatter level. Any apparent dimorphism detected here is a <Term>false positive</Term> -- the method
        mistaking noise for signal.</P>
        <P><B>Scenario 3 -- Fixed true dimorphism, increasing noise.</B> True dimorphism is fixed at the natural
        alligator level (1.01m difference in Linf). Noise increases from 0 to 2.5× natural. Same x-axis units as
        Scenario 2, so you can directly compare: at any given noise level, the gap between Sc.2 and Sc.3
        tells you how much of what the method detects is genuinely due to the real dimorphism versus how much
        is just noise.</P>
        <P>All three scenarios share a 0→2.5× x-axis range. The dashed vertical line at x=1 marks the
        "natural reference" -- the natural alligator dimorphism in Sc.1, and the natural alligator scatter level
        in Sc.2 and Sc.3.</P>
      </Section>

      <Section title="The metrics -- what each one measures">
        <P><B>Estimated effect size</B> -- the raw output of the method: the absolute difference in fitted Linf
        between the two residual-assigned groups (or dimensionless versions of it -- see Definition panels for
        details). Always positive by construction. The key problem: this rises in ALL three scenarios, so you
        cannot use it alone to confirm real dimorphism.</P>
        <P><B>CI and PI Spread</B> -- how far apart the outer bounds of the two growth curves are. "Spread" is
        always positive and increases both when curves are genuinely separated (Sc.1) and when individual
        uncertainty is high (Sc.2). It cannot distinguish the two.</P>
        <P><B>CI and PI Separation</B> -- the signed gap between the inner bounds of the two curves.
        Positive = the curves do not overlap at all; negative = they overlap. Zero = they just touch.
        This is directional: real dimorphism (Sc.1) pushes it positive; pure noise (Sc.2) pushes it negative.
        PI separation uses the wider prediction intervals (individual-level) rather than confidence intervals
        (curve-level) and is therefore more conservative and more biologically meaningful.</P>
        <P style={{background:"#faf6ec",borderLeft:"3px solid #c8a96e",padding:"10px 14px",margin:"4px 0"}}>
        <B>Foundation: log-likelihood.</B> Every model-comparison number below (AIC, AICc, BIC, CV) is built on the
        Gaussian log-likelihood of a fitted curve. Assume each residual rᵢ = (observedᵢ − predictedᵢ) is drawn from a
        normal distribution N(0, σ²). The log-likelihood, as a function of the unknown variance σ², is:</P>
        <Eq>{`RSS  = Σᵢ rᵢ²                                    (residual sum of squares, m²)
LL(σ²) = −(n/2)·ln(2π) − (n/2)·ln(σ²) − RSS/(2σ²)   (Gaussian log-likelihood)`}</Eq>
        <P>To evaluate it we need a value for σ². We use the value that MAXIMISES the likelihood — the maximum-likelihood
        estimate. Setting the derivative dLL/dσ² = 0 and solving gives a clean result:</P>
        <Eq>{`σ̂²ₘₗₑ = RSS / n          (maximum-likelihood estimate of the variance)`}</Eq>
        <Where items={[
          {sym:"σ̂²ₘₗₑ", def:"the maximum-likelihood estimate of the error variance σ². It divides RSS by n. This is the mean of the squared residuals, and it is what the likelihood formula requires — NOT the same as the unbiased variance estimator s² = RSS/(n−p) you may know from regression (which divides by the degrees of freedom n−p and is often called the residual MSE). Both estimate the same σ²; they differ only in the denominator. AIC/BIC/CV are likelihood-based, so they use the MLE version, RSS/n."},
          {sym:"the hat (ˆ)", def:"marks an ESTIMATE computed from the data, as opposed to the TRUE generating variance — which here is the square of the alligator SD function used to create the data."},
        ]}/>
        <P>Substituting σ̂²ₘₗₑ = RSS/n back into LL(σ²) above, the last two terms collapse to −(n/2), giving the
        compact closed form that this simulator computes for every fit:</P>
        <Eq>{`LL = −(n/2)·[ ln(2π·σ̂²ₘₗₑ) + 1 ]        (the complete log-likelihood at the MLE)`}</Eq>
        <P>This is the FULL log-likelihood — nothing is dropped. Every value labeled "LL" anywhere in this simulator is
        exactly this number (the cross-validation panel evaluates the same Gaussian formula point-by-point on held-out
        data, which sums to the same thing). So when a decomposition plot shows LL₁ and LL₂, those lines are the true
        log-likelihoods, not log-likelihoods shifted by a constant. The model-comparison metrics are then differences of
        these complete log-likelihoods:</P>
        <P>The catch that motivates all four metrics: adding parameters can always shrink RSS on the data being fit, so
        raw LL always favours the more complex model. AIC, AICc, BIC, and cross-validation are four ways of correcting
        for that.</P>
        <P><B>ΔAICc.</B> <Term>AIC</Term> (Akaike Information Criterion) penalises LL for the number of free parameters; <Term>AICc</Term> adds a small-sample correction:</P>
        <Eq>{`AIC  = −2·LL + 2k
AICc = −2·LL + 2k + 2k(k+1)/(n − k − 1)
ΔAICc = AICc(two-curve) − AICc(one-curve)`}</Eq>
        <Where items={[
          {sym:"k", def:"number of free parameters: 4 for one curve (L∞, K, t₀, and the residual variance σ²), 7 for two curves (3 curve parameters each, plus one shared pooled σ̂²). The variance σ² is counted because the log-likelihood is profiled at its maximum-likelihood value σ̂² = RSS/n — it is fitted from the data, exactly like a curve parameter. Lower-case k here is the parameter count — distinct from the upper-case K growth-rate parameter inside the von Bertalanffy equation above. Because the same kind of variance term is counted on both sides, ΔAIC and ΔBIC are identical whether or not you count it (kDim − kMono = 3 either way); but the AICc small-sample correction 2k(k+1)/(n − k − 1) is non-linear in k, so it does NOT cancel — counting σ² (k = 4/7, used here) is the correct, consistent convention, matching the residual-mixture ΔBIC below and the companion simulators."},
          {sym:"ΔAICc < 0", def:"two-curve model preferred after the complexity penalty"},
        ]}/>
        <P>The "two-curve model" fits a separate curve to each group — groups from the sign-split (solid line) or
        EM/GMM clustering (dashed). Textbook cutoffs |ΔAICc| &gt; 2 (modest) / &gt; 7 (strong) are NOT drawn here:
        because sex is assigned from the same data being fit, ΔAICc runs ≈ −100 to −250 in every scenario, dwarfing
        them. The mechanism is in the k-count above: k = 7 charges for the two curves and their shared variance but
        <B>not</B> for the degrees of freedom spent choosing the residual-sign split — that assignment is estimated from
        the same data, and its cost goes uncharged. This <Term>labels-from-data endogeneity</Term> biases ΔAICc (and
        ΔBIC) toward two curves regardless of the truth, so read the trend and the gap between scenarios, not the
        absolute value; the CV ΔLL and the bootstrap are the leak-free tests.</P>
        <P><B>CV ΔLog-Likelihood.</B> <Term>5-fold cross-validation</Term>: split the data into 5 parts (assigned by
        specimen index, <i>i</i> mod 5 — deterministic and exactly reproducible, and well-mixed because specimens are
        generated in random order); fit on 4,
        score the held-out 5th; repeat so each part is scored once. The held-out score uses the same Gaussian LL
        formula with σ̂² taken from the training folds, so parameters that only fit training noise earn nothing. Crucially,
        each held-out specimen is scored by the two-curve model's MIXTURE density — π·N(rₗ; 0, σ̂²) + (1−π)·N(r_s; 0, σ̂²),
        where π is the training mixing proportion — because at prediction time the model does not know the specimen's sex.
        (Scoring it by whichever curve happens to fit it better would let the point peek at its own label, inflating the
        two-curve advantage to ≈ +10 even with NO dimorphism; the mixture rule avoids that leak.) Finally, a fold whose
        fitted curve degenerates into a near-step solution predicting an impossible <B>negative</B> size at a held-out age
        is dropped from the CV average — the safeguard described under <B>How the curves are fit</B> above — which excludes
        only that fold's nonsensical held-out score and never alters the fit.</P>
        <Eq>{`CV ΔLL = (two-curve held-out LL) − (one-curve held-out LL)`}</Eq>
        <Where items={[
          {sym:"CV ΔLL > 0", def:"two-curve model predicts unseen data better — stronger than just fitting better"},
          {sym:"null behaviour", def:"with no true dimorphism CV ΔLL sits near 0; it rises only as real dimorphism appears. This near-zero null (unlike ΔAICc, pinned near −100) makes CV the model-comparison metric least distorted by the labels-from-data endogeneity — you can read it against zero, not only by the gap between scenarios."},
        ]}/>
        <P><B>GMM Component Separation (Cohen's d).</B> Instead of splitting residuals by sign, a
        <Term>Gaussian Mixture Model</Term> fit by <Term>Expectation-Maximisation (EM)</Term> discovers — unsupervised,
        not told the sexes — whether the residuals form one cluster or two, and how far apart:</P>
        <Eq>{`Cohen's d = |μ₂ − μ₁| / σ_pooled`}</Eq>
        <Where items={[
          {sym:"μ₁, μ₂", def:"the two fitted component means"},
          {sym:"σ_pooled", def:"pooled within-component standard deviation"},
          {sym:"d", def:"d=1 ⇒ means one pooled SD apart"},
        ]}/>
        <P>Key subtlety: forced to fit two curves to a single cloud (no real dimorphism), EM does NOT return d = 0 —
        it splits the cloud into two overlapping halves, giving a non-zero d (measured in Sc.2). That baseline is
        NOT a fixed constant — it depends on sample size, shrinking as n grows (≈1.6 at n=40, ≈1.0 at n=100, ≈0.8 at
        n=200), because more data lets EM resist a spurious split. So the textbook 0.2/0.5/0.8
        cutoffs are the wrong yardstick: read the unsupervised d against its Sc.2 null baseline AT THE SAME SAMPLE SIZE, treating only a
        clear rise above it as real bimodality. The supervised sign-split is worse — it mechanically forces d ≈ 2.6
        even on one cloud — so it cannot itself test for two groups.</P>
        <P><B>ΔBIC.</B> <Term>BIC</Term> (Bayesian Information Criterion) is like AIC but with a heavier per-parameter
        penalty. Note that ΔBIC here answers a DIFFERENT question from ΔAICc above: ΔAICc compares one vs two
        <em>growth curves</em>; ΔBIC compares one vs two <em>Gaussian components fit to the residuals</em> of the single
        combined curve (the same residual mixture that Cohen's d summarises). So its parameter counts are those of the
        mixture, not the growth model:</P>
        <Eq>{`BIC  = −2·LL + k·ln(n)
ΔBIC = BIC(two-component) − BIC(one-component)`}</Eq>
        <Where items={[
          {sym:"k", def:"mixture parameters: 2 for one component (its mean and SD), 5 for two components (two means, two SDs, one mixing weight). So k₂−k₁ = 3, giving ΔBIC = 3·ln(n) − 2·(LL₂−LL₁)."},
          {sym:"ln(n) > 2 for n > 7", def:"so BIC penalises parameters more than AIC — more conservative"},
          {sym:"ΔBIC < 0", def:"two-component model preferred"},
        ]}/>
        <P>Conventional cutoffs ΔBIC &lt; −2 ("positive") / &lt; −6 ("strong") are NOT drawn: averaged over
        repetitions, ΔBIC only grazes zero (min ≈ −1) and never reaches −2. Only the y = 0 crossover is drawn. As
        everywhere here, read the trend across scenarios, not whether a cutoff is crossed.</P>
        <P style={{background:"#f0f4f8",borderLeft:"3px solid #2a6496",padding:"10px 14px",margin:"4px 0 0"}}>
        <B>How the four model-comparison panels are organised:</B> ΔAICc, CV ΔLog-Likelihood, Separation (Cohen's d),
        and ΔBIC each get their own tab. Within each, the SAME metric is plotted two ways that differ only in how the
        two groups are formed before the metric is computed: the <B>solid</B> line uses the supervised residual
        sign-split (Saitta's rule), and the <B>dashed</B> line uses unsupervised EM/GMM clustering. Because the two
        lines are the same metric on the same scale, they can be read directly against each other — the vertical gap
        between solid and dashed is exactly the effect of the grouping choice. (The unsupervised ΔAICc and CV lines use
        "guarded" EM grouping — clusters of ≥10 specimens with physically plausible refits — and, like every line in the
        suite, are summarised by the mean by default or the median when the Error-band toggle is set to Med±IQR.)</P>
        <P><B>Trend / Slope Analysis</B> -- rather than looking at any single value, we compute the
        <Term>linear regression slope</Term> of each metric across its scenario's gradient -- in plain terms,
        "how fast does this metric change as we move along the x-axis?" We then normalise all slopes so the
        largest is ±1, making them directly comparable across metrics with different units, and re-orient them so
        that "positive" always means "moving toward more evidence of dimorphism" (this flips ΔAICc and ΔBIC, where a
        more-negative value is the evidence direction). A strong discriminator moves toward dimorphism evidence as
        real dimorphism grows (Sc.1) but NOT as pure noise grows with no dimorphism present (Sc.2); the panel's
        Discrimination score, D = g₁ − g₂, formalises exactly that. Full step-by-step definition is given beneath the
        table on that tab.</P>
      </Section>

      <Section title="Faithful implementations of Saitta et al.">
        <P>The following elements are direct translations of the published R code:</P>
        <ul style={{margin:"0 0 12px",padding:"0",listStyle:"none",display:"flex",flexDirection:"column",gap:"10px"}}>
          {[
            ["Female curve fixed; male curve scales with effect size E",
             <span>The female VB curve is held constant in all simulations; only the male curve shifts as effect size E grows:
               <Eq>{`Female:  L = 2.78 · (1 − 0.91 · exp(−0.0926 · age))
Male L∞  = 2.78 + E
(male shape and growth-rate scale with E too — Hone & Mallon 2017)`}</Eq>
               Larger-effect males have both a bigger adult size and somewhat faster growth (biologically realistic). Female size is the baseline; E is how far above it the male asymptote sits.</span>],
            ["Within-sex scatter (SD function)",
             <span>Random scatter added to each individual's length is not fixed — it scales with body length:
               <Eq>{`scatter = sdMult · (0.0589 · ln(L) + 0.0816)`}</Eq>
               Larger individuals have more absolute scatter (same relative scatter), matching real alligator data. At natural dimorphism, female scatter ≈ 0.141 m and male scatter ≈ 0.157 m (≈11% more). Both sexes share the same sdMult throughout.</span>],
            ["Sex assignment by residual sign",
             "After fitting the combined growth curve, individuals above the curve (positive residual = larger than expected for their age) are assigned to the 'larger sex' group; individuals below (negative residual = smaller than expected) are assigned to the 'smaller sex' group. This mirrors Allig_functions_ETS.r exactly. It requires no prior knowledge of sex -- which is why it can be applied to fossils."],
            ["Effect size always taken as absolute value",
             "Following Phylo_dimorphism.r line 129, the estimated effect is always abs(L∞_larger - L∞_smaller) -- the positive difference, regardless of which residual-assigned group happens to be 'larger' in a given run. This means the method does not assume which sex is the bigger one, and estimated effects are always ≥ 0."],
            ["Natural alligator dimorphism as reference",
             "E = 1.01m is the empirical Linf difference between male and female American alligators from Wilkinson & Rhodes (1997), used as the biological reference throughout. The x=1 line on all plots marks this natural value."],
            ["CI and PI interval computation",
             "Confidence and prediction intervals are computed via the delta method -- propagating the fitted parameter covariance to the predicted body length. Explicitly, with ŷ the fitted length at the target age, g its gradient w.r.t. the three VB parameters, J the Jacobian of the fit, and s² = MSE = RSS/(n−p): CI = ŷ ± t(n−p, 0.975)·s·√(gᵀ(JᵀJ)⁻¹g), and PI = ŷ ± t(n−p, 0.975)·s·√(1 + gᵀ(JᵀJ)⁻¹g). These are the standard textbook nonlinear-regression interval formulas (e.g. Seber & Wild; Kutner et al.) — the same expressions a student would write from the definition, using the t-distribution with n−p degrees of freedom and the unbiased residual variance RSS/(n−p). This is a first-order analytic approximation of the predictNLS() function in R's propagate package used by Saitta et al., which instead uses a second-order Taylor expansion plus Monte Carlo (but the same t, the same n−p, and the same added residual variance). The first-order method was chosen for performance: the tool refits thousands of curves live in the browser, and a per-interval Monte Carlo (predictNLS draws ~10⁵–10⁶ samples) would make it too slow to be interactive. Tested against a second-order Taylor + Monte Carlo reference on these fits, the delta-method PI comes out only about 1–2% wider across all ages (the gap is the t-multiplier vs Monte-Carlo-percentile difference, not the dropped second-order terms, which are negligible because a von Bertalanffy curve is nearly linear in its parameters). That offset is constant across scenarios, so the relative comparisons the tool is built on are unaffected. The prediction interval adds a SINGLE pooled residual variance (σ̂² = SSE/(n−p)) to the parameter-uncertainty variance -- exactly as predictNLS does -- even though the true generating scatter is length-dependent (sd = 0.0589·ln(L)+0.0816). This homoscedastic-PI-on-heteroscedastic-data choice is inherent to the nls/predictNLS approach Saitta used and is faithfully reproduced here. Its only consequence is mild: the nominal-95% PI covers a new individual about 93–95% of the time, dipping to ~93% at the oldest/largest specimens where the true scatter exceeds the pooled average. This is verified to be a property of the modeling choice, not a calculation error — under constant (homoscedastic) noise the same interval code gives exactly nominal 95% coverage at every age, and the delta-method matrix machinery reproduces the textbook regression CI/PI formulas to machine precision."],
          ].map(([title, desc], i) => (
            <li key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <span style={{flex:"0 0 auto",marginTop:"2px"}}><Faithful>{title}</Faithful></span>
              <span style={{fontSize:"12px",color:"#4a4a4a",lineHeight:1.7}}>{desc}</span>
            </li>
          ))}
        </ul>
      </Section>

      <Section title="Deliberate departures from Saitta et al.">
        <P>The following elements differ from the published R code, with justification:</P>
        <ul style={{margin:"0 0 12px",padding:"0",listStyle:"none",display:"flex",flexDirection:"column",gap:"10px"}}>
          {[
            ["Shared reference age for interval metrics",
             "Saitta's code evaluates confidence and prediction intervals at the oldest individual in each residual-assigned sex group separately. At extreme noise levels, the random residual split can accidentally put the dataset's overall oldest individual into the 'smaller sex' group, then the 'larger sex' group has no old individuals, and the upper bound of the younger group's curve is lower than the lower bound of the older group's curve -- producing a geometrically impossible negative spread. This simulator instead evaluates both curves at the single oldest individual in the entire combined dataset, ensuring the comparison is always made at the same biological reference point. This makes no practical difference at realistic noise levels where both assigned groups contain old individuals."],
            ["Shared 0→2.5× gradient range across all three scenarios",
             "All three scenarios run from 0 to 2.5× their natural reference value. This makes the three panels on each metric tab directly comparable: at any x position, you are looking at the same multiple of the natural reference for all three scenarios. Saitta's original simulations used different ranges and starting points. The range is capped at 2.5× because beyond about 3× natural dimorphism the curve-fitting becomes numerically unstable, and even at 2.5× the male growth curve is already biologically unrealistic (its juvenile portion crosses below the female curve)."],
            ["Scenario 3 SNR range limited to biologically realistic noise",
             "The SNR Analysis tab only shows Scenario 3 data where the noise level (coefficient of variation, or CV -- scatter expressed as a percentage of body length) is below 20%. Below this, simulated individuals can have near-zero or negative body lengths, which is biologically impossible and produces erratic fitting. The natural alligator CV is about 5%; 20% is already extreme."],
          ].map(([title, desc], i) => (
            <li key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <span style={{flex:"0 0 auto",marginTop:"2px"}}><Departure>{title}</Departure></span>
              <span style={{fontSize:"12px",color:"#4a4a4a",lineHeight:1.7}}>{desc}</span>
            </li>
          ))}
        </ul>
      </Section>

      <Section title="Novel extensions beyond Saitta et al.">
        <ul style={{margin:"0 0 12px",padding:"0",listStyle:"none",display:"flex",flexDirection:"column",gap:"10px"}}>
          {[
            ["Scenario 3 (SNR gradient)",
             "Saitta et al. discuss the signal-to-noise ratio (SNR = true dimorphism ÷ within-sex scatter) conceptually but do not simulate it directly. Scenario 3 fixes the true dimorphism and varies the noise, so both Scenario 1 and Scenario 3 can be plotted against SNR -- a single number capturing how detectable the signal is -- on a shared axis. At the same SNR, you can compare: does it matter whether that SNR comes from a large signal (Sc.1) or low noise (Sc.3)?"],
            ["ΔAICc / ΔBIC model comparison",
             "Formal comparison of the one-sex (monomorphic) vs two-sex (dimorphic) growth curve models using information criteria. AICc and BIC both measure model fit while penalising for complexity, but BIC is more conservative (heavier penalty). Saitta et al. mention AIC but do not implement it as a diagnostic. Key finding: because sex is assigned from the same data being fit, the two-sex model always appears to fit better -- AICc is biased and unreliable in isolation. Trends across scenarios are meaningful; absolute values are not."],
            ["Cross-validated log-likelihood (CV ΔLL)",
             "A corrected model comparison that hides part of the data during fitting and tests predictions on the hidden part. This REDUCES the bias described above but does not remove it: because sex labels are assigned from the full dataset before the data is split, a residual positive bias leaks into the held-out folds. So CV ΔLL is strongly positive in Sc.1 (real dimorphism) and lower -- but still positive (~10), not zero -- in Sc.2. Read the GAP between scenarios, not the absolute value."],
            ["Gaussian Mixture Model (GMM) on residuals",
             "A statistical test for whether the residuals (deviations from the combined curve) look like one population or a mixture of two. If two sexes grow differently, their residuals should cluster into two bell curves. The EM algorithm finds the best-fitting two-component mixture. This is more principled than the Hartigans' dip test (which just tests for bimodality in the raw data) -- Saitta et al. explicitly criticise the dip test and call for mixture modelling as future work."],
            ["Trend / slope analysis tab",
             "Operationalises Saitta et al.'s core argument: compare estimates across datasets rather than test a single dataset. For each metric, the slope (rate of change) across the gradient is computed and normalised so you can compare all metrics on the same scale. This directly answers: which metric responds most strongly to real dimorphism (Sc.1) relative to noise (Sc.2)?"],
            ["Y-axis scale toggle",
             "Switches between linear, log₁₀, and signed-log scaling across all three scenario panels simultaneously. The signed log transform -- sign(y)·log₁₀(1+|y|) -- compresses very large values while preserving zero and the sign of negative values (important for separation metrics). Useful when Sc.3 at high noise produces extreme values that visually dominate a linear-scale plot, hiding the more subtle dynamics in Sc.1 and Sc.2."],
          ].map(([title, desc], i) => (
            <li key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <span style={{flex:"0 0 auto",marginTop:"2px"}}><Added>{title}</Added></span>
              <span style={{fontSize:"12px",color:"#4a4a4a",lineHeight:1.7}}>{desc}</span>
            </li>
          ))}
        </ul>
      </Section>

      <Section title="Key findings">
        <ul style={{margin:0,padding:"0 0 0 18px",lineHeight:1.9,fontSize:"13px",color:"#3a3a3a"}}>
          <li style={{marginBottom:"10px"}}><B>PI separation is the most reliable single metric.</B> It is the only metric that moves in opposite directions in Sc.1 (increases as true dimorphism grows) and Sc.2 (decreases as noise grows). Every other metric either rises in both scenarios or is ambiguous. This is why Saitta et al. emphasise it.</li>
          <li style={{marginBottom:"10px"}}><B>Estimated effect size alone cannot distinguish real signal from noise.</B> The residual-split method always produces a positive estimate, even when there is no true dimorphism. The estimate rises in Scenario 2 as well as Scenario 1. You cannot look at a single effect size estimate and conclude dimorphism is real -- you need to compare it across multiple datasets and alongside the interval separation metrics.</li>
          <li style={{marginBottom:"10px"}}><B>ΔAICc is always negative -- it cannot confirm dimorphism.</B> The two-sex model always fits the data it was fit to better than the one-sex model, because the sex assignments come from the same data. This built-in advantage makes ΔAICc universally negative. Only the trend (how much more negative it gets in Sc.1 vs Sc.2) is informative. The cross-validated log-likelihood is more trustworthy.</li>
          <li style={{marginBottom:"10px"}}><B>Unsupervised Cohen's d has a non-zero null baseline, and it is sample-size dependent.</B> When EM is forced to fit two components to residuals with no real two-group structure (Sc.2), it does not return d ≈ 0 -- it splits the single cloud into two overlapping halves, reporting a sizeable d. That baseline is not a fixed number: it falls as sample size grows (≈1.6 at n=40, ≈1.0 at n=100, ≈0.8 at n=200), because more data lets EM resist a spurious split. By the textbook scale even the n=100 value (~1.0) looks like a "large" effect, but it reflects pure noise. So the d = 0.2/0.5/0.8 thresholds are the wrong yardstick here: judge the unsupervised d against the Sc.2 baseline AT YOUR SAMPLE SIZE, and treat only a clear rise above it (with a rising trend as dimorphism grows) as real bimodality. The supervised sign-split is worse still -- it forces ~2.6 regardless -- so it cannot test for groups at all.</li>
          <li style={{marginBottom:"0"}}><B>SNR = 1 is the practical detection threshold.</B> When noise equals signal (SNR = 1), most metrics become unreliable. The natural alligator CV is about 5%, which corresponds to a high SNR -- fossil datasets with many individuals of unknown growth histories may have much higher CV and correspondingly lower SNR. Any fossil application of this method should consider how noisy the data are relative to the expected dimorphism.</li>
        </ul>
      </Section>

      <Section title="How to use this simulator">
        <ul style={{margin:0,padding:"0 0 0 18px",lineHeight:1.9,fontSize:"13px",color:"#3a3a3a"}}>
          <li style={{marginBottom:"8px"}}><B>N per sex</B>: how many individuals are simulated per true sex (total sample = 2x). Fossil datasets often have 10-50 specimens total; lower N makes curves noisier and more variable between runs.</li>
          <li style={{marginBottom:"8px"}}><B>Reps per step</B>: how many independent simulations are averaged at each x-axis position. More reps = smoother, more reliable curves, but longer computation time. 15-30 reps is a reasonable starting point; use 50-100 for publication-quality results.</li>
          <li style={{marginBottom:"8px"}}><B>Y-axis scale</B>: Linear shows raw values. Log compresses large values (only works for positive metrics). Signed Log compresses large values in both directions -- recommended when Scenario 3 dominates the chart at high noise.</li>
          <li style={{marginBottom:"8px"}}><B>Effect metric</B>: switches between raw Linf difference in metres (absolute, body-size-dependent), SDI (percentage difference, dimensionless), and log-ratio (dimensionless, mathematically symmetric). Use log-ratio for cross-species comparison.</li>
          <li style={{marginBottom:"8px"}}><B>Random seed</B>: leave blank for a fresh random dataset on every run. Enter any text or number to make the run <em>reproducible</em> — the same seed plus the same N, Reps, and steps always regenerates the identical dataset and therefore identical results, so a figure can be replicated exactly or shared with others. The 🎲 button picks a new random seed; "clear" returns to random-each-run. (Changing N per sex or Reps per step changes the data even at the same seed, since they alter how many random draws are taken.) The active seed is shown above the results.</li>
          <li style={{marginBottom:"8px"}}><B>Read the Definition panel</B> (amber box above each chart group) before interpreting results -- it gives plain-language definitions, units, sign conventions, and the key caveat for each metric.</li>
          <li style={{marginBottom:"8px"}}><B>* Trend Analysis tab</B>: the best single summary of the simulator's findings. Shows slope (rate of change) of each metric across each scenario, normalised so all metrics are comparable. Start here for an overview.</li>
          <li style={{marginBottom:"0"}}><B>> SNR Analysis tab</B>: shows how performance changes as signal-to-noise ratio changes. The PI separation chart (starred, bottom-left) is the clearest visual demonstration of why this metric is the key diagnostic.</li>
        </ul>
      </Section>

      <div style={{background:"#f0f4f8",border:"1px solid #8aabcc",borderLeft:"4px solid #2a6496",padding:"14px 18px",fontSize:"12px",color:"#1a3a5a",lineHeight:1.7}}>
        <strong>Note on updates:</strong> This README is maintained alongside the simulator code. The most recent changes: (1) all explanatory text -- this README, the Definition panels above each chart, and the Interpretation panels below -- has been rewritten in plain language, defining every technical term (Cohen's d, BIC, CV, log-likelihood, etc.) on first use and spelling out every formula, for readers without a statistics background. (2) The four model-comparison metrics (ΔAICc, CV ΔLog-Likelihood, Cohen's d, ΔBIC) each get their own panel, and each is shown computed two ways -- a supervised residual sign-split (solid) and an unsupervised EM/GMM clustering (dashed) -- so the effect of the grouping choice is visible. (3) The y-axis scale toggle (Linear / Log / Signed-log) is applied to every plot in every panel, including the diagnostics and overlays. (4) All three scenarios share a 0→2.5× x-axis range, reduced from 0→4× because Sc.1 NLS fitting becomes erratic above 3× natural dimorphism. (5) Reference lines mark thresholds only where they are actually informative: y=0 (no-preference / curves-touching / one-vs-two-component boundary) on the relevant charts, and the natural dimorphism value on the effect-size chart. Several conventional thresholds are deliberately NOT drawn because the data never approaches them and they would mislead: the ΔAICc -2/-7 lines (ΔAICc runs -100 to -250 everywhere), the ΔBIC -2/-6 lines (averaged ΔBIC only grazes zero), and the Cohen's d 0.2/0.5/0.8 lines (every scenario sits well above them). The Cohen's d panel has no horizontal reference line at all -- the EM null baseline (sample-size dependent: ≈1.6 at n=40, ≈1.0 at n=100, ≈0.8 at n=200) is the level the unsupervised line itself sits at under no dimorphism, not a fixed cutoff, so it is explained in the panel text and read by comparing the two lines against each other. Throughout, the trend across scenarios is the diagnostic signal, not whether an absolute threshold is crossed.
      </div>

    </div>
  );
}

      ],
      caveat: "PI spread inflates rapidly with noise (Scenarios 2 and 3) because prediction interval width is directly proportional to within-sex scatter. It cannot reliably distinguish real dimorphism from high intraspecific variation. Like CI spread, it should not be used in isolation -- PI separation (below) is the more informative metric.",
    },
    ciSep: {
      title: "95% Confidence Interval Separation -- Are the Fitted Curves Statistically Distinct?",
      summary: <span>While spread measures the outer envelope, separation measures whether the inner edges of the two confidence intervals have cleared each other:
        <Eq>{`CI Separation = (lower bound of larger-sex CI) − (upper bound of smaller-sex CI)`}</Eq>
        Positive ⇒ the two confidence intervals do not overlap — the fitted curves are distinguishable at the 95% level. Negative ⇒ they overlap and the curves cannot be confidently said to differ. The red y=0 line marks the boundary: crossing from negative to positive means the curves have just separated.</span>,
      metrics: [
        { name: "CI Separation (metres)", def: "Lower 95% CI of larger-sex curve minus upper 95% CI of smaller-sex curve, at the oldest individual's age. Positive = non-overlapping (the fitted average curves are statistically distinct). Negative = overlapping (curves cannot be confidently distinguished). Zero = curves just touching. More negative = more overlap." },
      ],
      caveat: "CI separation answers the question 'are the average growth curves statistically distinct?' -- but even when the answer is yes, individual animals from each sex may still overlap substantially in body size. The next metric (PI separation) addresses the individual-level question, which is more biologically meaningful.",
    },
    piSep: {
      title: "95% Prediction Interval Separation -- Are Individual Specimens of Each Sex Distinguishable?",
      summary: <span>The most biologically meaningful interval metric, and the one Saitta et al. emphasise most:
        <Eq>{`PI Separation = (lower bound of larger-sex PI) − (upper bound of smaller-sex PI)`}</Eq>
        Positive ⇒ a new specimen of the larger sex would not overlap in body size with a new specimen of the smaller sex — they are individually distinguishable. Negative ⇒ individuals of the two sexes overlap. Because PIs are wider than CIs, PI separation is harder to achieve than CI separation for the same data. The red y=0 line is the boundary. This metric is uniquely powerful: it moves in OPPOSITE directions in Sc.1 (rises as real dimorphism grows) and Sc.2 (falls as noise grows) — the only metric that cleanly distinguishes these two cases.</span>,
      metrics: [
        { name: "PI Separation (metres)", def: "Lower 95% PI of larger-sex curve minus upper 95% PI of smaller-sex curve, at the oldest individual's age. Positive = non-overlapping individuals (strong dimorphism -- the sexes are individually distinguishable in size). Negative = overlapping (individual specimens cannot be reliably assigned to sex by size alone). Always more negative than CI separation for the same data." },
      ],
      caveat: "PI separation is the key diagnostic in the Saitta framework. Its distinctive property -- moving in opposite directions under real dimorphism vs pure noise -- makes it uniquely reliable for distinguishing signal from noise. However, it is conservative: even genuinely dimorphic species with wide individual variation will show negative PI separation, because large males can be smaller than small females.",
    },
    aicc: {
      title: "ΔAICc — Model Comparison by Akaike Information Criterion",
      summary: "ΔAICc asks whether the data is better explained by ONE shared growth curve or by TWO separate curves (one per assigned sex group). This single-metric panel shows ΔAICc computed two ways that differ only in HOW the two groups are formed before fitting: the SOLID line uses the supervised residual sign-split (Saitta et al.'s rule — specimens above the combined curve form one group, below the other); the DASHED line uses unsupervised EM/GMM clustering, which discovers its own grouping from the residuals. Comparing the two lines shows how much the grouping choice changes the verdict.",
      metrics: [
        { name: "Supervised ΔAICc (solid line)", def: "AICc measures fit while penalising extra parameters (AICc = −2·log-likelihood + 2k + 2k(k+1)/(n−k−1)); the 'c' is a small-sample correction. ΔAICc = AICc(two-curve) − AICc(one-curve), with the two groups formed by the residual sign-split. Negative = two-curve model preferred. Conventional thresholds (−2 modest, −7 strong) are NOT drawn: because sex is assigned from the same data being fit, the two-curve model has a built-in advantage and ΔAICc runs roughly −100 to −250 in EVERY scenario (including the no-dimorphism one), dwarfing those lines. Only y=0 is drawn; read the trend." },
        { name: "Unsupervised ΔAICc (dashed line)", def: "Identical computation, except the two groups come from EM/GMM clustering of the residuals rather than the sign rule. This version is “guarded” (≥10 specimens per group, physically plausible refits, so a stray tiny cluster can’t distort it) and, like every line here, is summarised by the MEAN across repetitions by default, or by the MEDIAN when the Error-band toggle is set to Med±IQR. With no true dimorphism it is consistently a little LESS negative than the supervised version — EM can decline to split a single cloud, whereas the sign rule always forces a 50/50 split — but it does not escape the bias either." },
      ],
      caveat: "ΔAICc is biased negative in all scenarios under BOTH groupings, because the group labels are derived from the same data used to fit the models. Do NOT read the absolute value as evidence of dimorphism — only the trend across scenarios, and the gap between the two groupings, are informative.",
    },
    cv: {
      title: "CV ΔLog-Likelihood — Cross-Validated Model Comparison",
      summary: "WHY CROSS-VALIDATION? This metric answers the same one-curve-vs-two-curve question as ΔAICc, but it has to, because a raw log-likelihood comparison is rigged. The two-curve model has 6 free parameters versus 3, so it can always bend closer to the very data it was fit on — a plain in-sample log-likelihood would prefer it even when there is NO real dimorphism, simply rewarding flexibility. There are two standard ways to debias that comparison. ΔAICc keeps the in-sample numbers but subtracts an analytic penalty for the extra parameters. Cross-validation (this panel) does it empirically instead: hide part of the data, fit both models on the rest, and score the log-likelihood ONLY on the held-out part the models never saw. Parameters that were merely fitting noise do not help predict fresh data, so the inflation cancels by construction rather than by formula. That is why the metric is 'CV' ΔLog-Likelihood — the cross-validation is the whole mechanism that makes a log-likelihood difference trustworthy. Showing CV and ΔAICc side by side is a deliberate cross-check: an empirical correction and an analytic one for the same overfitting problem; agreement raises confidence. MECHANICS: the dataset is split into 5 folds; each fold is predicted by models fit on the other four. As with ΔAICc, the SOLID line forms the two groups by the supervised residual sign-split and the DASHED line by unsupervised EM/GMM clustering.",
      metrics: [
        { name: "Supervised CV ΔLogLik (solid line)", def: "ΔLog-Likelihood = (two-curve held-out prediction quality) − (one-curve), averaged over the 5 folds, with groups from the residual sign-split. Each held-out specimen is scored by the two-curve model's MIXTURE density — π·N(rₗ) + (1−π)·N(r_s) — because at prediction time the model does not know the specimen's sex. This gives a properly behaved null: with NO true dimorphism it sits near 0 (not inflated), and it rises only as real dimorphism appears (≈ 0 at no dimorphism → ≈ 9 at natural). Positive = the two-curve model genuinely predicts unseen individuals better. Cross-validation plus mixture scoring is what tames the endogeneity that leaves ΔAICc stuck near −100; this is the most trustworthy of the four model-comparison metrics." },
        { name: "Unsupervised CV ΔLogLik (dashed line)", def: "The same cross-validated, mixture-scored comparison with the two groups formed by EM/GMM clustering instead of the sign rule (guarded; mean or median per the Error-band toggle). It also sits near 0 under no dimorphism and tracks the supervised version closely once real dimorphism is present." },
      ],
      caveat: "The most trustworthy of the four model-comparison metrics: cross-validation plus honest mixture scoring of held-out points gives a near-zero null under no dimorphism, so unlike ΔAICc/ΔBIC it can be read against zero, not just by the gap between scenarios. It is not perfectly bias-free — the group labels are still derived from the full dataset before the fold split, leaving a small residual endogeneity — so treat values that hug zero cautiously. On some runs CV can taper at the most extreme dimorphism in Sc.1 (juvenile curve-crossing); see the decomposition plots and the Sexing Accuracy tab.",
    },
    cohend: {
      title: "Separation (Cohen's d) — How Far Apart Are the Two Groups of Residuals?",
      summary: "After fitting one combined growth curve, each specimen's residual is its deviation from that curve. If two sexes differ, the residuals should form two clusters. Cohen's d measures their separation = (gap between group means) ÷ (average within-group spread). This panel shows it computed two ways: SOLID = supervised residual sign-split (Saitta's rule); DASHED = unsupervised EM/GMM clustering, which discovers its own boundary. The contrast is the whole point of the panel — see the caveat.",
      metrics: [
        { name: "Supervised separation (solid line)", def: "Split the residuals at zero (Saitta's rule), then directly compute each group's mean and SD by maximum likelihood (no algorithm needed — the labels are given) and form Cohen's d. CRITICAL: because the split is forced at zero, the two group means are mechanically pushed apart, so this reports a LARGE separation (~2.6) even when the residuals are really a single cloud with no dimorphism. It literally cannot report 'one group'. That is why the supervised separation is NOT a valid test for whether two groups exist." },
        { name: "Unsupervised separation (dashed line)", def: "Let an EM-fitted Gaussian Mixture Model discover whether the residuals form one cluster or two, placing the boundary wherever the data supports it (it is not told the sign rule). 'Cohen's d' here is the separation of the two DISCOVERED components, where d = 1.0 means their means lie one pooled SD apart. Crucially it does NOT return d ≈ 0 when there is no dimorphism: forced to fit two bell curves to a single noisy cloud, EM splits it into two overlapping halves, giving a non-zero null baseline. That baseline is NOT a universal constant — it depends on sample size, falling as n grows (≈1.6 at n=40, ≈1.0 at n=100, ≈0.8 at n=200), because more data lets EM resist a spurious split. At the default N=50/sex it sits near 1.0. So read d against the baseline FOR YOUR SAMPLE SIZE (re-read it from Sc.2 at the same N), not against the textbook 0.2/0.5/0.8 thresholds, which are the wrong yardstick here." },
      ],
      caveat: "The supervised (solid) line manufactures separation by construction (~2.6 regardless) and must not be read as evidence of two sexes. The unsupervised (dashed) line is the meaningful one for detecting bimodality -- but note its null baseline is NOT zero and NOT a fixed number: EM splitting a single noisy cloud gives d that depends on sample size (≈1.6 at n=40, ≈1.0 at n=100, ≈0.8 at n=200). Compare the Sc.1 value against the Sc.2 baseline AT THE SAME SAMPLE SIZE and look for a clear rise; do not use the textbook 0.2/0.5/0.8 thresholds here.",
    },
    bic: {
      title: "ΔBIC — Does a Two-Component Mixture Beat One, After a Heavy Penalty?",
      summary: "ΔBIC compares a two-component model against a one-component model for the residuals, using the Bayesian Information Criterion, which penalises extra parameters more heavily than AICc. As with the other metrics, the SOLID line forms the two groups by the supervised residual sign-split and the DASHED line by unsupervised EM/GMM clustering. The mechanism behind the dashed line's U-shape is shown in the decomposition diagnostics at the foot of this panel, which plot the one- and two-component log-likelihoods, their gain, and σ̂² (the estimated residual variance).",
      metrics: [
        { name: "Supervised ΔBIC (solid line)", def: "BIC = −2·log-likelihood + k·log(n). ΔBIC = BIC(two-group) − BIC(one-group), with groups from the residual sign-split. Negative favours two groups. Despite forcing a split, this line stays mostly POSITIVE — BIC's heavy penalty plus the fact that the forced halves are not cleanly separated bell curves means a single distribution usually wins on this conservative criterion." },
        { name: "Unsupervised ΔBIC (dashed line)", def: "Same comparison with EM/GMM clustering. Averaged over repetitions it stays close to zero — mildly positive at no/low dimorphism, dipping only to about −1 at moderate dimorphism (~1.25× natural), then climbing back toward zero at extreme dimorphism (a shallow U-shape, mirroring the separation curve). No conventional evidence line is drawn: the averaged ΔBIC only grazes zero and never reaches the −2 'positive evidence' or −6 'strong' thresholds, so drawing them would mislead. Only the y=0 crossover (one component vs two) is shown. Read the shallow dip as the trend signal, not as a threshold crossing." },
      ],
      caveat: "Under both groupings ΔBIC is a conservative test: even with real dimorphism present it barely favours two components, because BIC penalises the extra parameters heavily and the residual-based groups overlap. Read the trend (a shallow dip in Sc.1, flat-positive in Sc.2), not whether an absolute threshold is crossed.",
    },
  };

  const d = defs[metric];
  if (!d) return null;

  return (
    <div style={{
      background: "#f8f4ec", border: "1px solid #d4c9b0", borderLeft: "4px solid #c8a96e",
      padding: "18px 22px", marginBottom: "18px", fontSize: "12px", lineHeight: 1.75, color: "#2a2a2a",
    }}>
      <div style={{fontSize:"14px",fontWeight:"bold",color:"#1c2b3a",marginBottom:"8px"}}>
        {d.title}
      </div>
      <p style={{margin:"0 0 12px",color:"#3a3a3a"}}>{d.summary}</p>
      <ul style={{margin:"0 0 12px",padding:"0 0 0 18px"}}>
        {d.metrics.map((m,i) => (
          <li key={i} style={{marginBottom:"8px"}}>
            <strong style={{color:"#1c2b3a"}}>{m.name}:</strong>{" "}
            <span style={{color:"#4a4a4a"}}>{m.def}</span>
          </li>
        ))}
      </ul>
      <div style={{padding:"8px 12px",background:"#fff8e8",borderLeft:"3px solid #c8a96e",fontSize:"11px",color:"#5a4a2a"}}>
        <strong>Key caveat:</strong> {d.caveat}
      </div>
    </div>
  );
}

function InterpretationPanel({metric,naturalE}){
  const text={
    estEffect:{heading:"What to look for: Estimated Effect Size",points:[
      "All three scenarios produce positive estimated effects -- the residual-split method guarantees this even with no real dimorphism. The absolute value on any single run is not evidence of dimorphism.",
      "Compare the SLOPE (rate of increase) across scenarios, not the value itself. Sc.1 should rise steeply and track the true effect (gold reference line). Sc.2 should rise slowly from a noise-only floor. Sc.3 should rise, then plateau as noise dominates. The gap between Sc.1 and Sc.2 slopes is the signal the Saitta comparative framework exploits.",
      "If you are applying this method to real fossil data: compare your estimated effect to those from multiple species, not to an absolute threshold. A species whose effect estimate is well above others in a comparative dataset has stronger evidence for dimorphism.",
    ]},
    ciSpread:{heading:"What to look for: CI Spread",points:[
      "CI Spread increases in Sc.1 because the two fitted curves become genuinely further apart. It also increases in Sc.2 and Sc.3 because wider noise makes each curve harder to estimate precisely, widening the confidence intervals.",
      "Because both real signal and noise inflate CI Spread, you cannot distinguish them from this metric alone. Look at CI Separation instead, which measures whether the inner edges of the intervals have cleared each other.",
      "The reference line at y=0 marks the theoretical zero-width floor. In practice CI Spread is always positive and well above zero, so the line is just an axis baseline, not a threshold the data crosses.",
    ]},
    piSpread:{heading:"What to look for: PI Spread",points:[
      "PI Spread behaves similarly to CI Spread but is more sensitive to noise, because prediction intervals are wider than confidence intervals and grow faster as within-sex scatter increases.",
      "In Sc.3 (real dimorphism + rising noise), PI Spread may grow more slowly than in Sc.2 (noise only) because the real dimorphism signal counteracts some of the interval widening. The gap between Sc.2 and Sc.3 curves at the same noise level reflects how much dimorphism is holding the intervals apart.",
      "Use PI Separation (not spread) as the primary diagnostic -- separation measures whether the inner bounds have cleared each other, which is a much stronger claim than whether the outer bounds are far apart.",
    ]},
    ciSep:{heading:"What to look for: CI Separation",points:[
      "CI Separation moves in OPPOSITE directions in Sc.1 (increases as true dimorphism grows -- curves separate) and Sc.2 (decreases as noise grows -- wider intervals make curves look more overlapping). This opposite-direction behaviour is what makes it a useful discriminator.",
      "Sc.3 should decline less steeply than Sc.2 at the same noise level, because the real dimorphism signal in Sc.3 partially counteracts the noise-driven overlap. The vertical gap between Sc.2 and Sc.3 at any x-position reflects the contribution of real dimorphism.",
      "The red reference line at y=0 is the key threshold: when CI Separation crosses from negative to positive, the fitted curves no longer overlap at the 95% confidence level. But remember: non-overlapping curves do not mean non-overlapping individuals -- check PI Separation for that.",
    ]},
    piSep:{heading:"What to look for: PI Separation -- the starred key diagnostic",points:[
      "PI Separation is the only metric with OPPOSITE SIGNS between Sc.1 and Sc.2: Sc.1 increases (real dimorphism pushes individuals apart), Sc.2 decreases (noise widens prediction intervals, pushing separation more negative). This property makes it uniquely able to discriminate real dimorphism from noise.",
      "Sc.3 should show intermediate behaviour: declining less steeply than Sc.2 because the fixed real dimorphism resists the noise. The vertical gap between the Sc.2 and Sc.3 curves represents the direct contribution of the real dimorphism signal.",
      "The red reference line at y=0 is the critical threshold. Positive PI Separation means individual specimens of each sex are predicted not to overlap in body size -- strong evidence of dimorphism. Negative PI Separation means they do overlap -- individuals are not individually distinguishable by size alone, regardless of whether the mean curves differ.",
      "In real fossil applications: if PI Separation is trending positive as you increase sample size, or is clearly positive relative to a monomorphic comparison species, this is the strongest evidence the Saitta framework can provide for genuine sexual dimorphism.",
    ]},
    aicc:{heading:"What to look for: ΔAICc (supervised vs unsupervised grouping)",points:[
      "Both lines are ΔAICc; they differ only in how the two groups are formed. SOLID = supervised residual sign-split (Saitta's rule). DASHED = unsupervised EM/GMM clustering (guarded: clusters ≥10 specimens; mean or median per the Error-band toggle). Negative favours the two-curve model.",
      "ΔAICc is strongly negative in ALL scenarios under BOTH groupings — a structural bias, not evidence of dimorphism, because the group labels are derived from the same data used to fit the curves. The conventional −2/−7 thresholds are not drawn: ΔAICc runs roughly −100 to −250 everywhere, dwarfing them. Read the trend, not the absolute value.",
      "The instructive contrast: with no true dimorphism (Sc.2), the dashed unsupervised line is consistently a little LESS negative than the solid supervised line. EM can decline to split a single cloud, whereas the sign rule always forces a 50/50 split — so the unsupervised grouping is modestly less fooled. But neither escapes the bias.",
      "Compare TRENDS across scenarios: in Sc.1 both lines deepen as true dimorphism grows; in Sc.2 both stay roughly flat. The gap between scenarios, and between the two groupings, is the signal.",
    ]},
    cv:{heading:"What to look for: CV ΔLog-Likelihood (supervised vs unsupervised grouping)",points:[
      "Both lines are the cross-validated log-likelihood advantage of the two-curve model on held-out data. SOLID = supervised sign-split groups; DASHED = unsupervised EM/GMM groups. Positive means the two-curve model predicts unseen individuals better.",
      "Held-out scoring uses the two-curve model's MIXTURE density, so cross-validation gives a properly behaved null: in Sc.2 (no true dimorphism) CV sits near 0, and in Sc.1 it rises from ≈0 to ≈9 as real dimorphism grows. So here you CAN read position relative to zero — positive means two curves genuinely predict unseen individuals better — as well as the gap between scenarios. This is the metric least distorted by the labels-from-data endogeneity that pins ΔAICc near −100.",
      "The two groupings track each other closely once real dimorphism is present; the supervised/unsupervised difference is smaller here than for ΔAICc.",
      "Does CV dip at the very largest dimorphism in Sc.1? Sometimes — it is intermittent and outlier-driven. The typical (median) run keeps a high CV advantage to 2.5× natural; only occasional degenerate fits drag an average down. The real underlying cause (mis-sorting from juvenile curve-crossing) is shown on the Sexing Accuracy tab.",
    ]},
    cohend:{heading:"What to look for: Separation (Cohen's d) — supervised vs unsupervised",points:[
      "Both lines are Cohen's d separation between two groups of residuals. SOLID = supervised residual sign-split; DASHED = unsupervised EM/GMM clustering. This is the panel where the grouping choice matters MOST.",
      "The supervised (solid) line is misleading by construction: splitting residuals at zero mechanically forces a high group and a low group, so it reports a large separation (~2.6) EVEN WITH NO TRUE DIMORPHISM (look at Sc.2 — it stays high and flat). It literally cannot report 'one group'. Do not read it as evidence of two sexes.",
      "The unsupervised (dashed) line is the meaningful one for detecting two groups, but it has a non-zero null baseline that depends on sample size: EM forced to fit two components to a single noisy cloud reports d ≈ 1.6 at n=40, ≈1.0 at n=100, ≈0.8 at n=200 (the baseline shrinks as more data lets EM resist a spurious split), rising to ~2.5–3 with real dimorphism in Sc.1. Read it by whether it rises clearly above the Sc.2 baseline AT THE SAME SAMPLE SIZE, not against the textbook d=0.2/0.5/0.8 thresholds, which are the wrong yardstick here.",
      "This contrast is the whole reason an unsupervised method is the right tool for TESTING whether two groups exist: a rule that manufactures two groups cannot also be the test for whether two groups are there.",
      "Why the Sc.1 U-shape in the unsupervised line? Cohen's d = (between-group gap) ÷ (within-group spread). As dimorphism rises the gap grows, but so does the spread (a single combined curve fits each sex worse as the true curves diverge). Below ~1.5–2× the gap dominates (d rises); beyond that the spread overtakes it (d falls). The gap-vs-spread mechanism is plotted directly in the decomposition diagnostic at the foot of THIS (Cohen's d) panel.",
    ]},
    bic:{heading:"What to look for: ΔBIC (supervised vs unsupervised grouping)",points:[
      "Both lines are ΔBIC = BIC(two groups) − BIC(one group) on the residuals; negative favours two groups. SOLID = supervised sign-split; DASHED = unsupervised EM/GMM. BIC penalises extra parameters heavily, so it is the most conservative of the four metrics.",
      "The supervised (solid) line stays mostly POSITIVE — even though it forces a split, the forced halves are not cleanly separated bell curves, and BIC's penalty makes a single distribution win. The unsupervised (dashed) line dips negative only around moderate dimorphism (to about −1), then climbs back toward zero (a shallow U-shape).",
      "No conventional evidence line is drawn: the averaged ΔBIC only grazes zero and never reaches the −2 'positive evidence' or −6 'strong' thresholds, so drawing them would mislead. Only the y=0 crossover (one vs two components) is shown. Read the shallow dip as the trend signal, not as a threshold crossing.",
      "The decomposition diagnostics at the foot of this panel show the mechanism behind the U-shape: ΔBIC = 3·ln(n) − 2·(LL₂ − LL₁), so it is driven entirely by the likelihood gain LL₂ − LL₁, and its trough sits exactly at the gain's peak. σ̂² (the estimated residual variance) is shown alongside because it sets the scale of both log-likelihoods.",
    ]},
  };
  const t=text[metric];
  if(!t) return null;
  return(
    <div style={{marginTop:"20px",background:"#1c2b3a",color:"#e8dfc8",padding:"22px 28px"}}>
      <div style={{fontSize:"11px",letterSpacing:"2px",textTransform:"uppercase",color:"#c8a96e",marginBottom:"12px"}}>{t.heading}</div>
      <ul style={{margin:0,padding:"0 0 0 18px",lineHeight:1.85,fontSize:"12px"}}>
        {t.points.map((p,i)=><li key={i} style={{marginBottom:"8px",color:"#ccc8bc"}}>{p}</li>)}
      </ul>
    </div>
  );
}
