        { name: "CI Spread (metres)", def: "Upper 95% CI of the larger-sex curve minus the lower 95% CI of the smaller-sex curve, both evaluated at the age of the oldest individual in the full dataset. Always ≥ 0. The gold reference line at y=0 marks where this becomes pathological (impossible in practice with correctly-fitted models)." },
      ],
      caveat: "Spread is ambiguous: it increases both when curves are genuinely separated (good news, real signal) and when curves are uncertain and wide (bad news, unreliable estimates). Use separation metrics (below) instead of spread to assess whether the curves are truly distinct.",
    },
    piSpread: {
      title: "95% Prediction Interval Spread -- Individual-Level Uncertainty Envelope",
      summary: "A prediction interval (PI) is wider than a confidence interval. While a CI captures uncertainty about the average curve, a PI captures where we expect an individual new specimen to fall -- accounting for both curve uncertainty AND the natural variability between individual animals of the same sex and age. PIs are therefore always wider than CIs for the same data. PI Spread measures the same envelope concept as CI Spread, but using the wider prediction intervals. It is more sensitive to within-sex scatter, which is why it inflates more rapidly as noise increases.",
      metrics: [
        { name: "PI Spread (metres)", def: "Upper 95% PI of the larger-sex curve minus the lower 95% PI of the smaller-sex curve at the oldest individual's age. Always ≥ 0. PI spread is always larger than CI spread for the same data -- PIs are wider because they account for individual variation on top of curve uncertainty." },
      ],
      caveat: "PI spread inflates rapidly with noise (Scenarios 2 and 3) because prediction interval width is directly proportional to within-sex scatter. It cannot reliably distinguish real dimorphism from high intraspecific variation. Like CI spread, it should not be used in isolation -- PI separation (below) is the more informative metric.",
    },
    ciSep: {
      title: "95% Confidence Interval Separation -- Are the Fitted Curves Statistically Distinct?",
      summary: "While spread measures the outer envelope, separation measures whether the inner edges of the two confidence intervals have cleared each other. CI Separation = (lower bound of larger-sex CI) - (upper bound of smaller-sex CI). When this is positive, the two confidence intervals do not overlap at all -- the fitted growth curves are statistically distinguishable at the 95% level. When it is negative, the intervals overlap, and the curves cannot be confidently said to differ. The red reference line at y=0 marks the critical boundary: crossing from negative to positive means the curves have just separated.",
      metrics: [
        { name: "CI Separation (metres)", def: "Lower 95% CI of larger-sex curve minus upper 95% CI of smaller-sex curve, at the oldest individual's age. Positive = non-overlapping (the fitted average curves are statistically distinct). Negative = overlapping (curves cannot be confidently distinguished). Zero = curves just touching. More negative = more overlap." },
      ],
      caveat: "CI separation answers the question 'are the average growth curves statistically distinct?' -- but even when the answer is yes, individual animals from each sex may still overlap substantially in body size. The next metric (PI separation) addresses the individual-level question, which is more biologically meaningful.",
    },
    piSep: {
      title: "95% Prediction Interval Separation -- Are Individual Specimens of Each Sex Distinguishable?",
      summary: "This is the most biologically meaningful interval metric and the one Saitta et al. emphasise most strongly. PI Separation = (lower bound of larger-sex PI) - (upper bound of smaller-sex PI). When positive, a new specimen predicted to belong to the larger sex would be expected not to overlap in body size with a new specimen of the smaller sex -- they are individually distinguishable. When negative, individuals of the two sexes are expected to overlap. Because PIs are wider than CIs, PI separation is harder to achieve (more negative) than CI separation for the same data. The red reference line at y=0 is the critical boundary. This metric is uniquely powerful: it moves in opposite directions in Scenario 1 (increases as real dimorphism grows) and Scenario 2 (decreases as noise grows) -- making it the only metric that can clearly distinguish these two cases.",
      metrics: [
        { name: "PI Separation (metres)", def: "Lower 95% PI of larger-sex curve minus upper 95% PI of smaller-sex curve, at the oldest individual's age. Positive = non-overlapping individuals (strong dimorphism -- the sexes are individually distinguishable in size). Negative = overlapping (individual specimens cannot be reliably assigned to sex by size alone). Always more negative than CI separation for the same data." },
      ],
      caveat: "PI separation is the key diagnostic in the Saitta framework. Its distinctive property -- moving in opposite directions under real dimorphism vs pure noise -- makes it uniquely reliable for distinguishing signal from noise. However, it is conservative: even genuinely dimorphic species with wide individual variation will show negative PI separation, because large males can be smaller than small females.",
    },
    modelSel: {
      title: "Model Selection -- Which Growth Model Fits Better: One Curve or Two?",
      summary: "Instead of asking 'how large is the estimated dimorphism?', model selection asks: 'is the data better explained by assuming one shared growth trajectory for all individuals, or by assuming two separate trajectories for the two assigned sex groups?' The one-curve model has 3 free parameters (asymptote, shape, growth rate). The two-curve model has 6. Having more parameters always improves fit to the training data -- but if the extra parameters are just modelling noise rather than a real difference, they will not help predict new data. Two methods address this, shown as solid and dashed lines on the same chart.",
      metrics: [
        { name: "ΔAICc -- Akaike Information Criterion, corrected (solid line)", def: "AICc measures how well a model fits the data while penalising it for having more free parameters (the penalty prevents overfitting). AICc is a version corrected for small sample sizes: AICc = −2·log-likelihood + 2k + 2k(k+1)/(n-k-1), where k = number of parameters and n = number of data points. ΔAICc = AICc(two-sex model) - AICc(one-sex model). Negative = two-sex model preferred after the penalty. WHY THE CONVENTIONAL THRESHOLDS ARE NOT DRAWN: in textbooks, ΔAICc < -2 means 'modest' support and < -7 means 'strong' support for the more complex model. Here those lines would be useless — because sex assignment and model fitting use the SAME data, the two-sex model has a huge built-in advantage, and ΔAICc runs from roughly -100 to -250 in EVERY scenario (including Sc.2, where there is no real dimorphism). The -2 and -7 lines would sit invisibly on top of the y=0 line. Only the y=0 line is drawn, marking 'no preference'; the meaningful information is the TREND across scenarios, not the absolute value." },
        { name: "CV ΔLog-Likelihood -- Cross-Validated model comparison (dashed line)", def: "This corrects the limitation of ΔAICc by testing predictions on data the model never saw during fitting. The dataset is split into 5 equal portions (folds). In each fold: 4 portions are used to fit both models, and the 5th portion is used to test how well each model predicts those unseen individuals. Log-likelihood measures prediction quality (higher = better predictions). ΔLog-Likelihood = (two-sex prediction quality) - (one-sex prediction quality), averaged across all 5 folds. Positive = the two-sex model predicts new individuals better. The reference line at y=0 is the nominal threshold, BUT note an important caveat in this simulator: even in Sc.2 (no true dimorphism) CV ΔLL does not reach zero — it sits around +10. This residual positive bias arises because the sex labels are assigned from the full dataset before the cross-validation split, so a little of the same endogeneity that plagues ΔAICc leaks into the held-out folds. CV still helps a great deal (it collapses ΔAICc's ~-100 down to ~+10), but interpret it by the GAP between scenarios — Sc.1 (~19 at natural dimorphism) versus Sc.2 (~10) — rather than by whether it exceeds zero. Note: on some runs CV ΔLL can dip at the most extreme effect sizes in Sc.1 (an intermittent, outlier-driven effect — see the Sexing Accuracy tab for the underlying mis-sorting that causes it)." },
      ],
      caveat: "ΔAICc is biased negative in all scenarios because sex assignment and model fitting use the same data. Do NOT use the absolute ΔAICc value to claim dimorphism -- only the trend across scenarios is meaningful. CV ΔLog-Likelihood is more trustworthy but still carries a residual bias because sex labels are fixed from the full dataset even during cross-validation.",
    },
    gmm: {
      title: "Gaussian Mixture Model (GMM) -- Does the Growth Scatter Look Like One Population or Two?",
      summary: "After fitting a single combined growth curve to all data, each specimen's residual is computed -- its deviation from the population-average curve (positive = larger than average for age; negative = smaller than average). If two sexes have genuinely distinct growth curves, their residuals should form two clusters: one negative (smaller sex, consistently below average) and one positive (larger sex, consistently above average). A Gaussian Mixture Model (GMM) tests this formally by fitting two overlapping bell-shaped (Gaussian) distributions to the residuals, using an iterative algorithm called Expectation-Maximisation (EM). EM alternates between: (E-step) estimating the probability each observation belongs to each bell curve, and (M-step) re-fitting the bell curves based on those probabilities. This repeats until the estimates stop changing.",
      metrics: [
        { name: "GMM Component Separation, in Cohen's d (the SOLID line)", def: "How far apart are the two fitted bell curves, relative to their width? Computed as (mean of larger component − mean of smaller component) ÷ average spread of the two components. This quantity is called Cohen's d — a standard effect-size measure named after statistician Jacob Cohen (1988). On the chart this is the SOLID line. In this simulator its values sit around 1 at the no-dimorphism floor and rise to roughly 2.5–3 at natural dimorphism (then ease back down at extreme dimorphism — the U-shape). Conventional interpretation of Cohen's d: d < 0.2 = negligible; d = 0.2 = small; d = 0.5 = medium; d = 0.8 = large; d > 1.2 = very large. Reference lines at d=0.2 (light green), 0.5 (medium green), 0.8 (dark green) mark these thresholds. IMPORTANT: even with no true dimorphism (Sc.2), the GMM finds two components in the positive/negative residuals, giving a baseline d of ~1 (roughly 0.8–1.2). Only values clearly above this baseline indicate genuine bimodality." },
        { name: "GMM ΔBIC, from the Bayesian Information Criterion (the DASHED line)", def: "BIC (Bayesian Information Criterion) is similar to AICc but applies a larger penalty for extra parameters: BIC = −2·log-likelihood + k·log(n). This makes BIC more conservative — it requires stronger evidence to prefer the more complex model. ΔBIC = BIC(2-component GMM) − BIC(1-component normal distribution). On the chart this is the DASHED line. Negative ΔBIC = the two-bell-curve model is preferred. WHAT YOU ACTUALLY SEE HERE: averaged over the repetitions, ΔBIC stays close to zero — it is mildly positive (~+10) at no/low dimorphism, dips only to roughly −2 at moderate dimorphism (around 1.25× natural), then climbs back toward zero at extreme dimorphism (the same U-shape as component separation, for the same reason — the inflating within-group spread). So the conventional −2 (positive evidence) and −6 (strong evidence) reference lines are barely or never reached by the average: BIC's heavy penalty, combined with the noisy residual-based split, means the two-component model rarely earns decisive support even when real dimorphism is present. Individual repetitions scatter widely (some single runs reach −20 or beyond), but the plotted mean is the honest summary. Read the TREND (a shallow dip in Sc.1, flat-positive in Sc.2), not whether a threshold is crossed." },
      ],
      caveat: "The GMM baseline is non-zero even with no dimorphism because residuals are always split into positive and negative halves by the sex-assignment step. Focus on TRENDS: component separation should rise in Sc.1 (more bimodality as dimorphism grows) and be flat in Sc.2 (noise floor only). Values above the Sc.2 baseline with a clear Sc.1 trend are meaningful. Values near the Sc.2 baseline are not.",
    },
  };

  const d = defs[metric];
  if (!d) return null;

  return (
    <div style={{
      background: "#f8f4ec", border: "1px solid #d4c9b0", borderLeft: "4px solid #c8a96e",
      padding: "18px 22px", marginBottom: "18px", fontSize: "12px", lineHeight: 1.75, color: "#2a2a2a",
    }}>
      <div style={{fontSize:"14px",fontWeight:"bold",color:"#1c2b3a",marginBottom:"8px"}}>
        {d.title}
      </div>
      <p style={{margin:"0 0 12px",color:"#3a3a3a"}}>{d.summary}</p>
      <ul style={{margin:"0 0 12px",padding:"0 0 0 18px"}}>
        {d.metrics.map((m,i) => (
          <li key={i} style={{marginBottom:"8px"}}>
            <strong style={{color:"#1c2b3a"}}>{m.name}:</strong>{" "}
            <span style={{color:"#4a4a4a"}}>{m.def}</span>
          </li>
        ))}
      </ul>
      <div style={{padding:"8px 12px",background:"#fff8e8",borderLeft:"3px solid #c8a96e",fontSize:"11px",color:"#5a4a2a"}}>
        <strong>Key caveat:</strong> {d.caveat}
      </div>
    </div>
  );
}

function InterpretationPanel({metric,naturalE}){
  const text={
    estEffect:{heading:"What to look for: Estimated Effect Size",points:[
      "All three scenarios produce positive estimated effects -- the residual-split method guarantees this even with no real dimorphism. The absolute value on any single run is not evidence of dimorphism.",
      "Compare the SLOPE (rate of increase) across scenarios, not the value itself. Sc.1 should rise steeply and track the true effect (gold reference line). Sc.2 should rise slowly from a noise-only floor. Sc.3 should rise, then plateau as noise dominates. The gap between Sc.1 and Sc.2 slopes is the signal the Saitta comparative framework exploits.",
      "If you are applying this method to real fossil data: compare your estimated effect to those from multiple species, not to an absolute threshold. A species whose effect estimate is well above others in a comparative dataset has stronger evidence for dimorphism.",
    ]},
    ciSpread:{heading:"What to look for: CI Spread",points:[
