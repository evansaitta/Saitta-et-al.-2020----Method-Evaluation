          group by the sign of their residual from the combined growth curve (Saitta's residual rule). This panel asks the
          most basic question of all: <strong>how often does that rule put a specimen in the correct sex group?</strong>
          Because the simulator generates the data, we know each specimen's true sex, so we can score the rule directly —
          following Saitta et al.'s own per-sex accuracy calculation (fraction of true males assigned to the larger group;
          fraction of true females assigned to the smaller group).
        </p>
        <p style={{ margin: "0" }}>
          The red line at <strong>50%</strong> is chance — the accuracy you would get by flipping a coin. A rule that
          cannot beat 50% has recovered no real sex information. Watch how differently the rule performs across the three
          scenarios below: this is the root cause behind the effect-size floor, the GMM separation U-shape, and the
          occasional cross-validation dip seen in the other panels. (In the two noise-swept scenarios the curves begin at
          the first non-zero noise step rather than at exactly zero noise: with literally no scatter every specimen lies
          perfectly on the curve, so the residual rule has nothing to split on and "accuracy" is undefined there.)
        </p>
      </div>

        "Scenario 1 — Increasing true dimorphism (noise fixed at natural)",

      {renderChart(sc2T, "Noise level, sdMult (1 = natural scatter)", [0, 2.5], [0, 0.5, 1, 1.5, 2, 2.5], v => v.toFixed(1) + "×", "#a63a3a",
        "Scenario 2 — No true dimorphism, increasing noise",

      {renderChart(sc3T, "Noise level, sdMult (1 = natural scatter)", [0, 2.5], [0, 0.5, 1, 1.5, 2, 2.5], v => v.toFixed(1) + "×", "#2a7a4a",
        "Scenario 3 — Fixed natural dimorphism, increasing noise",
        "Accuracy starts high (the natural-strength signal is clean at low noise) and decays steadily toward 50% as rising scatter drowns the fixed signal. This shows how a real, biologically-typical dimorphism becomes progressively harder to recover as individual variation increases.")}

          <li style={{ marginBottom: "6px", color: "#ccc8bc" }}><strong style={{ color: "#e8dfc8" }}>The Sc.1 floor at 50%</strong> (left edge) is exactly why the Estimated Effect Size never reaches zero: when sexing is a coin flip, the two groups still differ by chance, producing a spurious positive "effect".</li>
          <li style={{ marginBottom: "0", color: "#ccc8bc" }}><strong style={{ color: "#e8dfc8" }}>The Sc.1 decline at extreme dimorphism shares a root cause with the Cohen's d and ΔBIC U-shapes.</strong> All three turn over because of the SAME upstream event: past moderate dimorphism the male growth curve's juvenile portion drops below the female curve (at 2.5× natural, males stay smaller up to age ~13). Young males are then mislabelled (accuracy falls), and on the residuals the two sexes stop being cleanly offset — so the EM between-group gap stalls (Cohen's d turns over; see its decomposition plot) and the two-component likelihood advantage shrinks (ΔBIC climbs back up; see its decomposition plot). They are downstream symptoms of one cause, but not the same quantity and they do not all peak at exactly the same effect size — accuracy and Cohen's d turn over together near ~1.25×, while the ΔBIC trough can sit slightly later.</li>
        </ul>
      </div>
    </div>
  );
}

// Interactive CV ΔLogLik mechanism: walk through the 5 held-out folds on one example clade.
// Deliberately avoids useMemo (not imported here) and Scatter (not imported here): frames are
// computed inline each render, and specimens are drawn as a stroke-less Line with a custom dot.
function CVFoldWalkthrough({ naturalE }) {
  const [foldIdx, setFoldIdx] = useState(0);
  const [dimMult, setDimMult] = useState(1.0);
  const [seed, setSeed] = useState(1);
  const NPS = 30, FOLDS = 5;

  // One deterministic example clade (NPS females + NPS males) from the seed/dimorphism controls.
  seedRNG(seed * 100003 + Math.round(dimMult * 100) * 17 + 7);
  const E = naturalE * dimMult;
  const ages = [], lens = [];
  for (let i = 0; i < NPS; i++) { const a = runif(1, 50), mu = femaleVB(a); ages.push(a); lens.push(drawSize(mu, alligSD(mu, 1.0))); }
  for (let i = 0; i < NPS; i++) { const a = runif(1, 50), mu = maleVB(a, E); ages.push(a); lens.push(drawSize(mu, alligSD(mu, 1.0))); }
  const idx = ages.map((_, i) => i);

  // Compute all five folds inline (mirrors computeCVLogLik incl. the degenerate-fold guard).
  const frames = []; let totalD = 0, totalPts = 0;
  for (let fld = 0; fld < FOLDS; fld++) {
    const te = idx.filter(i => i % FOLDS === fld), tr = idx.filter(i => i % FOLDS !== fld);
    const fr = { fold: fld, te, skip: null };
    const mono = (te.length >= 1 && tr.length >= 10) ? fitVB(tr.map(i => ages[i]), tr.map(i => lens[i])) : null;
    if (!mono) { fr.skip = "too few training points / fit failed"; frames.push(fr); continue; }
    fr.mono = mono;
    const trRes = tr.map(i => lens[i] - vbPredict(mono, ages[i]));
    const up = tr.filter((i, j) => trRes[j] > 0), lo = tr.filter((i, j) => trRes[j] <= 0);
    if (up.length < 4 || lo.length < 4) { fr.skip = "a residual-split group had fewer than 4 training points"; frames.push(fr); continue; }
    const fU = fitVB(up.map(i => ages[i]), up.map(i => lens[i])), fL = fitVB(lo.map(i => ages[i]), lo.map(i => lens[i]));
    if (!fU || !fL) { fr.skip = "a two-curve fit did not converge"; frames.push(fr); continue; }
    fr.fU = fU; fr.fL = fL;
    if (te.some(i => vbPredict(mono, ages[i]) < 0 || vbPredict(fU, ages[i]) < 0 || vbPredict(fL, ages[i]) < 0)) {
      fr.degenerate = true; fr.skip = "the fitted curve plunges to an impossible NEGATIVE size at a held-out age"; frames.push(fr); continue;
    }
    let s2m = 0; tr.forEach(i => { const r = lens[i] - vbPredict(mono, ages[i]); s2m += r * r; }); s2m /= tr.length;
    let rss = 0; up.forEach(i => { const r = lens[i] - vbPredict(fU, ages[i]); rss += r * r; }); lo.forEach(i => { const r = lens[i] - vbPredict(fL, ages[i]); rss += r * r; }); const s2d = rss / tr.length;
    if (!(s2m > 0) || !(s2d > 0)) { fr.skip = "a residual variance was zero (degenerate)"; frames.push(fr); continue; }
    const pi = up.length / tr.length, inv = 1 / Math.sqrt(2 * Math.PI * s2d);
    let foldSum = 0, better = 0; const scoreOf = {};
    te.forEach(i => {
      const rm = lens[i] - vbPredict(mono, ages[i]), mll = -0.5 * (rm * rm / s2m + Math.log(2 * Math.PI * s2m));
      const rU = lens[i] - vbPredict(fU, ages[i]), rL = lens[i] - vbPredict(fL, ages[i]);
      const dll = Math.log(pi * Math.exp(-0.5 * rU * rU / s2d) * inv + (1 - pi) * Math.exp(-0.5 * rL * rL / s2d) * inv + 1e-300);
      const d = dll - mll; foldSum += d; if (d > 0) better++; scoreOf[i] = d;
    });
    fr.foldSum = foldSum; fr.better = better; fr.scoreOf = scoreOf;
    totalD += foldSum; totalPts += te.length; frames.push(fr);
  }
  const finalCV = totalPts ? totalD / totalPts : NaN;
  const lastF = FOLDS - 1;
  const fr = frames[Math.min(foldIdx, frames.length - 1)];

  // Running mean over folds scored up to and including the current one.
  let _d = 0, _p = 0;
  for (let k = 0; k <= foldIdx && k < frames.length; k++) { const ff = frames[k]; if (!ff.skip) { _d += ff.foldSum; _p += ff.te.length; } }
  const runUpTo = _p ? _d / _p : NaN;

  // Chart rows: one per specimen (sorted by age), carrying the fitted curve values + flags.
  const order = idx.slice().sort((a, b) => ages[a] - ages[b]);
  const teSet = {}; (fr.te || []).forEach(i => teSet[i] = true);
  const maxLen = Math.max(...lens);
  const hasTwo = !!(fr.fU && fr.fL && !fr.skip);
  const largeIsU = hasTwo && fr.fU.Linf >= fr.fL.Linf;
  const bigFit = hasTwo ? (largeIsU ? fr.fU : fr.fL) : null, smallFit = hasTwo ? (largeIsU ? fr.fL : fr.fU) : null;
  const clamp = v => Math.max(-0.25 * maxLen, Math.min(1.5 * maxLen, v));
  const rows = order.map(i => {
    const a = ages[i], row = { age: +a.toFixed(2), length: +lens[i].toFixed(3), held: !!teSet[i], better: fr.scoreOf ? fr.scoreOf[i] > 0 : false };
    if (fr.mono) row.comb = +clamp(vbPredict(fr.mono, a)).toFixed(3);
    if (hasTwo) { row.big = +clamp(vbPredict(bigFit, a)).toFixed(3); row.small = +clamp(vbPredict(smallFit, a)).toFixed(3); }
    return row;
  });

  const renderDot = (props) => {
    const { cx, cy, payload, index } = props;
    if (cx == null || cy == null) return null;
    if (payload.held) return <circle key={index} cx={cx} cy={cy} r={5} fill={payload.better ? "#2a6d4f" : "#8a5a2a"} stroke="#fff" strokeWidth={1} />;
    return <circle key={index} cx={cx} cy={cy} r={2.5} fill="#9a8d62" fillOpacity={0.4} stroke="none" />;
  };
  const btn = { padding: "5px 11px", background: "none", border: "1px solid #d4c9b0", color: "#1c2b3a", cursor: "pointer", fontFamily: "inherit", fontSize: 12 };

  return (
    <div style={{ marginTop: 22, background: "#fff", border: "2px solid #1c2b3a", padding: "16px 18px" }}>
      <div style={{ fontSize: 13, fontWeight: "bold", color: "#1c2b3a", marginBottom: 3 }}>Watching the cross-validation score one held-out fold at a time</div>
      <div style={{ fontSize: 11, color: "#6a5a3a", fontStyle: "italic", marginBottom: 10, lineHeight: 1.5 }}>
        The CV ΔLogLik plotted above is a sweep average; here is the mechanism on one example clade. Five-fold CV hides 1/5 of the specimens (solid dots), fits a <b>one-curve</b> (dashed) and a <b>two-curve</b> (solid) model to the other 4/5, then scores how well each predicts the hidden ones. A held-out dot is <span style={{ color: "#2a6d4f", fontWeight: "bold" }}>green</span> when two curves predict it better than one, <span style={{ color: "#8a5a2a", fontWeight: "bold" }}>brown</span> when they do not. The colour is this two-curve vs one-curve likelihood ratio judged against each model's <i>own</i> scatter — not distance to the dashed line: the two-curve fit is tighter, so a point hugging one sex-curve scores green even if it sits far from the dashed curve, while an outlier from <i>both</i> curves scores brown (the tight two-curve fit punishes it harder than the loose one-curve fit). Each fold's score is averaged into the final CV ΔLogLik, and a fold whose fit is <b>degenerate</b> (predicts an impossible negative size at a held-out age) is dropped.
      </div>
      <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap", marginBottom: 10 }}>
        <label style={{ fontSize: 12, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ color: "#6a5a3a", fontWeight: "bold" }}>True dimorphism</span>
          <input type="range" min={0} max={2.5} step={0.05} value={dimMult} onChange={e => { setDimMult(+e.target.value); setFoldIdx(0); }} />
          <span style={{ fontVariantNumeric: "tabular-nums", color: "#1c2b3a", minWidth: 104 }}>{dimMult.toFixed(2)}× (E={(naturalE * dimMult).toFixed(2)}m)</span>
        </label>
        <button onClick={() => { setSeed(s => s + 1); setFoldIdx(0); }} style={{ ...btn, background: "#1c2b3a", color: "#e8dfc8", border: "none" }}>↻ New sample</button>
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8, flexWrap: "wrap" }}>
        <button style={{ ...btn, opacity: foldIdx <= 0 ? 0.4 : 1 }} disabled={foldIdx <= 0} onClick={() => setFoldIdx(i => Math.max(0, i - 1))}>◀ Previous fold</button>
        <button style={{ ...btn, opacity: foldIdx >= lastF ? 0.4 : 1 }} disabled={foldIdx >= lastF} onClick={() => setFoldIdx(i => Math.min(lastF, i + 1))}>Next fold ▶</button>
        <span style={{ fontSize: 12, color: "#1c2b3a", fontVariantNumeric: "tabular-nums" }}>Fold <b>{fr.fold + 1}</b> of 5 — {fr.te.length} specimens held out</span>
      </div>
      <ResponsiveContainer width="100%" height={360}>
        <ComposedChart data={rows} margin={{ top: 8, right: 16, left: 4, bottom: 28 }}>
          <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
          <XAxis dataKey="age" type="number" domain={["auto", "auto"]} tick={{ fontSize: 9 }} label={{ value: "Age (years)", position: "bottom", offset: -2, style: { fontSize: 10, fill: "#6a5a3a" } }} />
          <YAxis type="number" domain={[Math.min(0, -0.06 * maxLen), +(maxLen * 1.12).toFixed(2)]} tick={{ fontSize: 9 }} width={62} label={{ value: "Body length (m) · one dataset (not rep-averaged)", angle: -90, position: "insideLeft", offset: 8, style: { fontSize: 10, fill: "#6a5a3a", textAnchor: "middle" } }} />
          <Tooltip contentStyle={{ fontFamily: "Georgia,serif", fontSize: 10, border: "1px solid #d4c9b0" }} />
          {fr.mono && <Line dataKey="comb" stroke="#1c2b3a" strokeWidth={1.3} strokeDasharray="2 3" dot={false} type="monotone" isAnimationActive={false} name="one-curve fit" />}
          {hasTwo && <Line dataKey="big" stroke="#2a6496" strokeWidth={2.2} dot={false} type="monotone" isAnimationActive={false} name="larger-group curve" />}
          {hasTwo && <Line dataKey="small" stroke="#a63a3a" strokeWidth={2.2} dot={false} type="monotone" isAnimationActive={false} name="smaller-group curve" />}
          <Line dataKey="length" stroke="none" dot={renderDot} isAnimationActive={false} legendType="none" />
        </ComposedChart>
      </ResponsiveContainer>
      <div style={{ fontSize: 11.5, color: "#3a3228", marginTop: 6, lineHeight: 1.5 }}>
        {fr.skip
          ? <><b style={{ color: fr.degenerate ? "#a63a3a" : "#8a5a2a" }}>Fold {fr.fold + 1} is dropped:</b> {fr.skip}. {fr.degenerate ? "Scoring a held-out fossil against a negative predicted size would make this single fold's log-likelihood explode, so it is excluded from the average — the curve is still drawn exactly as the data produced it." : "It carries no usable held-out comparison, so it is left out of the average."}</>
          : <><b>Fold {fr.fold + 1} contributes {fr.foldSum >= 0 ? "+" : ""}{fr.foldSum.toFixed(2)} nats</b> — {fr.better} of {fr.te.length} held-out specimens are predicted better by two curves than one. Running average over scored folds so far: <b>{isFinite(runUpTo) ? (runUpTo >= 0 ? "+" : "") + runUpTo.toFixed(3) : "—"}</b> nats/specimen.</>}
        {foldIdx >= lastF && isFinite(finalCV) && <><br />Final <b>CV ΔLogLik = <span style={{ color: finalCV > 0 ? "#2a6d4f" : "#8a5a2a" }}>{finalCV >= 0 ? "+" : ""}{finalCV.toFixed(3)} nats/specimen</span></b> — {finalCV > 0 ? "two curves genuinely predict held-out specimens better, the honest signature of real dimorphism." : "two curves do not predict held-out specimens better, so the split does not generalise (the expected result with little or no real dimorphism)."}</>}
      </div>
    </div>
  );
}

function ChartPair({dimData,varData,snrData,metric,naturalE,effectMetric,yScale,bandType,onStepClick}){
  const effectConfigs={
    raw:{key:"estEffect_mean",sdKey:"estEffect_sd",nKey:"estEffect_n",medKey:"estEffect_med",q1Key:"estEffect_q1",q3Key:"estEffect_q3",label:"Est. L∞ diff (m)",desc:"Mean abs(L∞_larger - L∞_smaller) across reps"},
    sdi:{key:"sdi_mean",sdKey:"sdi_sd",nKey:"sdi_n",medKey:"sdi_med",q1Key:"sdi_q1",q3Key:"sdi_q3",sdKey:"sdi_sd",label:"SDI",desc:"SDI = (larger L∞ / smaller L∞) - 1. Dimensionless."},
    logr:{key:"logr_mean",sdKey:"logr_sd",nKey:"logr_n",medKey:"logr_med",q1Key:"logr_q1",q3Key:"logr_q3",label:"Log-ratio",desc:"ln(larger L∞ / smaller L∞). Symmetric, dimensionless."},
  };
  const configs={
    estEffect:effectConfigs[effectMetric],
    ciSpread:{key:"ciSpread_mean",sdKey:"ciSpread_sd",nKey:"ciSpread_n",medKey:"ciSpread_med",q1Key:"ciSpread_q1",q3Key:"ciSpread_q3",label:"95% CI Spread (m)",desc:"Larger-sex upper CI - smaller-sex lower CI at oldest individual. Assumes homoscedastic Gaussian residuals (raw scale); under lognormal size scatter this band is a mild approximation."},
    piSpread:{key:"piSpread_mean",sdKey:"piSpread_sd",nKey:"piSpread_n",medKey:"piSpread_med",q1Key:"piSpread_q1",q3Key:"piSpread_q3",label:"95% PI Spread (m)",desc:"Larger-sex upper PI - smaller-sex lower PI at oldest individual. Assumes homoscedastic Gaussian residuals (raw scale); under lognormal size scatter this band is a mild approximation."},
    ciSep:{key:"ciSep_mean",sdKey:"ciSep_sd",nKey:"ciSep_n",medKey:"ciSep_med",q1Key:"ciSep_q1",q3Key:"ciSep_q3",label:"95% CI Separation (m)",desc:"Larger-sex lower CI - smaller-sex upper CI. Positive = non-overlapping curves. Assumes homoscedastic Gaussian residuals (raw scale); under lognormal size scatter this band is a mild approximation."},
    piSep:{key:"piSep_mean",sdKey:"piSep_sd",nKey:"piSep_n",medKey:"piSep_med",q1Key:"piSep_q1",q3Key:"piSep_q3",label:"95% PI Separation (m)",desc:"Larger-sex lower PI - smaller-sex upper PI. Positive = non-overlapping individuals. Assumes homoscedastic Gaussian residuals (raw scale); under lognormal size scatter this band is a mild approximation."},
    aicc:{key:"deltaAICc_mean",sdKey:"deltaAICc_sd",nKey:"deltaAICc_n",medKey:"deltaAICc_med",q1Key:"deltaAICc_q1",q3Key:"deltaAICc_q3",label:"ΔAICc",desc:"ΔAICc = AICc(two-curve model) − AICc(one-curve model). Negative favours two curves. This panel shows the SAME metric computed two ways, differing only in how the two groups are formed before the curves are fitted: SOLID = supervised residual sign-split (Saitta's rule); DASHED = unsupervised EM/GMM clustering. Because of a structural bias (sex is assigned from the same data being fit), ΔAICc is strongly negative in EVERY scenario; read the TREND and the gap between scenarios, not the absolute value. The unsupervised (dashed) line uses “guarded” EM/GMM grouping (each cluster must hold ≥10 specimens and refit to physically plausible curves) and is summarised with the SAME statistic as the solid line — the mean, or the median when the Error-band toggle is set to Med±IQR."},
    cv:{key:"deltaCV_mean",sdKey:"deltaCV_sd",nKey:"deltaCV_n",medKey:"deltaCV_med",q1Key:"deltaCV_q1",q3Key:"deltaCV_q3",label:"CV ΔLog-Likelihood",desc:"Cross-validated log-likelihood advantage of the two-curve model on held-out data (5-fold). The SAME metric computed two ways: SOLID = supervised residual sign-split; DASHED = unsupervised EM/GMM clustering. Each held-out specimen is scored by the two-curve model's MIXTURE density (it is not told which sex it is), so the metric has a properly behaved null: with no true dimorphism it sits near 0, and it rises only when dimorphism is real. This makes it the model-comparison metric least distorted by the labels-from-data endogeneity. The unsupervised (dashed) line uses “guarded” EM/GMM grouping (each cluster must hold ≥10 specimens and refit to physically plausible curves) and is summarised with the SAME statistic as the solid line — the mean, or the median when the Error-band toggle is set to Med±IQR. Folds whose VB fit is degenerate — a near-step curve predicting an impossible negative size for the youngest specimens — are dropped from the average, since scoring a held-out individual against a negative predicted size would otherwise make a single fold's log-likelihood explode; the curve is still fit freely to the data, only that fold's nonsensical held-out score is skipped."},
    cohend:{key:"supSep_mean",sdKey:"supSep_sd",nKey:"supSep_n",medKey:"supSep_med",q1Key:"supSep_q1",q3Key:"supSep_q3",label:"Separation (Cohen's d)",desc:"Cohen's d separation between the two groups of residuals = (gap between group means) ÷ (average within-group spread); d=1 means the means lie one pooled SD apart. The SAME metric computed two ways: SOLID = supervised residual sign-split (Saitta's rule); DASHED = unsupervised EM/GMM clustering. KEY CONTRAST: the supervised split is forced at zero, so it MECHANICALLY reports a large separation (~2.6) even when there is no real dimorphism — it cannot report 'one group'. The unsupervised EM version can, but note it does NOT drop to zero with no dimorphism — it settles at a non-zero null baseline that depends on sample size (≈1.6 at n=40, ≈1.0 at n=100, ≈0.8 at n=200; the spurious split shrinks as data grows) and rises above that with real dimorphism. Judge the dashed line against the Sc.2 baseline at the same sample size, not the textbook 0.2/0.5/0.8 thresholds. This is why only the unsupervised version is a valid test for whether two groups exist."},
    bic:{key:"supDeltaBIC_mean",sdKey:"supDeltaBIC_sd",nKey:"supDeltaBIC_n",medKey:"supDeltaBIC_med",q1Key:"supDeltaBIC_q1",q3Key:"supDeltaBIC_q3",label:"ΔBIC",desc:"ΔBIC = BIC(two-component model) − BIC(one-component model) on the residuals; negative favours two components. The SAME metric computed two ways: SOLID = supervised residual sign-split; DASHED = unsupervised EM/GMM clustering. BIC penalises extra parameters heavily. The supervised split (solid) almost always prefers ONE component (positive ΔBIC) despite forcing a split, because the forced halves are not well-separated bells; the unsupervised EM (dashed) dips negative only around moderate dimorphism. Read the trend, not whether a threshold is crossed."},
  };
  const cfg=configs[metric];
  const showZero=metric==="ciSep"||metric==="piSep"||metric==="aicc"||metric==="cv"||metric==="cohend"||metric==="bic";
  // For the four model-comparison / mixture metrics, y = supervised version, y2 = unsupervised (EM) version.
  const y2Base = metric==="aicc"?"emDeltaAICc" : metric==="cv"?"emDeltaCV" : metric==="cohend"?"componentSep" : metric==="bic"?"gmmDeltaBIC" : null;
  const y2Key   = y2Base ? (bandType==="iqr" ? y2Base+"_med" : y2Base+"_mean") : null;  // center follows the toggle, like the solid line
  const y2Q1Key = y2Base ? y2Base+"_q1" : null;
  const y2Q3Key = y2Base ? y2Base+"_q3" : null;
  const y2SdKey = y2Base ? y2Base+"_sd" : null;
  const y2NKey  = y2Base ? y2Base+"_n"  : null;
  const y2Label = (metric==="aicc"||metric==="cv"||metric==="cohend"||metric==="bic")
              ? "Unsupervised (EM/GMM)" : null;
  const ySeriesLabel = (metric==="aicc"||metric==="cv"||metric==="cohend"||metric==="bic")
              ? "Supervised (sign-split)" : null;

  // -- Metric-specific reference lines -----------------------------------------
  // Each entry: { y, color, dash, label, labelPos }
  // These mark meaningful thresholds -- values where interpretation changes.
  const naturalSDI  = (2.78 + naturalE) / 2.78 - 1;
  const naturalLogr = Math.log((2.78 + naturalE) / 2.78);

  const refLinesByMetric = {
    estEffect: [
      // True biological dimorphism reference -- what the method should recover
      { y: naturalE,    color:"#c8a96e", dash:"6 3", label:"Natural E (1.01m)", pos:"right" },
    ],
    ciSpread: [
      // Zero is impossible/pathological; natural-condition spread is meaningful
      { y: 0,           color:"#c8a96e", dash:"4 3", label:"y=0", pos:"right" },
    ],
    piSpread: [
      { y: 0,           color:"#c8a96e", dash:"4 3", label:"y=0", pos:"right" },
    ],
    ciSep: [
      // Zero = curves just touching; the critical boundary
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0 (curves touching)", pos:"right" },
    ],
    piSep: [
      // Zero = individuals just touching; positive = non-overlapping
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0 (individuals touching)", pos:"right" },
    ],
    aicc: [
      // y=0: the monomorphic vs dimorphic crossover. Conventional ΔAICc thresholds (-2,-7) are not
      // drawn -- the structural bias makes ΔAICc ~ -100 to -250 everywhere, dwarfing them.
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0", pos:"right" },
    ],
    cv: [
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0", pos:"right" },
    ],
    cohend: [
      // No horizontal reference line is drawn on this panel. The conventional d=0.2/0.5/0.8 lines are
      // never crossed (every scenario sits well above them), and the EM null baseline (sample-size dependent) is not a
      // fixed threshold either -- it is the level the unsupervised line itself sits at under no
      // dimorphism, so plotting it as a static line just adds clutter. The baseline is explained in the
      // panel's definition and interpretation text instead, where the reader compares the two lines
      // (supervised vs unsupervised) against each other rather than against an absolute cutoff.
    ],
    bic: [
      // y=0 is the meaningful reference: the crossover between preferring ONE vs TWO components.
      // The conventional -2/-6 evidence lines are NOT drawn -- the averaged ΔBIC only just grazes
      // zero (min ~-0.8) and never reaches -2, so those lines would never be crossed and would mislead.
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0 (one vs two components)", pos:"right" },
    ],
  };

  // For effect size tab, add SDI/logr natural reference lines
  if (metric === "estEffect") {
    if (effectMetric === "sdi")  refLinesByMetric.estEffect = [{ y: naturalSDI,  color:"#c8a96e", dash:"6 3", label:`Natural SDI (${naturalSDI.toFixed(3)})`, pos:"right" }];
    if (effectMetric === "logr") refLinesByMetric.estEffect = [{ y: naturalLogr, color:"#c8a96e", dash:"6 3", label:`Natural log-r (${naturalLogr.toFixed(3)})`, pos:"right" }];
  }

  const refLines = refLinesByMetric[metric] || [];

  const toRaw=(data,xFn,scenarioType)=>(data||[]).filter(Boolean).map(d=>({
    ymean:d[cfg.key], ysd:cfg.sdKey?d[cfg.sdKey]:undefined, yn:cfg.nKey?d[cfg.nKey]:undefined,
    ymed:cfg.medKey?d[cfg.medKey]:undefined, yq1:cfg.q1Key?d[cfg.q1Key]:undefined, yq3:cfg.q3Key?d[cfg.q3Key]:undefined,
    x:+xFn(d).toFixed(3), y:d[cfg.key],
    y2:y2Key?d[y2Key]:undefined, y2q1:y2Q1Key?d[y2Q1Key]:undefined, y2q3:y2Q3Key?d[y2Q3Key]:undefined, y2sd:y2SdKey?d[y2SdKey]:undefined, y2n:y2NKey?d[y2NKey]:undefined,
    // Store step parameters for GrowthCurvePanel on click
    effectSize: scenarioType==="dimorphism" ? d.x : scenarioType==="variance" ? 0 : NATURAL_E,
    sdMult:     scenarioType==="dimorphism" ? 1   : d.sdMult!=null ? d.sdMult : d.x,
    scenario:   scenarioType,
  }));

  // Raw uncertainty-band bounds per point (SD / SE / 95% CI around the mean, or IQR around the
  // median), computed in raw units BEFORE the scale transform so the shared domain can include them
  // and so the plotted line can switch to the median in IQR mode.
  const rawBand=d=>{
    if(!cfg.sdKey||!bandType||bandType==="none"||d.ymean==null) return null;
    if(bandType==="iqr"){ if(d.ymed==null||d.yq1==null||d.yq3==null||!isFinite(d.ymed)) return null; return [Math.min(d.yq1,d.yq3),Math.max(d.yq1,d.yq3)]; }
    if(d.ysd==null||!isFinite(d.ysd)) return null;
    const se=d.ysd/Math.sqrt(d.yn||1), half=bandType==="sd"?d.ysd:bandType==="se"?se:t95(d.yn)*se;
    return [d.ymean-half,d.ymean+half];
  };
  const withBand=rows=>rows.map(d=>{ const b=rawBand(d); if(!b) return d; const y=(bandType==="iqr"&&d.ymed!=null)?d.ymed:d.y; return {...d,y,bandRaw:b}; });
  const dimRaw=withBand(toRaw(dimData,d=>d.x/naturalE,"dimorphism"));
  const varRaw=withBand(toRaw(varData,d=>d.x/NATURAL_SD_MULT,"variance"));
  const snrRaw=withBand(toRaw(snrData,d=>d.x/NATURAL_SD_MULT,"snr3")).sort((a,b)=>a.x-b.x);

  // -- Shared y-axis scale across all three panels ------------------------------
  // Collect ALL raw y values from all three datasets to compute a shared domain.
  // This is the whole point of the scale toggle: compress Sc.3 extremes so
  // Sc.1 and Sc.2 dynamics remain visible on the same axis range.
  const allRawY=[...dimRaw,...varRaw,...snrRaw]
    .flatMap(d=>[d.y,d.y2,d.y2q1,d.y2q3,...(d.y2sd!=null&&d.y2!=null?[d.y2-d.y2sd,d.y2+d.y2sd]:[]),...(d.bandRaw||[])]).filter(v=>v!=null&&isFinite(v));
  const hasNonPositive=allRawY.some(v=>v<=0);
  const effectiveScale=(yScale==="log"&&hasNonPositive)?"signedLog":yScale||"linear";
  const scaleFallback=(yScale==="log"&&hasNonPositive);

  const slog=v=>v===0?0:Math.sign(v)*Math.log10(1+Math.abs(v));
  const transform=v=>{
    if(v==null||!isFinite(v)) return null;
    if(effectiveScale==="log")       return v>0?Math.log10(v):null;
    if(effectiveScale==="signedLog") return slog(v);
    return v;
  };
  const untransform=v=>{
    if(effectiveScale==="log")       return Math.pow(10,v);
    if(effectiveScale==="signedLog"){const s=v<0?-1:1;return s*(Math.pow(10,Math.abs(v))-1);}
    return v;
  };
  // Use shared niceFmt for tick labels -- see module-level definition

  // Apply transform to all three datasets; transform the band bounds through the same scaler.
  const applyT=rows=>rows.map(d=>{
    const out={...d,y:transform(d.y),y2:transform(d.y2)};
    if(d.bandRaw){ const lo=transform(d.bandRaw[0]),hi=transform(d.bandRaw[1]); if(lo!=null&&hi!=null) out.band=[Math.min(lo,hi),Math.max(lo,hi)]; }
    // Unsupervised (EM/GMM) band, responding to the toggle: IQR for the "Med±IQR" option (its line
    // is a median), otherwise ±SD / ±SE / 95% CI centred on the plotted unsupervised value.
    if(bandType&&bandType!=="none"&&d.y2!=null){
      let rlo,rhi;
      if(bandType==="iqr"){ if(d.y2q1!=null&&d.y2q3!=null){ rlo=d.y2q1; rhi=d.y2q3; } }
      else if(d.y2sd!=null&&isFinite(d.y2sd)){ const se=d.y2sd/Math.sqrt(d.y2n||1); const half=bandType==="sd"?d.y2sd:bandType==="se"?se:t95(d.y2n)*se; rlo=d.y2-half; rhi=d.y2+half; }
      if(rlo!=null&&rhi!=null&&isFinite(rlo)&&isFinite(rhi)){ const lo=transform(rlo),hi=transform(rhi); if(lo!=null&&hi!=null) out.band2=[Math.min(lo,hi),Math.max(lo,hi)]; }
    }
    return out;
  });
  const dimT=applyT(dimRaw);
  const varT=applyT(varRaw);
  const snrT=applyT(snrRaw);

  // Shared domain in transformed space
  const tAll=[...dimT,...varT,...snrT].flatMap(d=>[d.y,d.y2]).filter(v=>v!=null&&isFinite(v));
  const tMin=tAll.length?Math.min(...tAll):0;
  const tMax=tAll.length?Math.max(...tAll):1;
  const tPad=(tMax-tMin)*0.08||0.1;

  // Shared domain: use raw (untransformed) values across ALL three datasets,
  // anchored at 0 when non-negative, then transform the domain endpoints.
  const allRawForDomain = [...dimRaw,...varRaw,...snrRaw]
    .flatMap(d=>[d.y,d.y2,d.y2q1,d.y2q3,...(d.y2sd!=null&&d.y2!=null?[d.y2-d.y2sd,d.y2+d.y2sd]:[]),...(d.bandRaw||[])]).filter(v=>v!=null&&isFinite(v));
  const rawMin = allRawForDomain.length ? Math.min(...allRawForDomain) : 0;
  const rawMax = allRawForDomain.length ? Math.max(...allRawForDomain) : 1;
  // Anchor lo at 0 for non-negative data
  const domainRawLo = rawMin >= 0 ? 0 : rawMin;
  const domainRawHi = rawMax;
  // Compute nice ticks in RAW space, then transform for the domain
  const tTicks = niceTicks(domainRawLo, domainRawHi, 5).map(t => transform(t)).filter(v=>v!=null&&isFinite(v));
  const sharedDomain = tTicks.length >= 2
    ? [tTicks[0] - Math.abs(tTicks[tTicks.length-1]-tTicks[0])*0.02,
       tTicks[tTicks.length-1] + Math.abs(tTicks[tTicks.length-1]-tTicks[0])*0.02]
    : [transform(domainRawLo)||0, transform(domainRawHi)||1];
  const tickFmt = effectiveScale !== "linear"
    ? v => niceFmt(untransform(v))
    : v => niceFmt(v);

  // Reference lines for the FIRST combined overlay (which plots the PRIMARY metric only).
  // Exclude secondary-axis lines (axis:"right", e.g. ΔBIC) — those belong on the second overlay.
  const visibleRefLines = refLines
    .filter(r => r.axis !== "right")
    .map(r => ({ ...r, yScaled: transform(r.y) }))
    .filter(r => r.yScaled != null && isFinite(r.yScaled));

  // Zero line in transformed space -- now handled via refLines array, not needed here
  const zeroT=transform(0); // kept for potential future use

  const scaleSuffix=""; // don't append to y-axis label -- too narrow, truncates
  const scaleNote=effectiveScale==="log"
    ? {label:"Log₁₀ scale", color:"#1a4a1a", bg:"#e8f4e8", border:"#2a8a2a",
       detail:"Y-axis spacing is logarithmic -- equal vertical distance = equal multiplicative change. All three panels share the same y-axis range, so Sc.1 and Sc.2 dynamics remain visible even when Sc.3 reaches extreme values. Tick labels show original (untransformed) values."}
    : effectiveScale==="signedLog"
    ? {label:"Signed-log scale", color:"#1a3a5a", bg:"#e8f0f8", border:"#2a6496",
       detail:"Y = sign(y)·log₁₀(1+|y|). Works for metrics with negative values (separation, ΔAICc). Equal vertical distance = equal multiplicative change in magnitude. All three panels share the same y-axis range. Tick labels show original values."}
    : null;

  const metricIntros={
    aicc:{
      title:"ΔAICc: Does Two Growth Curves Fit Better Than One?",
      body:"Compares a 4-parameter one-curve model (L∞, K, t₀, σ²) against a 7-parameter two-curve model (3 curve parameters per sex plus one shared σ²). Shown two ways that differ only in how the two groups are formed: SOLID = supervised residual sign-split (Saitta's rule); DASHED = unsupervised EM/GMM clustering (guarded: clusters ≥10 specimens; summarised as mean or median per the Error-band toggle). ΔAICc is strongly negative in every scenario under both groupings — a structural bias, since the labels come from the same data being fit — so read the trend and the gap between scenarios, not the absolute value. The unsupervised version is consistently a little less biased because EM can decline to split. Note this ΔAICc is the RAW whole-sample value (not divided by n); the cross-taxa companion simulator reports the same quantity ÷ n so species of very different size are comparable, so absolute magnitudes are not interchangeable between the two tools.",
    },
    cv:{
      title:"CV ΔLog-Likelihood: Does the Two-Curve Model Predict Unseen Data Better?",
      body:"The same one-vs-two-curve comparison judged on held-out data via 5-fold cross-validation. SOLID = supervised sign-split groups; DASHED = unsupervised EM/GMM groups. Each held-out specimen is scored by the two-curve model's MIXTURE density (the model is not told which sex the new specimen is), which gives a properly behaved null: with no true dimorphism CV sits near 0, and it rises only as real dimorphism appears. This is the model-comparison metric least distorted by the labels-from-data endogeneity — contrast it with ΔAICc, which is biased to ≈ −100 even under no dimorphism. Read the gap between scenarios AND the position relative to zero.",
    },
    cohend:{
      title:"Separation (Cohen's d): How Distinct Are the Two Residual Groups?",
      body:"Cohen's d = (gap between group means) ÷ (within-group spread); a d of 1.0 means the two group means lie one pooled standard deviation apart. SOLID = supervised sign-split; DASHED = unsupervised EM/GMM. The supervised split is forced at zero, so it MECHANICALLY reports large separation (~2.6) even with no real dimorphism — it cannot say 'one group'. The unsupervised version can refuse to split, but note it does NOT drop to zero with no dimorphism: it settles at a non-zero null baseline that depends on sample size (≈1.6 at n=40, ≈1.0 at n=100, ≈0.8 at n=200 — the spurious split shrinks as data grows). So judge the unsupervised line by whether it rises clearly ABOVE the Sc.2 baseline AT THE SAME SAMPLE SIZE (and trends upward as dimorphism grows), not against textbook thresholds. Only the unsupervised line is a valid test for whether two groups exist.",
    },
    bic:{
      title:"ΔBIC: Two Components or One, Under a Heavy Penalty?",
      body:"ΔBIC compares a 2-component vs 1-component model of the residuals; BIC = −2·LL + k·ln(n) penalises extra parameters heavily (heavier than AIC, since ln(n)>2). SOLID = supervised sign-split; DASHED = unsupervised EM/GMM. The supervised line stays mostly positive (the forced halves are not clean bells); the unsupervised line only just grazes zero — dipping to about −1 around moderate dimorphism — then climbs back (a shallow inverted-U). Read the trend, not whether a threshold is crossed. The decomposition plot below shows exactly what produces the U-shape: the one- and two-component log-likelihoods, their gain, and σ̂² (the estimated residual variance).",
    },
  };
  const intro=metricIntros[metric];

  // Common props for all three ChartPanel calls
  const panelProps={
    yLabel:cfg.label + ((cfg.sdKey && bandType==="iqr") ? " (median)" : " (mean)"), y2Label, ySeriesLabel,
    sharedDomain, tTicks, tickFmt, effectiveScale,
    untransform, scaleBadge:scaleNote?scaleNote.label:null,
    scaleBadgeColor:scaleNote?scaleNote.border:null,
    refLines,
    onStepClick,
  };

  // --- Reusable mechanism-decomposition diagnostics (rendered for BOTH groupings) -------------
  // Each takes a `g` config selecting the supervised or unsupervised field set, so we can show
  // one plot per grouping. They use the ChartPair scale closures (transform/untransform/tickFmt).
  const renderBicDiagnostic = (g) => {
    const useMed = bandType === "iqr";
    const ctr = base => base + (useMed ? "_med" : "_mean");
    const compBand = (d, base) => {
      if (!bandType || bandType === "none") return undefined;
      let lo, hi;
      if (bandType === "iqr") { if(!isFinite(d[base+"_q1"])||!isFinite(d[base+"_q3"])) return undefined; lo=transform(d[base+"_q1"]); hi=transform(d[base+"_q3"]); }
      else { const sd=d[base+"_sd"]; if(!isFinite(sd)) return undefined; const se=sd/Math.sqrt(d[base+"_n"]||1), c=d[ctr(base)]; if(!isFinite(c)) return undefined; const half=bandType==="sd"?sd:bandType==="se"?se:t95(d[base+"_n"])*se; lo=transform(c-half); hi=transform(c+half); }
      return (lo!=null&&hi!=null)?[Math.min(lo,hi),Math.max(lo,hi)]:undefined;
    };
    const b1=g.ll1.replace(/_(mean|med)$/,""), b2=g.ll2.replace(/_(mean|med)$/,""), bG=g.gain.replace(/_(mean|med)$/,""), bB=g.bic.replace(/_(mean|med)$/,""), bS=g.sig2.replace(/_(mean|med)$/,"");
    const rows = (dimData||[]).filter(Boolean)
      .filter(d => isFinite(d[g.ll1]) && isFinite(d[g.ll2]) && isFinite(d[g.bic]))
      .map(d => ({
        x: +(d.x/naturalE).toFixed(2),
        ll1: transform(+d[ctr(b1)].toFixed(3)),
        ll2: transform(+d[ctr(b2)].toFixed(3)),
        gain: transform(+d[ctr(bG)].toFixed(3)),
        bic: transform(+d[ctr(bB)].toFixed(2)),
        sig2: transform(+d[ctr(bS)].toFixed(5)),
        ll1Band: compBand(d,b1), ll2Band: compBand(d,b2), gainBand: compBand(d,bG), bicBand: compBand(d,bB), sig2Band: compBand(d,bS),
      }));
    if (rows.length < 3) return null;
    const lVals = rows.flatMap(r=>[r.ll1, r.ll2, r.gain, r.bic, ...(r.ll1Band||[]),...(r.ll2Band||[]),...(r.gainBand||[]),...(r.bicBand||[])]).filter(v=>v!=null&&isFinite(v));
    const lTicks = niceTicks(Math.min(...lVals,0), Math.max(...lVals,0), 6);
    const sVals = rows.flatMap(r=>[r.sig2, ...(r.sig2Band||[])]).filter(v=>v!=null&&isFinite(v));
    const sTicks = niceTicks(Math.min(...sVals,0), Math.max(...sVals,0), 5);
    const rawRows = (dimData||[]).filter(Boolean).filter(d=>isFinite(d[g.bic])&&isFinite(d[g.gain]))
      .map(d=>({x:+(d.x/naturalE).toFixed(2), gain:d[g.gain], bic:d[g.bic]}));
    const gainPeak = rawRows.reduce((a,b)=>b.gain>a.gain?b:a, rawRows[0]);
    const bicTrough = rawRows.reduce((a,b)=>b.bic<a.bic?b:a, rawRows[0]);
    return (
      <div style={{marginTop:"18px",background:"#fff",border:"2px solid "+g.color,padding:"18px 20px"}}>
        <div style={{fontSize:"13px",fontWeight:"bold",color:g.color,marginBottom:"3px"}}>
          What drives the Sc.1 ΔBIC shape — {g.title}
        </div>
        <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"8px"}}>
          {g.subtitle} ΔBIC is built from exactly two log-likelihoods; this plot shows them and how their difference shapes ΔBIC.
        </div>
        <Eq>{`σ̂²   = (1/n)·Σ(residualᵢ − mean)²            (estimated variance of the residuals)
LL₁  = one-component log-likelihood
LL₂  = two-component log-likelihood (`+g.groupNote+`)
gain = LL₂ − LL₁                            (the only moving part)
ΔBIC = 3·ln(n) − 2·gain                      [k₂=5, k₁=2 ⇒ (k₂−k₁)·ln(n)=3·ln(n)]`}</Eq>
        <Where items={[
          {sym:"LL₁, LL₂", def:g.llNote},
          {sym:"gain = LL₂−LL₁", def:"LEFT axis. ΔBIC's only moving part — 3·ln(n) is constant for fixed n."},
          {sym:"ΔBIC", def:"LEFT axis. = 3·ln(n) − 2·gain, a flipped/shifted copy of the gain; its trough = the gain peak."},
          {sym:"σ̂²", def:"RIGHT axis (m²). σ̂² = (1/n)·Σ(residual − mean)², the maximum-likelihood estimate of the residual variance about the single combined curve (RSS÷n, the mean of the squared residuals — NOT the unbiased RSS/(n−p)). It rises as the one curve fits worse and sets the scale of the one-component log-likelihood. The hat marks it an estimate, not the true generating variance."},
        ]}/>
        <div style={{display:"flex",flexWrap:"wrap",gap:"14px",margin:"8px 0",fontSize:"11px",color:"#5a4a2a"}}>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#888",display:"inline-block"}}/>LL₁ (one component, left)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#1c2b3a",display:"inline-block"}}/>LL₂ (two components, left)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#1a7a7a",display:"inline-block"}}/>gain = LL₂−LL₁ (left)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#2a6496",display:"inline-block",borderTop:"1px dashed #2a6496"}}/>ΔBIC (left)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#D85A30",display:"inline-block",borderTop:"1px dashed #D85A30"}}/>σ̂² (right, m²)</span>
        </div>
        <ResponsiveContainer width="100%" height={390}>
          <ComposedChart data={rows} margin={{top:20,right:54,left:16,bottom:34}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
            <XAxis dataKey="x" type="number" domain={[0,2.5]} ticks={[0,0.5,1,1.5,2,2.5]}
              tickFormatter={v=>v.toFixed(1)+"×"}
              label={{value:"Effect size (× natural dimorphism)",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
              tick={{fontSize:10}}/>
            <YAxis yAxisId="L" domain={[lTicks[0], lTicks[lTicks.length-1]]} ticks={lTicks} tickFormatter={tickFmt}
              label={{value:"Log-likelihood units (" + (useMed?"median":"mean") + " across reps)",angle:-90,position:"insideLeft",style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}}
              tick={{fontSize:10}} width={54}/>
            <YAxis yAxisId="R" orientation="right" domain={[sTicks[0], sTicks[sTicks.length-1]]} ticks={sTicks} tickFormatter={tickFmt}
              label={{value:"σ̂² (m², " + (useMed?"median":"mean") + " across reps)",angle:90,position:"insideRight",style:{fontSize:"10px",fill:"#D85A30",textAnchor:"middle"}}}
              tick={{fontSize:10}} width={48}/>
            <Tooltip formatter={(v,n)=>{const raw=untransform(v);return[isFinite(raw)?(+raw).toFixed(4):String(v),n];}}
              labelFormatter={l=>`${l}× natural dimorphism`}
              contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"}}/>
            <ReferenceLine yAxisId="L" y={transform(0)} stroke="#bbb" strokeDasharray="2 2"/>
            <ReferenceLine x={bicTrough.x} yAxisId="L" stroke="#2a6496" strokeDasharray="4 3"
              label={{value:"ΔBIC trough = gain peak",position:"insideTopLeft",fill:"#2a6496",fontSize:9,fontWeight:"bold",stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
            {rows.some(d=>d.ll1Band)&&<Area type="monotone" yAxisId="L" dataKey="ll1Band" fill="#888" fillOpacity={0.13} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.ll2Band)&&<Area type="monotone" yAxisId="L" dataKey="ll2Band" fill="#1c2b3a" fillOpacity={0.1} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.gainBand)&&<Area type="monotone" yAxisId="L" dataKey="gainBand" fill="#1a7a7a" fillOpacity={0.11} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.bicBand)&&<Area type="monotone" yAxisId="L" dataKey="bicBand" fill="#2a6496" fillOpacity={0.11} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.sig2Band)&&<Area type="monotone" yAxisId="R" dataKey="sig2Band" fill="#D85A30" fillOpacity={0.1} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            <Line yAxisId="L" type="monotone" dataKey="ll1" stroke="#888" strokeWidth={2} dot={{r:2,fill:"#888"}} name="LL₁ (one component)" connectNulls/>
            <Line yAxisId="L" type="monotone" dataKey="ll2" stroke="#1c2b3a" strokeWidth={2} dot={{r:2,fill:"#1c2b3a"}} name="LL₂ (two components)" connectNulls/>
            <Line yAxisId="L" type="monotone" dataKey="gain" stroke="#1a7a7a" strokeWidth={2.5} dot={{r:2.5,fill:"#1a7a7a"}} name="gain = LL₂−LL₁" connectNulls/>
            <Line yAxisId="L" type="monotone" dataKey="bic" stroke="#2a6496" strokeWidth={2.5} strokeDasharray="5 3" dot={{r:2.5,fill:"#2a6496"}} name="ΔBIC" connectNulls/>
            <Line yAxisId="R" type="monotone" dataKey="sig2" stroke="#D85A30" strokeWidth={2} strokeDasharray="5 3" dot={{r:2,fill:"#D85A30"}} name="σ̂² (m²)" connectNulls/>
          </ComposedChart>
        </ResponsiveContainer>
        <div style={{marginTop:"10px",padding:"8px 12px",background:g.bg,borderLeft:"3px solid "+g.color,fontSize:"10px",color:"#0a3a2a",lineHeight:1.6}}>
          <strong>Reading the plot.</strong> ΔBIC = 3·ln(n) − 2·gain, so the blue ΔBIC line is the teal gain line flipped and shifted; the ΔBIC trough sits exactly at the gain peak (x = {gainPeak.x}×). {g.reading}
        </div>
      </div>
    );
  };

  const renderCohendDiagnostic = (g) => {
    const useMed = bandType === "iqr";
    const ctr = base => base + (useMed ? "_med" : "_mean");
    const compBand = (d, base) => {
      if (!bandType || bandType === "none") return undefined;
      let lo, hi;
      if (bandType === "iqr") { if(!isFinite(d[base+"_q1"])||!isFinite(d[base+"_q3"])) return undefined; lo=transform(d[base+"_q1"]); hi=transform(d[base+"_q3"]); }
      else { const sd=d[base+"_sd"]; if(!isFinite(sd)) return undefined; const se=sd/Math.sqrt(d[base+"_n"]||1), c=d[ctr(base)]; if(!isFinite(c)) return undefined; const half=bandType==="sd"?sd:bandType==="se"?se:t95(d[base+"_n"])*se; lo=transform(c-half); hi=transform(c+half); }
      return (lo!=null&&hi!=null)?[Math.min(lo,hi),Math.max(lo,hi)]:undefined;
    };
    const bGap=g.gap.replace(/_(mean|med)$/,""), bSpread=g.spread.replace(/_(mean|med)$/,""), bSep=g.sep.replace(/_(mean|med)$/,"");
    const rows = (dimData||[]).filter(Boolean)
      .filter(d => isFinite(d[g.gap]) && isFinite(d[g.spread]) && isFinite(d[g.sep]))
      .map(d => ({
        x: +(d.x/naturalE).toFixed(2),
        gap: transform(+d[ctr(bGap)].toFixed(4)),
        spread: transform(+d[ctr(bSpread)].toFixed(4)),
        d: transform(+d[ctr(bSep)].toFixed(3)),
        gapBand: compBand(d,bGap), spreadBand: compBand(d,bSpread), dBand: compBand(d,bSep),
      }));
    if (rows.length < 3) return null;
    const mVals = rows.flatMap(r=>[r.gap, r.spread, ...(r.gapBand||[]),...(r.spreadBand||[])]).filter(v=>v!=null&&isFinite(v));
    const mTicks = niceTicks(Math.min(...mVals,0), Math.max(...mVals,0), 6);
    const dVals = rows.flatMap(r=>[r.d, ...(r.dBand||[])]).filter(v=>v!=null&&isFinite(v));
    const dTicks = niceTicks(Math.min(...dVals,0), Math.max(...dVals,0), 5);
    const rawRows = (dimData||[]).filter(Boolean).filter(d=>isFinite(d[g.sep]))
      .map(d=>({x:+(d.x/naturalE).toFixed(2), d:d[g.sep]}));
    const dPeak = rawRows.reduce((a,b)=>b.d>a.d?b:a, rawRows[0]);
    return (
      <div style={{marginTop:"18px",background:"#fff",border:"2px solid "+g.color,padding:"18px 20px"}}>
        <div style={{fontSize:"13px",fontWeight:"bold",color:g.color,marginBottom:"3px"}}>
          What drives the Sc.1 Cohen's d shape — {g.title}
        </div>
        <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"8px"}}>
          {g.subtitle} Cohen's d is a ratio of two quantities measured on the combined-fit residuals; this plot shows both.
        </div>
        <Eq>{`gap    = μ₂ − μ₁                  (`+g.groupNote+`; distance between the two group means, m)
spread = √[(s₁² + s₂²) / 2]       (pooled within-group SD, m)
d      = gap / spread             (Cohen's d, dimensionless)`}</Eq>
        <Where items={[
          {sym:"μ₁, μ₂", def:g.muNote},
          {sym:"gap", def:"LEFT axis (blue, m). The numerator."},
          {sym:"spread", def:"LEFT axis (orange, m). The denominator; rises as each group's residuals fan out."},
          {sym:"d = gap/spread", def:"RIGHT axis (blue). Climbs while the gap outruns the spread, then falls when it does not."},
        ]}/>
        <div style={{display:"flex",flexWrap:"wrap",gap:"14px",margin:"8px 0",fontSize:"11px",color:"#5a4a2a"}}>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#1a7a7a",display:"inline-block"}}/>gap = μ₂−μ₁ (left, m)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#D85A30",display:"inline-block",borderTop:"1px dashed #D85A30"}}/>spread = pooled SD (left, m)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#2a6496",display:"inline-block"}}/>Cohen's d = gap/spread (right)</span>
        </div>
        <ResponsiveContainer width="100%" height={390}>
          <ComposedChart data={rows} margin={{top:20,right:54,left:16,bottom:34}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
            <XAxis dataKey="x" type="number" domain={[0,2.5]} ticks={[0,0.5,1,1.5,2,2.5]}
              tickFormatter={v=>v.toFixed(1)+"×"}
              label={{value:"Effect size (× natural dimorphism)",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
              tick={{fontSize:10}}/>
            <YAxis yAxisId="L" domain={[mTicks[0], mTicks[mTicks.length-1]]} ticks={mTicks} tickFormatter={tickFmt}
              label={{value:"gap / spread (m, " + (useMed?"median":"mean") + " across reps)",angle:-90,position:"insideLeft",style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}}
              tick={{fontSize:10}} width={54}/>
            <YAxis yAxisId="R" orientation="right" domain={[dTicks[0], dTicks[dTicks.length-1]]} ticks={dTicks} tickFormatter={tickFmt}
              label={{value:"Cohen's d (" + (useMed?"median":"mean") + " across reps)",angle:90,position:"insideRight",style:{fontSize:"10px",fill:"#2a6496",textAnchor:"middle"}}}
              tick={{fontSize:10}} width={42}/>
            <Tooltip formatter={(v,n)=>{const raw=untransform(v);return[isFinite(raw)?(+raw).toFixed(4):String(v),n];}}
              labelFormatter={l=>`${l}× natural dimorphism`}
              contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"}}/>
            <ReferenceLine x={dPeak.x} yAxisId="R" stroke="#2a6496" strokeDasharray="4 3"
              label={{value:"d peak",position:"insideTopRight",fill:"#2a6496",fontSize:9,fontWeight:"bold",stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
            {rows.some(d=>d.gapBand)&&<Area type="monotone" yAxisId="L" dataKey="gapBand" fill="#1a7a7a" fillOpacity={0.12} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.spreadBand)&&<Area type="monotone" yAxisId="L" dataKey="spreadBand" fill="#D85A30" fillOpacity={0.1} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.dBand)&&<Area type="monotone" yAxisId="R" dataKey="dBand" fill="#2a6496" fillOpacity={0.11} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            <Line yAxisId="L" type="monotone" dataKey="gap" stroke="#1a7a7a" strokeWidth={2.5} dot={{r:2.5,fill:"#1a7a7a"}} name="gap = μ₂−μ₁" connectNulls/>
            <Line yAxisId="L" type="monotone" dataKey="spread" stroke="#D85A30" strokeWidth={2} strokeDasharray="5 3" dot={{r:2.5,fill:"#D85A30"}} name="spread (pooled SD)" connectNulls/>
            <Line yAxisId="R" type="monotone" dataKey="d" stroke="#2a6496" strokeWidth={3} dot={{r:3,fill:"#2a6496"}} name="Cohen's d" connectNulls/>
          </ComposedChart>
        </ResponsiveContainer>
        <div style={{marginTop:"10px",padding:"8px 12px",background:g.bg,borderLeft:"3px solid "+g.color,fontSize:"10px",color:"#0a3a2a",lineHeight:1.6}}>
          <strong>Reading the plot.</strong> Cohen's d (blue) is the teal gap line divided by the orange spread line. {g.reading}
        </div>
      </div>
    );
  };

  const bicSup = { title:"supervised (sign-split)", color:"#8a5a2a", bg:"#faf2e8",
    ll1:"supLL1_mean", ll2:"supLL2_mean", gain:"supLLGain_mean", bic:"supDeltaBIC_mean", sig2:"supSigma2_mean",
    groupNote:"residuals split at zero by sign",
    llNote:"the two competing model fits (LEFT axis). NOTE: the supervised LL₂ is a FIXED two-Gaussian built from the sign-split means/SDs — not a maximum-likelihood fit — so LL₂ is NOT guaranteed to exceed LL₁, and the gain can go negative.",
    subtitle:"Groups are formed by the supervised residual sign-split (Saitta's rule).",
    reading:"With no real second cluster, splitting the residuals at zero and forcing two components fits the overall distribution no better — sometimes worse — than a single Gaussian, so the gain hovers near or below zero and ΔBIC stays POSITIVE (one component preferred) across almost all of Sc.1. There is essentially no U-shape: the supervised construction cannot manufacture a likelihood advantage the way it manufactures a large Cohen's d. Contrast with the unsupervised plot, where a real bimodality produces a genuine positive gain." };
  const bicUns = { title:"unsupervised (EM/GMM)", color:"#0F6E56", bg:"#eafaf2",
    ll1:"gmmLL1_mean", ll2:"gmmLL2_mean", gain:"gmmLLGain_mean", bic:"gmmDeltaBIC_mean", sig2:"gmmSigma2_mean",
    groupNote:"EM-discovered components",
    llNote:"the two competing model fits (LEFT axis). EM fits LL₂ by maximum likelihood, so here LL₂ ≥ LL₁ always and the gain is ≥ 0.",
    subtitle:"Groups are discovered by unsupervised EM/GMM clustering of the residuals.",
    reading:"Both LL₁ and LL₂ drift down as σ̂² (orange) rises and the single curve fits worse; what matters is the gap. The gain rises as a genuine second cluster emerges, then shrinks past moderate dimorphism as the juvenile portions of the two growth curves cross and the residuals stop looking cleanly bimodal — that rise-then-fall is the U-shape, with no appeal to Cohen's d." };
  const cohendSup = { title:"supervised (sign-split)", color:"#8a5a2a", bg:"#faf2e8",
    gap:"supGap_mean", spread:"supSpread_mean", sep:"supSep_mean",
    groupNote:"means of the residuals above vs below zero",
    muNote:"the means of the residuals forced above (μ₂) and below (μ₁) the zero line",
    subtitle:"Groups are formed by the supervised residual sign-split (Saitta's rule).",
    reading:"Because the split is forced at zero, the gap is mechanically large at every effect size, so the supervised d stays high (~2.6) throughout with little turnover — it manufactures separation even when there is no real second group. Contrast with the unsupervised plot, where d can genuinely fall." };
  const cohendUns = { title:"unsupervised (EM/GMM)", color:"#0F6E56", bg:"#eafaf2",
    gap:"gmmGap_mean", spread:"gmmSpread_mean", sep:"componentSep_mean",
    groupNote:"EM-discovered component means",
    muNote:"the two EM-fitted component means on the residuals (smaller, larger)",
    subtitle:"Groups are discovered by unsupervised EM/GMM clustering of the residuals.",
    reading:"Early on the gap (teal) opens faster than the spread (orange), so d (blue) climbs. Past moderate dimorphism the juvenile ends of the male and female growth curves cross, the component means stop pulling apart (gap stalls/dips) while the spread keeps rising — a ratio whose numerator stalls while its denominator grows must fall, giving the inverted U. The peak sits where the gap stops outrunning the spread." };

  // ΔAICc and CV both compare a ONE-growth-curve fit to a TWO-growth-curve fit. Their decomposition
  // shows the two growth-curve log-likelihoods, their gain, and the resulting metric. The tapering at
  // high effect size shows up directly as LL_2curve stalling once the juvenile curve-crossing forces
  // young males below young females and they are placed in the wrong group. metricType: "aicc"/"cv".
  const renderGrowthFitDiagnostic = (g) => {
    const useMed = bandType === "iqr";
    const ctr = base => base + (useMed ? "_med" : "_mean");
    const bMono = g.llMono.replace(/_(mean|med)$/,""), bDim = g.llDim.replace(/_(mean|med)$/,""),
          bMet = g.metric.replace(/_(mean|med)$/,""), bSig = g.sig2 ? g.sig2.replace(/_(mean|med)$/,"") : null,
          bGain = g.gain ? g.gain.replace(/_(mean|med)$/,"") : null;
    const compBand = (d, base) => {
      if (!bandType || bandType === "none") return undefined;
      let lo, hi;
      if (bandType === "iqr") { if(!isFinite(d[base+"_q1"])||!isFinite(d[base+"_q3"])) return undefined; lo=transform(d[base+"_q1"]); hi=transform(d[base+"_q3"]); }
      else { const sd=d[base+"_sd"]; if(!isFinite(sd)) return undefined; const se=sd/Math.sqrt(d[base+"_n"]||1), c=d[ctr(base)]; if(!isFinite(c)) return undefined; const half=bandType==="sd"?sd:bandType==="se"?se:t95(d[base+"_n"])*se; lo=transform(c-half); hi=transform(c+half); }
      return (lo!=null&&hi!=null)?[Math.min(lo,hi),Math.max(lo,hi)]:undefined;
    };
    const rows = (dimData||[]).filter(Boolean)
      .filter(d => isFinite(d[g.llMono]) && isFinite(d[g.llDim]) && isFinite(d[g.metric]))
      .map(d => ({
        x: +(d.x/naturalE).toFixed(2),
        llMono: transform(+d[ctr(bMono)].toFixed(3)),
        llDim:  transform(+d[ctr(bDim)].toFixed(3)),
        gain:   bGain ? transform(+d[ctr(bGain)].toFixed(3)) : transform(+(d[ctr(bDim)]-d[ctr(bMono)]).toFixed(3)),
        metric: transform(+d[ctr(bMet)].toFixed(3)),
        sig2: (g.sig2 && isFinite(d[g.sig2])) ? transform(+d[ctr(bSig)].toFixed(5)) : null,
        llMonoBand: compBand(d,bMono), llDimBand: compBand(d,bDim), metricBand: compBand(d,bMet),
        gainBand: bGain ? compBand(d,bGain) : undefined,
        sig2Band: bSig ? compBand(d,bSig) : undefined,
      }));
    if (rows.length < 3) return null;
    const lVals = rows.flatMap(r=>[r.llMono, r.llDim, r.gain, r.metric, ...(r.llMonoBand||[]), ...(r.llDimBand||[]), ...(r.gainBand||[]), ...(r.metricBand||[])]).filter(v=>v!=null&&isFinite(v));
    const lTicks = niceTicks(Math.min(...lVals,0), Math.max(...lVals,0), 6);
    const sVals = rows.flatMap(r=>[r.sig2, ...(r.sig2Band||[])]).filter(v=>v!=null&&isFinite(v));
    const sTicks = sVals.length ? niceTicks(Math.min(...sVals,0), Math.max(...sVals,0), 5) : [0,1];
    const rawRows = (dimData||[]).filter(Boolean).filter(d=>isFinite(d[g.llMono])&&isFinite(d[g.llDim]))
      .map(d=>({x:+(d.x/naturalE).toFixed(2), gain:d[g.llDim]-d[g.llMono]}));
    const gainPeak = rawRows.reduce((a,b)=>b.gain>a.gain?b:a, rawRows[0]);
    return (
      <div style={{marginTop:"18px",background:"#fff",border:"2px solid "+g.color,padding:"18px 20px"}}>
        <div style={{fontSize:"13px",fontWeight:"bold",color:g.color,marginBottom:"3px"}}>
          What drives the Sc.1 {g.metricLabel} shape — {g.title}
        </div>
        <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"8px"}}>
          {g.subtitle} {g.metricLabel} compares a one-growth-curve fit to a two-growth-curve fit; this plot shows both fits, their gain, the resulting metric, and σ̂² (the estimated residual variance that sets the scale of every log-likelihood).
        </div>
        <Eq>{g.formula}</Eq>
        <Where items={[
          {sym:"σ̂²", def:"RIGHT axis (m²). σ̂² = RSS÷n, the maximum-likelihood estimate of the residual variance about the one combined curve (the mean of the squared residuals — NOT the unbiased RSS/(n−p)). It rises as the single curve fits the splitting data worse, lowering both log-likelihoods. This sets the LL scale. The hat marks it an estimate, not the true generating variance."},
          {sym:"LL_1curve", def:g.monoNote},
          {sym:"LL_2curve", def:g.dimNote+" — fit to the two groups under the "+g.groupWord+" assignment."},
          {sym:"gain = LL_2curve − LL_1curve", def:"the advantage of two curves over one. "+g.metricLabel+" is a penalised/cross-validated version of this gain."},
        ]}/>
        <div style={{display:"flex",flexWrap:"wrap",gap:"14px",margin:"8px 0",fontSize:"11px",color:"#5a4a2a"}}>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#888",display:"inline-block"}}/>LL_1curve (left)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#1c2b3a",display:"inline-block"}}/>LL_2curve (left)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#1a7a7a",display:"inline-block"}}/>gain (left)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#2a6496",display:"inline-block",borderTop:"1px dashed #2a6496"}}/>{g.metricLabel} (left)</span>
          <span style={{display:"flex",alignItems:"center",gap:"5px"}}><span style={{width:16,height:3,background:"#D85A30",display:"inline-block",borderTop:"1px dashed #D85A30"}}/>σ̂² (right, m²)</span>
        </div>
        <ResponsiveContainer width="100%" height={390}>
          <ComposedChart data={rows} margin={{top:20,right:54,left:16,bottom:34}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
            <XAxis dataKey="x" type="number" domain={[0,2.5]} ticks={[0,0.5,1,1.5,2,2.5]}
              tickFormatter={v=>v.toFixed(1)+"×"}
              label={{value:"Effect size (× natural dimorphism)",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
              tick={{fontSize:10}}/>
            <YAxis yAxisId="L" domain={[lTicks[0], lTicks[lTicks.length-1]]} ticks={lTicks} tickFormatter={tickFmt}
              label={{value:"Log-likelihood units (" + (useMed?"median":"mean") + " across reps)",angle:-90,position:"insideLeft",style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}}
              tick={{fontSize:10}} width={54}/>
            <YAxis yAxisId="R" orientation="right" domain={[sTicks[0], sTicks[sTicks.length-1]]} ticks={sTicks} tickFormatter={tickFmt}
              label={{value:"σ̂² (m², " + (useMed?"median":"mean") + " across reps)",angle:90,position:"insideRight",style:{fontSize:"10px",fill:"#D85A30",textAnchor:"middle"}}}
              tick={{fontSize:10}} width={48}/>
            <Tooltip formatter={(v,n)=>{ const raw=untransform(v); return [isFinite(raw)?(+raw).toFixed(4):String(v),n]; }}
              labelFormatter={l=>`${l}× natural dimorphism`}
              contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"}}/>
            <ReferenceLine yAxisId="L" y={transform(0)} stroke="#bbb" strokeDasharray="2 2"/>
            <ReferenceLine x={gainPeak.x} yAxisId="L" stroke="#1a7a7a" strokeDasharray="4 3"
              label={{value:"gain peak",position:"insideTopLeft",fill:"#1a7a7a",fontSize:9,fontWeight:"bold",stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
            {rows.some(d=>d.llMonoBand)&&<Area type="monotone" yAxisId="L" dataKey="llMonoBand" fill="#888" fillOpacity={0.13} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.llDimBand)&&<Area type="monotone" yAxisId="L" dataKey="llDimBand" fill="#1c2b3a" fillOpacity={0.1} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.gainBand)&&<Area type="monotone" yAxisId="L" dataKey="gainBand" fill="#1a7a7a" fillOpacity={0.11} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.metricBand)&&<Area type="monotone" yAxisId="L" dataKey="metricBand" fill="#2a6496" fillOpacity={0.11} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            {rows.some(d=>d.sig2Band)&&<Area type="monotone" yAxisId="R" dataKey="sig2Band" fill="#D85A30" fillOpacity={0.1} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>}
            <Line yAxisId="L" type="monotone" dataKey="llMono" stroke="#888" strokeWidth={2} dot={{r:2,fill:"#888"}} name="LL_1curve" connectNulls/>
            <Line yAxisId="L" type="monotone" dataKey="llDim" stroke="#1c2b3a" strokeWidth={2} dot={{r:2,fill:"#1c2b3a"}} name="LL_2curve" connectNulls/>
            <Line yAxisId="L" type="monotone" dataKey="gain" stroke="#1a7a7a" strokeWidth={2.5} dot={{r:2.5,fill:"#1a7a7a"}} name="gain" connectNulls/>
            <Line yAxisId="L" type="monotone" dataKey="metric" stroke="#2a6496" strokeWidth={2.5} strokeDasharray="5 3" dot={{r:2.5,fill:"#2a6496"}} name={g.metricLabel} connectNulls/>
            <Line yAxisId="R" type="monotone" dataKey="sig2" stroke="#D85A30" strokeWidth={2} strokeDasharray="5 3" dot={{r:2,fill:"#D85A30"}} name="σ̂² (m²)" connectNulls/>
          </ComposedChart>
        </ResponsiveContainer>
        <div style={{marginTop:"10px",padding:"8px 12px",background:g.bg,borderLeft:"3px solid "+g.color,fontSize:"10px",color:"#0a3a2a",lineHeight:1.6}}>
          <strong>Reading the plot.</strong> {g.reading}
        </div>
      </div>
    );
  };

  const aiccUns = { title:"unsupervised (EM/GMM)", color:"#0F6E56", bg:"#eafaf2", metricLabel:"ΔAICc", metricColor:"#b03060", sig2:"emAiccSig2_med",
    llMono:"emAiccLLMono_med", llDim:"emAiccLLDim_med", gain:"emAiccGain_med", metric:"emDeltaAICc_med", groupWord:"EM-clustering",
    formula:`σ̂²        = RSS / n                      (MLE variance = mean of squared residuals)
LL_1curve = −(n/2)·[ ln(2π·σ̂²₁) + 1 ]    one combined von Bertalanffy curve
LL_2curve = −(n/2)·[ ln(2π·σ̂²₂) + 1 ]    two separate VB curves (EM grouping)
gain      = LL_2curve − LL_1curve
ΔAICc     = (penalty: 2(k₂−k₁) + small-sample corr.) − 2·gain`,
    monoNote:"log-likelihood of ONE von Bertalanffy curve fit to all specimens",
    dimNote:"log-likelihood of TWO separate von Bertalanffy curves",
    subtitle:"Groups are discovered by unsupervised EM/GMM clustering of the residuals.",
    reading:"The two-curve gain (teal) rises strongly as real dimorphism emerges, so ΔAICc (blue) plunges far negative (two curves strongly preferred). σ̂² (orange, right axis) climbs throughout as the single combined curve fits the splitting data worse, dragging both LLs down — but what drives ΔAICc is the gap between them. ΔAICc does not turn over until the very top: once the juvenile portions of the male and female curves cross (around 2×+), young males fall below young females and EM mislabels them, so the two-curve fit is built on mixed-up groups — LL_2curve (black) stops improving while LL_1curve (grey) even recovers slightly as the crossed curves overlap. The gain therefore tapers, nudging ΔAICc back up. The turnover is the signature of the curve-crossing, visible directly in the two log-likelihood lines." };
  const aiccSup = { title:"supervised (sign-split)", color:"#8a5a2a", bg:"#faf2e8", metricLabel:"ΔAICc", metricColor:"#b03060", sig2:"aiccSig2_mean",
    llMono:"aiccLLMono_mean", llDim:"aiccLLDim_mean", gain:"aiccGain_mean", metric:"deltaAICc_mean", groupWord:"residual sign-split",
    formula:`σ̂²        = RSS / n                      (MLE variance = mean of squared residuals)
LL_1curve = −(n/2)·[ ln(2π·σ̂²₁) + 1 ]    one combined von Bertalanffy curve
LL_2curve = −(n/2)·[ ln(2π·σ̂²₂) + 1 ]    two separate VB curves (sign-split grouping)
gain      = LL_2curve − LL_1curve
ΔAICc     = (penalty: 2(k₂−k₁) + small-sample corr.) − 2·gain`,
    monoNote:"log-likelihood of ONE von Bertalanffy curve fit to all specimens",
    dimNote:"log-likelihood of TWO separate von Bertalanffy curves",
    subtitle:"Groups are formed by the supervised residual sign-split (Saitta's rule).",
    reading:"With the sign-split, the two-curve gain (teal) climbs even more aggressively (the split is taken from the same residuals being fit), driving ΔAICc (blue) strongly negative across the whole range — the structural bias that makes this metric over-eager to see two curves. σ̂² (orange, right axis) rises throughout, lowering both LLs and setting their scale. ΔAICc too tapers at the extreme top: once the juvenile curve-crossing forces young males below young females, the sign-split places them on the wrong side, LL_2curve (black) stalls, and even the forced split cannot keep improving the two-curve fit." };
  const cvUns = { title:"unsupervised (EM/GMM)", color:"#0F6E56", bg:"#eafaf2", metricLabel:"CV ΔLogLik", metricColor:"#1a7a7a", sig2:"emAiccSig2_med",
    llMono:"emCvMonoLL_med", llDim:"emCvDimLL_med", gain:"emCvGain_med", metric:"emDeltaCV_med", groupWord:"EM-clustering",
    formula:`LL_1curve = held-out log-likelihood, one combined VB curve (5-fold CV)
LL_2curve = held-out log-likelihood, two separate VB curves (EM grouping)
CV ΔLogLik = LL_2curve − LL_1curve   (averaged over the 5 folds)`,
    monoNote:"held-out (cross-validated) log-likelihood of ONE VB curve — scored on data it never saw during fitting",
    dimNote:"held-out log-likelihood of TWO separate VB curves",
    subtitle:"Groups are discovered by unsupervised EM/GMM clustering of the residuals.",
    reading:"Unlike ΔAICc, the held-out one-curve log-likelihood (grey) keeps FALLING as the sexes separate — a single curve predicts unseen data worse and worse. The two-curve held-out LL (black) starts essentially level with it at no dimorphism (so CV ≈ 0 there — a proper null) and pulls ahead as real dimorphism grows, so CV ΔLogLik (blue) — the gap, shown as the teal gain — climbs from zero. σ̂² (orange, right axis; the full-data one-curve residual variance) rises throughout and sets the scale of the residuals being predicted. At the top CV tapers: once the juvenile curves cross and EM mislabels young specimens, the two-curve model's held-out predictions degrade (black dips) and the gap shrinks. The turnover in the black line is the curve-crossing showing up in out-of-sample prediction." };
  const cvSup = { title:"supervised (sign-split)", color:"#8a5a2a", bg:"#faf2e8", metricLabel:"CV ΔLogLik", metricColor:"#1a7a7a", sig2:"aiccSig2_mean",
    llMono:"cvMonoLL_mean", llDim:"cvDimLL_mean", gain:"cvGain_mean", metric:"deltaCV_mean", groupWord:"residual sign-split",
    formula:`LL_1curve = held-out log-likelihood, one combined VB curve (5-fold CV)
LL_2curve = held-out log-likelihood, two separate VB curves (sign-split grouping)
CV ΔLogLik = LL_2curve − LL_1curve   (averaged over the 5 folds)`,
    monoNote:"held-out (cross-validated) log-likelihood of ONE VB curve — scored on data it never saw during fitting",
    dimNote:"held-out log-likelihood of TWO separate VB curves",
    subtitle:"Groups are formed by the supervised residual sign-split (Saitta's rule).",
    reading:"The held-out one-curve LL (grey) falls steadily as the sexes separate, while the two-curve held-out LL (black) starts level with it at no dimorphism and pulls ahead with real dimorphism, so CV ΔLogLik (blue), tracking the teal gain, climbs from zero. σ̂² (orange, right axis; the full-data one-curve residual variance) rises throughout and sets the scale of the residuals. Because cross-validation scores held-out points by the two-curve mixture density, the sign-split's structural bias is checked here (the null sits near zero, not inflated) — but the metric still tapers at the top: the juvenile curve-crossing causes young males to be placed on the wrong side of the split, so the two-curve held-out predictions (black) suffer and the gap narrows." };

  return(
    <div>
      {intro&&(
        <div style={{background:"#f8f4ec",border:"1px solid #d4c9b0",borderLeft:"4px solid #8a6a2a",
          padding:"16px 20px",marginBottom:"18px",fontSize:"13px",color:"#3a3a3a",lineHeight:1.8}}>
          <div style={{fontSize:"12px",letterSpacing:"1.5px",textTransform:"uppercase",color:"#8a6a2a",marginBottom:"8px",fontWeight:"bold"}}>{intro.title}</div>
          <p style={{margin:0}}>{intro.body}</p>
        </div>
      )}
      {scaleFallback&&(
        <div style={{fontSize:"11px",color:"#a63a3a",marginBottom:"8px",padding:"6px 10px",background:"#fdf0f0",borderLeft:"3px solid #a63a3a"}}>
          Warning: Log scale requested but data contains non-positive values -- automatically using Signed Log instead.
        </div>
      )}
      {scaleNote&&(
        <div style={{marginBottom:"14px",padding:"10px 16px",background:scaleNote.bg,
          border:`1px solid ${scaleNote.border}`,borderLeft:`4px solid ${scaleNote.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"}}>
            <span style={{background:scaleNote.border,color:"#fff",padding:"2px 8px",
              borderRadius:"3px",fontSize:"11px",fontWeight:"bold",letterSpacing:"0.5px"}}>
              {scaleNote.label}
            </span>
            <span style={{fontSize:"12px",fontWeight:"bold",color:scaleNote.color}}>
              Y-axis is shared across all three panels -- this is where the compression is meaningful
            </span>
          </div>
          <div style={{fontSize:"11px",color:scaleNote.color,lineHeight:1.6}}>{scaleNote.detail}</div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"18px"}}>
        <ChartPanel title="Sc.1: Increasing Dimorphism" subtitle="True effect: 0→2.5× natural (E=0 at origin). SD fixed at 1x."
          data={dimT} xLabel="True effect (× natural dimorphism)" yDesc={cfg.desc} color="#2a6496"
          referenceX={1} referenceXLabel="Natural E"
          {...panelProps}/>
        <ChartPanel title="Sc.2: Increasing Variance -- E = 0" subtitle="True E=0 throughout. SD: 0→2.5× natural."
          data={varT} xLabel="SD multiplier, sdMult (1 = natural scatter)" yDesc={cfg.desc} color="#a63a3a"
          referenceX={1} referenceXLabel="Natural SD"
          {...panelProps}/>
        <ChartPanel title="Sc.3: Increasing Variance -- E = natural" subtitle={`True E fixed at ${naturalE.toFixed(2)}m. SD: 0→2.5× natural.`}
          data={snrT} xLabel="SD multiplier, sdMult (1 = natural scatter)" color="#2a7a4a"
          referenceX={1} referenceXLabel="Natural SD"
          yDesc="Same x-axis range and units as Sc.2. Any difference at the same x position is due solely to real dimorphism in Sc.3."
          {...panelProps}/>
      </div>

      {/* Combined overlay: all three scenarios on one plot, shared x (× natural) and shared y */}
      {(() => {
        // Merge by x-value (× natural reference). All three use the same 0→2.5× x-axis.
        const xs = [...new Set([...dimT, ...varT, ...snrT].map(d => +d.x.toFixed(3)))].sort((a,b)=>a-b);
        const findY = (rows, x) => { const r = rows.find(d => Math.abs(d.x - x) < 0.001); return r ? r.y : undefined; };
        const findBand = (rows, x) => { const r = rows.find(d => Math.abs(d.x - x) < 0.001); return r && r.band ? r.band : undefined; };
        const combined = xs.map(x => ({
          x,
          sc1: findY(dimT, x), sc1Band: findBand(dimT, x),
          sc2: findY(varT, x), sc2Band: findBand(varT, x),
          sc3: findY(snrT, x), sc3Band: findBand(snrT, x),
        }));
        // Own y-domain for this overlay: based ONLY on this metric's supervised-series values plus the
        // threshold lines it draws (NOT the sharedDomain, which spans both the supervised and
        // unsupervised series and can be inflated when the two groupings sit at different magnitudes).
        const ov1vals = [
          ...combined.flatMap(d=>[d.sc1,d.sc2,d.sc3,...(d.sc1Band||[]),...(d.sc2Band||[]),...(d.sc3Band||[])]),
          ...visibleRefLines.map(r=>r.yScaled),
        ].filter(v=>v!=null&&isFinite(v));
        const ov1Lo = ov1vals.length ? Math.min(...ov1vals) : 0;
        const ov1Hi = ov1vals.length ? Math.max(...ov1vals) : 1;
        const ov1Ticks = niceTicks(ov1Lo, ov1Hi, 5);
        const ov1Pad = Math.abs(ov1Ticks[ov1Ticks.length-1]-ov1Ticks[0])*0.04 || 0.1;
        const ov1Dom = [ov1Ticks[0]-ov1Pad, ov1Ticks[ov1Ticks.length-1]+ov1Pad];
        return (
          <div style={{marginTop:"22px",background:"#fff",border:"2px solid #1c2b3a",padding:"18px 20px"}}>
            <div style={{fontSize:"13px",fontWeight:"bold",color:"#1c2b3a",marginBottom:"3px"}}>
              All Three Scenarios Overlaid — {cfg.label}{ySeriesLabel?", supervised (sign-split) version":""}
            </div>
            <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"12px"}}>
              All three scenarios on one plot for direct comparison. X-axis = × natural reference (dimorphism for Sc.1, scatter for Sc.2 and Sc.3). Dashed vertical line = natural reference (×1).
            </div>
            <ResponsiveContainer width="100%" height={390}>
              <ComposedChart data={combined} margin={{top:18,right:20,left:12,bottom:34}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
                <XAxis dataKey="x" type="number" domain={[0, 2.5]} ticks={[0,0.5,1,1.5,2,2.5]}
                  tickFormatter={v=>v.toFixed(1)+"×"}
                  label={{value:"× natural reference value",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
                  tick={{fontSize:10}}/>
                <YAxis domain={ov1Dom} ticks={ov1Ticks} tickFormatter={tickFmt}
                  label={{value:cfg.label + (bandType==="iqr" ? " (median)" : " (mean)"),angle:-90,position:"insideLeft",style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}}
                  tick={{fontSize:10}} width={62}/>
                <Tooltip formatter={(v,n)=>{const raw=untransform(v);return[isFinite(raw)?raw.toFixed(4):String(v),n];}}
                  contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"}}/>
                <Legend wrapperStyle={{fontSize:"11px",fontFamily:"Georgia,serif",paddingTop:"10px"}}/>
                <ReferenceLine x={1} stroke="#aaa" strokeDasharray="3 3"
                  label={{value:"Natural",position:"insideTop",fill:"#888",fontSize:9,stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
                {visibleRefLines.map((r,i)=>(
                  <ReferenceLine key={i} y={r.yScaled} stroke={r.color} strokeDasharray={r.dash} strokeWidth={1}
                    label={{value:r.label, position:r.pos==="left"?"insideTopLeft":"insideTopRight",
                      fill:r.color, fontSize:9, fontWeight:"bold", stroke:"#fff", strokeWidth:3, paintOrder:"stroke"}}/>
                ))}
                <Area type="monotone" dataKey="sc1Band" stroke="none" fill="#2a6496" fillOpacity={0.11} isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls/>
