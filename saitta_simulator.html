// Robust boot: verify all UMD globals loaded before transpiling/running the app.
(function () {
  function missing() {
    var m = [];
    if (typeof React === "undefined") m.push("React");
    if (typeof ReactDOM === "undefined") m.push("ReactDOM");
    if (typeof Recharts === "undefined") m.push("Recharts");
    if (typeof Babel === "undefined") m.push("Babel");
    return m;
  }
  function showError(list) {
    var root = document.getElementById("root");
    root.innerHTML =
      '<div class="boot"><div class="err"><b>Could not load required libraries:</b> ' +
      list.join(", ") +
      '.<br><br>This page needs an internet connection the first time it runs ' +
      "(it pulls React and Recharts from a CDN). If you are offline or behind a " +
      "strict firewall, the libraries cannot download. Try again on a normal " +
      "connection, or open the page in a different browser.</div></div>";
  }
  var tries = 0;
  function boot() {
    var miss = missing();
    if (miss.length === 0) {
      try {
        var src = document.getElementById("app-source").textContent;
        var out = Babel.transform(src, { presets: ["react"] }).code;
        // eslint-disable-next-line no-eval
        (0, eval)(out);
      } catch (e) {
        var root = document.getElementById("root");
        root.innerHTML =
          '<div class="boot"><div class="err"><b>Error starting the simulator:</b><br>' +
          (e && e.message ? e.message : String(e)) + "</div></div>";
        if (window.console) console.error(e);
      }
      return;
    }
    if (tries++ > 100) { showError(miss); return; }
    setTimeout(boot, 100);
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>

<script type="text/plain" id="app-source">

const { useState, useCallback, useRef, useEffect } = React;
const {
  LineChart, Line, BarChart, Bar, ComposedChart, Area,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine
} = Recharts;


// Shared scale transform -- used by all panels for y-axis scale toggle
function makeScaler(yScale, allYVals) {
  const hasNonPos = allYVals.some(v => v <= 0);
  const effective = (yScale === "log" && hasNonPos) ? "signedLog" : (yScale || "linear");
  const slog = v => v === 0 ? 0 : Math.sign(v) * Math.log10(1 + Math.abs(v));
  const transform = v => {
    if (v == null || !isFinite(v)) return null;
    if (effective === "log")       return v > 0 ? Math.log10(v) : null;
    if (effective === "signedLog") return slog(v);
    return v;
  };
  const untransform = v => {
    if (effective === "log")       return Math.pow(10, v);
    if (effective === "signedLog") { const s = v < 0 ? -1 : 1; return s * (Math.pow(10, Math.abs(v)) - 1); }
    return v;
  };
  const tickFmt = v => niceFmt(untransform(v));
  return { effective, transform, untransform, tickFmt, fallback: effective !== yScale };
}
// Generates ~5 "nice" tick values for a [lo, hi] domain.
// "Nice" means multiples of 1, 2, 2.5, 5, 10, 20, 50... so ticks land on round numbers.
function niceTicks(lo, hi, targetCount = 5) {
  if (!isFinite(lo) || !isFinite(hi) || lo === hi) return [lo];
  // Anchor at 0 when all data is non-negative or non-positive
  const anchoredLo = lo >= 0 ? 0 : lo;
  const anchoredHi = hi <= 0 ? 0 : hi;
  const range = anchoredHi - anchoredLo;
  const roughStep = range / (targetCount - 1);
  const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(roughStep) || 1)));
  const normalized = roughStep / mag;
  const niceStep = normalized <= 1   ? 1   * mag
                 : normalized <= 2   ? 2   * mag
                 : normalized <= 2.5 ? 2.5 * mag
                 : normalized <= 5   ? 5   * mag
                 :                     10  * mag;
  const start = Math.ceil(anchoredLo  / niceStep) * niceStep;
  const end   = Math.floor(anchoredHi / niceStep) * niceStep;
  const ticks = [];
  for (let t = start; t <= end + niceStep * 0.001; t += niceStep) {
    ticks.push(+t.toPrecision(10));
  }
  return ticks.length >= 2 ? ticks : [anchoredLo, anchoredHi];
}

// Formats a number for a tick label: clean, no unnecessary decimals.
function niceFmt(v) {
  if (!isFinite(v) || v === null) return "";
  if (v === 0) return "0";
  const abs = Math.abs(v);
  const sign = v < 0 ? "-" : "";
  // Choose decimal places based on magnitude
  if (abs >= 1000)  return sign + (abs / 1000).toFixed(1) + "k";
  if (abs >= 100)   return sign + Math.round(abs).toString();
  if (abs >= 10)    return sign + abs.toFixed(1).replace(/\.0$/, "");
  if (abs >= 1)     return sign + abs.toFixed(1).replace(/\.0$/, "");
  if (abs >= 0.1)   return sign + abs.toFixed(2).replace(/0$/, "");
  if (abs >= 0.01)  return sign + abs.toFixed(3).replace(/0+$/, "");
  return sign + abs.toExponential(1);
}


// --- Growth-curve fitting: Levenberg–Marquardt + multistart (shared across all three simulators) ---
// This replaces the original plain Gauss–Newton fitVB (which mirrored R's base nls()). The unified
// fitter below is Levenberg–Marquardt with a grid-search multistart — the same method as R's
// minpack.lm::nlsLM, the standard robust replacement for nls(): where nls() converges, LM lands on
// the identical least-squares optimum, and LM additionally converges where nls()'s Gauss–Newton
// fails. The multistart guards against local/degenerate minima that trap either single-start method.
// It carries VB, logistic and Gompertz so the same code fits all three families identically, and it
// uses NO L∞ magnitude constraint (there is no defensible asymptote bound for extinct taxa). This is
// an improvement over the fitting in Saitta et al. (2020), applied consistently across the suite.
const GROWTH = {
  vb:{_key:"vb",label:"von Bertalanffy",short:"VB",color:"#2a7d6f",predict:(p,t)=>p.Linf*(1-Math.exp(-p.K*(t-p.t0))),jac:(p,t)=>{const e=Math.exp(-p.K*(t-p.t0));return[1-e,p.Linf*(t-p.t0)*e,-p.Linf*p.K*e];},init:(a,l)=>{const sp=Math.max(Math.max(...a)-Math.min(...a),1e-6);return{Linf:Math.max(...l)*1.05,K:3.2/sp,t0:Math.min(...a)-0.05*sp};}},
  logistic:{_key:"logistic",label:"Logistic",short:"Logistic",color:"#8a4f9e",predict:(p,t)=>p.Linf/(1+Math.exp(-p.K*(t-p.t0))),jac:(p,t)=>{const E=Math.exp(-p.K*(t-p.t0)),d=1+E;return[1/d,p.Linf*(t-p.t0)*E/(d*d),-p.Linf*p.K*E/(d*d)];},init:(a,l)=>{const lo=Math.min(...a),sp=Math.max(Math.max(...a)-lo,1e-6);return{Linf:Math.max(...l)*1.05,K:5.5/sp,t0:lo+0.32*sp};}},
  gompertz:{_key:"gompertz",label:"Gompertz",short:"Gompertz",color:"#b8862b",predict:(p,t)=>p.Linf*Math.exp(-Math.exp(-p.K*(t-p.t0))),jac:(p,t)=>{const E=Math.exp(-p.K*(t-p.t0)),eE=Math.exp(-E);return[eE,p.Linf*eE*(t-p.t0)*E,-p.Linf*p.K*E*eE];},init:(a,l)=>{const lo=Math.min(...a),sp=Math.max(Math.max(...a)-lo,1e-6);return{Linf:Math.max(...l)*1.05,K:4.5/sp,t0:lo+0.25*sp};}},
};
// --- Growth-curve fitting: Levenberg–Marquardt + multistart (identical across all three simulators) ---
// Arithmetic-scale ordinary least squares — exactly what R's nls()/nlsLM does and what Saitta et al. (2020)
// used. Replaces the original plain Gauss–Newton: same optimum where nls() converges, but converges where
// nls() fails, and multistart avoids local minima. NO L∞ constraint (no defensible asymptote bound for
// extinct taxa). Carries VB, logistic and Gompertz so the SAME fitter handles every family in every panel.
function lmFit(ages,lens,modelOrKey,w,p0,maxIter=60){
  // UNIFIED FITTER (byte-identical in all three simulators): Levenberg–Marquardt damped least
  // squares with a coarse GRID-SEARCH MULTISTART. Handles VB, logistic and Gompertz identically
  // (all three are linear in L∞, so the grid solves L∞ in closed form at each K,t0 node). There is
  // NO L∞ magnitude constraint: for fossil/extinct taxa there is no defensible bound on the
  // asymptote, so it is left completely free — same method as R's minpack.lm::nlsLM (the standard
  // robust replacement for nls()'s Gauss–Newton). The only guards are domain-validity, not priors:
  // L∞ > 0 and K > 0 (a growth curve must rise to a positive asymptote) and a loose t0 sanity window
  // (~1.5 age-spans either side of the data) that only stops the inflection running to ±∞ into a
  // degenerate flat fit. Accepts a model key ("vb"/"logistic"/"gompertz") or a GROWTH model object.
  // Optional weights w and warm-start p0 (used by the mixture M-step for speed and stability).
  const key=(typeof modelOrKey==="string")?modelOrKey:(modelOrKey&&modelOrKey._key)||"vb";
  const model=GROWTH[key],n=ages.length;if(n<4)return null;
  const aLo=Math.min(...ages), aHi=Math.max(...ages), aSp=Math.max(aHi-aLo,1e-6);
  const t0Lo=aLo-1.5*aSp, t0Hi=aHi+0.6*aSp;              // loose inflection sanity window (NOT an L∞ prior)
  const wsse=q=>{let s=0;for(let i=0;i<n;i++){const r=lens[i]-model.predict(q,ages[i]);if(!isFinite(r))return Infinity;s+=(w?w[i]:1)*r*r;}return s;};
  const runFrom=(pInit)=>{
    let p={...pInit},lam=1e-3,prev=wsse(p);if(!isFinite(prev))return null;
    for(let it=0;it<maxIter;it++){
      const JtJ=[[0,0,0],[0,0,0],[0,0,0]],Jtr=[0,0,0];
      for(let i=0;i<n;i++){const wi=w?w[i]:1,r=lens[i]-model.predict(p,ages[i]),J=model.jac(p,ages[i]);for(let a=0;a<3;a++){Jtr[a]+=wi*J[a]*r;for(let b=0;b<3;b++)JtJ[a][b]+=wi*J[a]*J[b];}}
      let stepped=false;
      for(let tr=0;tr<7;tr++){
        const A=[[JtJ[0][0]*(1+lam),JtJ[0][1],JtJ[0][2]],[JtJ[1][0],JtJ[1][1]*(1+lam),JtJ[1][2]],[JtJ[2][0],JtJ[2][1],JtJ[2][2]*(1+lam)]];
        const d=solve3x3(A,Jtr);if(!d){lam*=4;continue;}
        const np={Linf:p.Linf+d[0],K:p.K+d[1],t0:p.t0+d[2]};
        if(!isFinite(np.Linf)||np.Linf<=0||np.K<=0||!isFinite(np.t0)||np.t0<t0Lo||np.t0>t0Hi){lam*=4;continue;}
        const e=wsse(np);
        if(isFinite(e)&&e<=prev){const conv=Math.abs(d[0])+Math.abs(d[1])+Math.abs(d[2])<1e-8;p=np;prev=e;lam=Math.max(lam/3,1e-9);stepped=true;if(conv)it=maxIter;break;}
        lam*=4;
      }
      if(!stepped)break;
    }
    if(!isFinite(p.Linf)||!isFinite(p.K)||!isFinite(p.t0)||p.Linf<=0||p.K<=0)return null;
    return p;
  };
  const shape={vb:(K,t0,t)=>1-Math.exp(-K*(t-t0)),logistic:(K,t0,t)=>1/(1+Math.exp(-K*(t-t0))),gompertz:(K,t0,t)=>Math.exp(-Math.exp(-K*(t-t0)))}[key];
  const gridStart=()=>{
    let best=null,bestE=Infinity;
    const Ks=[0.5,1,2,3.5,5.5,8,12].map(c=>c/aSp);
    const t0s=[];for(let f=-1.0;f<=0.5;f+=0.25)t0s.push(aLo+f*aSp);
    for(const K of Ks)for(const t0 of t0s){
      let sb=0,sl=0;for(let i=0;i<n;i++){const b=shape(K,t0,ages[i]);if(!isFinite(b))continue;const wi=w?w[i]:1;sb+=wi*b*b;sl+=wi*b*lens[i];}
      if(sb<=1e-12)continue;let Linf=sl/sb;if(!isFinite(Linf)||Linf<=0)continue;   // closed-form L∞, no clamp
      let e=0;for(let i=0;i<n;i++){const r=lens[i]-Linf*shape(K,t0,ages[i]);e+=(w?w[i]:1)*r*r;}
      if(e<bestE){bestE=e;best={Linf,K,t0};}
    }
    return best;
  };
  const starts=[];if(p0)starts.push(p0);starts.push(model.init(ages,lens));
  const gs=gridStart();if(gs)starts.push(gs);
  let best=null,bestE=Infinity;
  for(const st of starts){const r=runFrom(st);if(r){const e=wsse(r);if(e<bestE){bestE=e;best=r;}}}
  if(best&&gs){const om=(()=>{const o2=ages.map((a,i)=>i).sort((x,y)=>ages[x]-ages[y]);const q=Math.max(1,Math.floor(o2.length/4));return o2.slice(-q).reduce((s,i)=>s+lens[i],0)/q;})();
    if(model.predict(best,aHi)<0.78*om){const gr=runFrom(gs)||gs;if(model.predict(gr,aHi)>=model.predict(best,aHi))best=gr;}}
  return best;
}
function vbPredict(params, age) {
  const { Linf, K, t0 } = params;
  return Linf * (1 - Math.exp(-K * (age - t0)));
}
// Thin wrapper so every existing call site keeps working: a VB fit via the unified LM+multistart fitter.
function fitVB(ages, lengths) { return lmFit(ages, lengths, "vb"); }

function solve3x3(A, b) {
  // Direct 3x3 linear solve via Gaussian elimination with partial pivoting
  const M = A.map((row, i) => [...row, b[i]]);
  for (let col = 0; col < 3; col++) {
    // Find pivot
    let maxRow = col;
    for (let row = col + 1; row < 3; row++) {
      if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
    }
    [M[col], M[maxRow]] = [M[maxRow], M[col]];
    if (Math.abs(M[col][col]) < 1e-14) return null;
    for (let row = col + 1; row < 3; row++) {
      const f = M[row][col] / M[col][col];
      for (let k = col; k < 4; k++) M[row][k] -= f * M[col][k];
    }
  }
  const x = [0, 0, 0];
  for (let i = 2; i >= 0; i--) {
    x[i] = M[i][3];
    for (let j = i + 1; j < 3; j++) x[i] -= M[i][j] * x[j];
    x[i] /= M[i][i];
  }
  return x;
}

// --- Propagate uncertainty: delta method for CI/PI at a given age -------------
// First-order analytic approximation of propagate::predictNLS (Saitta's choice), which uses
// 2nd-order Taylor + Monte Carlo. Near the VB asymptote the model is ~linear in its params, so
// the two agree closely. PI adds a single pooled residual variance mse=SSE/(n-p), matching the
// homoscedastic residual variance predictNLS adds, even though true scatter is length-dependent.
// Uses numerical Jacobian of VB w.r.t. parameters, residual variance for PI

function computeIntervals(params, ages, lengths, targetAge, level = 0.95) {
  // NOTE ON SPECIFICATION: this is the standard delta-method interval for nonlinear least squares.
  // It assumes HOMOSCEDASTIC GAUSSIAN residuals on the raw (arithmetic) scale — a single mse and a
  // symmetric band. The data, however, are generated lognormal (scatter grows with size), so the
  // band is a mild approximation: slightly too wide at small sizes / too narrow at large sizes, and
  // symmetric where the true predictive distribution is mildly right-skewed. This matches Saitta's
  // raw-scale approach and the effect is small at natural noise, but the CI/PI panels should be read
  // with that caveat. (Same delta-method assumption is used in the companion simulators.)
  const n = ages.length;
  const p = 3; // parameters
  if (n <= p) return null;

  const { Linf, K, t0 } = params;
  const pred = ages.map((a) => vbPredict(params, a));
  const resids = ages.map((a, i) => lengths[i] - pred[i]);
  const sse = resids.reduce((s, r) => s + r * r, 0);
  const mse = sse / (n - p);

  // Numerical Jacobian at targetAge
  const h = 1e-5;
  const f0 = vbPredict(params, targetAge);
  const dLinf = (vbPredict({ Linf: Linf + h, K, t0 }, targetAge) - f0) / h;
  const dK = (vbPredict({ Linf, K: K + h, t0 }, targetAge) - f0) / h;
  const dt0 = (vbPredict({ Linf, K, t0: t0 + h }, targetAge) - f0) / h;
  const grad = [dLinf, dK, dt0];

  // (JtJ)^-1 via 3x3 inversion
  const JtJ = [[0,0,0],[0,0,0],[0,0,0]];
  ages.forEach((a) => {
    const e = Math.exp(-K * (a - t0));
    const j = [1 - e, Linf * (a - t0) * e, -Linf * K * e];
    for (let r = 0; r < 3; r++)
      for (let c = 0; c < 3; c++)
        JtJ[r][c] += j[r] * j[c];
  });
  const JtJinv = invert3x3(JtJ);
  if (!JtJinv) return null;

  // Variance of prediction = grad^T * (JtJ)^-1 * grad * mse
  let varFit = 0;
  for (let r = 0; r < 3; r++)
    for (let c = 0; c < 3; c++)
      varFit += grad[r] * JtJinv[r][c] * grad[c];
  varFit *= mse;

  // t critical value (approx for df = n-p)
  const df = n - p;
  const tCrit = tCritical(df, level);

  const seFit = Math.sqrt(Math.max(varFit, 0));
  const sePred = Math.sqrt(Math.max(varFit + mse, 0));

  return {
    fit: f0,
    ci_low: f0 - tCrit * seFit,
    ci_high: f0 + tCrit * seFit,
    pi_low: f0 - tCrit * sePred,
    pi_high: f0 + tCrit * sePred,
  };
}

function invert3x3(A) {
  const det =
    A[0][0] * (A[1][1]*A[2][2] - A[1][2]*A[2][1]) -
    A[0][1] * (A[1][0]*A[2][2] - A[1][2]*A[2][0]) +
    A[0][2] * (A[1][0]*A[2][1] - A[1][1]*A[2][0]);
  if (Math.abs(det) < 1e-14) return null;
  const inv = Array.from({length:3}, () => [0,0,0]);
  inv[0][0] = (A[1][1]*A[2][2]-A[1][2]*A[2][1])/det;
  inv[0][1] = (A[0][2]*A[2][1]-A[0][1]*A[2][2])/det;
  inv[0][2] = (A[0][1]*A[1][2]-A[0][2]*A[1][1])/det;
  inv[1][0] = (A[1][2]*A[2][0]-A[1][0]*A[2][2])/det;
  inv[1][1] = (A[0][0]*A[2][2]-A[0][2]*A[2][0])/det;
  inv[1][2] = (A[0][2]*A[1][0]-A[0][0]*A[1][2])/det;
  inv[2][0] = (A[1][0]*A[2][1]-A[1][1]*A[2][0])/det;
  inv[2][1] = (A[0][1]*A[2][0]-A[0][0]*A[2][1])/det;
  inv[2][2] = (A[0][0]*A[1][1]-A[0][1]*A[1][0])/det;
  return inv;
}

function tCritical(df, level = 0.95) {
  // Approximation of t-distribution quantile (two-tailed)
  // Using Wilson-Hilferty approximation
  const alpha = 1 - level;
  const p = 1 - alpha / 2;
  // Normal quantile for p (Beasley-Springer-Moro approximation)
  const z = normQuantile(p);
  if (df >= 200) return z;
  // Cornish-Fisher expansion for t
  return z + (z*z*z + z) / (4*df) + (5*z*z*z*z*z + 16*z*z*z + 3*z) / (96*df*df);
}

function normQuantile(p) {
  // Rational approximation (Abramowitz & Stegun 26.2.17)
  const a = [2.515517, 0.802853, 0.010328];
  const b = [1.432788, 0.189269, 0.001308];
  const t = Math.sqrt(-2 * Math.log(p <= 0.5 ? p : 1 - p));
  const num = a[0] + a[1]*t + a[2]*t*t;
  const den = 1 + b[0]*t + b[1]*t*t + b[2]*t*t*t;
  const x = t - num/den;
  return p <= 0.5 ? -x : x;
}

// --- RNG: Box-Muller normal, with optional reproducible seeding ---------------
// _rng is the active uniform generator on [0,1). It defaults to Math.random (non-reproducible).
// Calling seedRNG(seed) swaps in a deterministic mulberry32 stream so a given seed always
// reproduces the same simulated data; seedRNG(null) restores Math.random.
let _rng = Math.random;

// Hash an arbitrary string/number to a 32-bit unsigned integer (cyrb53-style, simplified).
function hashSeed(str) {
  let h = 1779033703 ^ String(str).length;
  for (let i = 0; i < String(str).length; i++) {
    h = Math.imul(h ^ String(str).charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  h = Math.imul(h ^ (h >>> 16), 2246822507);
  h = Math.imul(h ^ (h >>> 13), 3266489909);
  return (h ^= h >>> 16) >>> 0;
}

// mulberry32: a fast, well-distributed 32-bit PRNG. Deterministic given its state.
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Install a deterministic stream (seed = string or number) or restore Math.random (seed null/"").
function seedRNG(seed) {
  if (seed === null || seed === undefined || seed === "") { _rng = Math.random; return; }
  _rng = mulberry32(hashSeed(seed));
}

function randn(mean, sd) {
  let u, v;
  do { u = _rng(); } while (u === 0);
  do { v = _rng(); } while (v === 0);
  return mean + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function runif(min, max) {
  return min + _rng() * (max - min);
}

// --- Alligator SD function (from Saitta code) --------------------------------
// sd = sdMult * (0.0589 * log(L) + 0.0816)

function alligSD(L, sdMult = 1) {
  return sdMult * (0.0589 * Math.log(Math.max(L, 0.01)) + 0.0816);
}

// Multiplicative LOGNORMAL size draw — our improvement over the additive-Gaussian scatter used in
// Saitta et al. (2020). Returns a strictly positive value whose mean and standard deviation EXACTLY
// equal the requested (mu, sd), so it carries the same noise magnitude as the additive draw it
// replaces, but with the realistic shape of organismal size: proportional, right-skewed, never
// negative. (At small CV it is indistinguishable from a Gaussian; it only departs where the old
// additive model could push a body size to or below zero.)
function drawSize(mu, sd) {
  if (!(mu > 0) || !(sd > 0)) return mu;
  const cv = sd / mu, sg = Math.sqrt(Math.log(1 + cv * cv));
  return mu * Math.exp(randn(0, sg) - sg * sg / 2);
}

// Female VB params (Wilkinson & Rhodes 1997 via Hone & Mallon 2017)
const F_LINF = 2.78, F_K = 0.0926, F_SHAPE = 0.91; // Lf = 2.78*(1 - 0.91*exp(-0.0926*age)); 0.91 is the SHAPE
// coefficient (sets size at age 0), NOT t0. In the L∞·(1 − shape·e^(−K·age)) form, shape = e^(K·t0), so the
// equivalent von-Bertalanffy offset would be t0 = ln(0.91)/0.0926 ≈ −1.02 yr (left implicit; the fit uses the
// t0 form, the generator uses the shape form, and the two are algebraically identical).
// Male params with effect E (proportional scaling as in Saitta code)
function maleVB(age, E) {
  return (2.78 + E) * (1 - (0.91 + 0.02970297 * E) * Math.exp((-0.0926 + 0.022871287 * E) * age));
}
function femaleVB(age) {
  return 2.78 * (1 - 0.91 * Math.exp(-0.0926 * age));
}

// --- Single simulation run ----------------------------------------------------

// CV log-likelihood: 5-fold cross-validated advantage of the two-curve model over one curve.
// groupUpper[i] = true if specimen i is assigned to the larger/upper group, false otherwise.
// This assignment is supplied by the caller (residual sign-split OR EM clustering), so the CV
// genuinely reflects the chosen grouping rather than silently re-deriving the sign-split.
// Folds are assigned deterministically by specimen index (i mod 5), not randomly: because
// specimens are generated in random order (ages i.i.d.), this yields well-mixed folds while
// keeping the CV score exactly reproducible for a given dataset.
function computeCVLogLik(ages, lengths, method = 'sign') {
  const n = ages.length;
  const k = 5;
  const foldIdx = ages.map((_, i) => i % k);
  let deltaCV = 0, validFolds = 0, sumMonoLL = 0, sumDimLL = 0;
  for (let fold = 0; fold < k; fold++) {
    const testIdx  = ages.map((_, i) => i).filter(i => foldIdx[i] === fold);
    const trainIdx = ages.map((_, i) => i).filter(i => foldIdx[i] !== fold);
    if (testIdx.length < 1 || trainIdx.length < 4) continue;
    const trAges = trainIdx.map(i => ages[i]);
    const trLens = trainIdx.map(i => lengths[i]);
    const teAges = testIdx.map(i => ages[i]);
    const teLens = testIdx.map(i => lengths[i]);
    const monoFit = fitVB(trAges, trLens);
    if (!monoFit) continue;
    const monoResidTrain = trAges.map((a, i) => trLens[i] - vbPredict(monoFit, a));
    const monoSigma2 = monoResidTrain.reduce((s, r) => s + r*r, 0) / trAges.length;
    if (monoSigma2 <= 0) continue;
    const monoLLTest = teAges.reduce((s, a, j) => {
      const r = teLens[j] - vbPredict(monoFit, a);
      return s - 0.5*(r*r/monoSigma2 + Math.log(2*Math.PI*monoSigma2));
    }, 0);
    // Re-derive the two groups INSIDE this fold, from the training fit only — never from a global
    // split that already saw the held-out points. 'sign' = Saitta's residual-sign rule (r>0 = larger);
    // 'em' = unsupervised 2-component EM on the training residuals, assigned by posterior. Either way
    // the split is leak-free because it is recomputed per fold.
    let lTrainIdx, sTrainIdx;
    if (method === 'em') {
      const gm = fitGMM(monoResidTrain);
      if (!gm) continue;
      const gss = (x, mu, sig) => sig <= 0 ? 0 : Math.exp(-0.5*((x-mu)/sig)**2) / (sig*Math.sqrt(2*Math.PI));
      lTrainIdx = []; sTrainIdx = [];
      trainIdx.forEach((idx, j) => {
        const r = monoResidTrain[j];
        const pUp = (1 - gm.pi) * gss(r, gm.mu2, gm.s2);   // upper (larger-mean) component
        const pLo = gm.pi * gss(r, gm.mu1, gm.s1);
        (pUp >= pLo ? lTrainIdx : sTrainIdx).push(idx);
      });
    } else {
      lTrainIdx = trainIdx.filter((idx, j) => monoResidTrain[j] > 0);
      sTrainIdx = trainIdx.filter((idx, j) => monoResidTrain[j] <= 0);
    }
    if (lTrainIdx.length < 4 || sTrainIdx.length < 4) continue;
    const lFitCV = fitVB(lTrainIdx.map(i => ages[i]), lTrainIdx.map(i => lengths[i]));
    const sFitCV = fitVB(sTrainIdx.map(i => ages[i]), sTrainIdx.map(i => lengths[i]));
    if (!lFitCV || !sFitCV) continue;
    // DEGENERATE-FIT GUARD: a near-step VB fit (large K with t0 inside the observed ages) plunges to
    // an impossible NEGATIVE size below t0, and scoring a held-out specimen against that makes the
    // Gaussian log-likelihood explode. A growth curve cannot predict a negative size, so a fold whose
    // fit does is non-physical: drop it from the CV average (the fits themselves are left untouched —
    // only this fold's held-out scoring is skipped, exactly like the fit-failure skips above).
    let cvDegenerate = false;
    for (const i of testIdx) {
      if (vbPredict(monoFit, ages[i]) < 0 || vbPredict(lFitCV, ages[i]) < 0 || vbPredict(sFitCV, ages[i]) < 0) { cvDegenerate = true; break; }
    }
    if (cvDegenerate) continue;
    const lResidTr = lTrainIdx.map(i => lengths[i] - vbPredict(lFitCV, ages[i]));
    const sResidTr = sTrainIdx.map(i => lengths[i] - vbPredict(sFitCV, ages[i]));
    const dimRSS = lResidTr.reduce((s,r) => s+r*r,0) + sResidTr.reduce((s,r) => s+r*r,0);
    const dimSigma2 = dimRSS / (lTrainIdx.length + sTrainIdx.length);
    if (dimSigma2 <= 0) continue;
    // Score each held-out point by the two-curve model's MIXTURE density, NOT by the nearer curve.
    // At prediction time the model does not know which sex a new specimen is, so the honest predictive
    // density is the mixture: π·N(rₗ;0,σ̂²) + (1−π)·N(r_s;0,σ̂²), with π the training mixing proportion.
    // (Picking the nearer curve would let each test point peek at which curve fits it better — a label
    // leak that inflates the two-curve advantage even under zero dimorphism.) Combined with the
    // within-fold split above, the CV is leak-free. EMPIRICAL NULL BEHAVIOUR: under no dimorphism the
    // held-out two-curve score sits reliably BELOW the one-curve score (Δ ≈ −2 at these sizes), i.e.
    // the spurious split COSTS out-of-sample predictive accuracy. Δ rises toward and above 0 only as
    // real dimorphism appears — so a clearly negative ΔCV is the expected null signature, not ≈ 0.
    const piU = lTrainIdx.length / (lTrainIdx.length + sTrainIdx.length);
    const invDenom = 1 / Math.sqrt(2*Math.PI*dimSigma2);
    const dimLLTest = testIdx.reduce((s, i) => {
      const rL = lengths[i] - vbPredict(lFitCV, ages[i]);
      const rS = lengths[i] - vbPredict(sFitCV, ages[i]);
      const gL = Math.exp(-0.5*rL*rL/dimSigma2) * invDenom;
      const gS = Math.exp(-0.5*rS*rS/dimSigma2) * invDenom;
      return s + Math.log(piU*gL + (1-piU)*gS + 1e-300);
    }, 0);
    deltaCV += dimLLTest - monoLLTest;
    sumMonoLL += monoLLTest;
    sumDimLL  += dimLLTest;
    validFolds++;
  }
  if (validFolds === 0) return { deltaCV: NaN, monoLL: NaN, dimLL: NaN };
  return { deltaCV: deltaCV/validFolds, monoLL: sumMonoLL/validFolds, dimLL: sumDimLL/validFolds };
}

// --- Model selection: AICc and BIC -------------------------------------------
function computeModelSelection(ages, lengths, combinedResids, lAges, lLens, sAges, sLens, lFit, sFit) {
  // Parameter counts INCLUDE the residual variance σ², which is an estimated parameter here:
  // llMono/llDim below are PROFILED Gaussian log-likelihoods, evaluated at σ̂² = RSS/n (the MLE),
  // so σ² is fitted from the data and must be counted. One curve = Linf,K,t0,σ = 4; two curves
  // share a single pooled σ̂² = rssDim/n, so = 3+3+1 = 7. This also matches the residual-mixture
  // ΔBIC in fitGMM/fitSupervised, where the noise SD is likewise counted (1 cluster = mean+SD = 2,
  // 2 clusters = 5), and the detection BIC in the companion simulators (k=4 vs 7). NOTE: ΔAIC and
  // ΔBIC are UNAFFECTED by this (σ cancels: kDim−kMono = 3 either way, so the BIC penalty stays
  // 3·ln n); only the AICc small-sample correction 2k(k+1)/(n−k−1), which is non-linear in k,
  // shifts slightly — this is the correct, consistent count.
  const n = ages.length, kMono = 4, kDim = 7;
  const rssMono = combinedResids.reduce((s,r) => s+r*r, 0);
  const lResids = lAges.map((a,i) => lLens[i] - vbPredict(lFit, a));
  const sResids = sAges.map((a,i) => sLens[i] - vbPredict(sFit, a));
  const rssDim  = lResids.reduce((s,r) => s+r*r,0) + sResids.reduce((s,r) => s+r*r,0);
  if (rssMono<=0||rssDim<=0||!isFinite(rssMono)||!isFinite(rssDim)) return null;
  // Full Gaussian log-likelihood, evaluated at the MLE variance σ̂² = RSS/n.
  // LL = −(n/2)·[ ln(2π·σ̂²) + 1 ].  We keep the complete expression (including the
  // additive constant) so every value labeled "LL" in the app IS the log-likelihood,
  // not a shifted version of it. (The constant cancels in ΔAICc/ΔBIC either way, but we
  // never want a plotted/penalised "LL" that is secretly off by a constant.)
  const sigma2Mono = rssMono/n, sigma2Dim = rssDim/n;
  const llMono = -(n/2)*(Math.log(2*Math.PI*sigma2Mono) + 1);
  const llDim  = -(n/2)*(Math.log(2*Math.PI*sigma2Dim)  + 1);
  const aiccMono = 2*kMono - 2*llMono + (2*kMono*(kMono+1))/Math.max(n-kMono-1,1);
  const aiccDim  = 2*kDim  - 2*llDim  + (2*kDim*(kDim+1))/Math.max(n-kDim-1,1);
  const bicMono  = kMono*Math.log(n) - 2*llMono;
  const bicDim   = kDim *Math.log(n) - 2*llDim;
  return { deltaAICc: aiccDim-aiccMono, deltaBIC: bicDim-bicMono, deltaAIC: (2*kDim-2*llDim)-(2*kMono-2*llMono),
           llMono, llDim, sigma2Mono, sigma2Dim };
}

// --- GMM: 2-component Gaussian mixture via EM --------------------------------
function fitGMM(residuals, maxIter=100, tol=1e-6) {
  const n = residuals.length;
  if (n < 10) return null;
  const sorted = [...residuals].sort((a,b) => a-b);
  const half   = Math.floor(n/2);
  let mu1 = sorted.slice(0,half).reduce((s,x)=>s+x,0)/half;
  let mu2 = sorted.slice(half).reduce((s,x)=>s+x,0)/(n-half);
  const om = residuals.reduce((s,x)=>s+x,0)/n;
  const ov = residuals.reduce((s,x)=>s+(x-om)**2,0)/n;
  const initSD = Math.sqrt(ov/2)||0.01;
  let pi=0.5, s1=initSD, s2=initSD, prevLL=-Infinity;
  const gauss=(x,mu,sig)=>sig<=0?0:Math.exp(-0.5*((x-mu)/sig)**2)/(sig*Math.sqrt(2*Math.PI));
  for (let iter=0; iter<maxIter; iter++) {
    const r1=residuals.map(x=>pi*gauss(x,mu1,s1));
    const r2=residuals.map(x=>(1-pi)*gauss(x,mu2,s2));
    const rt=r1.map((v,i)=>v+r2[i]+1e-300);
    const g1=r1.map((v,i)=>v/rt[i]), g2=r2.map((v,i)=>v/rt[i]);
    const ll=rt.reduce((s,v)=>s+Math.log(v),0);
    if (!isFinite(ll)) return null;
    const n1=g1.reduce((s,v)=>s+v,0), n2=g2.reduce((s,v)=>s+v,0);
    if (n1<1||n2<1) return null;
    pi=n1/n;
    mu1=g1.reduce((s,v,i)=>s+v*residuals[i],0)/n1;
    mu2=g2.reduce((s,v,i)=>s+v*residuals[i],0)/n2;
    s1=Math.sqrt(g1.reduce((s,v,i)=>s+v*(residuals[i]-mu1)**2,0)/n1)||0.001;
    s2=Math.sqrt(g2.reduce((s,v,i)=>s+v*(residuals[i]-mu2)**2,0)/n2)||0.001;
    if (Math.abs(ll-prevLL)<tol) break;
    prevLL=ll;
  }
  if (mu1>mu2){[mu1,mu2]=[mu2,mu1];[s1,s2]=[s2,s1];pi=1-pi;}
  const ll2=prevLL;
  const ll1=residuals.reduce((s,x)=>s+Math.log(gauss(x,om,Math.sqrt(ov))+1e-300),0);
  const llGain=ll2-ll1;                              // extra log-likelihood the 2-component model earns
  const gmmDeltaBIC=(5*Math.log(n)-2*ll2)-(2*Math.log(n)-2*ll1);  // = 3·ln(n) − 2·llGain
  const pooledSD=Math.sqrt((s1**2+s2**2)/2);
  const componentSep=pooledSD>0?(mu2-mu1)/pooledSD:0;
  return {mu1,mu2,s1,s2,pi,gmmDeltaBIC,componentSep,llGain,gmmN:n,ll1,ll2,sigma2:ov};
}

// --- Supervised "sign-split" two-Gaussian fit (the Saitta-consistent alternative to EM) -------
// Instead of letting EM DISCOVER two clusters, this takes the cluster labels as GIVEN by the
// residual sign (r>0 = larger group, r<=0 = smaller group, exactly Saitta's sex.residuals rule)
// and estimates each group's Gaussian directly by maximum likelihood (just the group mean and SD).
// No iteration / no machine learning is needed because the memberships are already known.
// It returns the same separation and deltaBIC quantities as fitGMM so the two can be compared
// head-to-head. KEY POINT: because the split is forced at zero, the two group means are
// mechanically pushed apart, so this metric reports large "separation" even when the residuals
// are really one single cloud (no true bimodality). That is exactly why it is NOT a valid test
// for dimorphism, and why an unsupervised method (EM-GMM) is needed for that question.
function fitSupervised(residuals) {
  const n = residuals.length;
  if (n < 10) return null;
  // Degenerate guard: at zero noise with no dimorphism every residual is ~0, so the spread
  // collapses and the "split at zero" produces a meaningless blow-up. Bail out like fitGMM does.
  const totalVar = (() => {
    const mu = residuals.reduce((s,x)=>s+x,0)/n;
    return residuals.reduce((s,x)=>s+(x-mu)**2,0)/n;
  })();
  if (!(totalVar > 1e-8)) return null;
  const upper = residuals.filter(r => r > 0);
  const lower = residuals.filter(r => r <= 0);
  if (upper.length < 2 || lower.length < 2) return null;
  const mean = a => a.reduce((s,x)=>s+x,0)/a.length;
  const sdOf = (a,mu) => Math.sqrt(a.reduce((s,x)=>s+(x-mu)**2,0)/a.length);
  const muU = mean(upper), muL = mean(lower);
  const sU = sdOf(upper,muU)||1e-3, sL = sdOf(lower,muL)||1e-3;
  const piU = upper.length/n;
  const pooledSD = Math.sqrt((sU**2 + sL**2)/2);
  const componentSep = pooledSD>0 ? (muU-muL)/pooledSD : 0;
  // ΔBIC: supervised 2-Gaussian (5 free params: 2 means, 2 SDs, 1 mixing) vs single Gaussian (2 params)
  const gauss = (x,mu,sig) => sig<=0?0:Math.exp(-0.5*((x-mu)/sig)**2)/(sig*Math.sqrt(2*Math.PI));
  const ll2 = residuals.reduce((s,x)=>s+Math.log(piU*gauss(x,muU,sU)+(1-piU)*gauss(x,muL,sL)+1e-300),0);
  const om = mean(residuals), ov = sdOf(residuals,om)||1e-3;
  const ll1 = residuals.reduce((s,x)=>s+Math.log(gauss(x,om,ov)+1e-300),0);
  const supDeltaBIC = (5*Math.log(n)-2*ll2) - (2*Math.log(n)-2*ll1);
  return { muU, muL, sU, sL, piU, supDeltaBIC, componentSep,
           supGap: muU-muL, supSpread: pooledSD, supLLGain: ll2-ll1, supLL1: ll1, supLL2: ll2, supSigma2: ov*ov };
}

// --- Single simulation run ----------------------------------------------------
function simOnce(nPerSex, effectSize, sdMult) {
  const ages = [], lengths = [];
  for (let i=0; i<nPerSex; i++){
    const age=runif(1,50); const Lf=femaleVB(age);
    lengths.push(drawSize(Lf, alligSD(Lf,sdMult))); ages.push(age);
  }
  for (let i=0; i<nPerSex; i++){
    const age=runif(1,50); const Lm=maleVB(age,effectSize);
    lengths.push(drawSize(Lm, alligSD(Lm,sdMult))); ages.push(age);
  }
  const combinedFit=fitVB(ages,lengths);
  if (!combinedFit) return null;
  const residuals=ages.map((a,i)=>lengths[i]-vbPredict(combinedFit,a));
  // True sex by generation order: indices [0, nPerSex) are female, [nPerSex, 2*nPerSex) are male.
  // Sex assignment by residual sign: r>0 -> assigned male, r<=0 -> assigned female (Saitta sex.residuals).
  // Accuracy, computed separately per true sex exactly as Saitta et al. (Allig_analysis_ETS.r lines 30-31):
  //   male accuracy   = fraction of truly-male specimens assigned male (residual > 0)
  //   female accuracy = fraction of truly-female specimens assigned female (residual <= 0)
  let maleCorrect=0, femaleCorrect=0;
  for(let i=0;i<residuals.length;i++){
    const trulyMale = i >= nPerSex;       // second generation loop = male
    const assignedMale = residuals[i] > 0;
    if(trulyMale && assignedMale) maleCorrect++;
    if(!trulyMale && !assignedMale) femaleCorrect++;
  }
  const maleAccuracy   = (maleCorrect / nPerSex) * 100;
  const femaleAccuracy = (femaleCorrect / nPerSex) * 100;
  const mAges=[],mLens=[],fAges=[],fLens=[];
  residuals.forEach((r,i)=>{
    if(r>0){mAges.push(ages[i]);mLens.push(lengths[i]);}
    else   {fAges.push(ages[i]);fLens.push(lengths[i]);}
  });
  if(mAges.length<5||fAges.length<5) return null;
  const mFit=fitVB(mAges,mLens), fFit=fitVB(fAges,fLens);
  if(!mFit||!fFit) return null;
  const lFit=mFit.Linf>=fFit.Linf?mFit:fFit, sFit=mFit.Linf>=fFit.Linf?fFit:mFit;
  const lAges=mFit.Linf>=fFit.Linf?mAges:fAges, lLens=mFit.Linf>=fFit.Linf?mLens:fLens;
  const sAges=mFit.Linf>=fFit.Linf?fAges:mAges, sLens=mFit.Linf>=fFit.Linf?fLens:mLens;
  const estEffect=lFit.Linf-sFit.Linf;
  const sdi=(lFit.Linf/sFit.Linf)-1;
  const logr=Math.log(lFit.Linf/sFit.Linf);
  // Evaluate intervals at the SAME reference age for both sexes (oldest in entire dataset).
  // Using sex-specific oldest ages can produce negative spread when the random residual split
  // assigns the oldest specimen to the smaller-sex group -- making ci_high(young) < ci_low(old).
  // A shared reference age ensures geometric coherence: spread is always ≥ 0 when curves diverge.
  const refAge = Math.max(...ages);
  const lIntervals=computeIntervals(lFit,lAges,lLens,refAge);
  const sIntervals=computeIntervals(sFit,sAges,sLens,refAge);
  if(!lIntervals||!sIntervals) return null;
  const ciSpread=lIntervals.ci_high-sIntervals.ci_low;
  const piSpread=lIntervals.pi_high-sIntervals.pi_low;
  const ciSep=lIntervals.ci_low-sIntervals.ci_high;
  const piSep=lIntervals.pi_low-sIntervals.pi_high;
  // Supervised grouping: which specimens are in the larger/upper group. The r>0 specimens form
  // one group; whether that is the LARGER group depends on which sub-fit has the bigger Linf.
  const upperIsPositive = mFit.Linf >= fFit.Linf; // mFit was fit to the r>0 specimens
  const groupUpperSign = residuals.map(r => upperIsPositive ? (r>0) : (r<=0));
  // Skip CV when sdMult < 0.05: near-zero noise makes σ̂²→0 and log-likelihood→−∞,
  // producing extreme values that dominate the shared y-axis across all panels.
  const cvSup = sdMult < 0.05
    ? { deltaCV: NaN, monoLL: NaN, dimLL: NaN }
    : computeCVLogLik(ages,lengths,'sign');
  const deltaCV = cvSup.deltaCV;
  const cvMonoLL = cvSup.monoLL;   // held-out one-curve log-likelihood (supervised grouping)
  const cvDimLL  = cvSup.dimLL;    // held-out two-curve log-likelihood (supervised grouping)
  // Skip model selection metrics at near-zero noise for same reason as CV
  const modelSel = sdMult < 0.05
    ? null
    : computeModelSelection(ages,lengths,residuals,lAges,lLens,sAges,sLens,lFit,sFit);
  const deltaAICc=modelSel?modelSel.deltaAICc:NaN;
  const deltaBIC=modelSel?modelSel.deltaBIC:NaN;
  const aiccLLMono=modelSel?modelSel.llMono:NaN;   // one combined VB curve, full-data log-likelihood
  const aiccLLDim =modelSel?modelSel.llDim:NaN;    // two separate VB curves (supervised grouping)
  const aiccSigma2Mono=modelSel?modelSel.sigma2Mono:NaN; // σ̂² (estimated residual variance) of the single combined curve (m²)
  const gmm=fitGMM(residuals);
  const gmmDeltaBIC=gmm?gmm.gmmDeltaBIC:NaN;
  const componentSep=gmm?gmm.componentSep:NaN;
  const gmmGap=gmm?(gmm.mu2-gmm.mu1):NaN;                       // between-component mean gap (numerator of Cohen's d)
  const gmmSpread=gmm?Math.sqrt((gmm.s1**2+gmm.s2**2)/2):NaN;   // pooled within-component spread (denominator)
  const gmmLLGain=gmm?gmm.llGain:NaN;                           // LL2 − LL1: the exact driver of ΔBIC
  const gmmLL1=gmm?gmm.ll1:NaN;                                 // one-component log-likelihood
  const gmmLL2=gmm?gmm.ll2:NaN;                                 // two-component log-likelihood
  const gmmSigma2=gmm?gmm.sigma2:NaN;                           // σ̂² = estimated residual variance (mean squared residual of single Gaussian)
  // Supervised (Saitta sign-split, direct MLE) counterpart for head-to-head comparison.
  const sup=fitSupervised(residuals);
  const supDeltaBIC=sup?sup.supDeltaBIC:NaN;
  const supSep=sup?sup.componentSep:NaN;
  const supGap=sup?sup.supGap:NaN;
  const supSpread=sup?sup.supSpread:NaN;
  const supLLGain=sup?sup.supLLGain:NaN;
  const supLL1=sup?sup.supLL1:NaN;
  const supLL2=sup?sup.supLL2:NaN;
  const supSigma2=sup?sup.supSigma2:NaN;
  // --- UNSUPERVISED (EM-grouped) model selection -----------------------------------------------
  // The ΔAICc/CV above used Saitta's residual SIGN-split to form the two groups. Here we instead
  // form the two groups from the EM clustering (hard-assign each specimen to its higher-posterior
  // component), then run the SAME one-curve-vs-two-curve comparison. This asks: if we let the data
  // choose the grouping rather than forcing a split at zero, does the model-selection verdict change?
  // Guarded (>=10 per group, physical refit) and aggregated by median upstream, because EM groups
  // can occasionally be tiny/degenerate and blow up an individual AICc.
  let emDeltaAICc=NaN, emDeltaCV=NaN;
  let emAiccLLMono=NaN, emAiccLLDim=NaN, emAiccSigma2Mono=NaN;
  let emCvMonoLL=NaN, emCvDimLL=NaN;
  if (gmm && sdMult >= 0.05) {
    const eUp={a:[],l:[]}, eLo={a:[],l:[]};
    const emUpperPosterior=[]; // per-specimen: assigned to the higher-mean (mu2) component?
    const gA=(x,mu,sig)=>sig<=0?0:Math.exp(-0.5*((x-mu)/sig)**2)/(sig*Math.sqrt(2*Math.PI));
    residuals.forEach((r,i)=>{
      const pLo=gmm.pi*gA(r,gmm.mu1,gmm.s1);          // mu1 is the lower mean (sorted in fitGMM)
      const pUp=(1-gmm.pi)*gA(r,gmm.mu2,gmm.s2);       // mu2 is the higher mean
      const up = pUp>pLo;
      emUpperPosterior.push(up);
      (up?eUp:eLo).a.push(ages[i]); (up?eUp:eLo).l.push(lengths[i]);
    });
    if (eUp.a.length>=10 && eLo.a.length>=10) {
      const eUpFit=fitVB(eUp.a,eUp.l), eLoFit=fitVB(eLo.a,eLo.l);
      const physical = f => f && f.Linf<=10 && f.Linf>=0.5;
      if (physical(eUpFit) && physical(eLoFit)) {
        // larger/smaller by fitted Linf, consistent with the sign-split convention
        const upperIsLarger = eUpFit.Linf >= eLoFit.Linf;
        const LgF=upperIsLarger?eUpFit:eLoFit, SmF=upperIsLarger?eLoFit:eUpFit;
        const LgA=upperIsLarger?eUp.a:eLo.a, LgL=upperIsLarger?eUp.l:eLo.l;
        const SmA=upperIsLarger?eLo.a:eUp.a, SmL=upperIsLarger?eLo.l:eUp.l;
        const ems=computeModelSelection(ages,lengths,residuals,LgA,LgL,SmA,SmL,LgF,SmF);
        if (ems) { emDeltaAICc=ems.deltaAICc; emAiccLLMono=ems.llMono; emAiccLLDim=ems.llDim; emAiccSigma2Mono=ems.sigma2Mono; }
        // groupUpper for CV: true = larger-Linf group. Posterior 'up' maps to larger iff upperIsLarger.
        const ecv=computeCVLogLik(ages,lengths,'em');
        if (isFinite(ecv.deltaCV)) { emDeltaCV=ecv.deltaCV; emCvMonoLL=ecv.monoLL; emCvDimLL=ecv.dimLL; }
      }
    }
  }
  return {estEffect,sdi,logr,ciSpread,piSpread,ciSep,piSep,deltaAICc,deltaBIC,deltaCV,gmmDeltaBIC,componentSep,gmmGap,gmmSpread,gmmLLGain,gmmLL1,gmmLL2,gmmSigma2,supDeltaBIC,supSep,supGap,supSpread,supLLGain,supLL1,supLL2,supSigma2,emDeltaAICc,emDeltaCV,maleAccuracy,femaleAccuracy,
    aiccLLMono,aiccLLDim,aiccSigma2Mono,cvMonoLL,cvDimLL,emAiccLLMono,emAiccLLDim,emAiccSigma2Mono,emCvMonoLL,emCvDimLL,
    lFit,sFit,lAges,lLens,sAges,sLens};
}

// --- Run scenario -------------------------------------------------------------
// Full per-step statistic bundle for a metric's reps: mean, sd, n, median, and quartiles,
// flattened under a prefix so a config can reference prefix_mean / _sd / _n / _med / _q1 / _q3.
const t95 = n => Math.max(tCritical(Math.max((n||2)-1, 1), 0.95), 1.959964);  // two-sided 95% t critical value, n-1 df
function statBundle(prefix, arr){
  if(!arr||!arr.length) return {[prefix+"_mean"]:NaN,[prefix+"_sd"]:NaN,[prefix+"_n"]:0,[prefix+"_med"]:NaN,[prefix+"_q1"]:NaN,[prefix+"_q3"]:NaN};
  const n=arr.length, m=arr.reduce((a,b)=>a+b,0)/n;
  const s=Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/Math.max(n-1,1));
  const sorted=[...arr].sort((a,b)=>a-b);
  const q=p=>{const pos=(n-1)*p,b=Math.floor(pos),r=pos-b;return sorted[b+1]!==undefined?sorted[b]+r*(sorted[b+1]-sorted[b]):sorted[b];};
  return {[prefix+"_mean"]:m,[prefix+"_sd"]:s,[prefix+"_n"]:n,[prefix+"_med"]:q(0.5),[prefix+"_q1"]:q(0.25),[prefix+"_q3"]:q(0.75)};
}

}

// --- SNR helpers --------------------------------------------------------------
function computeSNR(effectSize,sdMult){
  const fLinf=2.78, mLinf=2.78+effectSize;
  const fSD=alligSD(fLinf,sdMult), mSD=alligSD(mLinf,sdMult);
  if(effectSize===0) return Infinity;
  return effectSize/((fSD+mSD)/2);
}

    const median = arr => { if(!arr.length)return NaN; const s=[...arr].sort((a,b)=>a-b); const h=Math.floor(s.length/2); return s.length%2?s[h]:(s[h-1]+s[h])/2; };
    results.push({

const NATURAL_E = 1.01;
const NATURAL_SD_MULT = 1.0;
const N_STEPS = 20;

// --- Trends Panel -------------------------------------------------------------

function linSlope(xs, ys) {
  const valid = xs.map((x, i) => [x, ys[i]]).filter(([x, y]) => isFinite(x) && isFinite(y) && y != null);
  if (valid.length < 3) return NaN;
  const n  = valid.length;
  const mx = valid.reduce((s, [x]) => s + x, 0) / n;
  const my = valid.reduce((s, [, y]) => s + y, 0) / n;
  const num = valid.reduce((s, [x, y]) => s + (x - mx) * (y - my), 0);
  const den = valid.reduce((s, [x]) => s + (x - mx) ** 2, 0);
  return den === 0 ? 0 : num / den;
}

// --- Shared textbook-style display helpers (formulas on their own lines) ----------
// Eq: a single formula/calculation on its own line, monospaced and set off from prose.
function Eq({ children }) {
  return (
    <div style={{ fontFamily:"'Courier New',monospace", fontSize:"12.5px", color:"#1c2b3a",
      background:"#f4f1e8", border:"1px solid #ddd4be", borderRadius:"3px",
      padding:"6px 12px", margin:"6px 0 6px 0", whiteSpace:"pre-wrap", lineHeight:1.5 }}>
      {children}
    </div>
  );
}
// Where: a compact symbol-definition list ("where: X = ...; Y = ...") under a formula.
function Where({ items }) {
  return (
    <div style={{ margin:"2px 0 8px 14px", fontSize:"11px", color:"#5a4a2a", lineHeight:1.6 }}>
      {items.map((it, i) => (
        <div key={i}><span style={{ fontFamily:"'Courier New',monospace", fontWeight:"bold", color:"#1c2b3a" }}>{it.sym}</span> = {it.def}</div>
      ))}
    </div>
  );
}

function TrendsPanel({ dimResults, varResults, snrResults, naturalE, yScale, effectMetric }) {
  // Note: the bar chart shows normalised slopes in [-1,1]. The global y-scale toggle IS applied
  // (via trendScaler below); on log it auto-falls-back to signed-log since slopes can be negative.
  // since the values are already dimensionless and the normalisation removes the need for compression.
  const dimClean = (dimResults || []).filter(Boolean);
  // For the noise-swept scenarios, drop the zero-noise step: at sdMult=0 all residuals are ~0, which
  // makes the supervised ΔBIC / Cohen's d degenerate (huge finite outliers) and would wreck the slope.
  const varClean = (varResults || []).filter(Boolean).filter(d => (d.x == null ? true : d.x >= 0.05));
  const snr3     = [...(snrResults || []).filter(Boolean)].filter(d => (d.sdMult == null ? true : d.sdMult >= 0.05)).sort((a, b) => a.sdMult - b.sdMult);

  const dimX = dimClean.map((_, i) => i / Math.max(dimClean.length - 1, 1));
  const varX = varClean.map((_, i) => i / Math.max(varClean.length - 1, 1));
  const snrX = snr3.map((_, i) => i / Math.max(snr3.length - 1, 1));

  // evid = sign convention for "more evidence of dimorphism":
  //   +1 = a MORE POSITIVE value means more evidence (effect size, separations, Cohen's d, CV gain)
  //   -1 = a MORE NEGATIVE value means more evidence (ΔAICc and ΔBIC: negative favours the two-curve model)
  // The Est. Effect row tracks the effect-metric toggle (Raw L∞ diff / SDI / Log-ratio).
  const effId = effectMetric === "sdi" ? "sdi_mean" : effectMetric === "logr" ? "logr_mean" : "estEffect_mean";
  const effLabel = effectMetric === "sdi" ? "Est. Effect (SDI)" : effectMetric === "logr" ? "Est. Effect (log-r)" : "Est. Effect (raw)";
  const metrics = [
    { id: effId,                label: effLabel,          evid: +1 },
    { id: "piSep_mean",         label: "PI Sep",          evid: +1 },
    { id: "ciSep_mean",         label: "CI Sep",          evid: +1 },
    { id: "deltaAICc_mean",     label: "ΔAICc (sup)",     evid: -1 },
    { id: "emDeltaAICc_med",    label: "ΔAICc (unsup)",   evid: -1 },
    { id: "deltaCV_mean",       label: "CV ΔLL (sup)",    evid: +1 },
    { id: "emDeltaCV_med",      label: "CV ΔLL (unsup)",  evid: +1 },
    { id: "supSep_mean",        label: "Cohen d (sup)",   evid: +1 },
    { id: "componentSep_mean",  label: "Cohen d (unsup)", evid: +1 },
    { id: "supDeltaBIC_mean",   label: "ΔBIC (sup)",      evid: -1 },
    { id: "gmmDeltaBIC_mean",   label: "ΔBIC (unsup)",    evid: -1 },
  ];

  const slopes = metrics.map(m => ({
    ...m,
    s1: linSlope(dimX, dimClean.map(d => d[m.id])),
    s2: linSlope(varX, varClean.map(d => d[m.id])),
    s3: linSlope(snrX, snr3.map(d => d[m.id])),
  }));

  const normSlopes = slopes.map(s => {
    const maxAbs = Math.max(Math.abs(s.s1)||0, Math.abs(s.s2)||0, Math.abs(s.s3)||0) || 1;
    return { ...s, n1: s.s1/maxAbs, n2: s.s2/maxAbs, n3: s.s3/maxAbs };
  });

  const chartDataRaw = normSlopes.map(s => ({
    name: s.label,
    "Sc.1":  isFinite(s.n1) ? +s.n1.toFixed(3) : 0,
    "Sc.2":  isFinite(s.n2) ? +s.n2.toFixed(3) : 0,
    "Sc.3":  isFinite(s.n3) ? +s.n3.toFixed(3) : 0,
    raw1: isFinite(s.s1) ? +s.s1.toFixed(4) : 0,
    raw2: isFinite(s.s2) ? +s.s2.toFixed(4) : 0,
    raw3: isFinite(s.s3) ? +s.s3.toFixed(4) : 0,
  }));

  // Honor the global y-axis scale toggle. Normalised slopes span [-1, 1] (with negatives), so a
  // plain "log" auto-falls-back to signed-log inside makeScaler. We transform the three plotted
  // bar values; the raw* fields (shown in tooltips) stay untransformed for reference.
  const trendScaler = makeScaler(yScale, chartDataRaw.flatMap(d => [d["Sc.1"], d["Sc.2"], d["Sc.3"], -1, 1]));
  const chartData = chartDataRaw.map(d => ({
    ...d,
    "Sc.1": trendScaler.transform(d["Sc.1"]),
    "Sc.2": trendScaler.transform(d["Sc.2"]),
    "Sc.3": trendScaler.transform(d["Sc.3"]),
  }));
  const trendTicksRaw = [-1, -0.5, 0, 0.5, 1];
  const trendTicks = trendTicksRaw.map(t => trendScaler.transform(t)).filter(v => v != null && isFinite(v));
  const trendTop = trendTicks.length ? trendTicks[trendTicks.length-1] : 1;
  const trendBot = trendTicks.length ? trendTicks[0] : -1;
  const trendPad = Math.abs(trendTop - trendBot) * 0.05 || 0.1;
  const trendDomain = trendTicks.length >= 2
    ? [trendTicks[0] - trendPad, trendTicks[trendTicks.length-1] + trendPad]
    : [trendScaler.transform(-1), trendScaler.transform(1)];

  return (
    <div>
      <div style={{
        background: "#1c2b3a", color: "#e8dfc8",
        padding: "22px 28px", marginBottom: "20px",
        fontSize: "13px", lineHeight: 1.85,
      }}>
        <div style={{ fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase", color: "#c8a96e", marginBottom: "10px" }}>
          The Saitta Comparative Framework -- Trends, Not Thresholds
        </div>
        <p style={{margin:"0 0 10px",color:"#ddd8cc"}}>
          Saitta et al. (p. 244) argue that the fundamental question in fossil dimorphism research should not be
          "is this species dimorphic?" -- a binary question that significance testing answers poorly -- but rather
          "which datasets show the strongest evidence of sexual variation relative to others?" This reframing
          shifts the analysis from hypothesis testing to <strong style={{color:"#e8dfc8"}}>effect size estimation and comparison across datasets</strong>.
        </p>
        <p style={{margin:"0 0 10px",color:"#ddd8cc"}}>
          This panel operationalises that argument. For each diagnostic metric, we compute the
          <strong style={{color:"#e8dfc8"}}> linear regression slope</strong> of the metric's mean value across its gradient --
          i.e., how fast does the metric change per unit of the x-axis? A steep slope means the metric responds
          strongly to changes in the underlying variable. A flat slope means it does not. The four model-comparison
          metrics (ΔAICc, CV ΔLL, Cohen's d, ΔBIC) each appear TWICE — once for the supervised residual sign-split
          grouping <em>(sup)</em> and once for the unsupervised EM/GMM grouping <em>(unsup)</em> — so you can see
          whether the grouping choice changes how each responds across scenarios.
        </p>
        <p style={{margin:"0 0 10px",color:"#ddd8cc"}}>
          Because metrics have very different units and magnitudes, slopes are
          <strong style={{color:"#e8dfc8"}}> normalised within each metric</strong>: the largest absolute slope across
          all three scenarios is set to ±1, and the other two are expressed relative to it. This lets you visually
          compare which metrics are most sensitive to dimorphism (Sc.1) vs noise (Sc.2) vs the mixed case (Sc.3),
          regardless of the metric's physical units.
        </p>
        <p style={{margin:"0",color:"#ddd8cc"}}>
          <strong style={{color:"#e8dfc8"}}>What to look for:</strong> The ideal diagnostic metric has (a) a large Sc.1 slope
          (responds strongly to true dimorphism), (b) a near-zero or opposite-sign Sc.2 slope (does not respond
          to noise alone), and (c) a Sc.3 slope that falls between Sc.1 and Sc.2 (degrades gracefully as noise
          rises). The Sc.1/Sc.2 ratio in the raw slopes table quantifies discriminative power -- and
          <strong style={{color:"#e8dfc8"}}> PI Separation is the only metric expected to produce an opposite-sign ratio</strong>,
          because it increases with true dimorphism (Sc.1) and decreases with noise (Sc.2).
        </p>
      </div>

      {/* Bar chart */}
      <div style={{ background: "#fff", border: "1px solid #d4c9b0", padding: "20px", marginBottom: "20px" }}>
        <div style={{ fontSize: "14px", fontWeight: "bold", color: "#1c2b3a", marginBottom: "4px" }}>
          Normalised Gradient Slopes by Metric and Scenario
        </div>
        <div style={{ fontSize: "10px", color: "#8a7a5a", fontStyle: "italic", marginBottom: "14px" }}>
          Each bar = slope / max(|slopes|) for that metric. Bar above zero = metric increases along gradient; below zero = decreases. Sc.1 x-axis: effect size. Sc.2/3 x-axis: SD multiplier.
        </div>
        <ResponsiveContainer width="100%" height={360}>
          <BarChart data={chartData} margin={{ top: 8, right: 20, left: 20, bottom: 70 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />

            <YAxis domain={trendDomain} ticks={trendTicks} tickFormatter={trendScaler.tickFmt} tick={{ fontSize: 9 }}
              label={{ value: "Normalised slope (regression slope of the mean curve — a trend summary, not a per-rep mean/median)", angle: -90, position: "insideLeft",
                style: { fontSize: "10px", fill: "#5a4a2a", textAnchor: "middle" } }} />

          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Observed trend directions table */}
      <div style={{ background: "#fff", border: "1px solid #d4c9b0", padding: "20px", marginBottom: "20px", overflowX: "auto" }}>
        <div style={{ fontSize: "13px", fontWeight: "bold", color: "#1c2b3a", marginBottom: "4px" }}>
          Observed Trend Directions
        </div>
        <div style={{ fontSize: "10px", color: "#8a7a5a", fontStyle: "italic", marginBottom: "10px" }}>
          The direction each metric's mean actually moves across each scenario's gradient, measured from this run's regression slopes: ↑ rises, ↓ falls, → flat (when |slope| is very small relative to the metric), -- when undefined. Read these as what the data did, and compare directions across the three scenarios.
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
          <thead>
            <tr style={{ background: "#1c2b3a", color: "#e8dfc8" }}>
              {["Metric","Sc.1 (↑ dimorphism)","Sc.2 (↑ noise, E=0)","Sc.3 (↑ noise, E=natural)"].map((h, i) => (
                <th key={i} style={{ padding: "8px 10px", textAlign: i===0?"left":"center", fontWeight: "normal",

            {slopes.map((s, i) => {
              const dir = v => !isFinite(v) ? "--" : Math.abs(v) < 1e-4 ? "→ flat" : v > 0 ? "↑ rises" : "↓ falls";
              const dcol = v => !isFinite(v) ? "#999" : Math.abs(v) < 1e-4 ? "#8a7a5a" : v > 0 ? "#1a6a1a" : "#a63a3a";

                  <td style={{ padding:"7px 10px", textAlign:"center", color:dcol(s.s1), fontWeight:"bold" }}>{dir(s.s1)}</td>

              );
            })}
          </tbody>
        </table>
      </div>

      {/* Raw slopes + discrimination table */}
      <div style={{ background: "#fff", border: "1px solid #d4c9b0", padding: "20px" }}>
        <div style={{ fontSize: "13px", fontWeight: "bold", color: "#1c2b3a", marginBottom: "10px" }}>
          Raw Slopes and Signal-vs-Noise Discrimination
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
          <thead>
            <tr style={{ background: "#f0ece2" }}>
              {["Metric","Evid. dir.","Sc.1 slope","Sc.2 slope","Sc.3 slope","Signal g₁","Noise g₂","Discrimination D = g₁−g₂"].map(h => (
                <th key={h} style={{ padding:"6px 10px", textAlign:h==="Metric"?"left":"right", fontWeight:"bold" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {slopes.map((s, i) => {
              // Discrimination = how well a metric tells REAL dimorphism (Sc.1) from PURE NOISE (Sc.2),
              // measured in EVIDENCE-ORIENTED units so the sign convention of each metric is handled
              // correctly. Steps:
              //  1. ev = +1 if a more-positive value means more dimorphism evidence, -1 if more-negative
              //     does (ΔAICc, ΔBIC). Multiplying a slope by ev re-expresses it as "movement toward more
              //     dimorphism evidence", so all metrics become directly comparable in sign.
              //  2. m = max(|s1|,|s2|,|s3|) puts each metric on a common [-1,1] scale (raw slopes differ by
              //     orders of magnitude: ΔAICc ~ -180 vs PI Sep ~ 0.2).
              //  3. g1 = ev*s1/m = signal response (Sc.1, dimorphism rising): want LARGE POSITIVE.
              //     g2 = ev*s2/m = noise response (Sc.2, noise rising at E=0): want <= 0. A POSITIVE g2 is
              //     bad -- pure noise is pushing the metric toward a false dimorphism signal.
              //  4. D = g1 - g2. Rewards responding to real signal AND penalises being fooled by noise.
              //     Range -2..+2. PI Sep scores highest because noise pushes it the OPPOSITE way (g2 < 0).
              // Sc.2 (not Sc.3) is the noise reference: Sc.2 has NO dimorphism, so any evidence-direction
              // response to it is a pure false positive. Sc.3 mixes real signal with rising noise, so it
              // measures noise-ROBUSTNESS (signal degradation), a different question; its slope is shown
              // for transparency but is not used in D.
              const ev = s.evid || 1;
              const maxAbs = Math.max(Math.abs(s.s1)||0, Math.abs(s.s2)||0, Math.abs(s.s3)||0) || 1;
              const g1 = isFinite(s.s1) ? ev*s.s1/maxAbs : NaN;
              const g2 = isFinite(s.s2) ? ev*s.s2/maxAbs : NaN;
              const D = (isFinite(g1) && isFinite(g2)) ? g1 - g2 : NaN;
              const noiseFalsePos = isFinite(g2) && g2 > 0.1;   // noise pushes toward false dimorphism
              const rating = !isFinite(D) ? "--"
                : D > 1.1 ? "★★★ Strong"
                : D > 0.9 ? "★★ Good"
                : D > 0.6 ? "★ Moderate"
                : D > 0.3 ? "~ Weak"
                :           "✗ Poor";
              const qColor = rating.startsWith("★★★")?"#1a6a1a":rating.startsWith("★★")?"#2a6496":rating.startsWith("★")?"#8a6a2a":rating.startsWith("~")?"#8a6a2a":rating==="--"?"#999":"#a63a3a";
              return (
                <tr key={i} style={{ background:i%2===0?"#faf8f4":"#fff" }}>
                  <td style={{ padding:"5px 10px", fontWeight:"bold" }}>{s.label}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", color:"#5a4a2a" }}>{ev>0?"+ (higher)":"− (lower)"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", color:"#2a6496" }}>{isFinite(s.s1)?s.s1.toFixed(3):"--"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", color:"#a63a3a" }}>{isFinite(s.s2)?s.s2.toFixed(3):"--"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", color:"#2a7a4a" }}>{isFinite(s.s3)?s.s3.toFixed(3):"--"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right" }}>{isFinite(g1)?g1.toFixed(2):"--"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", color:noiseFalsePos?"#a63a3a":"#3a3a3a", fontWeight:noiseFalsePos?"bold":"normal" }}>{isFinite(g2)?g2.toFixed(2):"--"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", fontWeight:"bold", color:qColor }}>{isFinite(D)?D.toFixed(2)+"  "+rating:"--"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{ marginTop:"12px", fontSize:"11px", color:"#3a3a3a", lineHeight:1.6 }}>
          <div style={{fontWeight:"bold",color:"#1c2b3a",fontSize:"12px",marginBottom:"6px"}}>Discrimination — definition</div>
          <div style={{marginBottom:"4px"}}>Step 1. For each metric, fit a least-squares line of (metric mean) vs (step index rescaled to 0→1) in each scenario:</div>
          <Eq>{`s₁ = slope over Sc.1   (dimorphism rising, noise fixed)     → real signal
s₂ = slope over Sc.2   (noise rising, dimorphism = 0)      → pure noise
s₃ = slope over Sc.3   (noise rising, dimorphism = natural) → shown for reference only`}</Eq>
          <div style={{marginBottom:"4px"}}>Step 2. Re-express each slope as movement <em>toward more evidence of dimorphism</em>, and put all metrics on a common scale:</div>
          <Eq>{`ev = +1 if a higher value means more dimorphism evidence
   = −1 if a lower value means more dimorphism evidence (ΔAICc, ΔBIC)
m  = max(|s₁|, |s₂|, |s₃|)              (per-metric scale)
g₁ = ev · s₁ / m      (signal response, in evidence units)
g₂ = ev · s₂ / m      (noise  response, in evidence units)`}</Eq>
          <div style={{marginBottom:"4px"}}>Step 3. Discrimination is how much more the metric moves toward "dimorphism" under real signal than under pure noise:</div>
          <Eq>{`D = g₁ − g₂            (range −2 to +2; higher is better)`}</Eq>
          <Where items={[
            {sym:"ev", def:"the sign convention multiplier; see the Evid. dir. column. It is what makes ΔAICc/ΔBIC (where negative = evidence) comparable to the rest."},
            {sym:"g₁ > 0", def:"good — the metric moves toward more dimorphism evidence as real dimorphism grows"},
            {sym:"g₂ > 0", def:"BAD — pure noise alone pushes the metric toward a FALSE dimorphism signal (false positive; shown in red)"},
            {sym:"g₂ < 0", def:"good — noise pushes the metric the other way, toward the null"},
            {sym:"D = g₁ − g₂", def:"large when the metric responds to real signal AND is not fooled (or is pushed the opposite way) by noise"},
          ]}/>
          <div style={{marginBottom:"6px"}}>Why Sc.2 and not Sc.3 is the noise reference: Sc.2 has zero dimorphism, so any evidence-direction response to it is a pure false positive — exactly what discrimination must penalise. Sc.3 contains real dimorphism plus rising noise, so its slope measures noise-<em>robustness</em> (how fast a real signal degrades), a different question; it is displayed but not used in D.</div>
          <div>Rating: ★★★ if D &gt; 1.1; ★★ if 0.9–1.1; ★ if 0.6–0.9; ~ if 0.3–0.6; ✗ if &lt; 0.3.</div>
          <div style={{marginTop:"8px",padding:"8px 12px",background:"#fdf3e3",borderLeft:"3px solid #c8a96e",fontSize:"11px"}}>
            <strong>Not the same as SNR (SNR Analysis panel).</strong> Different quantity, different formula:
            <Eq>{`D   = g₁ − g₂     (this panel: a metric's evidence-direction slope response, unitless)
SNR = E / mean_SD (SNR panel: the data itself, metres ÷ metres)`}</Eq>
            This panel asks whether a metric <em>reacts</em> differently to real signal vs pure noise. The SNR panel measures how large the signal <em>is</em> relative to noise in the data. They share no inputs.
          </div>
        </div>
      </div>
    </div>
  );
}


function SNRPanel({ snrResults, dimResults, varResults, naturalE, effectMetric, yScale, bandType }) {
  const useMed = bandType === "iqr";
  const effBase = effectMetric === "sdi" ? "sdi" : effectMetric === "logr" ? "logr" : "estEffect";
  const ctr = base => useMed ? base + "_med" : base + "_mean";
  const bandOf = (d, base) => {
    if (!bandType || bandType === "none") return undefined;
    if (bandType === "iqr") { const q1 = d[base + "_q1"], q3 = d[base + "_q3"]; return (isFinite(q1) && isFinite(q3)) ? [q1, q3] : undefined; }
    const sd = d[base + "_sd"]; if (!isFinite(sd)) return undefined;
    const se = sd / Math.sqrt(d[base + "_n"] || 1), c = d[ctr(base)];
    const half = bandType === "sd" ? sd : bandType === "se" ? se : t95(d[base + "_n"]) * se;
    return isFinite(c) ? [c - half, c + half] : undefined;
  };
  const metricMap = {
    raw:  { key:ctr("estEffect"), label:"Est. L∞ diff (m)", trueVal:naturalE },
    sdi:  { key:ctr("sdi"),       label:"SDI",              trueVal:(2.78+naturalE)/2.78-1 },
    logr: { key:ctr("logr"),      label:"Log-ratio",        trueVal:Math.log((2.78+naturalE)/2.78) },
  };
  const mc = metricMap[effectMetric];
  const trueDimMetric = E => effectMetric==="raw"?E:effectMetric==="sdi"?(2.78+E)/2.78-1:Math.log((2.78+E)/2.78);

  const snrClean = (snrResults||[]).filter(Boolean);
  const dimClean = (dimResults||[]).filter(Boolean);

  const sc3Data = snrClean
    .filter(d=>isFinite(d.snr)&&d.snr>0&&d.snr<20)
    .map(d=>({ snr:+d.snr.toFixed(3), est:+d[mc.key].toFixed(4),
      ciSpread:+d[ctr("ciSpread")].toFixed(4), piSpread:+d[ctr("piSpread")].toFixed(4),
      ciSep:+d[ctr("ciSep")].toFixed(4), piSep:+d[ctr("piSep")].toFixed(4), sdMult:+d.sdMult.toFixed(2),
      estBand:bandOf(d,effBase), ciSpreadBand:bandOf(d,"ciSpread"), piSpreadBand:bandOf(d,"piSpread"), ciSepBand:bandOf(d,"ciSep"), piSepBand:bandOf(d,"piSep") }))
    .sort((a,b)=>a.snr-b.snr);

  const sc1_snr = dimClean
    .filter(d=>isFinite(d.snr)&&d.snr>0&&d.snr<20)
    .map(d=>({ snr:+d.snr.toFixed(3), est:+d[mc.key].toFixed(4),
      true_val:+trueDimMetric(d.x).toFixed(4),
      ciSpread:+d[ctr("ciSpread")].toFixed(4), piSpread:+d[ctr("piSpread")].toFixed(4),
      ciSep:+d[ctr("ciSep")].toFixed(4), piSep:+d[ctr("piSep")].toFixed(4),
      estBand:bandOf(d,effBase), ciSpreadBand:bandOf(d,"ciSpread"), piSpreadBand:bandOf(d,"piSpread"), ciSepBand:bandOf(d,"ciSep"), piSepBand:bandOf(d,"piSep") }))
    .sort((a,b)=>a.snr-b.snr);

  // Build the y-scaler from the full pooled value range across both scenarios (incl. band bounds).
  const bandVals = d => [...(d.estBand||[]),...(d.ciSepBand||[]),...(d.piSepBand||[]),...(d.ciSpreadBand||[]),...(d.piSpreadBand||[])];
  const allY = [...sc1_snr.flatMap(d=>[d.est,d.true_val,d.ciSep,d.piSep,d.ciSpread,d.piSpread,...bandVals(d)]),
    ...sc3Data.flatMap(d=>[d.est,d.ciSep,d.piSep,d.ciSpread,d.piSpread,...bandVals(d)])]
    .filter(v=>v!=null&&isFinite(v));
  const scaler = makeScaler(yScale, allY);

  // Build each scenario as its OWN native series (no union-grid resampling / nearest-snapping,
  // which previously produced a stair-step "undulation" artifact). Each line carries its real
  // (snr, value) points; recharts plots two lines with different x-grids on a shared numeric axis.
  const txBand = b => b ? [scaler.transform(b[0]), scaler.transform(b[1])] : undefined;
  const txRow = d => ({ snr:d.snr,
    est:scaler.transform(d.est), true_val:d.true_val!=null?scaler.transform(d.true_val):undefined,
    ciSep:scaler.transform(d.ciSep), piSep:scaler.transform(d.piSep),
    ciSpread:scaler.transform(d.ciSpread), piSpread:scaler.transform(d.piSpread),
    estBand:txBand(d.estBand), ciSepBand:txBand(d.ciSepBand), piSepBand:txBand(d.piSepBand),
    ciSpreadBand:txBand(d.ciSpreadBand), piSpreadBand:txBand(d.piSpreadBand) });
  const sc1T = sc1_snr.map(txRow);
  const sc3T = sc3Data.map(txRow);

  const makeYP = (keys, labelText) => {
    const labelObj = labelText ? {label:{value:labelText,angle:-90,position:"insideLeft",
      style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}} : {};
    const vals=[...sc1T,...sc3T].flatMap(d=>keys.map(k=>d[k])).filter(v=>v!=null&&isFinite(v));
    if(!vals.length) return {tick:{fontSize:9},width:58,...labelObj};
    const tks=niceTicks(Math.min(...vals),Math.max(...vals),5);
    const pad=(tks[tks.length-1]-tks[0])*0.08||0.1;
    return {domain:[tks[0]-pad,tks[tks.length-1]+pad],ticks:tks,tickFormatter:scaler.tickFmt,tick:{fontSize:9},width:58,...labelObj};
  };
  const unit = effectMetric==="raw"?"m":effectMetric==="sdi"?"SDI":"log-ratio";
  const yEst=makeYP(["est","true_val"], `Estimated effect (${unit}) — ${useMed?"median":"mean"} across reps`);
  const yCiSep=makeYP(["ciSep"], "CI separation (m) " + (useMed?"median":"mean") + " across reps");
  const yPiSep=makeYP(["piSep"], "PI separation (m) " + (useMed?"median":"mean") + " across reps");
  const ySpread=makeYP(["ciSpread","piSpread"], "Interval spread (m) " + (useMed?"median":"mean") + " across reps");

  const zero0=scaler.transform(0);
  const showZero=zero0!=null&&isFinite(zero0);
  const tt={fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"};
  const leg={fontSize:"11px",fontFamily:"Georgia,serif",paddingTop:"6px"};
  const tfmt=(v,n)=>{const raw=scaler.untransform(v);return[isFinite(raw)?raw.toFixed(3):String(v),n];};
  const allSnrVals=[...sc1T.map(d=>d.snr),...sc3T.map(d=>d.snr)];
  const snrLo=allSnrVals.length?Math.min(...allSnrVals):0;
  const snrHi=allSnrVals.length?Math.max(...allSnrVals):20;
  const xP={dataKey:"snr",type:"number",domain:[Math.floor(snrLo*0.9*10)/10, Math.ceil(snrHi*1.02)],
    allowDuplicatedCategory:false,
    label:{value:"SNR (signal / noise)",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}},
    tick:{fontSize:10},tickFormatter:v=>niceFmt(v)};

  // Shared chart margin
  const cm = {top:8,right:14,left:18,bottom:30};

  return (
    <div>
      <div style={{background:"#f0f4f8",border:"1px solid #8aabcc",borderLeft:"4px solid #2a6496",padding:"18px 22px",marginBottom:"18px",fontSize:"13px",color:"#1a3a5a",lineHeight:1.85}}>
        <div style={{fontSize:"12px",letterSpacing:"2px",textTransform:"uppercase",color:"#2a6496",marginBottom:"10px"}}>SNR Analysis — Signal vs. Noise on a Common Axis</div>
        <div style={{margin:"0 0 6px"}}>
          SNR here is computed entirely from the <strong>TRUE generating values</strong> — the exact parameters used to
          create the synthetic data — <em>not</em> from anything fitted to the data. Because this is a simulation we know
          those true values; a real study never would. There is no curve-fitting and no regression in this quantity:
        </div>
        <Eq>{`signal  = E_true       = male L∞_true − female L∞_true         (metres)
noise   = mean_SD_true = (SD_female_true + SD_male_true) / 2   (metres)
SD_sex_true            = sdMult · (0.0589 · ln(L∞_sex_true) + 0.0816)
SNR     = E_true / mean_SD_true                                (dimensionless)`}</Eq>
        <Where items={[

D   = g₁ − g₂       (Trend panel: a metric's evidence-direction slope response, unitless)`}</Eq>

// --- Sexing Accuracy Panel ----------------------------------------------------
// Foundational diagnostic: how well does Saitta's residual-sign rule recover TRUE sex?
// This is upstream of every other metric (all are computed from the groups it produces).
// Three plots, one per scenario, because the behaviour is qualitatively different in each.
function SexingAccuracyPanel({ dimResults, varResults, snrResults, naturalE, yScale, bandType, onStepClick }) {
  const useMed = bandType === "iqr";
  // Build per-scenario rows of {x (in scenario-native units), male%, female%, overall%}.
  // Each row also carries the click metadata (effectSize, sdMult, scenario) so a click can open the
  // Growth Curves popup for that exact step, matching the behaviour of the metric panels.
  // dropZeroNoise: for the noise-swept scenarios (Sc.2/Sc.3), exclude the zero-noise step.
  // At exactly zero noise with no scatter, specimens sit perfectly on the curve so residuals
  // are exactly 0; the "residual > 0" rule then dumps everyone into the smaller group, giving
  // a degenerate ~6%/94% split that is an artifact of tie-breaking, not a meaningful accuracy.
  // The noise level is the x-value here (sdMult), so we filter on xFn(d) directly.
  const accBand = (c, sd, n, q1, q3) => {
    if (!bandType || bandType === "none") return undefined;
    if (bandType === "iqr") return (isFinite(q1) && isFinite(q3)) ? [q1, q3] : undefined;
    if (!isFinite(sd)) return undefined;
    const se = sd / Math.sqrt(n || 1);
    const half = bandType === "sd" ? sd : bandType === "se" ? se : t95(n) * se;
    return [c - half, c + half];
  };
  const buildRows = (results, xFn, scenario, metaFn, dropZeroNoise=false) => (results || []).filter(Boolean)
    .filter(d => isFinite(d.maleAccuracy_mean) && isFinite(d.femaleAccuracy_mean))
    .map(d => {
      const meta = metaFn(d);
      const mC = useMed ? d.maleAccuracy_med : d.maleAccuracy_mean;
      const fC = useMed ? d.femaleAccuracy_med : d.femaleAccuracy_mean;
      return {
        x: +xFn(d).toFixed(2),
        male:   +mC.toFixed(1),
        female: +fC.toFixed(1),
        overall: +(((mC + fC) / 2)).toFixed(1),
        maleBand: accBand(d.maleAccuracy_mean, d.maleAccuracy_sd, d.maleAccuracy_n, d.maleAccuracy_q1, d.maleAccuracy_q3),
        femaleBand: accBand(d.femaleAccuracy_mean, d.femaleAccuracy_sd, d.femaleAccuracy_n, d.femaleAccuracy_q1, d.femaleAccuracy_q3),
        effectSize: meta.effectSize, sdMult: meta.sdMult, scenario,
      };
    })
    .filter(row => !dropZeroNoise || row.x >= 0.05);

  // Sc.1: dimorphism rises (E = step), noise fixed at natural (sdMult = 1).
  const sc1 = buildRows(dimResults, d => d.x / naturalE, "dimorphism", d => ({ effectSize: d.x, sdMult: 1 }));
  // Sc.2: noise rises (sdMult = step), no dimorphism (E = 0).
  const sc2 = buildRows(varResults, d => d.x, "variance", d => ({ effectSize: 0, sdMult: d.x }), true);
  // Sc.3: noise rises (sdMult = step), dimorphism fixed at natural (E = naturalE).
  const sc3 = buildRows(snrResults, d => (d.sdMult != null ? d.sdMult : d.x), "snr", d => ({ effectSize: naturalE, sdMult: (d.sdMult != null ? d.sdMult : d.x) }), true);

  // Honor the global y-axis scale toggle. Accuracy is a percentage (40-100 plus the 50% line),
  // so build the scaler over those values, transform each series, and label ticks with true %.
  const allAcc = [...sc1, ...sc2, ...sc3].flatMap(r => [r.male, r.female, r.overall, 50, 40, 100, ...(r.maleBand||[]), ...(r.femaleBand||[])]).filter(v => isFinite(v));
  const scaler = makeScaler(yScale, allAcc);
  const txform = rows => rows.map(r => ({ x: r.x, male: scaler.transform(r.male), female: scaler.transform(r.female), overall: scaler.transform(r.overall), maleBand: r.maleBand ? [scaler.transform(r.maleBand[0]), scaler.transform(r.maleBand[1])] : undefined, femaleBand: r.femaleBand ? [scaler.transform(r.femaleBand[0]), scaler.transform(r.femaleBand[1])] : undefined, effectSize: r.effectSize, sdMult: r.sdMult, scenario: r.scenario }));
  const sc1T = txform(sc1), sc2T = txform(sc2), sc3T = txform(sc3);
  const accTicksRaw = [40, 50, 60, 70, 80, 90, 100];
  const accTicks = accTicksRaw.map(t => scaler.transform(t)).filter(v => v != null && isFinite(v));
  const accDomain = accTicks.length >= 2 ? [accTicks[0], accTicks[accTicks.length-1]] : [scaler.transform(40), scaler.transform(100)];

  const chartMargin = { top: 18, right: 20, left: 14, bottom: 34 };
  const tt = { fontFamily: "Georgia,serif", fontSize: "11px", border: "1px solid #d4c9b0" };
  const leg = { fontSize: "11px", fontFamily: "Georgia,serif", paddingTop: "8px" };

  // Shared y-axis: accuracy is a percentage; 50% = chance. Ticks transformed; labels show true %.
  const yProps = {
    domain: accDomain, ticks: accTicks,
    tickFormatter: v => scaler.tickFmt(v) + "%", tick: { fontSize: 10 }, width: 52,
    label: { value: "Sex-assignment accuracy (" + (useMed ? "median" : "mean") + ")", angle: -90, position: "insideLeft",
      style: { fontSize: "10px", fill: "#5a4a2a", textAnchor: "middle" } },
  };

  const handleClick = (chartData) => {
    if (!onStepClick || !chartData?.activePayload) return;
    const pt = chartData.activePayload[0]?.payload;
    if (!pt || pt.effectSize == null) return;
    onStepClick({ effectSize: pt.effectSize, sdMult: pt.sdMult, scenario: pt.scenario, xVal: pt.x });
  };

  const renderChart = (rows, xLabel, xDomain, xTicks, xFmt, color, title, subtitle) => (
    <div style={{ background: "#fff", border: "1px solid #d4c9b0", padding: "16px", marginBottom: "16px" }}>
      <div style={{ fontSize: "13px", fontWeight: "bold", color: "#1c2b3a", marginBottom: "2px" }}>{title}</div>
      <div style={{ fontSize: "10px", color: "#8a7a5a", fontStyle: "italic", marginBottom: "4px" }}>{subtitle}</div>
      {onStepClick && rows.length ? <div style={{fontSize:"9px",color:"#2a6496",marginBottom:"6px",fontStyle:"italic"}}>Click any data point to see the simulated growth curves at that step.</div> : null}
      {rows.length ? (
        <ResponsiveContainer width="100%" height={350}>
          <ComposedChart data={rows} margin={chartMargin} onClick={handleClick} style={{cursor:onStepClick?"pointer":"default"}}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
            <XAxis dataKey="x" type="number" domain={xDomain} ticks={xTicks} tickFormatter={xFmt}
              label={{ value: xLabel, position: "bottom", offset: -5, style: { fontSize: "11px", fill: "#5a4a2a" } }}
              tick={{ fontSize: 10 }} />
            <YAxis {...yProps} />
            <Tooltip formatter={(v, n) => [scaler.tickFmt(v) + "%", n]} contentStyle={tt} />
            <Legend wrapperStyle={leg} />
            <ReferenceLine y={scaler.transform(50)} stroke="#a63a3a" strokeDasharray="5 3"
              label={{ value: "50% = chance (no better than a coin flip)", position: "insideTopRight",
                fill: "#a63a3a", fontSize: 9, fontWeight: "bold", stroke: "#fff", strokeWidth: 3, paintOrder: "stroke" }} />
            {rows.some(d=>d.maleBand)&&<Area type="monotone" dataKey="maleBand" fill="#2a6496" fillOpacity={0.13} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls />}
            {rows.some(d=>d.femaleBand)&&<Area type="monotone" dataKey="femaleBand" fill="#a63a3a" fillOpacity={0.13} stroke="none" isAnimationActive={false} legendType="none" activeDot={false} tooltipType="none" connectNulls />}

  return (
    <div>
      <div style={{ background: "#f0f4f8", border: "1px solid #8aabcc", borderLeft: "4px solid #2a6496", padding: "18px 22px", marginBottom: "18px", fontSize: "13px", color: "#1a3a5a", lineHeight: 1.85 }}>
        <div style={{ fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase", color: "#2a6496", marginBottom: "10px" }}>Sexing Accuracy — How Well Does the Residual Rule Recover True Sex?</div>
        <p style={{ margin: "0 0 10px" }}>
