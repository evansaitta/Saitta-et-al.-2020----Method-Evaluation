// Robust boot: verify all UMD globals loaded before transpiling/running the app.
(function () {
  function missing() {
    var m = [];
    if (typeof React === "undefined") m.push("React");
    if (typeof ReactDOM === "undefined") m.push("ReactDOM");
    if (typeof Recharts === "undefined") m.push("Recharts");
    if (typeof Babel === "undefined") m.push("Babel");
    return m;
  }
  function showError(list) {
    var root = document.getElementById("root");
    root.innerHTML =
      '<div class="boot"><div class="err"><b>Could not load required libraries:</b> ' +
      list.join(", ") +
      '.<br><br>This page needs an internet connection the first time it runs ' +
      "(it pulls React and Recharts from a CDN). If you are offline or behind a " +
      "strict firewall, the libraries cannot download. Try again on a normal " +
      "connection, or open the page in a different browser.</div></div>";
  }
  var tries = 0;
  function boot() {
    var miss = missing();
    if (miss.length === 0) {
      try {
        var src = document.getElementById("app-source").textContent;
        var out = Babel.transform(src, { presets: ["react"] }).code;
        // eslint-disable-next-line no-eval
        (0, eval)(out);
      } catch (e) {
        var root = document.getElementById("root");
        root.innerHTML =
          '<div class="boot"><div class="err"><b>Error starting the simulator:</b><br>' +
          (e && e.message ? e.message : String(e)) + "</div></div>";
        if (window.console) console.error(e);
      }
      return;
    }
    if (tries++ > 100) { showError(miss); return; }
    setTimeout(boot, 100);
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>

<script type="text/plain" id="app-source">

const { useState, useCallback, useRef, useEffect } = React;
const {
  LineChart, Line, BarChart, Bar, ComposedChart, Area,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine
} = Recharts;


// Shared scale transform -- used by all panels for y-axis scale toggle
function makeScaler(yScale, allYVals) {
  const hasNonPos = allYVals.some(v => v <= 0);
  const effective = (yScale === "log" && hasNonPos) ? "signedLog" : (yScale || "linear");
  const slog = v => v === 0 ? 0 : Math.sign(v) * Math.log10(1 + Math.abs(v));
  const transform = v => {
    if (v == null || !isFinite(v)) return null;
    if (effective === "log")       return v > 0 ? Math.log10(v) : null;
    if (effective === "signedLog") return slog(v);
    return v;
  };
  const untransform = v => {
    if (effective === "log")       return Math.pow(10, v);
    if (effective === "signedLog") { const s = v < 0 ? -1 : 1; return s * (Math.pow(10, Math.abs(v)) - 1); }
    return v;
  };
  const tickFmt = v => niceFmt(untransform(v));
  return { effective, transform, untransform, tickFmt, fallback: effective !== yScale };
}
// Generates ~5 "nice" tick values for a [lo, hi] domain.
// "Nice" means multiples of 1, 2, 2.5, 5, 10, 20, 50... so ticks land on round numbers.
function niceTicks(lo, hi, targetCount = 5) {
  if (!isFinite(lo) || !isFinite(hi) || lo === hi) return [lo];
  // Anchor at 0 when all data is non-negative or non-positive
  const anchoredLo = lo >= 0 ? 0 : lo;
  const anchoredHi = hi <= 0 ? 0 : hi;
  const range = anchoredHi - anchoredLo;
  const roughStep = range / (targetCount - 1);
  const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(roughStep) || 1)));
  const normalized = roughStep / mag;
  const niceStep = normalized <= 1   ? 1   * mag
                 : normalized <= 2   ? 2   * mag
                 : normalized <= 2.5 ? 2.5 * mag
                 : normalized <= 5   ? 5   * mag
                 :                     10  * mag;
  const start = Math.ceil(anchoredLo  / niceStep) * niceStep;
  const end   = Math.floor(anchoredHi / niceStep) * niceStep;
  const ticks = [];
  for (let t = start; t <= end + niceStep * 0.001; t += niceStep) {
    ticks.push(+t.toPrecision(10));
  }
  return ticks.length >= 2 ? ticks : [anchoredLo, anchoredHi];
}

// Formats a number for a tick label: clean, no unnecessary decimals.
function niceFmt(v) {
  if (!isFinite(v) || v === null) return "";
  if (v === 0) return "0";
  const abs = Math.abs(v);
  const sign = v < 0 ? "-" : "";
  // Choose decimal places based on magnitude
  if (abs >= 1000)  return sign + (abs / 1000).toFixed(1) + "k";
  if (abs >= 100)   return sign + Math.round(abs).toString();
  if (abs >= 10)    return sign + abs.toFixed(1).replace(/\.0$/, "");
  if (abs >= 1)     return sign + abs.toFixed(1).replace(/\.0$/, "");
  if (abs >= 0.1)   return sign + abs.toFixed(2).replace(/0$/, "");
  if (abs >= 0.01)  return sign + abs.toFixed(3).replace(/0+$/, "");
  return sign + abs.toExponential(1);
}


// --- VB fitting via Gauss-Newton NLS (faithful to nls() in R) ---------------

function vbPredict(params, age) {
  const { Linf, K, t0 } = params;
  return Linf * (1 - Math.exp(-K * (age - t0)));
}

function fitVB(ages, lengths, maxIter = 200, tol = 1e-8) {
  // Starting values: Linf = max(lengths)*1.1, K=0.1, t0=0
  let Linf = Math.max(...lengths) * 1.1;
  let K = 0.1;
  let t0 = 0;
  const n = ages.length;

  for (let iter = 0; iter < maxIter; iter++) {
    // Residuals
    const resids = ages.map((a, i) => lengths[i] - vbPredict({ Linf, K, t0 }, a));

    // Jacobian columns: dF/dLinf, dF/dK, dF/dt0
    const J = ages.map((a) => {
      const e = Math.exp(-K * (a - t0));
      return [
        1 - e,                          // dF/dLinf
        Linf * (a - t0) * e,            // dF/dK
        -Linf * K * e,                  // dF/dt0
      ];
    });

    // JtJ and Jtr
    const JtJ = [[0,0,0],[0,0,0],[0,0,0]];
    const Jtr = [0, 0, 0];
    for (let i = 0; i < n; i++) {
      for (let r = 0; r < 3; r++) {
        Jtr[r] += J[i][r] * resids[i];
        for (let c = 0; c < 3; c++) {
          JtJ[r][c] += J[i][r] * J[i][c];
        }
      }
    }

    // Solve JtJ * delta = Jtr via Cramer / direct 3x3 inversion
    const delta = solve3x3(JtJ, Jtr);
    if (!delta) break;

    Linf += delta[0];
    K += delta[1];
    t0 += delta[2];

    if (Math.abs(delta[0]) + Math.abs(delta[1]) + Math.abs(delta[2]) < tol) break;
  }

  // Guard against degenerate fits
  if (!isFinite(Linf) || !isFinite(K) || !isFinite(t0) || K <= 0 || Linf <= 0) return null;

  return { Linf, K, t0 };
}

function solve3x3(A, b) {
  // Direct 3x3 linear solve via Gaussian elimination with partial pivoting
  const M = A.map((row, i) => [...row, b[i]]);
  for (let col = 0; col < 3; col++) {
    // Find pivot
    let maxRow = col;
    for (let row = col + 1; row < 3; row++) {
      if (Math.abs(M[row][col]) > Math.abs(M[maxRow][col])) maxRow = row;
    }
    [M[col], M[maxRow]] = [M[maxRow], M[col]];
    if (Math.abs(M[col][col]) < 1e-14) return null;
    for (let row = col + 1; row < 3; row++) {
      const f = M[row][col] / M[col][col];
      for (let k = col; k < 4; k++) M[row][k] -= f * M[col][k];
    }
  }
  const x = [0, 0, 0];
  for (let i = 2; i >= 0; i--) {
    x[i] = M[i][3];
    for (let j = i + 1; j < 3; j++) x[i] -= M[i][j] * x[j];
    x[i] /= M[i][i];
  }
  return x;
}

// --- Propagate uncertainty: delta method for CI/PI at a given age -------------
// Uses numerical Jacobian of VB w.r.t. parameters, residual variance for PI

function computeIntervals(params, ages, lengths, targetAge, level = 0.95) {
  const n = ages.length;
  const p = 3; // parameters
  if (n <= p) return null;

  const { Linf, K, t0 } = params;
  const pred = ages.map((a) => vbPredict(params, a));
  const resids = ages.map((a, i) => lengths[i] - pred[i]);
  const sse = resids.reduce((s, r) => s + r * r, 0);
  const mse = sse / (n - p);

  // Numerical Jacobian at targetAge
  const h = 1e-5;
  const f0 = vbPredict(params, targetAge);
  const dLinf = (vbPredict({ Linf: Linf + h, K, t0 }, targetAge) - f0) / h;
  const dK = (vbPredict({ Linf, K: K + h, t0 }, targetAge) - f0) / h;
  const dt0 = (vbPredict({ Linf, K, t0: t0 + h }, targetAge) - f0) / h;
  const grad = [dLinf, dK, dt0];

  // (JtJ)^-1 via 3x3 inversion
  const JtJ = [[0,0,0],[0,0,0],[0,0,0]];
  ages.forEach((a) => {
    const e = Math.exp(-K * (a - t0));
    const j = [1 - e, Linf * (a - t0) * e, -Linf * K * e];
    for (let r = 0; r < 3; r++)
      for (let c = 0; c < 3; c++)
        JtJ[r][c] += j[r] * j[c];
  });
  const JtJinv = invert3x3(JtJ);
  if (!JtJinv) return null;

  // Variance of prediction = grad^T * (JtJ)^-1 * grad * mse
  let varFit = 0;
  for (let r = 0; r < 3; r++)
    for (let c = 0; c < 3; c++)
      varFit += grad[r] * JtJinv[r][c] * grad[c];
  varFit *= mse;

  // t critical value (approx for df = n-p)
  const df = n - p;
  const tCrit = tCritical(df, level);

  const seFit = Math.sqrt(Math.max(varFit, 0));
  const sePred = Math.sqrt(Math.max(varFit + mse, 0));

  return {
    fit: f0,
    ci_low: f0 - tCrit * seFit,
    ci_high: f0 + tCrit * seFit,
    pi_low: f0 - tCrit * sePred,
    pi_high: f0 + tCrit * sePred,
  };
}

function invert3x3(A) {
  const det =
    A[0][0] * (A[1][1]*A[2][2] - A[1][2]*A[2][1]) -
    A[0][1] * (A[1][0]*A[2][2] - A[1][2]*A[2][0]) +
    A[0][2] * (A[1][0]*A[2][1] - A[1][1]*A[2][0]);
  if (Math.abs(det) < 1e-14) return null;
  const inv = Array.from({length:3}, () => [0,0,0]);
  inv[0][0] = (A[1][1]*A[2][2]-A[1][2]*A[2][1])/det;
  inv[0][1] = (A[0][2]*A[2][1]-A[0][1]*A[2][2])/det;
  inv[0][2] = (A[0][1]*A[1][2]-A[0][2]*A[1][1])/det;
  inv[1][0] = (A[1][2]*A[2][0]-A[1][0]*A[2][2])/det;
  inv[1][1] = (A[0][0]*A[2][2]-A[0][2]*A[2][0])/det;
  inv[1][2] = (A[0][2]*A[1][0]-A[0][0]*A[1][2])/det;
  inv[2][0] = (A[1][0]*A[2][1]-A[1][1]*A[2][0])/det;
  inv[2][1] = (A[0][1]*A[2][0]-A[0][0]*A[2][1])/det;
  inv[2][2] = (A[0][0]*A[1][1]-A[0][1]*A[1][0])/det;
  return inv;
}

function tCritical(df, level = 0.95) {
  // Approximation of t-distribution quantile (two-tailed)
  // Using Wilson-Hilferty approximation
  const alpha = 1 - level;
  const p = 1 - alpha / 2;
  // Normal quantile for p (Beasley-Springer-Moro approximation)
  const z = normQuantile(p);
  if (df >= 200) return z;
  // Cornish-Fisher expansion for t
  return z + (z*z*z + z) / (4*df) + (5*z*z*z*z*z + 16*z*z*z + 3*z) / (96*df*df);
}

function normQuantile(p) {
  // Rational approximation (Abramowitz & Stegun 26.2.17)
  const a = [2.515517, 0.802853, 0.010328];
  const b = [1.432788, 0.189269, 0.001308];
  const t = Math.sqrt(-2 * Math.log(p <= 0.5 ? p : 1 - p));
  const num = a[0] + a[1]*t + a[2]*t*t;
  const den = 1 + b[0]*t + b[1]*t*t + b[2]*t*t*t;
  const x = t - num/den;
  return p <= 0.5 ? -x : x;
}

// --- RNG: Box-Muller normal ---------------------------------------------------

function randn(mean, sd) {
  let u, v;
  do { u = Math.random(); } while (u === 0);
  do { v = Math.random(); } while (v === 0);
  return mean + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function runif(min, max) {
  return min + Math.random() * (max - min);
}

// --- Alligator SD function (from Saitta code) --------------------------------
// sd = sdMult * (0.0589 * log(L) + 0.0816)

function alligSD(L, sdMult = 1) {
  return sdMult * (0.0589 * Math.log(Math.max(L, 0.01)) + 0.0816);
}

// Female VB params (Wilkinson & Rhodes 1997 via Hone & Mallon 2017)
const F_LINF = 2.78, F_K = 0.0926, F_T0_IMPLICIT = 0.91; // Lf = 2.78*(1 - 0.91*exp(-0.0926*age))
// Male params with effect E (proportional scaling as in Saitta code)
function maleVB(age, E) {
  return (2.78 + E) * (1 - (0.91 + 0.02970297 * E) * Math.exp((-0.0926 + 0.022871287 * E) * age));
}
function femaleVB(age) {
  return 2.78 * (1 - 0.91 * Math.exp(-0.0926 * age));
}

// --- Single simulation run ----------------------------------------------------

function computeCVLogLik(ages, lengths, residuals, lAges, lLens, sAges, sLens) {
  const n = ages.length;
  const k = 5;
  const foldIdx = ages.map((_, i) => i % k);
  let deltaCV = 0, validFolds = 0;
  for (let fold = 0; fold < k; fold++) {
    const testIdx  = ages.map((_, i) => i).filter(i => foldIdx[i] === fold);
    const trainIdx = ages.map((_, i) => i).filter(i => foldIdx[i] !== fold);
    if (testIdx.length < 1 || trainIdx.length < 4) continue;
    const trAges = trainIdx.map(i => ages[i]);
    const trLens = trainIdx.map(i => lengths[i]);
    const teAges = testIdx.map(i => ages[i]);
    const teLens = testIdx.map(i => lengths[i]);
    const monoFit = fitVB(trAges, trLens);
    if (!monoFit) continue;
    const monoResidTrain = trAges.map((a, i) => trLens[i] - vbPredict(monoFit, a));
    const monoSigma2 = monoResidTrain.reduce((s, r) => s + r*r, 0) / trAges.length;
    if (monoSigma2 <= 0) continue;
    const monoLLTest = teAges.reduce((s, a, j) => {
      const r = teLens[j] - vbPredict(monoFit, a);
      return s - 0.5*(r*r/monoSigma2 + Math.log(2*Math.PI*monoSigma2));
    }, 0);
    const trResids = trainIdx.map(i => residuals[i]);
    const lTrainIdx = trainIdx.filter((_, j) => trResids[j] > 0);
    const sTrainIdx = trainIdx.filter((_, j) => trResids[j] <= 0);
    if (lTrainIdx.length < 4 || sTrainIdx.length < 4) continue;
    const lFitCV = fitVB(lTrainIdx.map(i => ages[i]), lTrainIdx.map(i => lengths[i]));
    const sFitCV = fitVB(sTrainIdx.map(i => ages[i]), sTrainIdx.map(i => lengths[i]));
    if (!lFitCV || !sFitCV) continue;
    const lResidTr = lTrainIdx.map(i => lengths[i] - vbPredict(lFitCV, ages[i]));
    const sResidTr = sTrainIdx.map(i => lengths[i] - vbPredict(sFitCV, ages[i]));
    const dimRSS = lResidTr.reduce((s,r) => s+r*r,0) + sResidTr.reduce((s,r) => s+r*r,0);
    const dimSigma2 = dimRSS / (lTrainIdx.length + sTrainIdx.length);
    if (dimSigma2 <= 0) continue;
    const dimLLTest = testIdx.reduce((s, i) => {
      const fit = residuals[i] > 0 ? lFitCV : sFitCV;
      const r   = lengths[i] - vbPredict(fit, ages[i]);
      return s - 0.5*(r*r/dimSigma2 + Math.log(2*Math.PI*dimSigma2));
    }, 0);
    deltaCV += dimLLTest - monoLLTest;
    validFolds++;
  }
  return validFolds === 0 ? NaN : deltaCV / validFolds;
}

// --- Model selection: AICc and BIC -------------------------------------------
function computeModelSelection(ages, lengths, combinedResids, lAges, lLens, sAges, sLens, lFit, sFit) {
  const n = ages.length, kMono = 3, kDim = 6;
  const rssMono = combinedResids.reduce((s,r) => s+r*r, 0);
  const lResids = lAges.map((a,i) => lLens[i] - vbPredict(lFit, a));
  const sResids = sAges.map((a,i) => sLens[i] - vbPredict(sFit, a));
  const rssDim  = lResids.reduce((s,r) => s+r*r,0) + sResids.reduce((s,r) => s+r*r,0);
  if (rssMono<=0||rssDim<=0||!isFinite(rssMono)||!isFinite(rssDim)) return null;
  const llMono = -n/2*Math.log(rssMono/n);
  const llDim  = -n/2*Math.log(rssDim/n);
  const aiccMono = 2*kMono - 2*llMono + (2*kMono*(kMono+1))/Math.max(n-kMono-1,1);
  const aiccDim  = 2*kDim  - 2*llDim  + (2*kDim*(kDim+1))/Math.max(n-kDim-1,1);
  const bicMono  = kMono*Math.log(n) - 2*llMono;
  const bicDim   = kDim *Math.log(n) - 2*llDim;
  return { deltaAICc: aiccDim-aiccMono, deltaBIC: bicDim-bicMono, deltaAIC: (2*kDim-2*llDim)-(2*kMono-2*llMono) };
}

// --- GMM: 2-component Gaussian mixture via EM --------------------------------
function fitGMM(residuals, maxIter=100, tol=1e-6) {
  const n = residuals.length;
  if (n < 10) return null;
  const sorted = [...residuals].sort((a,b) => a-b);
  const half   = Math.floor(n/2);
  let mu1 = sorted.slice(0,half).reduce((s,x)=>s+x,0)/half;
  let mu2 = sorted.slice(half).reduce((s,x)=>s+x,0)/(n-half);
  const om = residuals.reduce((s,x)=>s+x,0)/n;
  const ov = residuals.reduce((s,x)=>s+(x-om)**2,0)/n;
  const initSD = Math.sqrt(ov/2)||0.01;
  let pi=0.5, s1=initSD, s2=initSD, prevLL=-Infinity;
  const gauss=(x,mu,sig)=>sig<=0?0:Math.exp(-0.5*((x-mu)/sig)**2)/(sig*Math.sqrt(2*Math.PI));
  for (let iter=0; iter<maxIter; iter++) {
    const r1=residuals.map(x=>pi*gauss(x,mu1,s1));
    const r2=residuals.map(x=>(1-pi)*gauss(x,mu2,s2));
    const rt=r1.map((v,i)=>v+r2[i]+1e-300);
    const g1=r1.map((v,i)=>v/rt[i]), g2=r2.map((v,i)=>v/rt[i]);
    const ll=rt.reduce((s,v)=>s+Math.log(v),0);
    if (!isFinite(ll)) return null;
    const n1=g1.reduce((s,v)=>s+v,0), n2=g2.reduce((s,v)=>s+v,0);
    if (n1<1||n2<1) return null;
    pi=n1/n;
    mu1=g1.reduce((s,v,i)=>s+v*residuals[i],0)/n1;
    mu2=g2.reduce((s,v,i)=>s+v*residuals[i],0)/n2;
    s1=Math.sqrt(g1.reduce((s,v,i)=>s+v*(residuals[i]-mu1)**2,0)/n1)||0.001;
    s2=Math.sqrt(g2.reduce((s,v,i)=>s+v*(residuals[i]-mu2)**2,0)/n2)||0.001;
    if (Math.abs(ll-prevLL)<tol) break;
    prevLL=ll;
  }
  if (mu1>mu2){[mu1,mu2]=[mu2,mu1];[s1,s2]=[s2,s1];pi=1-pi;}
  const ll2=prevLL;
  const ll1=residuals.reduce((s,x)=>s+Math.log(gauss(x,om,Math.sqrt(ov))+1e-300),0);
  const gmmDeltaBIC=(5*Math.log(n)-2*ll2)-(2*Math.log(n)-2*ll1);
  const pooledSD=Math.sqrt((s1**2+s2**2)/2);
  const componentSep=pooledSD>0?(mu2-mu1)/pooledSD:0;
  return {mu1,mu2,s1,s2,pi,gmmDeltaBIC,componentSep};
}

// --- Single simulation run ----------------------------------------------------
function simOnce(nPerSex, effectSize, sdMult) {
  const ages = [], lengths = [];
  for (let i=0; i<nPerSex; i++){
    const age=runif(1,50); const Lf=femaleVB(age);
    lengths.push(randn(Lf, alligSD(Lf,sdMult))); ages.push(age);
  }
  for (let i=0; i<nPerSex; i++){
    const age=runif(1,50); const Lm=maleVB(age,effectSize);
    lengths.push(randn(Lm, alligSD(Lm,sdMult))); ages.push(age);
  }
  const combinedFit=fitVB(ages,lengths);
  if (!combinedFit) return null;
  const residuals=ages.map((a,i)=>lengths[i]-vbPredict(combinedFit,a));
  // True sex by generation order: indices [0, nPerSex) are female, [nPerSex, 2*nPerSex) are male.
  // Sex assignment by residual sign: r>0 -> assigned male, r<=0 -> assigned female (Saitta sex.residuals).
  // Accuracy, computed separately per true sex exactly as Saitta et al. (Allig_analysis_ETS.r lines 30-31):
  //   male accuracy   = fraction of truly-male specimens assigned male (residual > 0)
  //   female accuracy = fraction of truly-female specimens assigned female (residual <= 0)
  let maleCorrect=0, femaleCorrect=0;
  for(let i=0;i<residuals.length;i++){
    const trulyMale = i >= nPerSex;       // second generation loop = male
    const assignedMale = residuals[i] > 0;
    if(trulyMale && assignedMale) maleCorrect++;
    if(!trulyMale && !assignedMale) femaleCorrect++;
  }
  const maleAccuracy   = (maleCorrect / nPerSex) * 100;
  const femaleAccuracy = (femaleCorrect / nPerSex) * 100;
  const mAges=[],mLens=[],fAges=[],fLens=[];
  residuals.forEach((r,i)=>{
    if(r>0){mAges.push(ages[i]);mLens.push(lengths[i]);}
    else   {fAges.push(ages[i]);fLens.push(lengths[i]);}
  });
  if(mAges.length<5||fAges.length<5) return null;
  const mFit=fitVB(mAges,mLens), fFit=fitVB(fAges,fLens);
  if(!mFit||!fFit) return null;
  const lFit=mFit.Linf>=fFit.Linf?mFit:fFit, sFit=mFit.Linf>=fFit.Linf?fFit:mFit;
  const lAges=mFit.Linf>=fFit.Linf?mAges:fAges, lLens=mFit.Linf>=fFit.Linf?mLens:fLens;
  const sAges=mFit.Linf>=fFit.Linf?fAges:mAges, sLens=mFit.Linf>=fFit.Linf?fLens:mLens;
  const estEffect=lFit.Linf-sFit.Linf;
  const sdi=(lFit.Linf/sFit.Linf)-1;
  const logr=Math.log(lFit.Linf/sFit.Linf);
  // Evaluate intervals at the SAME reference age for both sexes (oldest in entire dataset).
  // Using sex-specific oldest ages can produce negative spread when the random residual split
  // assigns the oldest specimen to the smaller-sex group -- making ci_high(young) < ci_low(old).
  // A shared reference age ensures geometric coherence: spread is always ≥ 0 when curves diverge.
  const refAge = Math.max(...ages);
  const lIntervals=computeIntervals(lFit,lAges,lLens,refAge);
  const sIntervals=computeIntervals(sFit,sAges,sLens,refAge);
  if(!lIntervals||!sIntervals) return null;
  const ciSpread=lIntervals.ci_high-sIntervals.ci_low;
  const piSpread=lIntervals.pi_high-sIntervals.pi_low;
  const ciSep=lIntervals.ci_low-sIntervals.ci_high;
  const piSep=lIntervals.pi_low-sIntervals.pi_high;
  // Skip CV when sdMult < 0.05: near-zero noise makes σ²→0 and log-likelihood→−∞,
  // producing extreme values that dominate the shared y-axis across all panels.
  const deltaCV = sdMult < 0.05
    ? NaN
    : computeCVLogLik(ages,lengths,residuals,lAges,lLens,sAges,sLens);
  // Skip model selection metrics at near-zero noise for same reason as CV
  const modelSel = sdMult < 0.05
    ? null
    : computeModelSelection(ages,lengths,residuals,lAges,lLens,sAges,sLens,lFit,sFit);
  const deltaAICc=modelSel?modelSel.deltaAICc:NaN;
  const deltaBIC=modelSel?modelSel.deltaBIC:NaN;
  const gmm=fitGMM(residuals);
  const gmmDeltaBIC=gmm?gmm.gmmDeltaBIC:NaN;
  const componentSep=gmm?gmm.componentSep:NaN;
  const gmmGap=gmm?(gmm.mu2-gmm.mu1):NaN;                       // between-component mean gap (numerator of Cohen's d)
  const gmmSpread=gmm?Math.sqrt((gmm.s1**2+gmm.s2**2)/2):NaN;   // pooled within-component spread (denominator)
  return {estEffect,sdi,logr,ciSpread,piSpread,ciSep,piSep,deltaAICc,deltaBIC,deltaCV,gmmDeltaBIC,componentSep,gmmGap,gmmSpread,maleAccuracy,femaleAccuracy,lFit,sFit,lAges,lLens,sAges,sLens};
}

// --- Run scenario -------------------------------------------------------------
function runScenario(scenario,steps,nPerSex,nReps){
  const results=[];
  for(let si=0;si<steps.length;si++){
    const step=steps[si];
    const estEffects=[],sdis=[],logrs=[],ciSpreads=[],piSpreads=[],ciSeps=[],piSeps=[],
          deltaAICcs=[],deltaBICs=[],deltaCVs=[],gmmDeltaBICs=[],componentSeps=[],gmmGaps=[],gmmSpreads=[],
          maleAccs=[],femaleAccs=[];
    for(let r=0;r<nReps;r++){
      const effectSize=scenario==="dimorphism"?step:0;
      const sdMult=scenario==="variance"?step:1;
      const res=simOnce(nPerSex,effectSize,sdMult);
      if(!res) continue;
      estEffects.push(res.estEffect); sdis.push(res.sdi); logrs.push(res.logr);
      ciSpreads.push(res.ciSpread); piSpreads.push(res.piSpread);
      ciSeps.push(res.ciSep); piSeps.push(res.piSep);
      if(isFinite(res.deltaAICc))    deltaAICcs.push(res.deltaAICc);
      if(isFinite(res.deltaBIC))     deltaBICs.push(res.deltaBIC);
      if(isFinite(res.deltaCV))      deltaCVs.push(res.deltaCV);
      if(isFinite(res.gmmDeltaBIC))  gmmDeltaBICs.push(res.gmmDeltaBIC);
      if(isFinite(res.componentSep)) componentSeps.push(res.componentSep);
      if(isFinite(res.gmmGap))       gmmGaps.push(res.gmmGap);
      if(isFinite(res.gmmSpread))    gmmSpreads.push(res.gmmSpread);
      if(isFinite(res.maleAccuracy)) maleAccs.push(res.maleAccuracy);
      if(isFinite(res.femaleAccuracy)) femaleAccs.push(res.femaleAccuracy);
    }
    if(estEffects.length===0){results.push(null);continue;}
    const mean=arr=>arr.reduce((a,b)=>a+b,0)/arr.length;
    const sd=arr=>{const m=mean(arr);return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length);};
    results.push({
      x:step,
      snr:computeSNR(scenario==="dimorphism"?step:0, scenario==="variance"?step:1),
      estEffect_mean:mean(estEffects), estEffect_sd:sd(estEffects),
      sdi_mean:mean(sdis), sdi_sd:sd(sdis),
      logr_mean:mean(logrs), logr_sd:sd(logrs),
      ciSpread_mean:mean(ciSpreads), piSpread_mean:mean(piSpreads),
      ciSep_mean:mean(ciSeps), piSep_mean:mean(piSeps),
      deltaAICc_mean:deltaAICcs.length?mean(deltaAICcs):NaN,
      deltaBIC_mean:deltaBICs.length?mean(deltaBICs):NaN,
      deltaCV_mean:deltaCVs.length?mean(deltaCVs):NaN,
      gmmDeltaBIC_mean:gmmDeltaBICs.length?mean(gmmDeltaBICs):NaN,
      componentSep_mean:componentSeps.length?mean(componentSeps):NaN,
      gmmGap_mean:gmmGaps.length?mean(gmmGaps):NaN,
      gmmSpread_mean:gmmSpreads.length?mean(gmmSpreads):NaN,
      maleAccuracy_mean:maleAccs.length?mean(maleAccs):NaN,
      femaleAccuracy_mean:femaleAccs.length?mean(femaleAccs):NaN,
      n:estEffects.length,
    });
  }
  return results;
}

// --- SNR helpers --------------------------------------------------------------
function computeSNR(effectSize,sdMult){
  const fLinf=2.78, mLinf=2.78+effectSize;
  const fSD=alligSD(fLinf,sdMult), mSD=alligSD(mLinf,sdMult);
  if(effectSize===0) return Infinity;
  return effectSize/((fSD+mSD)/2);
}

// --- Scenario 3: fixed true E = NATURAL_E, sdMult varies from 0 to 2.5x ------
// x-axis = sdMult (same units as Sc.2), SNR computed analytically as metadata.
// This makes Sc.3's x-axis directly comparable to Sc.2's on the metric tabs.

function runScenarioSNR(sdMultSteps, nPerSex, nReps) {
  const results = [];
  for (let si = 0; si < sdMultSteps.length; si++) {
    const sdMult = sdMultSteps[si];
    const E = NATURAL_E;
    const estEffects=[],sdis=[],logrs=[],ciSpreads=[],piSpreads=[],ciSeps=[],piSeps=[],
          deltaAICcs=[],deltaBICs=[],deltaCVs=[],gmmDeltaBICs=[],componentSeps=[],maleAccs=[],femaleAccs=[];
    for (let r = 0; r < nReps; r++) {
      const res = simOnce(nPerSex, E, sdMult);
      if (!res) continue;
      estEffects.push(res.estEffect); sdis.push(res.sdi); logrs.push(res.logr);
      ciSpreads.push(res.ciSpread); piSpreads.push(res.piSpread);
      ciSeps.push(res.ciSep); piSeps.push(res.piSep);
      if (isFinite(res.deltaAICc))    deltaAICcs.push(res.deltaAICc);
      if (isFinite(res.deltaBIC))     deltaBICs.push(res.deltaBIC);
      if (isFinite(res.deltaCV))      deltaCVs.push(res.deltaCV);
      if (isFinite(res.gmmDeltaBIC))  gmmDeltaBICs.push(res.gmmDeltaBIC);
      if (isFinite(res.componentSep)) componentSeps.push(res.componentSep);
      if (isFinite(res.maleAccuracy)) maleAccs.push(res.maleAccuracy);
      if (isFinite(res.femaleAccuracy)) femaleAccs.push(res.femaleAccuracy);
    }
    if (estEffects.length === 0) { results.push(null); continue; }
    const mean = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
    const sd   = arr => { const m=mean(arr); return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length); };
    results.push({
      x: sdMult,                          // x-axis = sdMult, same units as Sc.2
      sdMult,
      snr: computeSNR(E, sdMult),         // SNR as metadata for SNR Analysis tab
      estEffect_mean:    mean(estEffects), estEffect_sd:    sd(estEffects),
      sdi_mean:          mean(sdis),       sdi_sd:          sd(sdis),
      logr_mean:         mean(logrs),      logr_sd:         sd(logrs),
      ciSpread_mean:     mean(ciSpreads),  piSpread_mean:   mean(piSpreads),
      ciSep_mean:        mean(ciSeps),     piSep_mean:      mean(piSeps),
      deltaAICc_mean:    deltaAICcs.length    ? mean(deltaAICcs)    : NaN,
      deltaBIC_mean:     deltaBICs.length     ? mean(deltaBICs)     : NaN,
      deltaCV_mean:      deltaCVs.length      ? mean(deltaCVs)      : NaN,
      gmmDeltaBIC_mean:  gmmDeltaBICs.length  ? mean(gmmDeltaBICs)  : NaN,
      componentSep_mean: componentSeps.length ? mean(componentSeps) : NaN,
      maleAccuracy_mean: maleAccs.length ? mean(maleAccs) : NaN,
      femaleAccuracy_mean: femaleAccs.length ? mean(femaleAccs) : NaN,
      trueEffect: E, n: estEffects.length,
    });
  }
  return results;
}


const NATURAL_E = 1.01;
const NATURAL_SD_MULT = 1.0;
const N_STEPS = 20;

// --- Trends Panel -------------------------------------------------------------

function linSlope(xs, ys) {
  const valid = xs.map((x, i) => [x, ys[i]]).filter(([x, y]) => isFinite(x) && isFinite(y) && y != null);
  if (valid.length < 3) return NaN;
  const n  = valid.length;
  const mx = valid.reduce((s, [x]) => s + x, 0) / n;
  const my = valid.reduce((s, [, y]) => s + y, 0) / n;
  const num = valid.reduce((s, [x, y]) => s + (x - mx) * (y - my), 0);
  const den = valid.reduce((s, [x]) => s + (x - mx) ** 2, 0);
  return den === 0 ? 0 : num / den;
}

function TrendsPanel({ dimResults, varResults, snrResults, naturalE, yScale }) {
  // Note: the bar chart shows normalised slopes [-1,1] -- scale toggle not applied here
  // since the values are already dimensionless and the normalisation removes the need for compression.
  const dimClean = (dimResults || []).filter(Boolean);
  const varClean = (varResults || []).filter(Boolean);
  const snr3     = [...(snrResults || []).filter(Boolean)].sort((a, b) => a.sdMult - b.sdMult);

  const dimX = dimClean.map((_, i) => i / Math.max(dimClean.length - 1, 1));
  const varX = varClean.map((_, i) => i / Math.max(varClean.length - 1, 1));
  const snrX = snr3.map((_, i) => i / Math.max(snr3.length - 1, 1));

  const metrics = [
    { id: "estEffect_mean",    label: "Est. Effect"  },
    { id: "piSep_mean",        label: "PI Sep"       },
    { id: "ciSep_mean",        label: "CI Sep"       },
    { id: "deltaAICc_mean",    label: "ΔAICc"        },
    { id: "deltaCV_mean",      label: "CV ΔLL"       },
    { id: "componentSep_mean", label: "GMM Sep"      },
    { id: "gmmDeltaBIC_mean",  label: "GMM ΔBIC"    },
  ];

  const slopes = metrics.map(m => ({
    ...m,
    s1: linSlope(dimX, dimClean.map(d => d[m.id])),
    s2: linSlope(varX, varClean.map(d => d[m.id])),
    s3: linSlope(snrX, snr3.map(d => d[m.id])),
  }));

  const normSlopes = slopes.map(s => {
    const maxAbs = Math.max(Math.abs(s.s1)||0, Math.abs(s.s2)||0, Math.abs(s.s3)||0) || 1;
    return { ...s, n1: s.s1/maxAbs, n2: s.s2/maxAbs, n3: s.s3/maxAbs };
  });

  const chartData = normSlopes.map(s => ({
    name: s.label,
    "Sc.1":  isFinite(s.n1) ? +s.n1.toFixed(3) : 0,
    "Sc.2":  isFinite(s.n2) ? +s.n2.toFixed(3) : 0,
    "Sc.3":  isFinite(s.n3) ? +s.n3.toFixed(3) : 0,
    raw1: isFinite(s.s1) ? +s.s1.toFixed(4) : 0,
    raw2: isFinite(s.s2) ? +s.s2.toFixed(4) : 0,
    raw3: isFinite(s.s3) ? +s.s3.toFixed(4) : 0,
  }));

  const expectations = [
    { m: "Est. Effect",  s1: "Increases (tracks true E)",      s2: "Increases (bias floor)",         s3: "Rises then plateau",      note: "All three rise -- trend slope alone not discriminating. Magnitude differs." },
    { m: "PI Sep",       s1: "Increases (goes positive)",       s2: "Decreases (more negative)",      s3: "Decreases (less than Sc.2)", note: "★ ONLY metric where Sc.1 and Sc.2 slopes have OPPOSITE SIGNS. Key discriminator." },
    { m: "CI Sep",       s1: "Increases",                s2: "Increases (false positive)",  s3: "Decreases",         note: "Weaker discriminator than PI Sep: CI Sep RISES in Sc.2 even with no real dimorphism (wider noise pushes the curve CIs apart), so its Sc.1 and Sc.2 slopes share the same sign. Only PI Sep cleanly separates the two." },
    { m: "ΔAICc",        s1: "Decreases steeply",               s2: "~Flat / noisy",          s3: "Decreases then recovers",    note: "Sc.1 slope much steeper than Sc.2. Absolute values misleading (always negative)." },
    { m: "CV ΔLL",       s1: "Increases (CV corrects AICc's growth)",    s2: "~Flat (constant positive bias)",                     s3: "Falls as noise rises",           note: "Cross-validation reduces ΔAICc's runaway magnitude but does NOT reach zero in Sc.2: a residual positive bias (~10) remains because sex labels are fixed from the full dataset and leak into the held-out folds. Judge it by SLOPE and by the Sc.1-vs-Sc.2 contrast, not by whether it hits zero." },
    { m: "GMM Sep",      s1: "Rises then falls (U-shape)",   s2: "~Flat (noise floor)",       s3: "Falls as noise rises",   note: "Sc.1 is non-monotonic: separation peaks near 1.25-1.5x then declines as within-group spread overtakes the gap (see diagnostic in GMM tab). Sc.3 falls because rising noise buries the fixed signal." },
    { m: "GMM ΔBIC",     s1: "Shallow U (dips mid-range)",   s2: "~0 or positive",         s3: "Rises toward positive",           note: "Mirrors GMM Sep inverted but shallow: the averaged ΔBIC only just dips to about -2 at moderate dimorphism, then climbs back toward zero at extreme E. In Sc.3 it rises from negative (low noise) through zero as noise buries the signal." },
  ];

  return (
    <div>
      <div style={{
        background: "#1c2b3a", color: "#e8dfc8",
        padding: "22px 28px", marginBottom: "20px",
        fontSize: "13px", lineHeight: 1.85,
      }}>
        <div style={{ fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase", color: "#c8a96e", marginBottom: "10px" }}>
          The Saitta Comparative Framework -- Trends, Not Thresholds
        </div>
        <p style={{margin:"0 0 10px",color:"#ddd8cc"}}>
          Saitta et al. (p. 244) argue that the fundamental question in fossil dimorphism research should not be
          "is this species dimorphic?" -- a binary question that significance testing answers poorly -- but rather
          "which datasets show the strongest evidence of sexual variation relative to others?" This reframing
          shifts the analysis from hypothesis testing to <strong style={{color:"#e8dfc8"}}>effect size estimation and comparison across datasets</strong>.
        </p>
        <p style={{margin:"0 0 10px",color:"#ddd8cc"}}>
          This panel operationalises that argument. For each of seven diagnostic metrics, we compute the
          <strong style={{color:"#e8dfc8"}}> linear regression slope</strong> of the metric's mean value across its gradient --
          i.e., how fast does the metric change per unit of the x-axis? A steep slope means the metric responds
          strongly to changes in the underlying variable. A flat slope means it does not.
        </p>
        <p style={{margin:"0 0 10px",color:"#ddd8cc"}}>
          Because metrics have very different units and magnitudes, slopes are
          <strong style={{color:"#e8dfc8"}}> normalised within each metric</strong>: the largest absolute slope across
          all three scenarios is set to ±1, and the other two are expressed relative to it. This lets you visually
          compare which metrics are most sensitive to dimorphism (Sc.1) vs noise (Sc.2) vs the mixed case (Sc.3),
          regardless of the metric's physical units.
        </p>
        <p style={{margin:"0",color:"#ddd8cc"}}>
          <strong style={{color:"#e8dfc8"}}>What to look for:</strong> The ideal diagnostic metric has (a) a large Sc.1 slope
          (responds strongly to true dimorphism), (b) a near-zero or opposite-sign Sc.2 slope (does not respond
          to noise alone), and (c) a Sc.3 slope that falls between Sc.1 and Sc.2 (degrades gracefully as noise
          rises). The Sc.1/Sc.2 ratio in the raw slopes table quantifies discriminative power -- and
          <strong style={{color:"#e8dfc8"}}> PI Separation is the only metric expected to produce an opposite-sign ratio</strong>,
          because it increases with true dimorphism (Sc.1) and decreases with noise (Sc.2).
        </p>
      </div>

      {/* Bar chart */}
      <div style={{ background: "#fff", border: "1px solid #d4c9b0", padding: "20px", marginBottom: "20px" }}>
        <div style={{ fontSize: "14px", fontWeight: "bold", color: "#1c2b3a", marginBottom: "4px" }}>
          Normalised Gradient Slopes by Metric and Scenario
        </div>
        <div style={{ fontSize: "10px", color: "#8a7a5a", fontStyle: "italic", marginBottom: "14px" }}>
          Each bar = slope / max(|slopes|) for that metric. Bar above zero = metric increases along gradient; below zero = decreases. Sc.1 x-axis: effect size. Sc.2/3 x-axis: SD multiplier.
        </div>
        <ResponsiveContainer width="100%" height={300}>
          <BarChart data={chartData} margin={{ top: 8, right: 20, left: 20, bottom: 20 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
            <XAxis dataKey="name" tick={{ fontSize: 10 }} />
            <YAxis domain={[-1.1, 1.1]} ticks={[-1,-0.5,0,0.5,1]} tickFormatter={niceFmt} tick={{ fontSize: 9 }}
              label={{ value: "Normalised slope", angle: -90, position: "insideLeft",
                style: { fontSize: "10px", fill: "#5a4a2a", textAnchor: "middle" } }} />
            <ReferenceLine y={0} stroke="#c8a96e" strokeDasharray="3 3" />
            <Tooltip
              formatter={(v, name, props) => {
                const raw = name.startsWith("Sc.1") ? props.payload.raw1
                          : name.startsWith("Sc.2") ? props.payload.raw2
                          : props.payload.raw3;
                return [`${(+v).toFixed(3)} (raw slope: ${raw})`, name];
              }}
              contentStyle={{ fontFamily: "Georgia, serif", fontSize: "11px" }}
            />
            <Legend wrapperStyle={{ fontSize: "11px", fontFamily: "Georgia, serif" }} />
            <Bar dataKey="Sc.1" fill="#2a6496" name="Sc.1 — ↑ dimorphism" radius={[2,2,0,0]} />
            <Bar dataKey="Sc.2" fill="#a63a3a" name="Sc.2 — ↑ variance, E=0" radius={[2,2,0,0]} />
            <Bar dataKey="Sc.3" fill="#2a7a4a" name="Sc.3 — ↑ variance, E=natural" radius={[2,2,0,0]} />
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Expectations table */}
      <div style={{ background: "#fff", border: "1px solid #d4c9b0", padding: "20px", marginBottom: "20px", overflowX: "auto" }}>
        <div style={{ fontSize: "13px", fontWeight: "bold", color: "#1c2b3a", marginBottom: "4px" }}>
          Expected Trend Directions -- Theory vs Simulation
        </div>
        <div style={{ fontSize: "10px", color: "#8a7a5a", fontStyle: "italic", marginBottom: "10px" }}>
          For each metric, the <strong>Expected</strong> row gives the theoretical prediction; the <strong>Observed</strong> row gives the actual direction measured from this simulation run's regression slopes (↑ rising, ↓ falling, → flat when |slope| is very small). Compare the two: a match supports the theory, a mismatch flags either insufficient reps/sample size or a genuine departure.
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
          <thead>
            <tr style={{ background: "#1c2b3a", color: "#e8dfc8" }}>
              {["Metric","","Sc.1","Sc.2","Sc.3","Note"].map((h, i) => (
                <th key={i} style={{ padding: "8px 10px", textAlign: "left", fontWeight: "normal",
                  color: i===2?"#7ab0d4":i===3?"#d47a7a":i===4?"#7ad4a0":i===5?"#c8a96e":"#e8dfc8" }}>{h}</th>
              ))}

            {expectations.map((e, i) => {
              const s = slopes[i] || {};
              const dir = v => !isFinite(v) ? "--" : Math.abs(v) < 1e-4 ? "→ flat" : v > 0 ? "↑ rises" : "↓ falls";
              const dcol = v => !isFinite(v) ? "#999" : Math.abs(v) < 1e-4 ? "#8a7a5a" : v > 0 ? "#1a6a1a" : "#a63a3a";

          Raw Slopes and Discrimination Ratios
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
          <thead>
            <tr style={{ background: "#f0ece2" }}>
              {["Metric","Sc.1 slope","Sc.2 slope","Sc.3 slope","Sc.1/Sc.2","Sc.1/Sc.3","Discrimination"].map(h => (
                <th key={h} style={{ padding:"6px 10px", textAlign:h==="Metric"?"left":"right", fontWeight:"bold" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {slopes.map((s, i) => {
              const ratio12 = (isFinite(s.s1) && isFinite(s.s2) && Math.abs(s.s2) > 1e-6)
                ? (s.s1/s.s2).toFixed(2) : "--";
              const ratio13 = (isFinite(s.s1) && isFinite(s.s3) && Math.abs(s.s3) > 1e-6)
                ? (s.s1/s.s3).toFixed(2) : "--";
              const r12 = parseFloat(ratio12);
              // Discrimination quality, based on Sc.1/Sc.2 slope ratio. NOTE: this is NOT the
              // signal-to-noise ratio (SNR = E / mean_SD) shown in the SNR Analysis tab. It is a
              // separate measure of how differently this metric responds to true dimorphism (Sc.1)
              // versus to pure noise (Sc.2):
              //  - Opposite signs (ratio < 0) AND meaningful magnitude = best: metric moves in
              //    opposite directions for signal vs noise (e.g. PI separation).
              //  - Otherwise rate by how much steeper the signal (Sc.1) trend is vs noise (Sc.2).
              const discrim = isNaN(r12) ? "--"
                : (r12 < 0 && Math.abs(r12) > 0.5) ? "★★★ Opposite (best)"
                : Math.abs(r12) > 3               ? "★★★ Strong"
                : Math.abs(r12) > 1.5             ? "★★ Moderate"
                : Math.abs(r12) > 0.8             ? "★ Weak"
                :                                   "✗ Poor";
              const qColor = discrim.startsWith("★★★")?"#1a6a1a":discrim.startsWith("★★")?"#2a6496":discrim.startsWith("★")?"#8a6a2a":"#a63a3a";
              return (
                <tr key={i} style={{ background:i%2===0?"#faf8f4":"#fff" }}>
                  <td style={{ padding:"5px 10px", fontWeight:"bold" }}>{s.label}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", color:"#2a6496" }}>{isFinite(s.s1)?s.s1.toFixed(3):"--"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", color:"#a63a3a" }}>{isFinite(s.s2)?s.s2.toFixed(3):"--"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", color:"#2a7a4a" }}>{isFinite(s.s3)?s.s3.toFixed(3):"--"}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", fontWeight:"bold" }}>{ratio12}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", fontWeight:"bold", color:"#2a5a8a" }}>{ratio13}</td>
                  <td style={{ padding:"5px 10px", textAlign:"right", fontWeight:"bold", color:qColor }}>{discrim}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{ marginTop:"10px", fontSize:"10px", color:"#8a7a5a", lineHeight:1.6 }}>
          <strong>Sc.1/Sc.2</strong>: Sc.1 slope divided by Sc.2 slope. Measures how much more strongly the metric responds to real dimorphism (Sc.1) vs noise alone (Sc.2). A large positive ratio = good discriminator; a negative ratio = the metric responds in opposite directions (strongest possible discrimination -- PI Sep is the only metric expected to show this).<br/>
          <strong>Sc.1/Sc.3</strong>: Sc.1 slope divided by Sc.3 slope. Values near 1 = both scenarios produce similar trends; values far from 1 = the metric behaves differently when signal grows vs when noise grows at constant signal.<br/>
          <strong>Discrimination</strong>: A rating of how well this metric separates a real dimorphism signal from noise, based on the Sc.1/Sc.2 slope ratio. <em>This is NOT the same as the signal-to-noise ratio (SNR = E ÷ mean_SD) used in the SNR Analysis tab</em> — it is a separate measure of how differently the metric's trend responds to true dimorphism (Sc.1) versus pure noise (Sc.2). "★★★ Opposite (best)" = the metric moves in opposite directions for signal (Sc.1) vs noise (Sc.2) with meaningful magnitude — the strongest discrimination, expected only for PI Sep. "★★★ Strong" = |Sc.1/Sc.2| &gt; 3. "★★ Moderate" = 1.5–3. "★ Weak" = 0.8–1.5. "✗ Poor" = below 0.8 (metric barely distinguishes signal from noise).
        </div>
      </div>
    </div>
  );
}


function SNRPanel({ snrResults, dimResults, varResults, naturalE, effectMetric, yScale }) {
  const metricMap = {
    raw:  { key:"estEffect_mean", label:"Est. L∞ diff (m)", trueVal:naturalE },
    sdi:  { key:"sdi_mean",       label:"SDI",              trueVal:(2.78+naturalE)/2.78-1 },
    logr: { key:"logr_mean",      label:"Log-ratio",        trueVal:Math.log((2.78+naturalE)/2.78) },
  };
  const mc = metricMap[effectMetric];
  const trueDimMetric = E => effectMetric==="raw"?E:effectMetric==="sdi"?(2.78+E)/2.78-1:Math.log((2.78+E)/2.78);

  const snrClean = (snrResults||[]).filter(Boolean);
  const dimClean = (dimResults||[]).filter(Boolean);

  const sc3Data = snrClean
    .filter(d=>isFinite(d.snr)&&d.snr>0&&d.snr<20)
    .map(d=>({ snr:+d.snr.toFixed(3), est:+d[mc.key].toFixed(4),
      ciSpread:+d.ciSpread_mean.toFixed(4), piSpread:+d.piSpread_mean.toFixed(4),
      ciSep:+d.ciSep_mean.toFixed(4), piSep:+d.piSep_mean.toFixed(4), sdMult:+d.sdMult.toFixed(2) }))
    .sort((a,b)=>a.snr-b.snr);

  const sc1_snr = dimClean
    .filter(d=>isFinite(d.snr)&&d.snr>0&&d.snr<20)
    .map(d=>({ snr:+d.snr.toFixed(3), est:+d[mc.key].toFixed(4),
      true_val:+trueDimMetric(d.x).toFixed(4),
      ciSpread:+d.ciSpread_mean.toFixed(4), piSpread:+d.piSpread_mean.toFixed(4),
      ciSep:+d.ciSep_mean.toFixed(4), piSep:+d.piSep_mean.toFixed(4) }))

  // Build the y-scaler from the full pooled value range across both scenarios.
  const allY = [...sc1_snr.flatMap(d=>[d.est,d.true_val,d.ciSep,d.piSep,d.ciSpread,d.piSpread]),
    ...sc3Data.flatMap(d=>[d.est,d.ciSep,d.piSep,d.ciSpread,d.piSpread])]
    .filter(v=>v!=null&&isFinite(v));
  const scaler = makeScaler(yScale, allY);

  // Build each scenario as its OWN native series (no union-grid resampling / nearest-snapping,
  // which previously produced a stair-step "undulation" artifact). Each line carries its real
  // (snr, value) points; recharts plots two lines with different x-grids on a shared numeric axis.
  const sc1T = sc1_snr.map(d=>({ snr:d.snr,
    est:scaler.transform(d.est), true_val:scaler.transform(d.true_val),

    ciSpread:scaler.transform(d.ciSpread), piSpread:scaler.transform(d.piSpread) }));
  const sc3T = sc3Data.map(d=>({ snr:d.snr,
    est:scaler.transform(d.est),
    ciSep:scaler.transform(d.ciSep), piSep:scaler.transform(d.piSep),
    ciSpread:scaler.transform(d.ciSpread), piSpread:scaler.transform(d.piSpread) }));

  const makeYP = (keys, labelText) => {
    const labelObj = labelText ? {label:{value:labelText,angle:-90,position:"insideLeft",
      style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}} : {};
    const vals=[...sc1T,...sc3T].flatMap(d=>keys.map(k=>d[k])).filter(v=>v!=null&&isFinite(v));
    if(!vals.length) return {tick:{fontSize:9},width:58,...labelObj};
    const tks=niceTicks(Math.min(...vals),Math.max(...vals),5);
    const pad=(tks[tks.length-1]-tks[0])*0.08||0.1;
    return {domain:[tks[0]-pad,tks[tks.length-1]+pad],ticks:tks,tickFormatter:scaler.tickFmt,tick:{fontSize:9},width:58,...labelObj};
  };
  const unit = effectMetric==="raw"?"m":effectMetric==="sdi"?"SDI":"log-ratio";
  const yEst=makeYP(["est","true_val"], `Estimated effect (${unit})`);
  const yCiSep=makeYP(["ciSep"], "CI separation (m)");
  const yPiSep=makeYP(["piSep"], "PI separation (m)");
  const ySpread=makeYP(["ciSpread","piSpread"], "Interval spread (m)");

  const zero0=scaler.transform(0);
  const showZero=zero0!=null&&isFinite(zero0);
  const tt={fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"};

  const tfmt=(v,n)=>{const raw=scaler.untransform(v);return[isFinite(raw)?raw.toFixed(3):String(v),n];};
  const allSnrVals=[...sc1T.map(d=>d.snr),...sc3T.map(d=>d.snr)];

      </div>

        <div style={{background:"#fff",border:"1px solid #d4c9b0",padding:"16px"}}>

              <Legend wrapperStyle={leg}/>

              <Tooltip formatter={tfmt} contentStyle={tt}/>
              <Legend wrapperStyle={leg}/>
              <Line data={sc1T} type="monotone" dataKey="ciSpread" stroke="#2a6496" strokeWidth={2} dot={{r:2,fill:"#2a6496"}} name="Sc.1 CI Spread" connectNulls/>
              <Line data={sc3T} type="monotone" dataKey="ciSpread" stroke="#2a7a4a" strokeWidth={2} dot={{r:2,fill:"#2a7a4a"}} name="Sc.3 CI Spread" connectNulls/>
              <Line data={sc1T} type="monotone" dataKey="piSpread" stroke="#2a6496" strokeWidth={1.5} strokeDasharray="4 2" dot={false} name="Sc.1 PI Spread" connectNulls/>
              <Line data={sc3T} type="monotone" dataKey="piSpread" stroke="#2a7a4a" strokeWidth={1.5} strokeDasharray="4 2" dot={false} name="Sc.3 PI Spread" connectNulls/>

        </div>

      </div>

      {/* Diagnostic: why points bunch at low SNR — the reciprocal mapping from even noise steps */}
      {(() => {
        const sdSteps = Array.from({length:11},(_, i)=>+(0.25+i*0.225).toFixed(3)); // 0.25 .. 2.5
        const fixedE = naturalE;
        const rows = sdSteps.map(sd => {
          const fSD = alligSD(2.78, sd), mSD = alligSD(2.78+fixedE, sd);
          const snr = fixedE/((fSD+mSD)/2);
          return { sd, snr:+snr.toFixed(2) };
        });
        const maxSnr = Math.max(...rows.map(r=>r.snr));
        const sTicks = niceTicks(0, maxSnr, 5);
        return (
          <div style={{marginTop:"18px",background:"#fff",border:"2px solid #2a6496",padding:"18px 20px"}}>
            <div style={{fontSize:"13px",fontWeight:"bold",color:"#2a6496",marginBottom:"3px"}}>
              Why the Sc.3 points bunch up at low SNR
            </div>
            <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"12px"}}>
              The simulation steps the noise level (sdMult) in EVEN increments along the horizontal axis below. But SNR =
              signal ÷ noise is a RECIPROCAL of the noise, plotted on the vertical axis. Notice how equal horizontal steps
              produce vertical SNR jumps that are large at low noise and tiny at high noise — so when these points are
              re-plotted with SNR on the horizontal axis (in the four charts above), they crowd together at the low-SNR end.
              It is purely the geometry of a reciprocal, not anything in the biology.
            </div>
            <ResponsiveContainer width="100%" height={250}>
              <LineChart data={rows} margin={{top:18,right:24,left:16,bottom:34}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
                <XAxis dataKey="sd" type="number" domain={[0,2.6]} ticks={[0,0.5,1,1.5,2,2.5]}
                  tickFormatter={v=>v.toFixed(1)+"×"}
                  label={{value:"Noise level (sdMult) — stepped in EVEN increments",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
                  tick={{fontSize:10}}/>
                <YAxis domain={[0, sTicks[sTicks.length-1]]} ticks={sTicks} tickFormatter={niceFmt}
                  label={{value:"Resulting SNR (= signal ÷ noise)",angle:-90,position:"insideLeft",style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}}
                  tick={{fontSize:10}} width={48}/>
                <Tooltip formatter={(v,n)=>[v,n]} labelFormatter={l=>`sdMult = ${l}×`}
                  contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"}}/>
                <Line type="monotone" dataKey="snr" stroke="#2a7a4a" strokeWidth={2.5} dot={{r:4,fill:"#2a7a4a"}} name="SNR at each even noise step" connectNulls/>
              </LineChart>
            </ResponsiveContainer>
            <div style={{marginTop:"10px",padding:"8px 12px",background:"#f0f4f8",borderLeft:"3px solid #2a6496",fontSize:"10px",color:"#1a3a5a",lineHeight:1.6}}>
              The green dots are evenly spaced left-to-right (equal noise steps) but pile up toward the bottom (low SNR):
              the same even spacing, viewed on the SNR axis, becomes the bunching you see in the charts above. This is why
              Sc.3 (fixed signal, rising noise) shows dense points at low SNR and sparse points at high SNR.
            </div>
          </div>
        );
      })()}

      <div style={{marginTop:"18px",background:"#1c2b3a",color:"#e8dfc8",padding:"20px 24px"}}>
        <div style={{fontSize:"11px",letterSpacing:"2px",textTransform:"uppercase",color:"#c8a96e",marginBottom:"10px"}}>The Saitta argument: why PI separation is the correct diagnostic</div>
        <ul style={{margin:0,padding:"0 0 0 18px",lineHeight:1.8,fontSize:"12px"}}>
          <li style={{marginBottom:"6px",color:"#ccc8bc"}}><strong style={{color:"#e8dfc8"}}>Effect size:</strong> Both scenarios can produce similar estimated effects at the same SNR -- cannot distinguish real signal from noise bias.</li>
          <li style={{marginBottom:"6px",color:"#ccc8bc"}}><strong style={{color:"#e8dfc8"}}>CI separation:</strong> Increases with SNR in both -- not a reliable standalone discriminator.</li>
          <li style={{marginBottom:"6px",color:"#ccc8bc"}}><strong style={{color:"#e8dfc8"}}>★ PI separation:</strong> Increases in Sc.1 (bigger signal = individuals more genuinely separated) but decreases in Sc.3 (rising noise widens PIs). The divergence between blue and green is the diagnostic signature.</li>
          <li style={{marginBottom:"0",color:"#ccc8bc"}}><strong style={{color:"#e8dfc8"}}>Spread:</strong> Ambiguous -- rises in both scenarios for different reasons.</li>
        </ul>
      </div>
    </div>
  );
}

// --- Sexing Accuracy Panel ----------------------------------------------------
// Foundational diagnostic: how well does Saitta's residual-sign rule recover TRUE sex?
// This is upstream of every other metric (all are computed from the groups it produces).
// Three plots, one per scenario, because the behaviour is qualitatively different in each.
function SexingAccuracyPanel({ dimResults, varResults, snrResults, naturalE }) {
  // Build per-scenario rows of {x (in scenario-native units), male%, female%, overall%}.
  // dropZeroNoise: for the noise-swept scenarios (Sc.2/Sc.3), exclude the zero-noise step.
  // At exactly zero noise with no scatter, specimens sit perfectly on the curve so residuals
  // are exactly 0; the "residual > 0" rule then dumps everyone into the smaller group, giving
  // a degenerate ~6%/94% split that is an artifact of tie-breaking, not a meaningful accuracy.
  // The noise level is the x-value here (sdMult), so we filter on xFn(d) directly.
  const buildRows = (results, xFn, dropZeroNoise=false) => (results || []).filter(Boolean)
    .filter(d => isFinite(d.maleAccuracy_mean) && isFinite(d.femaleAccuracy_mean))
    .map(d => ({
      x: +xFn(d).toFixed(2),
      male:   +d.maleAccuracy_mean.toFixed(1),
      female: +d.femaleAccuracy_mean.toFixed(1),
      overall: +(((d.maleAccuracy_mean + d.femaleAccuracy_mean) / 2)).toFixed(1),
    }))
    .filter(row => !dropZeroNoise || row.x >= 0.05);

  const sc1 = buildRows(dimResults, d => d.x / naturalE);                              // x = × natural dimorphism (no zero-noise issue: noise fixed at 1)
  const sc2 = buildRows(varResults, d => d.x, true);                                   // x = sdMult; drop sdMult=0
  const sc3 = buildRows(snrResults, d => (d.sdMult != null ? d.sdMult : d.x), true);   // x = sdMult; drop sdMult=0

  const chartMargin = { top: 18, right: 20, left: 14, bottom: 34 };
  const tt = { fontFamily: "Georgia,serif", fontSize: "11px", border: "1px solid #d4c9b0" };
  const leg = { fontSize: "11px", fontFamily: "Georgia,serif", paddingTop: "8px" };

  // Shared y-axis: accuracy is a percentage, always 0-100, with 50% = chance.
  const yProps = {
    domain: [40, 100], ticks: [40, 50, 60, 70, 80, 90, 100],
    tickFormatter: v => v + "%", tick: { fontSize: 10 }, width: 48,
    label: { value: "Sex-assignment accuracy", angle: -90, position: "insideLeft",
      style: { fontSize: "10px", fill: "#5a4a2a", textAnchor: "middle" } },
  };

  const renderChart = (rows, xLabel, xDomain, xTicks, xFmt, color, title, subtitle) => (
    <div style={{ background: "#fff", border: "1px solid #d4c9b0", padding: "16px", marginBottom: "16px" }}>
      <div style={{ fontSize: "13px", fontWeight: "bold", color: "#1c2b3a", marginBottom: "2px" }}>{title}</div>
      <div style={{ fontSize: "10px", color: "#8a7a5a", fontStyle: "italic", marginBottom: "10px" }}>{subtitle}</div>
      {rows.length ? (
        <ResponsiveContainer width="100%" height={250}>
          <LineChart data={rows} margin={chartMargin}>
            <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd" />
            <XAxis dataKey="x" type="number" domain={xDomain} ticks={xTicks} tickFormatter={xFmt}
              label={{ value: xLabel, position: "bottom", offset: -5, style: { fontSize: "11px", fill: "#5a4a2a" } }}
              tick={{ fontSize: 10 }} />
            <YAxis {...yProps} />
            <Tooltip formatter={(v, n) => [v + "%", n]} contentStyle={tt} />
            <Legend wrapperStyle={leg} />
            <ReferenceLine y={50} stroke="#a63a3a" strokeDasharray="5 3"
              label={{ value: "50% = chance (no better than a coin flip)", position: "insideTopRight",
                fill: "#a63a3a", fontSize: 9, fontWeight: "bold", stroke: "#fff", strokeWidth: 3, paintOrder: "stroke" }} />
            <Line type="monotone" dataKey="male" stroke="#2a6496" strokeWidth={2} dot={{ r: 2.5, fill: "#2a6496" }} name="True males correctly assigned" connectNulls />
            <Line type="monotone" dataKey="female" stroke="#a63a3a" strokeWidth={2} dot={{ r: 2.5, fill: "#a63a3a" }} name="True females correctly assigned" connectNulls />
            <Line type="monotone" dataKey="overall" stroke={color} strokeWidth={2.5} strokeDasharray="4 2" dot={false} name="Overall accuracy" connectNulls />
          </LineChart>
        </ResponsiveContainer>
      ) : (
        <div style={{ height: 250, display: "flex", alignItems: "center", justifyContent: "center", color: "#aaa", fontStyle: "italic", fontSize: "11px" }}>No data — run the simulation first.</div>
      )}
    </div>
  );

  return (
    <div>
      <div style={{ background: "#f0f4f8", border: "1px solid #8aabcc", borderLeft: "4px solid #2a6496", padding: "18px 22px", marginBottom: "18px", fontSize: "13px", color: "#1a3a5a", lineHeight: 1.85 }}>
        <div style={{ fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase", color: "#2a6496", marginBottom: "10px" }}>Sexing Accuracy — How Well Does the Residual Rule Recover True Sex?</div>
        <p style={{ margin: "0 0 10px" }}>
          Every metric in this simulator is computed <em>after</em> specimens are sorted into a "larger" and a "smaller"
          group by the sign of their residual from the combined growth curve (Saitta's residual rule). This panel asks the
          most basic question of all: <strong>how often does that rule put a specimen in the correct sex group?</strong>
          Because the simulator generates the data, we know each specimen's true sex, so we can score the rule directly —
          following Saitta et al.'s own per-sex accuracy calculation (fraction of true males assigned to the larger group;
          fraction of true females assigned to the smaller group).
        </p>
        <p style={{ margin: "0" }}>
          The red line at <strong>50%</strong> is chance — the accuracy you would get by flipping a coin. A rule that
          cannot beat 50% has recovered no real sex information. Watch how differently the rule performs across the three
          scenarios below: this is the root cause behind the effect-size floor, the GMM separation U-shape, and the
          occasional cross-validation dip seen in the other panels. (In the two noise-swept scenarios the curves begin at
          the first non-zero noise step rather than at exactly zero noise: with literally no scatter every specimen lies
          perfectly on the curve, so the residual rule has nothing to split on and "accuracy" is undefined there.)
        </p>
      </div>

      {renderChart(sc1, "Effect size (× natural dimorphism)", [0, 2.5], [0, 0.5, 1, 1.5, 2, 2.5], v => v.toFixed(1) + "×", "#2a6496",
        "Scenario 1 — Increasing true dimorphism (noise fixed at natural)",
        "Accuracy climbs from chance (50% at no dimorphism) as the sexes separate, peaks near natural dimorphism, then declines again at extreme dimorphism — where the male growth curve's juvenile portion crosses below the female curve and young males get mislabelled.")}

      {renderChart(sc2, "Noise level, sdMult (1 = natural scatter)", [0, 2.5], [0, 0.5, 1, 1.5, 2, 2.5], v => v.toFixed(1) + "×", "#a63a3a",
        "Scenario 2 — No true dimorphism, increasing noise",
        "Accuracy sits at ~50% (chance) at every noise level. There is no real size difference between the sexes, so no rule can recover sex from size — the residual split just cuts a single population in half. This is the honest baseline: the method cannot manufacture sex information that is not in the data.")}

      {renderChart(sc3, "Noise level, sdMult (1 = natural scatter)", [0, 2.5], [0, 0.5, 1, 1.5, 2, 2.5], v => v.toFixed(1) + "×", "#2a7a4a",
        "Scenario 3 — Fixed natural dimorphism, increasing noise",
        "Accuracy starts high (the natural-strength signal is clean at low noise) and decays steadily toward 50% as rising scatter drowns the fixed signal. This shows how a real, biologically-typical dimorphism becomes progressively harder to recover as individual variation increases.")}

      <div style={{ background: "#1c2b3a", color: "#e8dfc8", padding: "20px 24px" }}>
        <div style={{ fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase", color: "#c8a96e", marginBottom: "10px" }}>Why this is the foundational diagnostic</div>
        <ul style={{ margin: 0, padding: "0 0 0 18px", lineHeight: 1.8, fontSize: "12px" }}>
          <li style={{ marginBottom: "6px", color: "#ccc8bc" }}><strong style={{ color: "#e8dfc8" }}>Sc.2 pinned at 50%</strong> is the cleanest illustration in the whole simulator that the residual rule cannot invent dimorphism: with no true signal, sexing is pure chance no matter how the noise is dialled.</li>
          <li style={{ marginBottom: "6px", color: "#ccc8bc" }}><strong style={{ color: "#e8dfc8" }}>The Sc.1 floor at 50%</strong> (left edge) is exactly why the Estimated Effect Size never reaches zero: when sexing is a coin flip, the two groups still differ by chance, producing a spurious positive "effect".</li>
          <li style={{ marginBottom: "0", color: "#ccc8bc" }}><strong style={{ color: "#e8dfc8" }}>The Sc.1 decline at extreme dimorphism</strong> is the same juvenile curve-crossing that drives the GMM separation U-shape and the intermittent cross-validation dip — all three are downstream symptoms of this one upstream cause.</li>
        </ul>
      </div>
    </div>
  );
}

function ChartPair({dimData,varData,snrData,metric,naturalE,effectMetric,yScale,onStepClick}){
  const effectConfigs={
    raw:{key:"estEffect_mean",sdKey:"estEffect_sd",label:"Est. L∞ diff (m)",desc:"Mean abs(L∞_larger - L∞_smaller) across reps"},
    sdi:{key:"sdi_mean",sdKey:"sdi_sd",label:"SDI",desc:"SDI = (larger L∞ / smaller L∞) - 1. Dimensionless."},
    logr:{key:"logr_mean",sdKey:"logr_sd",label:"Log-ratio",desc:"ln(larger L∞ / smaller L∞). Symmetric, dimensionless."},
  };
  const configs={
    estEffect:effectConfigs[effectMetric],
    ciSpread:{key:"ciSpread_mean",label:"95% CI Spread (m)",desc:"Larger-sex upper CI - smaller-sex lower CI at oldest individual."},
    piSpread:{key:"piSpread_mean",label:"95% PI Spread (m)",desc:"Larger-sex upper PI - smaller-sex lower PI at oldest individual."},
    ciSep:{key:"ciSep_mean",label:"95% CI Separation (m)",desc:"Larger-sex lower CI - smaller-sex upper CI. Positive = non-overlapping curves."},
    piSep:{key:"piSep_mean",label:"95% PI Separation (m)",desc:"Larger-sex lower PI - smaller-sex upper PI. Positive = non-overlapping individuals."},
    modelSel:{key:"deltaAICc_mean",label:"ΔAICc (two-curve − one-curve model)",desc:"This panel shows TWO different measures on one chart. SOLID line = ΔAICc (negative means the two-curve dimorphic model fits better; typically large negative here). DASHED line = CV ΔLog-Likelihood (positive means the dimorphic model predicts held-out data better; typically near 0). Different scales — read each against its own range. Focus on TRENDS."},
    gmm:{key:"componentSep_mean",label:"GMM Component Separation (Cohen's d)",desc:"This panel shows TWO different measures on one chart. SOLID line = GMM Component Separation, measured in Cohen's d (how far apart the two clusters are; about 1 at the no-dimorphism floor, rising to ~2.5-3 at natural dimorphism). DASHED line = GMM ΔBIC (whether two clusters fit better than one; the plotted average runs roughly +10 down to about −2). They use different numeric scales, so read each line against its own typical range, not against each other. Focus on TRENDS, not absolute values."},
  };
  const cfg=configs[metric];
  const showZero=metric==="ciSep"||metric==="piSep"||metric==="modelSel"||metric==="gmm";
  const y2Key=metric==="modelSel"?"deltaCV_mean":metric==="gmm"?"gmmDeltaBIC_mean":null;
  const y2Label=metric==="modelSel"?"CV ΔLog-Likelihood":metric==="gmm"?"GMM ΔBIC":null;

  // -- Metric-specific reference lines -----------------------------------------
  // Each entry: { y, color, dash, label, labelPos }
  // These mark meaningful thresholds -- values where interpretation changes.
  const naturalSDI  = (2.78 + naturalE) / 2.78 - 1;
  const naturalLogr = Math.log((2.78 + naturalE) / 2.78);

  const refLinesByMetric = {
    estEffect: [
      // True biological dimorphism reference -- what the method should recover
      { y: naturalE,    color:"#c8a96e", dash:"6 3", label:"Natural E (1.01m)", pos:"right" },
    ],
    ciSpread: [
      // Zero is impossible/pathological; natural-condition spread is meaningful
      { y: 0,           color:"#c8a96e", dash:"4 3", label:"y=0", pos:"right" },
    ],
    piSpread: [
      { y: 0,           color:"#c8a96e", dash:"4 3", label:"y=0", pos:"right" },
    ],
    ciSep: [
      // Zero = curves just touching; the critical boundary
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0 (curves touching)", pos:"right" },
    ],
    piSep: [
      // Zero = individuals just touching; positive = non-overlapping
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0 (individuals touching)", pos:"right" },
    ],
    modelSel: [
      // y=0: monomorphic vs dimorphic preference crossover -- the only meaningful absolute line here.
      // The conventional ΔAICc thresholds (-2 modest, -7 strong) are intentionally NOT drawn: the
      // structural bias makes ΔAICc ~ -100 to -250 in every scenario, so those thresholds sit
      // essentially on the y=0 line and convey nothing. See the definition panel for why.
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0", pos:"right" },
    ],
    gmm: [
      // y=0 for component separation (left axis)
      { y: 0,           color:"#e05050", dash:"4 2", label:"y=0", pos:"right" },
      // Cohen's d conventional thresholds for component separation (LEFT axis - solid line)
      { y: 0.2,         color:"#8aaa6a", dash:"3 3", label:"d=0.2 (small)", pos:"right" },
      { y: 0.5,         color:"#4a8a4a", dash:"3 3", label:"d=0.5 (medium)", pos:"right" },
      { y: 0.8,         color:"#2a6a2a", dash:"3 3", label:"d=0.8 (large)", pos:"right" },
      // GMM ΔBIC threshold (RIGHT axis - dashed line). Only the -2 "positive evidence" line is
      // drawn: averaged over reps the curve only just grazes -2 at moderate dimorphism and never
      // approaches the conventional -6 "strong" line, so drawing -6 would only mislead.
      { y: -2,          color:"#a06030", dash:"2 4", label:"ΔBIC=−2 (positive evidence)", pos:"left", axis:"right" },
    ],
  };

  // For effect size tab, add SDI/logr natural reference lines
  if (metric === "estEffect") {
    if (effectMetric === "sdi")  refLinesByMetric.estEffect = [{ y: naturalSDI,  color:"#c8a96e", dash:"6 3", label:`Natural SDI (${naturalSDI.toFixed(3)})`, pos:"right" }];
    if (effectMetric === "logr") refLinesByMetric.estEffect = [{ y: naturalLogr, color:"#c8a96e", dash:"6 3", label:`Natural log-r (${naturalLogr.toFixed(3)})`, pos:"right" }];
  }

  const refLines = refLinesByMetric[metric] || [];

  const toRaw=(data,xFn,scenarioType)=>(data||[]).filter(Boolean).map(d=>({
    x:+xFn(d).toFixed(3), y:d[cfg.key],
    y2:y2Key?d[y2Key]:undefined,
    // Store step parameters for GrowthCurvePanel on click
    effectSize: scenarioType==="dimorphism" ? d.x : scenarioType==="variance" ? 0 : NATURAL_E,
    sdMult:     scenarioType==="dimorphism" ? 1   : d.sdMult!=null ? d.sdMult : d.x,
    scenario:   scenarioType,
  }));

  const dimRaw=toRaw(dimData,d=>d.x/naturalE,"dimorphism");
  const varRaw=toRaw(varData,d=>d.x/NATURAL_SD_MULT,"variance");
  const snrRaw=toRaw(snrData,d=>d.x/NATURAL_SD_MULT,"snr3").sort((a,b)=>a.x-b.x);

  // -- Shared y-axis scale across all three panels ------------------------------
  // Collect ALL raw y values from all three datasets to compute a shared domain.
  // This is the whole point of the scale toggle: compress Sc.3 extremes so
  // Sc.1 and Sc.2 dynamics remain visible on the same axis range.
  const allRawY=[...dimRaw,...varRaw,...snrRaw]
    .flatMap(d=>[d.y,d.y2]).filter(v=>v!=null&&isFinite(v));
  const hasNonPositive=allRawY.some(v=>v<=0);
  const effectiveScale=(yScale==="log"&&hasNonPositive)?"signedLog":yScale||"linear";
  const scaleFallback=(yScale==="log"&&hasNonPositive);

  const slog=v=>v===0?0:Math.sign(v)*Math.log10(1+Math.abs(v));
  const transform=v=>{
    if(v==null||!isFinite(v)) return null;
    if(effectiveScale==="log")       return v>0?Math.log10(v):null;
    if(effectiveScale==="signedLog") return slog(v);
    return v;
  };
  const untransform=v=>{
    if(effectiveScale==="log")       return Math.pow(10,v);
    if(effectiveScale==="signedLog"){const s=v<0?-1:1;return s*(Math.pow(10,Math.abs(v))-1);}
    return v;
  };
  // Use shared niceFmt for tick labels -- see module-level definition

  // Apply transform to all three datasets
  const applyT=rows=>rows.map(d=>({...d,y:transform(d.y),y2:transform(d.y2)}));
  const dimT=applyT(dimRaw);
  const varT=applyT(varRaw);
  const snrT=applyT(snrRaw);

  // Shared domain in transformed space
  const tAll=[...dimT,...varT,...snrT].flatMap(d=>[d.y,d.y2]).filter(v=>v!=null&&isFinite(v));
  const tMin=tAll.length?Math.min(...tAll):0;
  const tMax=tAll.length?Math.max(...tAll):1;
  const tPad=(tMax-tMin)*0.08||0.1;

  // Shared domain: use raw (untransformed) values across ALL three datasets,
  // anchored at 0 when non-negative, then transform the domain endpoints.
  const allRawForDomain = [...dimRaw,...varRaw,...snrRaw]
    .flatMap(d=>[d.y,d.y2]).filter(v=>v!=null&&isFinite(v));
  const rawMin = allRawForDomain.length ? Math.min(...allRawForDomain) : 0;
  const rawMax = allRawForDomain.length ? Math.max(...allRawForDomain) : 1;
  // Anchor lo at 0 for non-negative data
  const domainRawLo = rawMin >= 0 ? 0 : rawMin;
  const domainRawHi = rawMax;
  // Compute nice ticks in RAW space, then transform for the domain
  const tTicks = niceTicks(domainRawLo, domainRawHi, 5).map(t => transform(t)).filter(v=>v!=null&&isFinite(v));
  const sharedDomain = tTicks.length >= 2
    ? [tTicks[0] - Math.abs(tTicks[tTicks.length-1]-tTicks[0])*0.02,
       tTicks[tTicks.length-1] + Math.abs(tTicks[tTicks.length-1]-tTicks[0])*0.02]
    : [transform(domainRawLo)||0, transform(domainRawHi)||1];
  const tickFmt = effectiveScale !== "linear"
    ? v => niceFmt(untransform(v))
    : v => niceFmt(v);

  // Reference lines for the FIRST combined overlay (which plots the PRIMARY metric only).
  // Exclude secondary-axis lines (axis:"right", e.g. ΔBIC) — those belong on the second overlay.
  const visibleRefLines = refLines
    .filter(r => r.axis !== "right")
    .map(r => ({ ...r, yScaled: transform(r.y) }))
    .filter(r => r.yScaled != null && isFinite(r.yScaled));

  // Zero line in transformed space -- now handled via refLines array, not needed here
  const zeroT=transform(0); // kept for potential future use

  const scaleSuffix=""; // don't append to y-axis label -- too narrow, truncates
  const scaleNote=effectiveScale==="log"
    ? {label:"Log₁₀ scale", color:"#1a4a1a", bg:"#e8f4e8", border:"#2a8a2a",
       detail:"Y-axis spacing is logarithmic -- equal vertical distance = equal multiplicative change. All three panels share the same y-axis range, so Sc.1 and Sc.2 dynamics remain visible even when Sc.3 reaches extreme values. Tick labels show original (untransformed) values."}
    : effectiveScale==="signedLog"
    ? {label:"Signed-log scale", color:"#1a3a5a", bg:"#e8f0f8", border:"#2a6496",
       detail:"Y = sign(y)·log₁₀(1+|y|). Works for metrics with negative values (separation, ΔAICc). Equal vertical distance = equal multiplicative change in magnitude. All three panels share the same y-axis range. Tick labels show original values."}
    : null;

  const metricIntros={
    modelSel:{
      title:"Model Selection: Does Two Growth Curves Fit Better Than One?",
      body:"Each panel compares a 3-parameter monomorphic VB model against a 6-parameter dimorphic model. ΔAICc (solid) penalises for extra parameters; CV ΔLog-Likelihood (dashed) evaluates both on held-out data via 5-fold cross-validation, reducing (but not eliminating) the endogeneity bias. In Sc.2, CV ΔLL does NOT reach zero -- a residual positive bias (~10) remains because sex labels are fixed from the full dataset. The Sc.2 vs Sc.3 (and Sc.1 vs Sc.2) GAP in CV ΔLL is the cleanest model-selection signal of real dimorphism, not its absolute value.",
    },
    gmm:{
      title:"GMM on Residuals: Unimodal or Bimodal Growth Scatter?",
      body:"A 2-component Gaussian mixture is fitted to residuals from the combined VB curve. Component separation (solid, Cohen's d) quantifies how clearly two groups emerge. GMM ΔBIC (dashed) tests whether the 2-component model is preferred over a single normal. Important: component separation is non-zero even at E=0 (~0.8-1.2 in Sc.2) because the residual split always creates two halves. Focus on TRENDS and the Sc.2 vs Sc.3 gap.",
    },
  };
  const intro=metricIntros[metric];

  // Common props for all three ChartPanel calls
  const panelProps={
    yLabel:cfg.label, y2Label,
    sharedDomain, tTicks, tickFmt, effectiveScale,
    untransform, scaleBadge:scaleNote?scaleNote.label:null,
    scaleBadgeColor:scaleNote?scaleNote.border:null,
    refLines,
    onStepClick,
  };

  return(
    <div>
      {intro&&(
        <div style={{background:"#f8f4ec",border:"1px solid #d4c9b0",borderLeft:"4px solid #8a6a2a",
          padding:"16px 20px",marginBottom:"18px",fontSize:"13px",color:"#3a3a3a",lineHeight:1.8}}>
          <div style={{fontSize:"12px",letterSpacing:"1.5px",textTransform:"uppercase",color:"#8a6a2a",marginBottom:"8px",fontWeight:"bold"}}>{intro.title}</div>
          <p style={{margin:0}}>{intro.body}</p>
        </div>
      )}
      {scaleFallback&&(
        <div style={{fontSize:"11px",color:"#a63a3a",marginBottom:"8px",padding:"6px 10px",background:"#fdf0f0",borderLeft:"3px solid #a63a3a"}}>
          Warning: Log scale requested but data contains non-positive values -- automatically using Signed Log instead.
        </div>
      )}
      {scaleNote&&(
        <div style={{marginBottom:"14px",padding:"10px 16px",background:scaleNote.bg,
          border:`1px solid ${scaleNote.border}`,borderLeft:`4px solid ${scaleNote.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"}}>
            <span style={{background:scaleNote.border,color:"#fff",padding:"2px 8px",
              borderRadius:"3px",fontSize:"11px",fontWeight:"bold",letterSpacing:"0.5px"}}>
              {scaleNote.label}
            </span>
            <span style={{fontSize:"12px",fontWeight:"bold",color:scaleNote.color}}>
              Y-axis is shared across all three panels -- this is where the compression is meaningful
            </span>
          </div>
          <div style={{fontSize:"11px",color:scaleNote.color,lineHeight:1.6}}>{scaleNote.detail}</div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"18px"}}>
        <ChartPanel title="Sc.1: Increasing Dimorphism" subtitle="True effect: 0→2.5× natural (E=0 at origin). SD fixed at 1x."
          data={dimT} xLabel="True effect (× natural dimorphism)" yDesc={cfg.desc} color="#2a6496"
          referenceX={1} referenceXLabel="Natural E"
          {...panelProps}/>
        <ChartPanel title="Sc.2: Increasing Variance -- E = 0" subtitle="True E=0 throughout. SD: 0→2.5× natural."
          data={varT} xLabel="SD multiplier, sdMult (1 = natural scatter)" yDesc={cfg.desc} color="#a63a3a"
          referenceX={1} referenceXLabel="Natural SD"
          {...panelProps}/>
        <ChartPanel title="Sc.3: Increasing Variance -- E = natural" subtitle={`True E fixed at ${naturalE.toFixed(2)}m. SD: 0→2.5× natural.`}
          data={snrT} xLabel="SD multiplier, sdMult (1 = natural scatter)" color="#2a7a4a"
          referenceX={1} referenceXLabel="Natural SD"
          yDesc="Same x-axis range and units as Sc.2. Any difference at the same x position is due solely to real dimorphism in Sc.3."
          {...panelProps}/>
      </div>

      {/* Combined overlay: all three scenarios on one plot, shared x (× natural) and shared y */}
      {(() => {
        // Merge by x-value (× natural reference). All three use the same 0→2.5× x-axis.
        const xs = [...new Set([...dimT, ...varT, ...snrT].map(d => +d.x.toFixed(3)))].sort((a,b)=>a-b);
        const findY = (rows, x) => { const r = rows.find(d => Math.abs(d.x - x) < 0.001); return r ? r.y : undefined; };
        const combined = xs.map(x => ({
          x,
          sc1: findY(dimT, x),
          sc2: findY(varT, x),
          sc3: findY(snrT, x),
        }));
        // Own y-domain for this overlay: based ONLY on the primary metric's values plus the
        // primary-axis threshold lines it draws (NOT the dual-scale sharedDomain, which for the
        // GMM/modelSel tabs is inflated by the very different secondary-metric range).
        const ov1vals = [
          ...combined.flatMap(d=>[d.sc1,d.sc2,d.sc3]),
          ...visibleRefLines.map(r=>r.yScaled),
        ].filter(v=>v!=null&&isFinite(v));
        const ov1Lo = ov1vals.length ? Math.min(...ov1vals) : 0;
        const ov1Hi = ov1vals.length ? Math.max(...ov1vals) : 1;
        const ov1Ticks = niceTicks(ov1Lo, ov1Hi, 5);
        const ov1Pad = Math.abs(ov1Ticks[ov1Ticks.length-1]-ov1Ticks[0])*0.04 || 0.1;
        const ov1Dom = [ov1Ticks[0]-ov1Pad, ov1Ticks[ov1Ticks.length-1]+ov1Pad];
        return (
          <div style={{marginTop:"22px",background:"#fff",border:"2px solid #1c2b3a",padding:"18px 20px"}}>
            <div style={{fontSize:"13px",fontWeight:"bold",color:"#1c2b3a",marginBottom:"3px"}}>
              All Three Scenarios Overlaid — {cfg.label}
            </div>
            <div style={{fontSize:"10px",color:"#8a7a5a",fontStyle:"italic",marginBottom:"12px"}}>
              All three scenarios on one plot for direct comparison. X-axis = × natural reference (dimorphism for Sc.1, scatter for Sc.2 and Sc.3). Dashed vertical line = natural reference (×1).
            </div>
            <ResponsiveContainer width="100%" height={300}>
              <LineChart data={combined} margin={{top:18,right:20,left:12,bottom:34}}>
                <CartesianGrid strokeDasharray="3 3" stroke="#ede8dd"/>
                <XAxis dataKey="x" type="number" domain={[0, 2.5]} ticks={[0,0.5,1,1.5,2,2.5]}
                  tickFormatter={v=>v.toFixed(1)+"×"}
                  label={{value:"× natural reference value",position:"bottom",offset:-5,style:{fontSize:"11px",fill:"#5a4a2a"}}}
                  tick={{fontSize:10}}/>
                <YAxis domain={ov1Dom} ticks={ov1Ticks} tickFormatter={tickFmt}
                  label={{value:cfg.label,angle:-90,position:"insideLeft",style:{fontSize:"10px",fill:"#5a4a2a",textAnchor:"middle"}}}
                  tick={{fontSize:10}} width={62}/>
                <Tooltip formatter={(v,n)=>{const raw=untransform(v);return[isFinite(raw)?raw.toFixed(4):String(v),n];}}
                  contentStyle={{fontFamily:"Georgia,serif",fontSize:"11px",border:"1px solid #d4c9b0"}}/>
                <Legend wrapperStyle={{fontSize:"11px",fontFamily:"Georgia,serif",paddingTop:"10px"}}/>
                <ReferenceLine x={1} stroke="#aaa" strokeDasharray="3 3"
                  label={{value:"Natural",position:"insideTop",fill:"#888",fontSize:9,stroke:"#fff",strokeWidth:3,paintOrder:"stroke"}}/>
                {visibleRefLines.map((r,i)=>(
                  <ReferenceLine key={i} y={r.yScaled} stroke={r.color} strokeDasharray={r.dash} strokeWidth={1}
